<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#7dd87d"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="560" height="68" fill="#0D0E13"/>
  <text x="24" y="42" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="700" fill="#fff">Dashboard Validation</text>
  <g transform="translate(480,22)">
    <rect width="56" height="24" rx="9999" fill="#1e1f26"/>
    <circle cx="14" cy="12" r="8" fill="#97ea90"/>
    <text x="28" y="16" font-family="Inter, sans-serif" font-size="11" fill="#fff">Live</text>
  </g>

  <!-- Cards Row -->
  <g transform="translate(24,88)">
    <!-- Card 1 -->
    <rect width="160" height="92" fill="#fff" rx="12" filter="url(#sd)"/>
    <text x="16" y="32" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.05em">TOTAL ZONES</text>
    <text x="16" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="32" font-weight="700" fill="#0D0E13">42</text>
    <rect x="16" y="70" width="128" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="16" y="70" width="128" height="6" rx="3" fill="url(#grad)"/>
    
    <!-- Card 2 -->
    <rect x="184" width="160" height="92" fill="#fff" rx="12" filter="url(#sd)"/>
    <text x="200" y="32" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.05em">LAYOUT SCORE</text>
    <text x="200" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="32" font-weight="700" fill="#0D0E13">98%</text>
    <circle cx="328" cy="44" r="20" stroke="#97ea90" stroke-width="4" fill="none" stroke-dasharray="94 6" stroke-linecap="round" transform="rotate(-90 328 44)"/>
    
    <!-- Card 3 -->
    <rect x="368" width="160" height="92" fill="#fff" rx="12" filter="url(#sd)"/>
    <text x="384" y="32" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.05em">CONFIDENCE</text>
    <text x="384" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="32" font-weight="700" fill="#0D0E13">A+</text>
    <rect x="384" y="70" width="128" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="384" y="70" width="128" height="6" rx="3" fill="url(#grad)"/>
  </g>

  <!-- Action Bar -->
  <g transform="translate(24,200)">
    <rect width="504" height="48" fill="#f8f7f4" rx="12"/>
    <rect x="16" y="12" width="24" height="24" fill="#97ea90" rx="6"/>
    <text x="48" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0D0E13">Explore zones interactively</text>
    <rect x="400" y="8" width="88" height="32" rx="9999" fill="#0D0E13"/>
    <text x="444" y="26" font-family="Inter, sans-serif" font-size="13" fill="#fff" text-anchor="middle">Validate</text>
  </g>
</svg>