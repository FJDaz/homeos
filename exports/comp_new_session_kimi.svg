<svg viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="20" y="10" width="320" height="60" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Button -->
  <rect id="btn" x="24" y="18" width="312" height="44" rx="9999" fill="#1258ca"/>

  <!-- Icon -->
  <g fill="#ffffff">
    <path d="M52 34a8 8 0 1 0 2.3 5.7l-1.2-1.2a6 6 0 1 1 1.3-6.5h3.4v-2h-4.2a8 8 0 0 0-1.6 3z"/>
  </g>

  <!-- Label -->
  <text x="72" y="42" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff">NOUVELLE SESSION</text>

  <!-- Hover overlay (hidden by default) -->
  <rect id="btnHover" x="24" y="18" width="312" height="44" rx="9999" fill="#ffffff" fill-opacity="0.12" opacity="0"/>
</svg>