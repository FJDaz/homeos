<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="20" y="40" width="400" height="160" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="40" y="70" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Progression des 9 phases</text>

  <!-- Stepper -->
  <g>
    <!-- Step 1 (completed) -->
    <circle cx="60" cy="120" r="12" fill="#1258ca"/>
    <text x="60" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">1</text>
    <line x1="72" y1="120" x2="88" y2="120" stroke="#1258ca" stroke-width="2"/>

    <!-- Step 2 (completed) -->
    <circle cx="100" cy="120" r="12" fill="#1258ca"/>
    <text x="100" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">2</text>
    <line x1="112" y1="120" x2="128" y2="120" stroke="#1258ca" stroke-width="2"/>

    <!-- Step 3 (completed) -->
    <circle cx="140" cy="120" r="12" fill="#1258ca"/>
    <text x="140" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">3</text>
    <line x1="152" y1="120" x2="168" y2="120" stroke="#1258ca" stroke-width="2"/>

    <!-- Step 4 (active) -->
    <circle cx="180" cy="120" r="14" fill="none" stroke="#1258ca" stroke-width="3"/>
    <circle cx="180" cy="120" r="8" fill="#1258ca"/>
    <text x="180" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">4</text>
    <line x1="194" y1="120" x2="208" y2="120" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Step 5 (future) -->
    <circle cx="220" cy="120" r="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="2"/>
    <text x="220" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">5</text>
    <line x1="232" y1="120" x2="248" y2="120" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Step 6 (future) -->
    <circle cx="260" cy="120" r="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="2"/>
    <text x="260" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">6</text>
    <line x1="272" y1="120" x2="288" y2="120" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Step 7 (future) -->
    <circle cx="300" cy="120" r="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="2"/>
    <text x="300" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">7</text>
    <line x1="312" y1="120" x2="328" y2="120" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Step 8 (future) -->
    <circle cx="340" cy="120" r="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="2"/>
    <text x="340" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">8</text>
    <line x1="352" y1="120" x2="368" y2="120" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Step 9 (future) -->
    <circle cx="380" cy="120" r="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="2"/>
    <text x="380" y="148" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">9</text>
  </g>

  <!-- Labels -->
  <text x="60" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Init</text>
  <text x="100" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Plan</text>
  <text x="140" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Design</text>
  <text x="180" y="168" font-family="Inter, sans-serif" font-size="10" fill="#1258ca" font-weight="600" text-anchor="middle">Build</text>
  <text x="220" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Test</text>
  <text x="260" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Launch</text>
  <text x="300" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Scale</text>
  <text x="340" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Support</text>
  <text x="380" y="168" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Done</text>
</svg>