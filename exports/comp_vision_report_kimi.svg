<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#df1f29"/>
      <stop offset="100%" stop-color="#b71a24"/>
    </linearGradient>
    <style>
      .title { font-family:"Plus Jakarta Sans", Inter, sans-serif; font-weight:700; font-size:18px; fill:#151515; }
      .meta { font-family:Inter, system-ui, sans-serif; font-size:11px; fill:#6b7280; letter-spacing:0.05em; }
      .btn { font-family:Inter, system-ui, sans-serif; font-size:13px; font-weight:600; fill:#ffffff; }
      .zone { font-family:Inter, system-ui, sans-serif; font-size:10px; font-weight:600; fill:#ffffff; }
    </style>
  </defs>

  <!-- Card -->
  <rect x="16" y="16" width="408" height="208" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="32" y="44" class="title">Rapport Analyse Vision</text>
  <text x="32" y="62" class="meta">IMAGE + CALQUE SUPERPOSÉ • 6 ZONES DÉTECTÉS</text>

  <!-- Preview canvas -->
  <rect x="32" y="78" width="248" height="128" rx="8" fill="#f8f7f4"/>
  <image x="36" y="82" width="240" height="120" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQwIiBoZWlnaHQ9IjEyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjQwIiBoZWlnaHQ9IjEyMCIgZmlsbD0iI2U1ZTdlYiIvPjx0ZXh0IHg9IjEyMCIgeT0iNjAiIGZvbnQtZmFtaWx5PSJJbnRlciI+SW1hZ2U8L3RleHQ+PC9zdmc+"/>

  <!-- Overlay zones -->
  <rect x="48" y="96" width="64" height="48" rx="4" fill="none" stroke="#df1f29" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="80" y="120" text-anchor="middle" class="zone">Zone 1</text>

  <rect x="180" y="110" width="72" height="56" rx="4" fill="none" stroke="#f05e23" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="216" y="142" text-anchor="middle" class="zone">Zone 2</text>

  <!-- Confidence badge -->
  <rect x="216" y="86" width="48" height="20" rx="10" fill="#97ea90"/>
  <text x="240" y="98" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#151515">92%</text>

  <!-- Side panel -->
  <rect x="296" y="78" width="104" height="128" rx="8" fill="#f8f7f4"/>
  <text x="308" y="98" class="meta">DÉTECTIONS</text>
  <text x="308" y="116" font-family="Inter" font-size="12" fill="#151515">• Visage A</text>
  <text x="308" y="130" font-family="Inter" font-size="12" fill="#151515">• Visage B</text>
  <text x="308" y="144" font-family="Inter" font-size="12" fill="#151515">• Texte</text>
  <text x="308" y="158" font-family="Inter" font-size="12" fill="#151515">• Logo</text>

  <!-- Action button -->
  <g>
    <rect x="296" y="176" width="104" height="30" rx="9999" fill="url(#btnGrad)"/>
    <text x="348" y="195" text-anchor="middle" class="btn">Analyser</text>
  </g>
</svg>