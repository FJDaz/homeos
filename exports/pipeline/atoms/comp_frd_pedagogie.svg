<svg viewBox="0 0 300 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc33;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="12" y="12" width="276" height="716" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="32" y="52" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="19" fill="#111827">Structure Technique</text>
    <text x="32" y="78" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Sullivan • Expert Architecture</text>
    
    <line x1="32" y1="95" x2="268" y2="95" stroke="#e5e7eb" stroke-width="1"/>
    
    <g transform="translate(32, 115)">
      <circle cx="12" cy="12" r="12" fill="#ffd548" opacity="0.15"/>
      <text x="12" y="16" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="11" fill="#b45309" text-anchor="middle">S</text>
      <rect x="28" y="0" width="208" height="90" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="42" y="25" font-family="Inter, sans-serif" font-size="13" fill="#374151">
        <tspan x="42" dy="0">Le Genome est structuré</tspan>
        <tspan x="42" dy="20">en organes indépendants.</tspan>
        <tspan x="42" dy="20">Chaque composant expose</tspan>
        <tspan x="42" dy="20">une interface sémantique</tspan>
        <tspan x="42" dy="20">strictement typée.</tspan>
      </text>
    </g>
    
    <g transform="translate(32, 225)">
      <rect x="48" y="0" width="188" height="50" rx="8" fill="#1f2937"/>
      <text x="62" y="22" font-family="Inter, sans-serif" font-size="13" fill="#f9fafb">
        <tspan x="62" dy="0">Et la communication</tspan>
        <tspan x="62" dy="18">inter-organes ?</tspan>
      </text>
    </g>
    
    <g transform="translate(32, 295)">
      <circle cx="12" cy="12" r="12" fill="#ffd548" opacity="0.15"/>
      <text x="12" y="16" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="11" fill="#b45309" text-anchor="middle">S</text>
      <rect x="28" y="0" width="208" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="42" y="25" font-family="Inter, sans-serif" font-size="13" fill="#374151">
        <tspan x="42" dy="0">Via le bus Aetherflow :</tspan>
      </text>
      <rect x="42" y="45" width="180" height="85" rx="6" fill="#111827"/>
      <text x="52" y="65" font-family="Roboto Mono, monospace" font-size="10" fill="#97ea90">
        <tspan x="52" dy="0">// Publication d'événement</tspan>
        <tspan x="52" dy="16" fill="#ffd548">bus.emit('genome:update',</tspan>
        <tspan x="52" dy="16" fill="#ffd548">  { organ: 'frd-ui',</tspan>
        <tspan x="52" dy="16" fill="#ffd548">    delta: mutation });</tspan>
      </text>
    </g>
    
    <g transform="translate(32, 455)">
      <rect x="108" y="0" width="128" height="40" rx="8" fill="#1f2937"/>
      <text x="122" y="25" font-family="Inter, sans-serif" font-size="13" fill="#f9fafb">Parfait, merci.</text>
    </g>
    
    <g transform="translate(32, 640)">
      <rect x="0" y="0" width="236" height="56" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1.5"/>
      <text x="16" y="33" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">Poser une question...</text>
      <rect x="244" y="8" width="40" height="40" rx="8" fill="url(#goldGradient)"/>
      <path d="M258 24 L266 28 L258 32" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="264" y1="28" x2="258" y2="28" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <text x="32" y="725" font-family="Inter, sans-serif" font-size="11" fill="#10b981">● En ligne</text>
  </g>
</svg>