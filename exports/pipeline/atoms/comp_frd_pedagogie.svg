<svg viewBox="0 0 240 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd548"/>
      <stop offset="100%" style="stop-color:#ffe175"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="16" y="16" width="208" height="528" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <!-- Header -->
    <text x="36" y="56" font-family="Plus Jakarta Sans, sans-serif" font-size="19" font-weight="700" fill="#111827">Pédagogie</text>
    <rect x="36" y="64" width="32" height="3" rx="1.5" fill="#ffd548"/>
    
    <!-- Sullivan Avatar -->
    <circle cx="48" cy="104" r="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="48" y="108" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#1258ca" text-anchor="middle">S</text>
    
    <!-- Message Bubble -->
    <path d="M 68 88 L 188 88 A 8 8 0 0 1 196 96 L 196 268 A 8 8 0 0 1 188 276 L 68 276 A 8 8 0 0 1 60 268 L 60 104 A 8 8 0 0 1 68 88 Z" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Sender Name -->
    <text x="80" y="112" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#111827">Sullivan</text>
    
    <!-- Message Body -->
    <text x="80" y="134" font-family="Inter, sans-serif" font-size="12" fill="#4b5563">
      <tspan x="80" dy="0">Voici la structure</tspan>
      <tspan x="80" dy="18">technique recommandée :</tspan>
    </text>
    
    <!-- Technical Structure Block -->
    <rect x="80" y="164" width="100" height="92" rx="10" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
    <text x="88" y="184" font-family="Inter, sans-serif" font-size="10" fill="#1f2937">
      <tspan x="88" dy="0">src/</tspan>
      <tspan x="88" dy="14">├── components/</tspan>
      <tspan x="88" dy="14">├── hooks/</tspan>
      <tspan x="88" dy="14">├── utils/</tspan>
      <tspan x="88" dy="14">└── types/</tspan>
    </text>
    
    <!-- Timestamp -->
    <text x="180" y="292" font-family="Inter, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">10:42</text>
    
    <!-- Input Field -->
    <rect x="36" y="476" width="132" height="48" rx="10" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
    <text x="52" y="504" font-family="Inter, sans-serif" font-size="13" fill="#9ca3af">Écrivez votre message...</text>
    
    <!-- Send Button -->
    <rect x="176" y="476" width="48" height="48" rx="10" fill="url(#goldGradient)"/>
    <path d="M 192 494 L 204 500 L 192 506" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="200" y1="500" x2="208" y2="500" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>