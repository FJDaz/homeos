<svg viewBox="0 0 1140 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a46c4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Container -->
    <rect x="70" y="45" width="1000" height="260" rx="10" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Section Title -->
    <text x="110" y="95" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Téléchargement ZIP</text>
    
    <!-- File Info Card -->
    <g transform="translate(110, 120)">
      <rect x="0" y="0" width="480" height="140" rx="8" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      
      <!-- ZIP File Icon -->
      <rect x="24" y="30" width="80" height="80" rx="6" fill="#fff7ed" stroke="#f05e23" stroke-width="1.5"/>
      <text x="64" y="78" font-family="Roboto Mono, monospace" font-size="14" font-weight="700" fill="#f05e23" text-anchor="middle">ZIP</text>
      <line x1="44" y1="40" x2="44" y2="100" stroke="#f05e23" stroke-width="2" stroke-dasharray="3,2"/>
      
      <!-- File Metadata -->
      <text x="124" y="62" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1f2937">sources-complete-v2.zip</text>
      <text x="124" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">45.8 MB • Archive compressée</text>
      <text x="124" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">Mis à jour le 18 déc. 2024</text>
    </g>
    
    <!-- Primary Download Button -->
    <g transform="translate(650, 166)">
      <rect x="0" y="0" width="180" height="48" rx="8" fill="url(#btnGradient)"/>
      <!-- Download Icon -->
      <path d="M12 15v6m0 0l-3-3m3 3l3-3M4 15v2a2 2 0 002 2h8a2 2 0 002-2v-2" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(16, 12) scale(0.9)"/>
      <text x="100" y="30" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Télécharger</text>
    </g>
    
    <!-- Secondary Info -->
    <text x="650" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Téléchargement sécurisé • HTTPS</text>
  </g>
</svg>