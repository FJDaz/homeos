<svg viewBox="0 0 280 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#97ea90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd676;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Background -->
    <rect x="0" y="0" width="280" height="740" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
    
    <!-- Header Section -->
    <text x="20" y="40" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#111827">Secrets Manager</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Manage API keys and credentials</text>
    
    <!-- Add New Button -->
    <rect x="20" y="85" width="240" height="40" rx="6" fill="url(#green-gradient)"/>
    <text x="140" y="110" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#064e3b" text-anchor="middle">+ Add New Secret</text>
    
    <!-- Secret Item 1: OpenAI -->
    <g transform="translate(20, 145)">
      <rect x="0" y="0" width="240" height="115" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <!-- Header row -->
      <text x="12" y="28" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1f2937">OPENAI_API_KEY</text>
      <rect x="175" y="16" width="55" height="18" rx="4" fill="#fef3c7"/>
      <text x="202" y="29" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#92400e" text-anchor="middle">PROD</text>
      <!-- Value -->
      <text x="12" y="55" font-family="Roboto Mono, monospace" font-size="11" fill="#4b5563">sk-•••••••••••••••••••••••••</text>
      <!-- Actions -->
      <g transform="translate(12, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M10 8h8v2h-8z M10 12h8v2h-8z" fill="#6b7280"/>
        <rect x="12" y="6" width="8" height="10" rx="1" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(48, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 18c0-3 2.5-5 6-5s6 2 6 5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="18" cy="12" r="2.5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(196, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 10h12l-2 14h-8z M13 10l1-3h6l1 3" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="90" y="93" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Used 2m ago</text>
    </g>
    
    <!-- Secret Item 2: Database -->
    <g transform="translate(20, 270)">
      <rect x="0" y="0" width="240" height="115" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="28" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1f2937">DATABASE_URL</text>
      <rect x="170" y="16" width="60" height="18" rx="4" fill="#e0f2fe"/>
      <text x="200" y="29" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#0369a1" text-anchor="middle">DEV</text>
      <text x="12" y="55" font-family="Roboto Mono, monospace" font-size="11" fill="#4b5563">postgresql://•••••••••••••••••</text>
      <g transform="translate(12, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M10 8h8v2h-8z M10 12h8v2h-8z" fill="#6b7280"/>
        <rect x="12" y="6" width="8" height="10" rx="1" stroke="#6b7280" stroke-width="1.5" fill="none"/>
