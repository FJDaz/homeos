<svg viewBox="0 0 200 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c840;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Background -->
    <rect x="0" y="0" width="200" height="540" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Header Section -->
    <text x="16" y="32" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#1a1a1a">Secrets Manager</text>
    <text x="16" y="52" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Gestion des clés API sécurisées</text>
    
    <!-- Form Section -->
    <text x="16" y="88" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#444444" font-weight="500">Nom du secret</text>
    <rect x="16" y="96" width="168" height="32" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
    <text x="24" y="116" font-family="Roboto Mono, monospace" font-size="11" fill="#999999">STRIPE_LIVE_KEY</text>
    
    <text x="16" y="144" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#444444" font-weight="500">Valeur</text>
    <rect x="16" y="152" width="168" height="32" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
    <text x="24" y="172" font-family="Roboto Mono, monospace" font-size="10" fill="#999999">sk_live_51H...</text>
    
    <!-- Primary Action Button -->
    <rect x="16" y="200" width="168" height="36" rx="6" fill="url(#goldGradient)"/>
    <text x="100" y="223" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a1a1a" text-anchor="middle">Ajouter le secret</text>
    
    <!-- Divider -->
    <line x1="16" y1="256" x2="184" y2="256" stroke="#e5e4e0" stroke-width="1"/>
    
    <!-- List Section Header -->
    <text x="16" y="278" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#1a1a1a">Secrets actifs</text>
    
    <!-- Secret Item 1 -->
    <rect x="16" y="290" width="168" height="56" rx="6" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
    <text x="28" y="312" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" font-weight="500">API_PRODUCTION</text>
    <text x="28" y="332" font-family="Roboto Mono, monospace" font-size="10" fill="#888888">••••••••••••••••••••••</text>
    <!-- Copy Icon -->
    <rect x="148" y="312" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <rect x="150" y="310" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <!-- Delete Icon -->
    <path d="M170 312 l4 4 m0 -4 l-4 4" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Secret Item 2 -->
    <rect x="16" y="356" width="168" height="56" rx="6" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
    <text x="28" y="378" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" font-weight="500">DATABASE_URL</text>
    <text x="28" y="398" font-family="Roboto Mono, monospace" font-size="10" fill="#888888">••••••••••••••••••••••</text>
    <rect x="148" y="378" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <rect x="150" y="376" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <path d="M170 378 l4 4 m0 -4 l-4 4" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Secret Item 3 -->
    <rect x="16" y="422" width="168" height="56" rx="6" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
    <text x="28" y="444" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" font-weight="500">JWT_PRIVATE_KEY</text>
    <text x="28" y="464" font-family="Roboto Mono, monospace" font-size="10" fill="#888888">••••••••••••••••••••••</text>
    <rect x="148" y="444" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <rect x="150" y="442" width="10" height="10" rx="1" fill="none" stroke="#666666" stroke-width="1.5"/>
    <path d="M170 444 l4 4 m0 -4 l-4 4" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>