        <path d="M12 18c0-3 2.5-5 6-5s6 2 6 5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="18" cy="12" r="2.5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(196, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 10h12l-2 14h-8z M13 10l1-3h6l1 3" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="90" y="93" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Used 1h ago</text>
    </g>
    
    <!-- Secret Item 3: Stripe -->
    <g transform="translate(20, 395)">
      <rect x="0" y="0" width="240" height="115" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="28" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1f2937">STRIPE_SECRET</text>
      <rect x="175" y="16" width="55" height="18" rx="4" fill="#fef3c7"/>
      <text x="202" y="29" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#92400e" text-anchor="middle">PROD</text>
      <text x="12" y="55" font-family="Roboto Mono, monospace" font-size="11" fill="#4b5563">sk_live_••••••••••••••••••••</text>
      <g transform="translate(12, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M10 8h8v2h-8z M10 12h8v2h-8z" fill="#6b7280"/>
        <rect x="12" y="6" width="8" height="10" rx="1" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(48, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 18c0-3 2.5-5 6-5s6 2 6 5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="18" cy="12" r="2.5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(196, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 10h12l-2 14h-8z M13 10l1-3h6l1 3" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="90" y="93" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Used 5m ago</text>
    </g>
    
    <!-- Secret Item 4: JWT -->
    <g transform="translate(20, 520)">
      <rect x="0" y="0" width="240" height="115" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="28" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1f2937">JWT_SECRET_KEY</text>
      <rect x="170" y="16" width="60" height="18" rx="4" fill="#e0f2fe"/>
      <text x="200" y="29" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#0369a1" text-anchor="middle">DEV</text>
      <text x="12" y="55" font-family="Roboto Mono, monospace" font-size="11" fill="#4b5563">•••••••••••••••••••••••••••</text>
      <g transform="translate(12, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M10 8h8v2h-8z M10 12h8v2h-8z" fill="#6b7280"/>
        <rect x="12" y="6" width="8" height="10" rx="1" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(48, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 18c0-3 2.5-5 6-5s6 2 6 5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="18" cy="12" r="2.5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      </g>
      <g transform="translate(196, 75)">
        <rect x="0" y="0" width="32" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
        <path d="M12 10h12l-2 14h-8z M13 10l1-3h6l1 3" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="90" y="93" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Used 3d ago</text>
    </g>
    
    <!-- Bottom Info -->
    <text x="140" y="710" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">4 secrets stored securely</text>
  </g>
</svg>