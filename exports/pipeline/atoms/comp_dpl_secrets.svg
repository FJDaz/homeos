<svg viewBox="0 0 260 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="260" height="600" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <g id="component_root">
    <!-- Header -->
    <text x="24" y="44" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#111111">Secrets Manager</text>
    <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Gestion des clés API sensibles</text>
    
    <!-- Secret 1: OpenAI -->
    <g transform="translate(24, 90)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#333333">OpenAI API Key</text>
      <rect x="0" y="8" width="212" height="36" rx="6" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="31" font-family="Roboto Mono, monospace" font-size="11" fill="#555555">sk-••••••••••••••9x2L</text>
      <path d="M192 20c0 0 3-5 8-5s8 5 8 5-3 5-8 5-8-5-8-5z M200 20a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="56" r="3" fill="#97ea90"/>
      <text x="14" y="59" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#666666">Active — Production</text>
    </g>
    
    <!-- Secret 2: Anthropic -->
    <g transform="translate(24, 170)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#333333">Anthropic API Key</text>
      <rect x="0" y="8" width="212" height="36" rx="6" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="31" font-family="Roboto Mono, monospace" font-size="11" fill="#555555">sk-ant-•••••••••••3fK</text>
      <path d="M192 20c0 0 3-5 8-5s8 5 8 5-3 5-8 5-8-5-8-5z M200 20a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="56" r="3" fill="#97ea90"/>
      <text x="14" y="59" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#666666">Active — Production</text>
    </g>
    
    <!-- Secret 3: Groq -->
    <g transform="translate(24, 250)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#333333">Groq API Key</text>
      <rect x="0" y="8" width="212" height="36" rx="6" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="31" font-family="Roboto Mono, monospace" font-size="11" fill="#555555">gsk_•••••••••••••••7mP</text>
      <path d="M192 20c0 0 3-5 8-5s8 5 8 5-3 5-8 5-8-5-8-5z M200 20a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="56" r="3" fill="#d5d4d0"/>
      <text x="14" y="59" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#999999">Inactive</text>
    </g>
    
    <!-- Add Button -->
    <g transform="translate(24, 330)">
      <rect x="0" y="0" width="212" height="40" rx="8" fill="#97ea90"/>
      <text x="106" y="25" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1a1a1a" text-anchor="middle">+ Ajouter un secret</text>
    </g>
    
    <!-- Environment Settings -->
    <g transform="translate(24, 400)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#111111">Sécurité</text>
      
      <g transform="translate(0, 28)">
        <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#444444">Chiffrement AES-256</text>
        <rect x="180" y="2" width="32" height="18" rx="9" fill="#97ea90"/>
        <circle cx="204" cy="11" r="6" fill="#ffffff"/>
      </g>
      
      <g transform="translate(0, 58)">
        <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#444444">Rotation auto des clés</text>
        <rect x="180" y="2" width="32" height="18" rx="9" fill="#e5e5e5"/>
        <circle cx="188" cy="11" r="6" fill="#ffffff"/>
      </g>
    </g>
    
    <!-- Save Action -->
    <g transform="translate(24, 520)">
      <rect x="0" y="0" width="212" height="44" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="106" y="28" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#1a1a1a" text-anchor="middle">Sauvegarder les changements</text>
    </g>
  </g>
</svg>