<svg viewBox="0 0 840 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7a45"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="0" y="0" width="840" height="180" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Title Section -->
    <text x="24" y="36" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#111827">Trace Logs</text>
    <text x="106" y="36" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="12" fill="#9ca3af">— Live arbitration feed</text>
    
    <!-- Global Reload Indicator -->
    <circle cx="800" cy="28" r="12" fill="#fff5f2" stroke="#f05e23" stroke-width="1.5"/>
    <path d="M 796 28 L 800 24 M 800 24 L 804 28 M 800 24 L 800 32" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(45 800 28)"/>
    
    <!-- Column 1: Claude -->
    <g id="col_claude">
      <!-- Header -->
      <circle cx="34" cy="62" r="4" fill="#97ea90"/>
      <text x="46" y="66" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="12" fill="#374151">Claude Sonnet</text>
      <g transform="translate(251, 54)" style="cursor: pointer;">
        <rect x="0" y="0" width="16" height="16" rx="4" fill="none"/>
        <path d="M 8 2 A 6 6 0 1 1 2 8" stroke="#f05e23" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M 8 2 L 8 5 M 8 2 L 5 2" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <line x1="24" y1="78" x2="277" y2="78" stroke="#d5d4d0" stroke-width="1"/>
      
      <!-- Log Entries -->
      <text x="24" y="100" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:10</text>
      <text x="86" y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">analyse_sémantique</text>
      
      <text x="24" y="120" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:12</text>
      <text x="86" y="120" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">validation_intent</text>
      
      <text x="24" y="140" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:15</text>
      <text x="86" y="140" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">génération_prd</text>
    </g>
    
    <!-- Column 2: GPT-4 -->
    <g id="col_gpt" transform="translate(269, 0)">
      <line x1="0" y1="50" x2="0" y2="170" stroke="#f3f4f6" stroke-width="1"/>
      <circle cx="34" cy="62" r="4" fill="#1258ca"/>
      <text x="46" y="66" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="12" fill="#374151">GPT-4 Turbo</text>
      <g transform="translate(251, 54)" style="cursor: pointer;">
        <rect x="0" y="0" width="16" height="16" rx="4" fill="none"/>
        <path d="M 8 2 A 6 6 0 1 1 2 8" stroke="#f05e23" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M 8 2 L 8 5 M 8 2 L 5 2" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <line x1="24" y1="78" x2="277" y2="78" stroke="#d5d4d0" stroke-width="1"/>
      
      <text x="24" y="100" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:11</text>
      <text x="86" y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">extraction_entités</text>
      
      <text x="24" y="120" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:14</text>
      <text x="86" y="120" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">structuration_api</text>
    </g>
    
    <!-- Column 3: Gemini -->
    <g id="col_gemini" transform="translate(538, 0)">
      <line x1="0" y1="50" x2="0" y2="170" stroke="#f3f4f6" stroke-width="1"/>
      <circle cx="34" cy="62" r="4" fill="#f05e23"/>
      <text x="46" y="66" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="12" fill="#374151">Gemini Pro</text>
      <g transform="translate(251, 54)" style="cursor: pointer;">
        <rect x="0" y="0" width="16" height="16" rx="4" fill="none"/>
        <path d="M 8 2 A 6 6 0 1 1 2 8" stroke="#f05e23" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M 8 2 L 8 5 M 8 2 L 5 2" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <line x1="24" y1="78" x2="277" y2="78" stroke="#d5d4d0" stroke-width="1"/>
      
      <text x="24" y="100" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:13</text>
      <text x="86" y="100" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">arbitrage_sullivan</text>
      
      <text x="24" y="120" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af">14:32:16</text>
      <text x="86" y="120" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5563">synthèse_frg</text>
    </g>
    
    <!-- Footer hint -->
    <text x="24" y="165" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">Cliquez sur une colonne pour recharger le flux</text>
    <rect x="24" y="168" width="120" height="3" rx="1.5" fill="#f05e23" opacity="0.3"/>
  </g>
</svg>