<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9fafb;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ledActive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#b8f2b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#97ea90;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="ledInactive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <g id="component_root">
    <rect x="40" y="40" width="1060" height="420" rx="10" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="80" y="90" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Status Session</text>
    <text x="80" y="118" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Monitor pipeline stages and system health</text>
    
    <g id="refreshBtn" cursor="pointer">
      <rect x="970" y="70" width="110" height="40" rx="8" fill="url(#btnGradient)" stroke="#c5c4c0" stroke-width="1"/>
      <text x="1025" y="95" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151" text-anchor="middle">Refresh</text>
    </g>
    
    <g transform="translate(120, 160)">
      <rect x="0" y="0" width="220" height="260" rx="8" fill="#fafaf9" stroke="#e5e4e0" stroke-width="1"/>
      <circle cx="110" cy="70" r="14" fill="url(#ledActive)"/>
      <text x="110" y="120" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Current Step</text>
      <text x="110" y="155" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" text-anchor="middle">PROCESSING_04</text>
      <text x="110" y="180" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280" text-anchor="middle">Active • 2m ago</text>
    </g>
    
    <g transform="translate(370, 160)">
      <rect x="0" y="0" width="220" height="260" rx="8" fill="#fafaf9" stroke="#e5e4e0" stroke-width="1"/>
      <circle cx="110" cy="70" r="14" fill="url(#ledActive)"/>
      <text x="110" y="120" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Genome</text>
      <text x="110" y="155" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" text-anchor="middle">INDEXED</text>
      <text x="110" y="180" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280" text-anchor="middle">Active • 5s ago</text>
    </g>
    
    <g transform="translate(620, 160)">
      <rect x="0" y="0" width="220" height="260" rx="8" fill="#fafaf9" stroke="#e5e4e0" stroke-width="1"/>
      <circle cx="110" cy="70" r="14" fill="url(#ledActive)"/>
      <text x="110" y="120" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Entries</text>
      <text x="110" y="155" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" text-anchor="middle">SYNCED</text>
      <text x="110" y="180" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280" text-anchor="middle">Active • 1m ago</text>
    </g>
    
    <g transform="translate(870, 160)">
      <rect x="0" y="0" width="220" height="260" rx="8" fill="#fafaf9" stroke="#e5e4e0" stroke-width="1"/>
      <circle cx="110" cy="70" r="14" fill="url(#ledInactive)"/>
      <text x="110" y="120" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Queue</text>
      <text x="110" y="155" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">STANDBY</text>
      <text x="110" y="180" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af" text-anchor="middle">Idle • 15m ago</text>
    </g>
  </g>
</svg>