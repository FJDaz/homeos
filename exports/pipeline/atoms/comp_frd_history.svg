<svg viewBox="0 0 200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="0" y="0" width="200" height="560" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Header -->
    <text x="20" y="42" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#111827">Intent Feed</text>
    <rect x="20" y="52" width="32" height="3" rx="1.5" fill="#ffd548"/>
    
    <!-- Item 1: Auth Flow -->
    <g transform="translate(20, 90)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">Auth Flow</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 2h • BRS</text>
    </g>
    <line x1="20" y1="145" x2="180" y2="145" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 2: Dashboard Grid -->
    <g transform="translate(20, 165)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.8"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">Dashboard Grid</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 5h • FRD</text>
    </g>
    <line x1="20" y1="220" x2="180" y2="220" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 3: Color Tokens -->
    <g transform="translate(20, 240)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.6"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">Color Tokens</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Hier • BKD</text>
    </g>
    <line x1="20" y1="295" x2="180" y2="295" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 4: API Layer -->
    <g transform="translate(20, 315)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.5"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">API Layer</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 2j • BKD</text>
    </g>
    <line x1="20" y1="370" x2="180" y2="370" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 5: Component Lib -->
    <g transform="translate(20, 390)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.4"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">Component Lib</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 3j • FRD</text>
    </g>
    <line x1="20" y1="445" x2="180" y2="445" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 6: State Mgmt -->
    <g transform="translate(20, 465)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.3"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">State Mgmt</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 5j • BKD</text>
    </g>
    <line x1="20" y1="520" x2="180" y2="520" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Item 7: Project Init -->
    <g transform="translate(20, 540)">
      <rect x="0" y="2" width="3" height="36" rx="1.5" fill="#ffd548" opacity="0.2"/>
      <text x="12" y="14" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937">Project Init</text>
      <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Il y a 1s • BRS</text>
    </g>
  </g>
</svg>