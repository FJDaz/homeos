<svg viewBox="0 0 1140 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="modal-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#ffcc33"/>
    </linearGradient>
  </defs>
  
  <rect width="1140" height="350" fill="#000000" opacity="0.4"/>
  
  <g id="component_root">
    <rect x="300" y="55" width="540" height="240" rx="8" fill="#ffffff" filter="url(#modal-shadow)"/>
    
    <text x="340" y="115" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="24" fill="#111827">Confirm Action</text>
    
    <text x="340" y="155" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6b7280">
      <tspan x="340" dy="0">Are you sure you want to proceed with this</tspan>
      <tspan x="340" dy="24">operation? This action cannot be undone.</tspan>
    </text>
    
    <rect x="548" y="211" width="120" height="44" rx="8" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
    <text x="608" y="238" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="#111827" text-anchor="middle">Cancel</text>
    
    <rect x="680" y="211" width="120" height="44" rx="8" fill="url(#gold-gradient)"/>
    <text x="740" y="238" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#111827" text-anchor="middle">Confirm</text>
  </g>
</svg>