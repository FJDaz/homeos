<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="selectedBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <g id="component_root">
    <rect x="20" y="20" width="310" height="260" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    
    <text x="40" y="58" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Question de Sullivan</text>
    
    <text x="40" y="88" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4b5563">Quelle stratégie adoptez-vous face à l'incertitude ?</text>
    
    <g id="choice_selected">
      <rect x="40" y="110" width="270" height="48" rx="8" fill="url(#selectedBg)" stroke="#f05e23" stroke-width="1.5"/>
      <circle cx="60" cy="134" r="8" fill="#ffffff" stroke="#f05e23" stroke-width="1.5"/>
      <circle cx="60" cy="134" r="4" fill="#f05e23"/>
      <text x="80" y="138" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#111827">Analyse de scénarios multiples</text>
    </g>
    
    <g id="choice_default_1">
      <rect x="40" y="170" width="270" height="48" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <circle cx="60" cy="194" r="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="80" y="198" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Décision rapide basée sur l'expérience</text>
    </g>
    
    <g id="choice_default_2">
      <rect x="40" y="230" width="270" height="48" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <circle cx="60" cy="254" r="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="80" y="258" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Consultation des parties prenantes</text>
    </g>
  </g>
</svg>