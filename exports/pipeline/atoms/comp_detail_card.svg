<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btn-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1258ca;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="70" y="70" width="1000" height="360" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Section Title -->
    <text x="110" y="115" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="700" fill="#111827">Fiche Détail Atome</text>
    
    <!-- Method Badge -->
    <rect x="110" y="140" width="56" height="28" rx="6" fill="#2458f3"/>
    <text x="138" y="159" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">GET</text>
    
    <!-- URL Field -->
    <text x="185" y="159" font-family="Roboto Mono, monospace" font-size="13" fill="#2458f3">https://api.atoms.io/v1/quantum-core</text>
    
    <!-- Copy Icon Button (Inline) -->
    <rect x="780" y="138" width="32" height="32" rx="6" fill="none" stroke="#d5d4d0" stroke-width="1"/>
    <path d="M790 146 L794 146 L794 150 M794 146 L786 154 L786 158 L798 158 L798 146 Z" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Divider -->
    <line x1="110" y1="195" x2="1030" y2="195" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Metadata Grid -->
    <!-- Endpoint -->
    <text x="110" y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" letter-spacing="0.5">ENDPOINT</text>
    <text x="110" y="255" font-family="Roboto Mono, monospace" font-size="14" fill="#111827">api.atoms.io/v1/retrieve</text>
    
    <!-- Identifiant -->
    <text x="400" y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" letter-spacing="0.5">IDENTIFIANT</text>
    <text x="400" y="255" font-family="Roboto Mono, monospace" font-size="14" fill="#111827">atm_qt_7845</text>
    
    <!-- Type -->
    <text x="690" y="230" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" letter-spacing="0.5">TYPE</text>
    <text x="690" y="255" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#111827">Quantum Processor</text>
    
    <!-- Status -->
    <text x="110" y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" letter-spacing="0.5">STATUT</text>
    <circle cx="120" cy="320" r="4" fill="#97ea90"/>
    <text x="132" y="325" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#111827">Active</text>
    
    <!-- Version -->
    <text x="400" y="305" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" letter-spacing="0.5">VERSION</text>
    <text x="400" y="325" font-family="Roboto Mono, monospace" font-size="14" fill="#111827">v2.4.0</text>
    
    <!-- Action Buttons -->
    <!-- Copier Button (Secondary) -->
    <rect x="830" y="370" width="110" height="42" rx="8" fill="#ffffff" stroke="#2458f3" stroke-width="1.5"/>
    <text x="885" y="397" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="600" fill="#2458f3" text-anchor="middle">Copier</text>
    
    <!-- Tester Button (Primary) -->
    <rect x="960" y="370" width="110" height="42" rx="8" fill="url(#btn-primary)"/>
    <text x="1015" y="397" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Tester</text>
  </g>
</svg>