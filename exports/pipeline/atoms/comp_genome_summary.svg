<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f05e23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d94d1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e5e5e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f05e23;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#1258ca;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="1100" height="460" rx="8" fill="#ffffff" filter="url(#shadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="60" y="65" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Résumé Genome</text>
    <text x="60" y="88" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#666666">Real-time system topology and endpoint health monitoring</text>
    
    <rect x="60" y="108" width="120" height="50" rx="6" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
    <text x="120" y="130" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="700" fill="#666666" text-anchor="middle">ENDPOINTS</text>
    <text x="120" y="148" font-family="Roboto Mono, monospace" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">24</text>
    
    <rect x="195" y="108" width="120" height="50" rx="6" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
    <text x="255" y="130" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="700" fill="#666666" text-anchor="middle">AVG LATENCY</text>
    <text x="255" y="148" font-family="Roboto Mono, monospace" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">45ms</text>
    
    <rect x="330" y="108" width="120" height="50" rx="6" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
    <text x="390" y="130" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="700" fill="#666666" text-anchor="middle">UPTIME</text>
    <text x="390" y="148" font-family="Roboto Mono, monospace" font-size="14" font-weight="600" fill="#97ea90" text-anchor="middle">99.9%</text>
    
    <circle cx="350" cy="300" r="45" fill="#ffffff" stroke="#f05e23" stroke-width="2"/>
    <circle cx="350" cy="300" r="35" fill="url(#blueGradient)"/>
    <text x="350" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">GENOME</text>
    <text x="350" y="310" font-family="Roboto Mono, monospace" font-size="9" fill="#666666" text-anchor="middle">v2.4.0</text>
    
    <circle cx="200" cy="220" r="32" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
    <text x="200" y="225" font-family="Roboto Mono, monospace" font-size="10" fill="#1a1a1a" text-anchor="middle">REST</text>
    <circle cx="200" cy="190" r="5" fill="#97ea90"/>
    
    <circle cx="500" cy="220" r="32" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
    <text x="500" y="225" font-family="Roboto Mono, monospace" font-size="10" fill="#1a1a1a" text-anchor="middle">GRPC</text>
    <circle cx="500" cy="190" r="5" fill="#97ea90"/>
    
    <circle cx="200" cy="380" r="32" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
    <text x="200" y="385" font-family="Roboto Mono, monospace" font-size="10" fill="#1a1a1a" text-anchor="middle">GRAPH</text>
    <circle cx="200" cy="350" r="5" fill="#ffd548"/>
    
    <circle cx="500" cy="380" r="32" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
    <text x="500" y="385" font-family="Roboto Mono, monospace" font-size="10" fill="#1a1a1a" text-anchor="middle">WS</text>
    <circle cx="500" cy="350" r="5" fill="#97ea90"/>
    
    <path d="M 232 220 Q 291 260 320 280" fill="none" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 468 220 Q 409 260 380 280" fill="none" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 232 380 Q 291 340 320 320" fill="none" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 468 380 Q 409 340 380 320" fill="none" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round"/>
    
    <rect x="620" y="180" width="460" height="260" rx="8" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
    <text x="650" y="215" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Endpoint Topology</text>
    
    <rect x="640" y="235" width="420" height="56" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="650" y="253" width="44" height="20" rx="4" fill="#e8f5e9"/>
    <text x="672" y="267" font-family="Roboto Mono, monospace" font-size="10" font-weight="600" fill="#2e7d32" text-anchor="middle">GET</text>
    <text x="705" y="267" font-family="Roboto Mono, monospace" font-size="11" fill="#1a1a1a">/api/v1/users/profile</text>
    <text x="1010" y="267" font-family="Roboto Mono, monospace" font-size="10" fill="#666666" text-anchor="end">24ms</text>
    <circle cx="1040" cy="263" r="5" fill="#97ea90"/>
    <text x="1040" y="285" font-family="Roboto Mono, monospace" font-size="9" fill="#666666" text-anchor="middle">200</text>
    
    <rect x="640" y="301" width="420" height="56" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="650" y="319" width="44" height="20" rx="4" fill="#fff3e0"/>
    <text x="672" y="333" font-family="Roboto Mono, monospace" font-size="10" font-weight="600" fill="#f05e23" text-anchor="middle">POST</text>
    <text x="705" y="333" font-family="Roboto Mono, monospace" font-size="11" fill="#1a1a1a">/api/v1/auth/token</text>
    <text x="1010" y="333" font-family="Roboto Mono, monospace" font-size="10" fill="#666666" text-anchor="end">156ms</text>
    <circle cx="1040" cy="315" r="5" fill="#ffd548"/>
    <text x="1040" y="337" font-family="Roboto Mono, monospace" font-size="9" fill="#666666" text-anchor="middle">201</text>
    
    <rect x="640" y="367" width="420" height="56" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="650" y="385" width="44" height="20" rx="4" fill="#e3f2fd"/>
    <text x="672" y="399" font-family="Roboto Mono, monospace" font-size="10" font-weight="600" fill="#1258ca" text-anchor="middle">PUT</text>
    <text x="705" y="399" font-family="Roboto Mono, monospace" font-size="11" fill="#1a1a1a">/api/v1/data/sync</text>
    <text x="1010" y="399" font-family="Roboto Mono, monospace" font-size="10" fill="#666666" text-anchor="end">42ms</text>
    <circle cx="1040" cy="381" r="5" fill="#97ea90"/>
    <text x="1040" y="403" font-family="Roboto Mono, monospace" font-size="9" fill="#666666" text-anchor="middle">204</text>
    
    <rect x="950" y="440" width="130" height="40" rx="6" fill="url(#orangeGradient)"/>
    <text x="1015" y="465" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">View Details</text>
    
    <circle cx="60" cy="455" r="4" fill="#97ea90"/>
    <text x="75" y="459" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Healthy</text>
    <circle cx="140" cy="455" r="4" fill="#ffd548"/>
    <text x="155" y="459" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Degraded</text>
    <circle cx="230" cy="455" r="4" fill="#f05e23"/>
    <text x="245" y="459" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Down</text>
  </g>
</svg>