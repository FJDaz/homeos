<svg viewBox="0 0 1140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="terminalHeaderClip">
      <rect x="44" y="60" width="1064" height="60" rx="6"/>
    </clipPath>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="1100" height="100" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="44" y="48" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#1e293b">Audit Terminal</text>
    
    <rect x="1016" y="32" width="92" height="24" rx="4" fill="#1258ca" fill-opacity="0.1"/>
    <circle cx="1032" cy="44" r="3" fill="#1258ca"/>
    <text x="1042" y="48" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#1258ca">TRACKING</text>
    
    <rect x="44" y="60" width="1064" height="60" rx="6" fill="url(#terminalGradient)"/>
    <rect x="44" y="60" width="1064" height="20" fill="#27272a" clip-path="url(#terminalHeaderClip)"/>
    
    <circle cx="58" cy="70" r="3" fill="#ef4444"/>
    <circle cx="68" cy="70" r="3" fill="#f59e0b"/>
    <circle cx="78" cy="70" r="3" fill="#22c55e"/>
    
    <text x="102" y="74" font-family="Roboto Mono, monospace" font-size="10" fill="#71717a">audit-log-8921 — bash</text>
    
    <text x="56" y="96" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0" font-weight="500">$</text>
    <text x="68" y="96" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca" font-weight="600">audit</text>
    <text x="112" y="96" font-family="Roboto Mono, monospace" font-size="11" fill="#97ea90">--live</text>
    <text x="160" y="96" font-family="Roboto Mono, monospace" font-size="11" fill="#ffd548">--session=prod-01</text>
    
    <text x="56" y="112" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">[14:32:05]</text>
    <text x="120" y="112" font-family="Roboto Mono, monospace" font-size="10" fill="#a5b4fc">AUTH</text>
    <text x="154" y="112" font-family="Roboto Mono, monospace" font-size="10" fill="#475569">::</text>
    <text x="170" y="112" font-family="Roboto Mono, monospace" font-size="10" fill="#cbd5e1">Validating credentials...</text>
    <text x="340" y="112" font-family="Roboto Mono, monospace" font-size="10" fill="#97ea90">[OK]</text>
    
    <rect x="56" y="116" width="6" height="10" fill="#1258ca">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>