<svg viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#2458f3;stop-opacity:0.02"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Container -->
    <rect x="24" y="24" width="1392" height="152" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- Header Background with Rounded Top -->
    <path d="M24,24 L1416,24 A8,8 0 0 1 1424,32 L1424,72 L24,72 Z" fill="url(#headerGrad)"/>
    
    <!-- Section Title -->
    <text x="48" y="54" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">Terminal Output &amp; Audit Trail</text>
    
    <!-- Live Status Badge -->
    <rect x="1296" y="36" width="96" height="24" rx="6" fill="#97ea90" opacity="0.15"/>
    <circle cx="1308" cy="48" r="4" fill="#97ea90"/>
    <text x="1320" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#2d7a32">ACTIVE</text>
    
    <!-- Terminal Window -->
    <rect x="48" y="88" width="1344" height="72" rx="6" fill="#0f172a"/>
    
    <!-- Log Entry 1: Command -->
    <text x="64" y="108" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">[14:32:01]</text>
    <text x="136" y="108" font-family="Roboto Mono, monospace" font-size="11" font-weight="700" fill="#2458f3">❯</text>
    <text x="152" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">aetherflow deploy --env=production --verify-pristine</text>
    
    <!-- Log Entry 2: Success -->
    <text x="64" y="126" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">[14:32:04]</text>
    <text x="136" y="126" font-family="Roboto Mono, monospace" font-size="11" fill="#97ea90">✓</text>
    <text x="152" y="126" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Build verification passed — 0 vulnerabilities detected</text>
    
    <!-- Log Entry 3: Audit -->
    <text x="64" y="144" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">[14:32:05]</text>
    <text x="136" y="144" font-family="Roboto Mono, monospace" font-size="11" fill="#ffd548">⚡</text>
    <text x="152" y="144" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Surgical Edit: 12 files optimized | Genome synchronized</text>
    
    <!-- Active Cursor -->
    <rect x="64" y="154" width="6" height="2" rx="1" fill="#2458f3">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>