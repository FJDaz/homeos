<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Button Gradient -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd365"/>
    </linearGradient>
    
    <!-- Icon Gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd365"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="780" height="580" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="40" y="40" width="700" height="500" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Header -->
  <text x="70" y="85" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Résultats de l'analyse</text>
  
  <!-- Metadata Label -->
  <text x="70" y="112" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b7280" letter-spacing="1.5">GÉNÉRÉ LE 14 JANVIER 2025</text>
  
  <!-- Analysis Content - Score Indicator -->
  <g transform="translate(70, 145)">
    <!-- Score Circle Background -->
    <circle cx="45" cy="45" r="42" fill="none" stroke="#e5e7eb" stroke-width="6"/>
    <!-- Score Circle Progress -->
    <circle cx="45" cy="45" r="42" fill="none" stroke="url(#iconGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="55" transform="rotate(-90 45 45)"/>
    <!-- Score Value -->
    <text x="45" y="52" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="700" fill="#151515" text-anchor="middle">75</text>
  </g>
  
  <!-- Score Label -->
  <text x="70" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280">Score de conformité</text>
  
  <!-- Analysis Details List -->
  <g transform="translate(160, 145)">
    <!-- Item 1 -->
    <rect x="0" y="0" width="520" height="48" rx="6" fill="#f8f7f4"/>
    <circle cx="20" cy="24" r="6" fill="#97ea90"/>
    <text x="38" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#151515">Structure des métadonnées</text>
    <text x="480" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="end">Validé</text>
    
    <!-- Item 2 -->
    <rect x="0" y="56" width="520" height="48" rx="6" fill="#f8f7f4"/>
    <circle cx="20" cy="80" r="6" fill="#97ea90"/>
    <text x="38" y="84" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#151515">Optimisation des images</text>
    <text x="480" y="84" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="end">Validé</text>
    
    <!-- Item 3 -->
    <rect x="0" y="112" width="520" height="48" rx="6" fill="#f8f7f4"/>
    <circle cx="20" cy="136" r="6" fill="#f05e23"/>
    <text x="38" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#151515">Performance mobile</text>
    <text x="480" y="140" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f05e23" text-anchor="end">À améliorer</text>
    
    <!-- Item 4 -->
    <rect x="0" y="168" width="520" height="48" rx="6" fill="#f8f7f4"/>
    <circle cx="20" cy="192" r="6" fill="#ffd548"/>
    <text x="38" y="196" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#151515">Accessibilité WCAG</text>
    <text x="480" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#d97706" text-anchor="end">En cours</text>
  </g>
  
  <!-- Divider -->
  <line x1="70" y1="380" x2="710" y2="380" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Feedback Text -->
  <text x="70" y="415" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#6b7280">Les résultats ne correspondent pas à vos attentes ?</text>
  
  <!-- Régénérer Analyse Button -->
  <g transform="translate(70, 435)">
    <!-- Button Background -->
    <rect x="0" y="0" width="186" height="44" rx="6" fill="url(#btnGradient)"/>
    
    <!-- Refresh Icon -->
    <g transform="translate(16, 10)">
      <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" fill="#ffffff" transform="scale(0.9) translate(0, 0)"/>
    </g>
    
    <!-- Button Label -->
    <text x="46" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Régénérer l'analyse</text>
  </g>
  
  <!-- Secondary Action -->
  <text x="276" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6b7280">ou</text>
  
  <!-- Export Link -->
  <text x="306" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1258ca" style="cursor: pointer;">Exporter le rapport PDF</text>
  
  <!-- Info Note -->
  <g transform="translate(70, 505)">
    <circle cx="8" cy="8" r="8" fill="#f8f7f4"/>
    <text x="8" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" text-anchor="middle">i</text>
    <text x="24" y="12" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#9ca3af">L'analyse utilise l'IA pour évaluer votre contenu. Les résultats peuvent varier.</text>
  </g>
</svg>