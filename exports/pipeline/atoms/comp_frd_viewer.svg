<svg viewBox="0 0 840 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-card" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-node" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="gradient-connection" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e8e6"/>
      <stop offset="50%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#e8e8e6"/>
    </linearGradient>
    <linearGradient id="gradient-active" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf0"/>
      <stop offset="100%" stop-color="#e0f9de"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Container -->
    <rect x="20" y="20" width="800" height="700" rx="8" fill="#ffffff" filter="url(#shadow-card)" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Header -->
    <text x="52" y="64" font-family="sans-serif" font-weight="700" font-size="20" fill="#1a1a1a">Genome Explorer</text>
    <text x="52" y="88" font-family="sans-serif" font-size="13" fill="#6b6b6b">Visualisation explosive des organes système</text>
    
    <!-- Controls -->
    <g transform="translate(620, 52)">
      <rect x="0" y="0" width="120" height="32" rx="6" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="21" font-family="monospace" font-size="11" fill="#6b6b6b">Search...</text>
      <circle cx="104" cy="16" r="6" fill="#97ea90"/>
    </g>
    
    <!-- Visualization Canvas -->
    <g transform="translate(60, 120)">
      <!-- Connection Lines -->
      <path d="M 360 250 L 360 100" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      <path d="M 360 250 L 580 180" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      <path d="M 360 250 L 580 350" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      <path d="M 360 250 L 360 420" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      <path d="M 360 250 L 140 350" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      <path d="M 360 250 L 140 180" stroke="url(#gradient-connection)" stroke-width="2" fill="none"/>
      
      <!-- Cross connections -->
      <path d="M 140 180 L 360 100" stroke="#f0f0ee" stroke-width="1" fill="none"/>
      <path d="M 580 180 L 580 350" stroke="#f0f0ee" stroke-width="1" fill="none"/>
      
      <!-- Center Node: App Core -->
      <g transform="translate(300, 190)">
        <rect x="0" y="0" width="120" height="120" rx="10" fill="url(#gradient-active)" stroke="#97ea90" stroke-width="2" filter="url(#shadow-node)"/>
        <rect x="35" y="25" width="50" height="8" rx="2" fill="#1258ca"/>
        <rect x="35" y="40" width="30" height="6" rx="2" fill="#6b6b6b" opacity="0.6"/>
        <rect x="35" y="52" width="40" height="6" rx="2" fill="#6b6b6b" opacity="0.4"/>
        <text x="60" y="95" font-family="sans-serif" font-weight="600" font-size="12" fill="#1a1a1a" text-anchor="middle">App Core</text>
        <circle cx="60" cy="55" r="12" fill="#ffffff" stroke="#97ea90" stroke-width="2"/>
        <path d="M 55 55 L 60 50 L 65 55 L 60 60 Z" fill="#97ea90"/>
      </g>
      
      <!-- Node 1: Navigation (Top) -->
      <g transform="translate(300, 40)">
        <rect x="0" y="0" width="120" height="80" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow-node)"/>
        <rect x="12" y="15" width="20" height="3" rx="1" fill="#1a1a1a"/>
        <rect x="12" y="22" width="16" height="3" rx="1" fill="#6b6b6b"/>
        <rect x="12" y="29" width="24" height="3" rx="1" fill="#6b6b6b"/>
        <rect x="50" y="15" width="58" height="40" rx="3" fill="#fafafa" stroke="#e8e8e6"/>
        <text x="60" y="70" font-family="sans-serif" font-size="11" fill="#6b6b6b" text-anchor="middle">Navigation</text>
      </g>
      
      <!-- Node 2: Data Card (Right Top) -->
      <g transform="translate(520, 130)">
        <rect x="0" y="0" width="140" height="100" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow-node)"/>
        <rect x="12" y="12" width="116" height="20" rx="3" fill="#fafafa"/>
        <circle cx="22" cy="22" r="5" fill="#97ea90"/>
        <rect x="32" y="20" width="40" height="4" rx="1" fill="#1a1a1a"/>
        <rect x="12" y="40" width="50" height="30" rx="3" fill="#f5f5f4"/>
        <rect x="70" y="40" width="58" height="30" rx="3" fill="#f5f5f4"/>
        <text x="70" y="88" font-family="sans-serif" font-size="11" fill="#6b6b6b" text-anchor="middle">DataCard</text>
      </g>
      
      <!-- Node 3: Button System (Right Bottom) -->
      <g transform="translate(520, 300)">
        <rect x="0" y="0" width="140" height="100" rx="6" fill="#ffffff" stroke="#97ea90" stroke-width="1.5" filter="url(#shadow-node)"/>
        <rect x="20" y="25" width="100" height="28" rx="4" fill="#1258ca"/>
        <text x="70" y="44" font-family="sans-serif" font-weight="600" font-size="11" fill="#ffffff" text-anchor="middle">Action</text>
        <rect x="30" y="60" width="80" height="20" rx="3" fill="none" stroke="#d5d4d0"/>
        <text x="70" y="90" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="500">Button</text>
        <circle cx="120" cy="15" r="4" fill="#97ea90"/>
      </g>
      
      <!-- Node 4: Input Field (Bottom) -->
      <g transform="translate(300, 400)">
        <rect x="0" y="0" width="120" height="80" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow-node)"/>
        <rect x="12" y="20" width="96" height="28" rx="4" fill="#fafafa" stroke="#d5d4d0"/>
        <text x="20" y="38" font-family="monospace" font-size="10" fill="#6b6b6b">input...</text>
        <text x="60" y="65" font-family="sans-serif" font-size="11" fill="#6b6b6b" text-anchor="middle">InputField</text>
      </g>
      
      <!-- Node 5: Sidebar (Left Bottom) -->
      <g transform="translate(80, 300)">
        <rect x="0" y="0" width="100" height="100" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow-node)"/>
        <rect x="0" y="0" width="30" height="100" rx="6" fill="#fafafa"/>
        <circle cx="15" cy="20" r="6" fill="#97ea90"/>
        <rect x="8" y="40" width="14" height="2" rx="1" fill="#6b6b6b"/>
        <rect x="8" y="50" width="14" height="2" rx="1" fill="#6b6b6b"/>
        <rect x="8" y="60" width="14" height="2" rx="1" fill="#6b6b6b"/>
        <rect x="40" y="20" width="45" height="6" rx="1" fill="#e8e8e6"/>
        <rect x="40" y="35" width="35" height="6" rx="1" fill="#e8e8e6"/>
        <text x="50" y="90" font-family="sans-serif" font-size="11" fill="#6b6b6b" text-anchor="middle">Sidebar</text>
      </g>
      
      <!-- Node 6: Modal (Left Top) -->
      <g transform="translate(80, 130)">
        <rect x="0" y="0" width="100" height="100" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow-node)"/>
        <rect x="10" y="10" width="80" height="60" rx="4" fill="#ffffff" stroke="#d5d4d0" stroke-width="1.5"/>
        <rect x="18" y="20" width="40" height="4" rx="1" fill="#1a1a1a"/>
        <rect x="18" y="30" width="64" height="3" rx="1" fill="#e8e8e6"/>
        <rect x="18" y="38" width="50" height="3" rx="1" fill="#e8e8e6"/>
        <rect x="50" y="52" width="30" height="12" rx="2" fill="#97ea90"/>
        <text x="50" y="90" font-family="sans-serif" font-size="11" fill="#6b6b6b" text-anchor="middle">Modal</text>
      </g>
      
      <!-- Detail Panel (Right Side - Active Selection) -->
      <g transform="translate(680, 0)">
        <rect x="0" y="0" width="160" height="480" rx="6" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
        <text x="16" y="30" font-family="sans-serif" font-weight="700" font-size="14" fill="#1a1a1a">Properties</text>
        
        <!-- Selected Component Info -->
        <text x="16" y="60" font-family="sans-serif" font-size="11" fill="#6b6b6b">Selected</text>
        <text x="16" y="78" font-family="monospace" font-size="11" fill="#1258ca">&lt;Button /&gt;</text>
        
        <line x1="16" y1="95" x2="144" y2="95" stroke="#e8e8e6"/>
        
        <text x="16" y="115" font-family="sans-serif" font-size="10" fill="#6b6b6b">Intent</text>
        <text x="16" y="132" font-family="sans-serif" font-size="11" fill="#1a1a1a">Primary Action</text>
        
        <text x="16" y="155" font-family="sans-serif" font-size="10" fill="#6b6b6b">Variants</text>
        <rect x="16" y="165" width="50" height="20" rx="3" fill="#ffffff" stroke="#97ea90" stroke-width="1"/>
        <text x="28" y="178" font-family="monospace" font-size="9" fill="#1a1a1a">solid</text>
        <rect x="70" y="165" width="50" height="20" rx="3" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
        <text x="78" y="178" font-family="monospace" font-size="9" fill="#6b6b6b">ghost</text>
        
        <text x="16" y="210" font-family="sans-serif" font-size="10" fill="#6b6b6b">Genome ID</text>
        <text x="16" y="228" font-family="monospace" font-size="10" fill="#6b6b6b">FRD-BTN-001</text>
        
        <!-- Usage Stats -->
        <rect x="16" y="250" width="128" height="60" rx="4" fill="#ffffff" stroke="#e8e8e6"/>
        <text x="28" y="270" font-family="sans-serif" font-size="10" fill="#6b6b6b">Usage</text>
        <text x="28" y="295" font-family="sans-serif" font-weight="700" font-size="18" fill="#1a1a1a">24</text>
        <text x="50" y="295" font-family="sans-serif" font-size="10" fill="#6b6b6b">instances</text>
        
        <!-- Action Buttons -->
        <rect x="16" y="380" width="128" height="32" rx="4" fill="#1258ca"/>
        <text x="80" y="400" font-family="sans-serif" font-weight="600" font-size="11" fill="#ffffff" text-anchor="middle">Edit Source</text>
        
        <rect x="16" y="420" width="128" height="32" rx="4" fill="none" stroke="#d5d4d0" stroke-width="1"/>
        <text x="80" y="440" font-family="sans-serif" font-weight="500" font-size="11" fill="#1a1a1a" text-anchor="middle">View Docs</text>
      </g>
    </g>
    
    <!-- Footer Status -->
    <rect x="20" y="660" width="800" height="60" rx="8" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
    <text x="52" y="695" font-family="monospace" font-size="11" fill="#6b6b6b">7 organs active • 12 connections • Genome v2.4.1</text>
    <circle cx="780" cy="690" r="6" fill="#97ea90"/>
    <text x="760" y="694" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="end">Live</text>
  </g>
</svg>