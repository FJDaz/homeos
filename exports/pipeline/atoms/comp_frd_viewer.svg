<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2458f3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1258ca" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f05e23" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd548" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd548" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#97ea90" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <g id="component_root">
