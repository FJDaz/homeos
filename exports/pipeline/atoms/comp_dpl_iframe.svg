<svg viewBox="0 0 800 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-main" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f05e23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7640;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="24" y="24" width="752" height="692" rx="8" fill="#ffffff" filter="url(#shadow-main)"/>
    
    <!-- Section Header -->
    <text x="56" y="72" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Deployment Preview</text>
    <text x="56" y="96" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Native UI of your deployment service</text>
    
    <!-- Third-Party Service Interface Container -->
    <rect x="56" y="116" width="688" height="576" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Browser Chrome Bar -->
    <rect x="56" y="116" width="688" height="44" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="80" cy="138" r="5" fill="#ef4444"/>
    <circle cx="100" cy="138" r="5" fill="#f59e0b"/>
    <circle cx="120" cy="138" r="5" fill="#22c55e"/>
    
    <!-- URL Bar -->
    <rect x="180" y="126" width="420" height="28" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="196" y="144" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">vercel.com/dashboard/aetherflow/production</text>
    
    <!-- Service Dashboard Header -->
    <rect x="80" y="180" width="640" height="72" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="104" y="204" width="40" height="40" rx="8" fill="#111827"/>
    <text x="156" y="224" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">aetherflow-app</text>
    <text x="156" y="242" font-family="Inter, sans-serif" font-size="13" fill="#6b7280">Production • Git: main</text>
    
    <!-- Status Badge -->
    <rect x="560" y="202" width="96" height="32" rx="6" fill="#dcfce7"/>
    <circle cx="580" cy="218" r="5" fill="#22c55e"/>
    <text x="594" y="222" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Ready</text>
    
    <!-- Deployment Preview Card -->
    <rect x="80" y="268" width="640" height="220" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Site Preview Thumbnail -->
    <rect x="280" y="292" width="420" height="172" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="280" y="292" width="420" height="32" rx="6" fill="#f1f5f9"/>
    <circle cx="300" cy="308" r="4" fill="#cbd5e1"/>
    <circle cx="314" cy="308" r="4" fill="#cbd5e1"/>
    <circle cx="328" cy="308" r="4" fill="#cbd5e1"/>
    <rect x="304" y="340" width="372" height="116" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="490" y="398" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">aetherflow-app.vercel.app</text>
    
    <!-- Deployment Metadata -->
    <text x="104" y="320" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#374151">Deployment</text>
    
    <text x="104" y="352" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Domain</text>
    <text x="104" y="372" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">aetherflow-app.vercel.app</text>
    
    <text x="104" y="404" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Framework</text>
    <text x="104" y="424" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#111827">Next.js 14</text>
    
    <text x="104" y="456" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Build Time</text>
    <text x="104" y="476" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#111827">42s</text>
    
    <!-- Primary Action Button -->
    <rect x="104" y="496" width="128" height="40" rx="6" fill="url(#grad-primary)"/>
    <text x="168" y="520" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Redeploy</text>
    
    <!-- Secondary Action -->
    <rect x="240" y="496" width="128" height="40" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="304" y="520" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Visit</text>
    
    <!-- Build Logs Panel -->
    <rect x="80" y="508" width="640" height="164" rx="8" fill="#0f172a"/>
    <text x="104" y="540" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Build Output</text>
    
    <text x="104" y="576" font-family="Roboto Mono, monospace" font-size="11" fill="#22c55e">✓</text>
    <text x="124" y="576" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">14:32:05</text>
    <text x="200" y="576" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Build completed successfully</text>
    
    <text x="104" y="604" font-family="Roboto Mono, monospace" font-size="11" fill="#22c55e">✓</text>
    <text x="124" y="604" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">14:31:48</text>
    <text x="200" y="604" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Generated static pages (24/24)</text>
    
    <text x="104" y="632" font-family="Roboto Mono, monospace" font-size="11" fill="#22c55e">✓</text>
    <text x="124" y="632" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">14:31:35</text>
    <text x="200" y="632" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Optimized images and assets</text>
    
    <text x="104" y="660" font-family="Roboto Mono, monospace" font-size="11" fill="#3b82f6">ℹ</text>
    <text x="124" y="660" font-family="Roboto Mono, monospace" font-size="10" fill="#64748b">14:31:23</text>
    <text x="200" y="660" font-family="Roboto Mono, monospace" font-size="11" fill="#e2e8f0">Compiling application...</text>
  </g>
</svg>