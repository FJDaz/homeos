<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1258ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fafafa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="40" y="40" width="600" height="460" rx="10" fill="url(#cardSurface)" filter="url(#shadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="70" y="85" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#1a1a1a">Third-Party Services</text>
    <text x="70" y="110" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b6b">Manage deployment integrations and external connections</text>
    
    <g transform="translate(70, 140)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M16 32 V20 C16 18 18 16 20 16 C22 16 24 18 24 20 V28 C24 30 26 32 28 32 C30 32 32 30 32 28" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="16" r="3" fill="#333"/>
      <circle cx="28" cy="32" r="3" fill="#333"/>
      
      <text x="64" y="20" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="15" fill="#1a1a1a">Git Repository</text>
      <text x="64" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">Connected to github.com/org/project</text>
      
      <rect x="420" y="8" width="80" height="28" rx="6" fill="#97ea90" opacity="0.2"/>
      <text x="460" y="26" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#2d7a2d" text-anchor="middle">Active</text>
      
      <rect x="520" y="10" width="44" height="24" rx="10" fill="#2458f3"/>
      <circle cx="556" cy="22" r="8" fill="white"/>
    </g>
    
    <line x1="70" y1="210" x2="610" y2="210" stroke="#e5e5e5" stroke-width="1"/>
    
    <g transform="translate(70, 230)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M16 32 H32 C36 32 40 28 40 24 C40 20 37 17 33 16 C32 12 28 10 24 10 C20 10 17 12 15 16 C11 16 8 20 8 24 C8 28 12 32 16 32Z" fill="#2458f3" opacity="0.1" stroke="#2458f3" stroke-width="1.5"/>
      
      <text x="64" y="20" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="15" fill="#1a1a1a">Cloud Hosting</text>
      <text x="64" y="38" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">AWS us-east-1 • Auto-deploy enabled</text>
      
      <rect x="420" y="8" width="80" height="28" rx="6" fill="#ffd548" opacity="0.2"/>
      <text x="460" y="26" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#b38600" text-anchor="middle">Syncing</text>
      
