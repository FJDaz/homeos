      <text x="460" y="26" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#666" text-anchor="middle">Paused</text>
      
      <rect x="520" y="10" width="44" height="24" rx="10" fill="#d5d4d0"/>
      <circle cx="528" cy="22" r="8" fill="white"/>
    </g>
    
    <g transform="translate(70, 420)">
