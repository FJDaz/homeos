      <text x="206" y="25" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="white" text-anchor="middle">Add Service</text>
      
      <text x="420" y="25" font-family="Roboto Mono, monospace" font-size="11" fill="#6b6b6b">Last sync: 2m ago</text>
