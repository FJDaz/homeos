<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-main" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1258ca"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="0" y="0" width="700" height="400" rx="10" fill="#ffffff" filter="url(#shadow-main)"/>
    <rect x="0" y="0" width="700" height="400" rx="10" fill="none" stroke="#d5d4d0" stroke-width="1"/>
    
    <rect x="0" y="0" width="700" height="4" rx="2" fill="#1258ca"/>
    
    <text x="60" y="80" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#111827">Carte Pouvoir Active</text>
    
    <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#4b5563">
      <tspan x="60" dy="0">Décidez du sort de cette capacité spéciale. Vous pouvez l'activer</tspan>
      <tspan x="60" dy="24">immédiatement ou la conserver en réserve pour un moment stratégique.</tspan>
      <tspan x="60" dy="24">La réserve offre des avantages cumulatifs mais retarde l'effet immédiat.</tspan>
    </text>
    
    <g transform="translate(550, 100)">
      <rect x="0" y="0" width="80" height="100" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
      <path d="M40 25 L45 40 L60 40 L48 50 L52 65 L40 55 L28 65 L32 50 L20 40 L35 40 Z" fill="#ffd548"/>
      <rect x="20" y="75" width="40" height="4" rx="2" fill="#d1d5db"/>
      <rect x="20" y="82" width="28" height="4" rx="2" fill="#d1d5db"/>
    </g>
    
    <g id="btn-garder" transform="translate(60, 300)">
      <rect x="0" y="0" width="160" height="48" rx="8" fill="url(#grad-primary)"/>
      <text x="80" y="31" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#ffffff" text-anchor="middle">Garder</text>
    </g>
    
    <g id="btn-reserve" transform="translate(240, 300)">
      <rect x="0" y="0" width="160" height="48" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1.5"/>
      <text x="80" y="31" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#374151" text-anchor="middle">Réserve</text>
    </g>
    
    <circle cx="140" cy="365" r="4" fill="#97ea90"/>
    <text x="140" y="385" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Sélectionné</text>
  </g>
</svg>