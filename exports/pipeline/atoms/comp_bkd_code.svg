<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <filter id="shadow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Card background with 10px radius -->
  <rect x="40" y="40" width="320" height="240" rx="10" ry="10" fill="#ffffff" filter="url(#shadow-sm)" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Image placeholder area -->
  <rect x="40" y="40" width="320" height="120" rx="10" ry="10" fill="#f3f4f6"/>
  <rect x="40" y="90" width="320" height="70" fill="#f3f4f6"/>
  
  <!-- Avatar -->
  <circle cx="100" cy="140" r="32" fill="#6366f1" stroke="#ffffff" stroke-width="3"/>
  <text x="100" y="145" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">AB</text>
  
  <!-- Text content -->
  <text x="100" y="200" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#111827">Alex Brown</text>
  <text x="100" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#6b7280">Senior Developer</text>
  
  <!-- Action buttons with 8px radius (within 10-12px cap) -->
  <rect x="250" y="240" width="90" height="32" rx="8" fill="#4f46e5"/>
  <text x="295" y="260" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Connect</text>
</svg>