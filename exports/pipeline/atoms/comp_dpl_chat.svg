<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-main" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1258ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f4aad;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Card Container -->
  <rect x="0" y="0" width="600" height="600" rx="10" fill="#ffffff" filter="url(#shadow-main)"/>
  
  <!-- Header Section -->
  <g id="header">
    <text x="40" y="50" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="700" fill="#111827">Sullivan Ops</text>
    <text x="40" y="75" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Instructions et chat de pilotage</text>
    
    <!-- Status Badge -->
    <rect x="480" y="38" width="80" height="28" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <circle cx="496" cy="52" r="4" fill="#10b981"/>
    <text x="506" y="56" font-family="Inter, sans-serif" font-size="12" fill="#059669" font-weight="500">Actif</text>
  </g>
  
  <!-- Divider -->
  <line x1="40" y1="95" x2="560" y2="95" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Chat History Area -->
  <g id="chat-history" transform="translate(0, 110)">
    
    <!-- AI Message 1 -->
    <g transform="translate(40, 20)">
      <!-- Avatar -->
      <circle cx="0" cy="20" r="16" fill="#1258ca"/>
      <text x="0" y="25" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
      
      <!-- Bubble -->
      <rect x="24" y="0" width="360" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="44" y="28" font-family="Inter, sans-serif" font-size="13" fill="#374151">Analyse du manifeste de déploiement</text>
      <text x="44" y="48" font-family="Inter, sans-serif" font-size="13" fill="#374151">terminée. Environnement cible: <tspan font-weight="600" fill="#111827">Production</tspan></text>
    </g>
    
    <!-- User Message -->
    <g transform="translate(176, 104)">
      <rect x="0" y="0" width="384" height="48" rx="10" fill="#1258ca" opacity="0.08"/>
      <rect x="0" y="0" width="384" height="48" rx="10" fill="none" stroke="#1258ca" stroke-width="1" stroke-opacity="0.2"/>
      <text x="24" y="30" font-family="Inter, sans-serif" font-size="13" fill="#1258ca" font-weight="500">Procéder au déploiement avec vérification des</text>
      <text x="360" y="30" font-family="Inter, sans-serif" font-size="13" fill="#1258ca" font-weight="500" text-anchor="end">secrets</text>
    </g>
    
    <!-- AI Message 2 with Code Snippet -->
    <g transform="translate(40, 172)">
      <circle cx="0" cy="20" r="16" fill="#1258ca"/>
      <text x="0" y="25" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
      
      <rect x="24" y="0" width="400" height="120" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="44" y="28" font-family="Inter, sans-serif" font-size="13" fill="#374151">Exécution en cours:</text>
      
      <!-- Code block inside chat -->
      <rect x="44" y="40" width="360" height="64" rx="6" fill="#1f2937"/>
      <text x="60" y="65" font-family="Roboto Mono, monospace" font-size="11" fill="#97ea90">$ netlify deploy --prod --build</text>
      <text x="60" y="85" font-family="Roboto Mono, monospace" font-size="11" fill="#ffd548">✓ Site live: https://app-demo.netlify.app</text>
    </g>
    
  </g>
  
  <!-- Quick Actions -->
  <g id="quick-actions" transform="translate(40, 440)">
    <rect x="0" y="0" width="120" height="28" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="60" y="19" font-family="Inter, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Redémarrer build</text>
    
    <rect x="132" y="0" width="100" height="28" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="182" y="19" font-family="Inter, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Voir logs</text>
    
    <rect x="244" y="0" width="120" height="28" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="304" y="19" font-family="Inter, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Rollback</text>
  </g>
  
  <!-- Input Area -->
  <g id="input-area" transform="translate(40, 480)">
    <!-- Input Background -->
    <rect x="0" y="0" width="520" height="80" rx="10" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Text Input -->
    <rect x="16" y="16" width="432" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="32" y="45" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">Écrivez une instruction ou coller une configuration...</text>
    
    <!-- Send Button -->
    <rect x="456" y="16" width="48" height="48" rx="8" fill="url(#gradient-accent)"/>
    <path d="M472 32 L484 40 L472 48" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="476" y1="40" x2="484" y2="40" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>