<svg viewBox="0 0 800 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#97ea90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd976;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="760" height="700" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <rect x="20" y="20" width="760" height="90" rx="10" fill="url(#headerGradient)"/>
    <rect x="20" y="90" width="760" height="20" fill="url(#headerGradient)"/>
    
    <text x="60" y="65" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#1a1a1a">Sullivan Ops</text>
    <text x="60" y="90" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#666666">Instructions et chat de pilotage</text>
    
    <circle cx="720" cy="70" r="6" fill="#97ea90"/>
    <text x="735" y="74" font-family="Roboto Mono, monospace" font-size="11" fill="#666666">ACTIF</text>
    
    <line x1="60" y1="110" x2="740" y2="110" stroke="#d5d4d0" stroke-width="1"/>
    
    <rect x="60" y="130" width="680" height="40" rx="8" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
    <text x="80" y="155" font-family="Roboto Mono, monospace" font-size="11" fill="#666666">Contexte: Déploiement DPL Phase 4 • Target: Production • Mode: Automatique</text>
    
    <g transform="translate(60, 200)">
      <circle cx="20" cy="20" r="16" fill="#f5f5f5" stroke="#d5d4d0" stroke-width="1"/>
      <text x="20" y="25" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#666666">S</text>
      <rect x="45" y="0" width="420" height="80" rx="8" fill="#f5f5f5"/>
      <text x="65" y="30" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#333333">Je suis prêt à piloter le déploiement. Les secrets sont</text>
      <text x="65" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#333333">configurés. Souhaitez-vous procéder au build de</text>
      <text x="65" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#333333">l'application sur l'environnement cible ?</text>
      <text x="65" y="100" font-family="Roboto Mono, monospace" font-size="10" fill="#999999">10:42:18 AM</text>
    </g>
    
    <g transform="translate(350, 310)">
      <rect x="0" y="0" width="390" height="60" rx="8" fill="#97ea90"/>
      <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1a3a1a">Oui, lance le build avec les paramètres de production.</text>
      <text x="20" y="48" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1a3a1a">Vérifie les variables d'environnement avant.</text>
      <text x="290" y="80" font-family="Roboto Mono, monospace" font-size="10" fill="#999999">10:42:45 AM</text>
    </g>
    
    <g transform="translate(60, 410)">
      <circle cx="20" cy="20" r="16" fill="#f5f5f5" stroke="#d5d4d0" stroke-width="1"/>
      <text x="20" y="25" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#666666">S</text>
      <rect x="45" y="0" width="450" height="120" rx="8" fill="#f5f5f5"/>
      <text x="65" y="30" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#333333">Build initié. Voici le statut des services :</text>
      <rect x="65" y="45" width="410" height="55" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
      <text x="80" y="68" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">✓</text>
      <text x="95" y="68" font-family="Roboto Mono, monospace" font-size="11" fill="#333333">API Gateway: CONNECTED</text>
      <text x="80" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">✓</text>
      <text x="95" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#333333">Database: MIGRATIONS APPLIED</text>
      <text x="65" y="140" font-family="Roboto Mono, monospace" font-size="10" fill="#999999">10:43:02 AM</text>
    </g>
    
    <g transform="translate(60, 570)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#999999">Actions rapides:</text>
      <rect x="0" y="15" width="140" height="32" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <text x="20" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#333333">Voir les logs</text>
      <rect x="155" y="15" width="160" height="32" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <text x="175" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#333333">Rollback</text>
      <rect x="330" y="15" width="180" height="32" rx="6" fill="#ffffff" stroke="#97ea90" stroke-width="1.5"/>
      <text x="350" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1a3a1a">Confirmer deploy</text>
    </g>
    
    <g transform="translate(60, 630)">
      <rect x="0" y="0" width="600" height="56" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1.5"/>
      <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#999999">Saisir une instruction ou coller du code...</text>
      <rect x="620" y="0" width="100" height="56" rx="8" fill="url(#accentGradient)"/>
      <text x="670" y="35" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="14" fill="#1a3a1a">Envoyer</text>
    </g>
    
    <text x="60" y="705" font-family="Roboto Mono, monospace" font-size="10" fill="#c5c4c0">Sullivan v2.4 • Mode: Deployment Pilot • Secure Channel TLS 1.3</text>
  </g>
</svg>