<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
  </defs>
  <g id="component_root">
    <rect x="120" y="70" width="900" height="360" rx="10" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#cardShadow)"/>
    
    <text x="170" y="135" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Finalisation de la Distillation</text>
    
    <text x="170" y="180" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6b7280">Tous les paramètres sont validés et le système est prêt.</text>
    <text x="170" y="205" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6b7280">Cliquez sur le bouton ci-dessous pour lancer le processus automatique.</text>
    
    <g id="launch-button" cursor="pointer">
      <rect x="410" y="250" width="320" height="64" rx="10" fill="url(#goldGradient)"/>
      <g transform="translate(445, 282)">
        <path d="M0,-14 C5,-14 9,-4 9,9 C9,13 7,17 5,19 L5,23 L1,21 L0,26 L-1,21 L-5,23 L-5,19 C-7,17 -9,13 -9,9 C-9,-4 -5,-14 0,-14 Z M0,-8 A3,3 0 1,0 0,-2 A3,3 0 1,0 0,-8" fill="#1f2937"/>
      </g>
      <text x="570" y="282" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="17" font-weight="700" fill="#1f2937" text-anchor="middle" dominant-baseline="middle">Lancer la distillation</text>
    </g>
  </g>
</svg>