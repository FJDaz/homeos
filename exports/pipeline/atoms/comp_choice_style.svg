<svg viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="selectedFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2458f3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2458f3" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="460" height="240" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="44" y="66" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Choix du style</text>
    
    <g id="style-minimal">
      <rect x="44" y="86" width="200" height="76" rx="8" fill="url(#selectedFill)" stroke="#2458f3" stroke-width="1.5"/>
      <rect x="64" y="102" width="36" height="24" rx="2" fill="none" stroke="#111827" stroke-width="1.5"/>
      <line x1="64" y1="114" x2="100" y2="114" stroke="#111827" stroke-width="1.5" stroke-linecap="round"/>
      <text x="64" y="148" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#111827">Minimal</text>
      <circle cx="232" cy="102" r="8" fill="none" stroke="#2458f3" stroke-width="1.5"/>
      <circle cx="232" cy="102" r="4" fill="#2458f3"/>
    </g>
    
    <g id="style-brutaliste">
      <rect x="256" y="86" width="200" height="76" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <rect x="276" y="100" width="40" height="32" rx="0" fill="#111827"/>
      <rect x="280" y="106" width="32" height="4" fill="#ffffff"/>
      <rect x="280" y="114" width="20" height="4" fill="#ffffff"/>
      <text x="276" y="148" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#111827">Brutaliste</text>
      <circle cx="444" cy="102" r="8" fill="none" stroke="#d5d4d0" stroke-width="1.5"/>
    </g>
    
    <g id="style-moderne">
      <rect x="44" y="174" width="200" height="76" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <rect x="64" y="188" width="40" height="28" rx="8" fill="none" stroke="#111827" stroke-width="1.5"/>
      <circle cx="84" cy="202" r="6" fill="#2458f3" opacity="0.2"/>
      <text x="64" y="236" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#111827">Moderne</text>
      <circle cx="232" cy="190" r="8" fill="none" stroke="#d5d4d0" stroke-width="1.5"/>
    </g>
    
    <g id="style-corporate">
      <rect x="256" y="174" width="200" height="76" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      <rect x="276" y="188" width="40" height="28" rx="2" fill="none" stroke="#111827" stroke-width="1"/>
      <line x1="296" y1="188" x2="296" y2="216" stroke="#111827" stroke-width="1"/>
      <line x1="276" y1="202" x2="316" y2="202" stroke="#111827" stroke-width="1"/>
      <text x="276" y="236" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#111827">Corporate</text>
      <circle cx="444" cy="190" r="8" fill="none" stroke="#d5d4d0" stroke-width="1.5"/>
    </g>
  </g>
</svg>