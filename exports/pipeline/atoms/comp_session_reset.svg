<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3"/>
      <stop offset="100%" style="stop-color:#1258ca"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card -->
    <rect x="70" y="70" width="1000" height="360" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Left Accent Bar -->
    <rect x="70" y="70" width="4" height="360" rx="2" fill="#f05e23"/>
    
    <!-- Title -->
    <text x="110" y="120" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Reset Session</text>
    
    <!-- Description -->
    <text x="110" y="160" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">
      <tspan x="110" dy="0">Restart your workflow from scratch. All current progress,</tspan>
      <tspan x="110" dy="22">settings, and temporary data will be permanently removed.</tspan>
    </text>
    
    <!-- Warning Box -->
    <rect x="110" y="210" width="420" height="48" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <!-- Warning Icon Triangle -->
    <path d="M130 228 L136 240 L124 240 Z" fill="#f05e23" stroke="#f05e23" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="130" y="237" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">!</text>
    <text x="145" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9a3412">This action requires confirmation and cannot be undone</text>
    
    <!-- Divider -->
    <line x1="110" y1="290" x2="1030" y2="290" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Confirmation Checkbox -->
    <rect x="110" y="320" width="18" height="18" rx="4" fill="#ffffff" stroke="#d5d4d0" stroke-width="1.5"/>
    <text x="140" y="334" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#374151">I understand this will reset all progress to zero</text>
    
    <!-- Primary Action Button -->
    <g transform="translate(890, 308)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="url(#blueGrad)"/>
      <!-- Reset Arrow Icon -->
      <path d="M18 22 L18 16 L12 16 M18 16 C18 12 22 10 26 12 C30 14 30 20 26 22" 
            stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="40" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Reset</text>
    </g>
    
    <!-- Session Metadata -->
    <text x="110" y="395" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">Session: #8X29-A • Started: 2h 14m ago</text>
  </g>
</svg>