<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter for card -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <!-- Gradient for send button -->
    <linearGradient id="sendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a45c2"/>
    </linearGradient>
  </defs>
  
  <!-- Main card background -->
  <rect x="20" y="20" width="360" height="480" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section title -->
  <text x="40" y="60" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Input Message</text>
  
  <!-- Metadata label -->
  <text x="40" y="85" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1.5" fill="#6b7280">CHAT INPUT COMPONENT</text>
  
  <!-- Chat input container -->
  <rect x="40" y="110" width="320" height="64" rx="8" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
  
  <!-- Placeholder text -->
  <text x="56" y="148" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Écrivez votre message...</text>
  
  <!-- Attachment icon (paperclip) -->
  <g transform="translate(272, 130)">
    <path d="M12 2C12.5523 2 13 2.44772 13 3V13C13 15.2091 11.2091 17 9 17C6.79086 17 5 15.2091 5 13V5C5 4.44772 5.44772 4 6 4C6.55228 4 7 4.44772 7 5V13C7 14.1046 7.89543 15 9 15C10.1046 15 11 14.1046 11 13V3C11 1.34315 9.65685 0 8 0C6.34315 0 5 1.34315 5 3V13" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(45 9 8.5)"/>
  </g>
  
  <!-- Emoji icon (smiley face) -->
  <g transform="translate(304, 130)">
    <circle cx="12" cy="12" r="10" stroke="#6b7280" stroke-width="1.5" fill="none"/>
    <circle cx="9" cy="10" r="1.5" fill="#6b7280"/>
    <circle cx="15" cy="10" r="1.5" fill="#6b7280"/>
    <path d="M8 15C8.5 16.5 10 17.5 12 17.5C14 17.5 15.5 16.5 16 15" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Send button -->
  <rect x="336" y="122" width="40" height="40" rx="8" fill="url(#sendGradient)"/>
  <g transform="translate(348, 134)">
    <path d="M4 8L16 2L10 14L8 10L4 8Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M8 10L16 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Active state example -->
  <text x="40" y="210" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">Active State</text>
  
  <!-- Active input container -->
  <rect x="40" y="230" width="320" height="64" rx="8" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
  
  <!-- Typed text -->
  <text x="56" y="268" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">Bonjour, comment ça va ?</text>
  
  <!-- Cursor -->
  <rect x="230" y="256" width="2" height="16" fill="#2458f3">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Active attachment icon -->
  <g transform="translate(272, 250)">
    <path d="M12 2C12.5523 2 13 2.44772 13 3V13C13 15.2091 11.2091 17 9 17C6.79086 17 5 15.2091 5 13V5C5 4.44772 5.44772 4 6 4C6.55228 4 7 4.44772 7 5V13C7 14.1046 7.89543 15 9 15C10.1046 15 11 14.1046 11 13V3C11 1.34315 9.65685 0 8 0C6.34315 0 5 1.34315 5 3V13" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(45 9 8.5)"/>
  </g>
  
  <!-- Active emoji icon -->
  <g transform="translate(304, 250)">
    <circle cx="12" cy="12" r="10" stroke="#6b7280" stroke-width="1.5" fill="none"/>
    <circle cx="9" cy="10" r="1.5" fill="#6b7280"/>
    <circle cx="15" cy="10" r="1.5" fill="#6b7280"/>
    <path d="M8 15C8.5 16.5 10 17.5 12 17.5C14 17.5 15.5 16.5 16 15" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Active send button -->
  <rect x="336" y="242" width="40" height="40" rx="8" fill="url(#sendGradient)"/>
  <g transform="translate(348, 254)">
    <path d="M4 8L16 2L10 14L8 10L4 8Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M8 10L16 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Specs section -->
  <text x="40" y="330" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">Specifications</text>
  
  <!-- Spec items -->
  <rect x="40" y="350" width="320" height="1" fill="#e5e5e5"/>
  
  <text x="40" y="375" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Height</text>
  <text x="320" y="375" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#151515" text-anchor="end">64px</text>
  
  <rect x="40" y="390" width="320" height="1" fill="#e5e5e5"/>
  
  <text x="40" y="415" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Border radius</text>
  <text x="320" y="415" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#151515" text-anchor="end">8px</text>
  
  <rect x="40" y="430" width="320" height="1" fill="#e5e5e5"/>
  
  <text x="40" y="455" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Focus state</text>
  <text x="320" y="455" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#2458f3" text-anchor="end">2px blue border</text>
  
  <rect x="40" y="470" width="320" height="1" fill="#e5e5e5"/>
  
  <text x="40" y="495" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Send button</text>
  <text x="320" y="495" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#151515" text-anchor="end">40×40 gradient</text>
</svg>