<svg viewBox="0 0 1140 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4ad4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g id="component_root">
    <rect x="20" y="10" width="1100" height="80" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="20" y="10" width="1100" height="80" rx="8" fill="none" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="50" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#1a1a1a">Validation des prérequis</text>
    
    <g transform="translate(50, 65)">
      <circle cx="0" cy="0" r="6" fill="#97ea90"/>
      <path d="M -3 0 L -1 2 L 3 -2" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#555555">Profil complet</text>
    </g>
    
    <g transform="translate(220, 65)">
      <circle cx="0" cy="0" r="6" fill="#97ea90"/>
      <path d="M -3 0 L -1 2 L 3 -2" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#555555">Pièce d'identité vérifiée</text>
    </g>
    
    <g transform="translate(430, 65)">
      <circle cx="0" cy="0" r="6" fill="#97ea90"/>
      <path d="M -3 0 L -1 2 L 3 -2" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="4" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#555555">Conditions acceptées</text>
    </g>
    
    <g transform="translate(920, 30)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="url(#btnGradient)" filter="url(#shadow)"/>
      <text x="90" y="25" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#ffffff" text-anchor="middle">Suivant</text>
      <path d="M 150 20 L 158 20 M 154 16 L 158 20 L 154 24" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>