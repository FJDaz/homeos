<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#e6c040"/>
    </linearGradient>
    <linearGradient id="editorSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="1100" height="460" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="50" y="60" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#1a1a1a">Éditeur Code</text>
    
    <g id="toolbar">
      <rect x="50" y="80" width="72" height="32" rx="6" fill="url(#goldGradient)"/>
      <text x="86" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="600">Run</text>
      
      <rect x="132" y="80" width="72" height="32" rx="6" fill="#f5f5f5" stroke="#d5d4d0" stroke-width="1"/>
      <text x="168" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle">Save</text>
      
      <rect x="214" y="80" width="80" height="32" rx="6" fill="#f5f5f5" stroke="#d5d4d0" stroke-width="1"/>
      <text x="254" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle">Format</text>
    </g>
    
    <rect x="50" y="130" width="1040" height="330" rx="6" fill="url(#editorSurface)" stroke="#e5e5e5" stroke-width="1"/>
    
    <rect x="50" y="130" width="60" height="330" rx="6" fill="#f5f5f5"/>
    <rect x="110" y="130" width="1" height="330" fill="#e5e5e5"/>
    
    <text x="80" y="160" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">1</text>
    <text x="80" y="180" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">2</text>
    <text x="80" y="200" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">3</text>
    <text x="80" y="220" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">4</text>
    <text x="80" y="240" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">5</text>
    <text x="80" y="260" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">6</text>
    <text x="80" y="280" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">7</text>
    <text x="80" y="300" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">8</text>
    <text x="80" y="320" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">9</text>
    <text x="80" y="340" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280" text-anchor="middle">10</text>
    
    <rect x="50" y="325" width="1040" height="20" fill="#ffd548" fill-opacity="0.08"/>
    <rect x="50" y="325" width="3" height="20" fill="#ffd548"/>
    
    <g transform="translate(130, 160)">
      <text font-family="Roboto Mono, monospace" font-size="12" fill="#6b7280">// Configuration API Client</text>
      
      <text y="20" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#1258ca">import</tspan>
        <tspan fill="#1a1a1a"> { </tspan>
        <tspan fill="#f05e23">createClient</tspan>
        <tspan fill="#1a1a1a"> } </tspan>
        <tspan fill="#1258ca">from</tspan>
        <tspan fill="#97ea90"> '@api/core'</tspan>
        <tspan fill="#1a1a1a">;</tspan>
      </text>
      
      <text y="60" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#2458f3">const</tspan>
        <tspan fill="#1a1a1a"> config = {</tspan>
      </text>
      
      <text y="80" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#1a1a1a">  endpoint: </tspan>
        <tspan fill="#97ea90">'https://api.elite.io/v2'</tspan>
        <tspan fill="#1a1a1a">,</tspan>
      </text>
      
      <text y="100" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#1a1a1a">  timeout: </tspan>
        <tspan fill="#ffd548">3000</tspan>
        <tspan fill="#1a1a1a">,</tspan>
      </text>
      
      <text y="120" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#1a1a1a">  retries: </tspan>
        <tspan fill="#f05e23">3</tspan>
        <tspan fill="#1a1a1a">,</tspan>
      </text>
      
      <text y="140" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#2458f3">  debug</tspan>
        <tspan fill="#1a1a1a">: </tspan>
        <tspan fill="#1258ca">true</tspan>
      </text>
      
      <text y="160" font-family="Roboto Mono, monospace" font-size="12" fill="#1a1a1a">};</text>
      
      <text y="200" font-family="Roboto Mono, monospace" font-size="12">
        <tspan fill="#1258ca">export</tspan>
        <tspan fill="#2458f3"> default</tspan>
        <tspan fill="#1a1a1a"> createClient(config);</tspan>
      </text>
      
      <rect x="248" y="187" width="2" height="15" fill="#1258ca">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <rect x="50" y="430" width="1040" height="30" rx="0" fill="#fafafa"/>
    <text x="70" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">JavaScript</text>
    <text x="140" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#97ea90">●</text>
    <text x="150" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">modified</text>
    <text x="1070" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">UTF-8</text>
    <text x="990" y="450" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">Ln 10, Col 32</text>
  </g>
</svg>