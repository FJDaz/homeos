<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <filter id="itemShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#97ea90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd976;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Container -->
    <rect x="12" y="12" width="576" height="256" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <!-- Section Title -->
    <text x="32" y="44" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="19" fill="#111827">Grille Stencils</text>
    
    <!-- Grid Row 1 -->
    <!-- Corp Alpha - Keep Selected -->
    <g transform="translate(32, 64)">
      <rect width="170" height="58" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#itemShadow)"/>
      <text x="12" y="20" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="11" fill="#374151">Corp Alpha</text>
      <text x="12" y="36" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">UI Kit, Icons</text>
      <rect x="85" y="38" width="36" height="18" rx="4" fill="url(#greenGradient)"/>
      <text x="103" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#14532d" text-anchor="middle">Keep</text>
      <rect x="125" y="38" width="38" height="18" rx="4" fill="none" stroke="#d1d5db" stroke-width="1"/>
      <text x="144" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#6b7280" text-anchor="middle">Reserve</text>
    </g>
    
    <!-- Corp Beta - Reserve Selected -->
    <g transform="translate(217, 64)">
      <rect width="170" height="58" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#itemShadow)"/>
      <text x="12" y="20" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="11" fill="#374151">Corp Beta</text>
