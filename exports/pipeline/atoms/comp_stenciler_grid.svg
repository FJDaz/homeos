        <text x="22" y="10" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#ffffff" text-anchor="middle">Keep</text>
        <rect x="50" y="0" width="52" height="14" rx="6" fill="#e5e7eb"/>
        <text x="76" y="10" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#6b7280" text-anchor="middle">Reserve</text>
      </g>
    </g>
    
    <!-- Corps 2 -->
