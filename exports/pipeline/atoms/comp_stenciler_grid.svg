    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">
      <tspan font-weight="600" fill="#2458f3">3</tspan> Keep
      <tspan dx="16" font-weight="600" fill="#e5bc3a">3</tspan> Reserve
      <tspan dx="16" font-weight="600" fill="#9ca3af">3</tspan> Pending
