  </defs>
  
  <!-- Main Card -->
  <rect x="0" y="0" width="600" height="320" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header Section -->
  <text x="24" y="32" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Grille Stencils</text>
  <text x="24" y="52" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">Sélectionnez les composants à conserver ou réserver</text>
  
  <!-- Grid Container -->
  <g transform="translate(24, 68)">
