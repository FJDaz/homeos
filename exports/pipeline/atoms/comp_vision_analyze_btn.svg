<svg viewBox="0 0 700 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <filter id="btnShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#f05e23" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#e05520"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="700" height="580" fill="#fafaf9"/>
  
  <g id="component_root">
    <rect x="50" y="40" width="600" height="500" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="90" y="100" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#18181b">Analyse Intelligence Artificielle</text>
    <text x="90" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#71717a">Configurez les paramètres et lancez l'analyse par Gemini.</text>
    
    <g transform="translate(90, 170)">
      <rect x="0" y="0" width="240" height="64" rx="8" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="16" y="28" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#27272a">Analyse Complète</text>
      <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a1a1aa">Traitement IA avancé</text>
      <circle cx="208" cy="32" r="10" fill="#f05e23" opacity="0.1"/>
      <circle cx="208" cy="32" r="4" fill="#f05e23"/>
      
      <rect x="260" y="0" width="240" height="64" rx="8" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="276" y="28" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#27272a">Rapport Détaillé</text>
      <text x="276" y="48" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a1a1aa">Export JSON &amp; PDF</text>
      <circle cx="468" cy="32" r="10" fill="#e4e4e7"/>
      
      <rect x="0" y="88" width="500" height="120" rx="8" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="16" y="116" font-family="Roboto Mono, monospace" font-size="10" fill="#a1a1aa">// Prêt pour l'analyse</text>
      <text x="16" y="140" font-family="Roboto Mono, monospace" font-size="11" fill="#52525b">{ "source": "gemini_api_v2", "mode": "deep_analysis" }</text>
      <text x="16" y="162" font-family="Roboto Mono, monospace" font-size="11" fill="#52525b">{ "records": 12543, "estimated_time": "4.2s" }</text>
      
      <circle cx="460" cy="108" r="4" fill="#97ea90"/>
      <text x="470" y="112" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">API Connectée</text>
    </g>
    
    <g transform="translate(210, 420)">
      <rect x="0" y="0" width="280" height="56" rx="8" fill="url(#btnGradient)" filter="url(#btnShadow)"/>
      
      <g transform="translate(24, 16)">
        <path d="M12 2c0 0-4 6-4 10 0 2 1 4 2 5l-2 3 4-1c1 1 2 1 2 1s1 0 2-1l4 1-2-3c1-1 2-3 2-5 0-4-4-10-4-10z" fill="#ffffff"/>
        <circle cx="12" cy="12" r="2" fill="#f05e23"/>
        <path d="M8 18l-2 4 4-1-2-3z" fill="#ffd548"/>
      </g>
      
      <text x="140" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Lancer l'analyse Gemini</text>
    </g>
    
    <text x="350" y="510" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">L'analyse prendra environ 4 secondes</text>
  </g>
</svg>