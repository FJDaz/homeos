<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="modalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a46d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="350" height="300" fill="#000000" opacity="0.45"/>
  
  <g id="component_root">
    <rect x="35" y="50" width="280" height="200" rx="10" fill="#ffffff" filter="url(#modalShadow)"/>
    
    <text x="175" y="95" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="17" text-anchor="middle" fill="#111827">Passer le dialogue ?</text>
    
    <text x="175" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">
      <tspan x="175" dy="0">Cette action vous permet d'accéder</tspan>
      <tspan x="175" dy="20">directement à l'étape de validation.</tspan>
    </text>
    
    <rect x="115" y="175" width="120" height="44" rx="8" fill="url(#primaryGradient)" style="cursor:pointer"/>
    <text x="175" y="202" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" text-anchor="middle" fill="#ffffff" style="pointer-events:none">Passer</text>
    
    <text x="175" y="235" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#9ca3af" style="cursor:pointer">Annuler</text>
  </g>
</svg>