<svg viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="previewGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="20" y="20" width="460" height="240" rx="8" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    <rect x="20" y="20" width="460" height="4" rx="2" fill="#97ea90"/>
    
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="180" height="180" rx="6" fill="url(#previewGradient)" stroke="#e8e8e6" stroke-width="1"/>
      <rect x="12" y="12" width="36" height="156" rx="4" fill="#e8e8e6"/>
      <rect x="56" y="12" width="112" height="28" rx="4" fill="#e8e8e6"/>
      <rect x="56" y="48" width="54" height="54" rx="4" fill="#97ea90" fill-opacity="0.25"/>
      <rect x="114" y="48" width="54" height="54" rx="4" fill="#e8e8e6"/>
      <rect x="56" y="108" width="112" height="60" rx="4" fill="#e8e8e6"/>
      <rect x="68" y="120" width="88" height="8" rx="2" fill="#d5d4d0"/>
      <rect x="68" y="134" width="64" height="8" rx="2" fill="#d5d4d0"/>
      <rect x="68" y="148" width="76" height="8" rx="2" fill="#d5d4d0"/>
    </g>
    
    <g transform="translate(240, 70)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">Split Dashboard</text>
      <text x="0" y="32" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#666666">Classic sidebar navigation with</text>
      <text x="0" y="52" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#666666">modular content grid layout.</text>
      
      <text x="0" y="96" font-family="Roboto Mono, monospace" font-size="11" fill="#888888">GRID: 12-COLUMN</text>
      <text x="0" y="116" font-family="Roboto Mono, monospace" font-size="11" fill="#888888">RESPONSIVE: YES</text>
      
      <g transform="translate(0, 140)">
        <rect x="0" y="0" width="96" height="32" rx="6" fill="#97ea90" fill-opacity="0.12" stroke="#97ea90" stroke-width="1.5"/>
        <text x="48" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#2d7a2d" text-anchor="middle">Selected</text>
      </g>
    </g>
    
    <g transform="translate(446, 36)">
      <circle cx="12" cy="12" r="12" fill="#97ea90"/>
      <path d="M7 12 L11 16 L17 8" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
