<svg viewBox="0 0 260 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f05e23"/>
    </linearGradient>
    
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <filter id="floatShadow" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <g id="component_root">
    <rect x="16" y="16" width="228" height="518" rx="10" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="130" y="64" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="19" text-anchor="middle" fill="#111827">Nouvelle Analyse</text>
    
    <text x="130" y="96" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#6b7280">
      <tspan x="130" dy="0">Positionnez votre sujet</tspan>
      <tspan x="130" dy="22">et capturez l'écran</tspan>
    </text>
    
    <rect x="40" y="140" width="180" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
    <g transform="translate(130, 210)" opacity="0.4">
      <rect x="-30" y="-25" width="60" height="50" rx="4" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 2"/>
      <line x1="-15" y1="-10" x2="15" y2="10" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="-10" x2="-15" y2="10" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="130" y="305" font-family="Roboto Mono, monospace" font-size="10" text-anchor="middle" fill="#9ca3af">En attente de capture...</text>
    
    <g transform="translate(130, 420)" filter="url(#floatShadow)">
      <circle cx="0" cy="0" r="75" fill="url(#btnGradient)"/>
      <circle cx="0" cy="0" r="68" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.25"/>
      
      <g transform="translate(0, -15)">
        <rect x="-22" y="-18" width="44" height="36" rx="6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
        <circle cx="12" cy="-12" r="2" fill="#ffffff"/>
      </g>
      
      <text x="0" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle" fill="#ffffff" letter-spacing="-0.3">Analyser</text>
      <text x="0" y="54" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle" fill="#ffffff" letter-spacing="-0.3">l'écran</text>
    </g>
    
    <text x="130" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#9ca3af">Appuyez pour capturer</text>
  </g>
</svg>