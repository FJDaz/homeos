<svg viewBox="0 0 1140 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f05e23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0501e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="40" y="40" width="1060" height="420" rx="10" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="80" y="95" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="20" fill="#1a1a1a">Modifications à appliquer</text>
    
    <g id="changes_list">
      <rect x="80" y="120" width="980" height="64" rx="8" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
      <text x="104" y="145" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">Nom du document</text>
      <text x="104" y="168" font-family="Roboto Mono, monospace" font-size="11" fill="#4a4a4a">"Rapport_Q4.pdf"</text>
      <text x="300" y="168" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">→</text>
      <text x="330" y="168" font-family="Roboto Mono, monospace" font-size="11" fill="#f05e23">"Rapport_Q4_Final.pdf"</text>
      
      <rect x="80" y="196" width="980" height="64" rx="8" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
      <text x="104" y="221" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">Visibilité</text>
      <text x="104" y="244" font-family="Roboto Mono, monospace" font-size="11" fill="#4a4a4a">Privé</text>
      <text x="200" y="244" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">→</text>
      <text x="230" y="244" font-family="Roboto Mono, monospace" font-size="11" fill="#97ea90">Public</text>
      
      <rect x="80" y="272" width="980" height="64" rx="8" fill="#fafafa" stroke="#e8e8e6" stroke-width="1"/>
      <text x="104" y="297" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">Tags</text>
      <text x="104" y="320" font-family="Roboto Mono, monospace" font-size="11" fill="#4a4a4a">[archivé, brouillon]</text>
      <text x="320" y="320" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">→</text>
      <text x="350" y="320" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">[archivé, validé, 2024]</text>
    </g>
    
    <line x1="40" y1="370" x2="1100" y2="370" stroke="#f0f0f0" stroke-width="1"/>
    
    <g id="button_cancel" transform="translate(780, 390)">
      <rect x="0" y="0" width="120" height="40" rx="8" fill="#ffffff" stroke="#c5c4c0" stroke-width="1.5"/>
      <path d="M22 20 L16 20 M16 20 L19 17 M16 20 L19 23 M16 20 C16 24 19 27 23 27 C27 27 30 24 30 20 C30 16 27 13 23 13 C21 13 19 14 18 15" 
            stroke="#4a4a4a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(4, 4) scale(0.7)"/>
      <text x="44" y="26" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#4a4a4a">Annuler</text>
    </g>
    
    <g id="button_apply" transform="translate(920, 390)">
      <rect x="0" y="0" width="140" height="40" rx="8" fill="url(#primaryGradient)"/>
      <path d="M24 12 L24 18 L30 18 M20 14 L20 26 L32 26 L32 16 L26 16 L26 10 L14 10 L14 26 L18 26" 
            stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(8, 6) scale(0.8)"/>
      <rect x="22.4" y="14.8" width="4.8" height="3.2" fill="#ffffff" transform="translate(8, 6) scale(0.8)"/>
      <text x="50" y="26" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Appliquer</text>
    </g>
  </g>
</svg>