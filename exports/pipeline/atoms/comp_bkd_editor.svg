<svg viewBox="0 0 660 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="tabGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#97ea90" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#97ea90" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="0" y="0" width="660" height="520" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <!-- Header Section -->
    <text x="24" y="36" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="20" fill="#1f2937">Éditeur de Code</text>
    
    <!-- Tab Bar -->
    <g transform="translate(24, 56)">
      <!-- Active Tab -->
      <rect x="0" y="0" width="140" height="36" rx="6" fill="url(#tabGradient)"/>
      <rect x="0" y="34" width="140" height="2" rx="1" fill="#97ea90"/>
      <text x="12" y="23" font-family="Inter, sans-serif" font-size="13" fill="#1f2937" font-weight="600">main.tsx</text>
      <path d="M 122 18 L 126 14 M 122 14 L 126 18" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
      
      <!-- Inactive Tabs -->
      <text x="160" y="23" font-family="Inter, sans-serif" font-size="13" fill="#6b7280">styles.css</text>
      <text x="280" y="23" font-family="Inter, sans-serif" font-size="13" fill="#6b7280">ROADMAP.md</text>
      
      <!-- Add Tab Button -->
      <circle cx="420" cy="18" r="10" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <path d="M 420 14 L 420 22 M 416 18 L 424 18" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Editor Workspace -->
    <g transform="translate(24, 108)">
      <!-- Left Pane: Code Editor -->
      <rect x="0" y="0" width="306" height="360" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      
      <!-- Line Numbers Column -->
      <rect x="0" y="0" width="40" height="360" rx="6" fill="#f5f5f4"/>
      <text x="12" y="28" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">1</text>
      <text x="12" y="48" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">2</text>
      <text x="12" y="68" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">3</text>
      <text x="12" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">4</text>
      <text x="12" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">5</text>
      <text x="12" y="128" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">6</text>
      <text x="12" y="148" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">7</text>
      
      <!-- Active Line Highlight (Line 4) -->
      <rect x="40" y="72" width="266" height="20" rx="3" fill="#97ea90" fill-opacity="0.12"/>
      <rect x="40" y="72" width="3" height="20" rx="1.5" fill="#97ea90"/>
      
      <!-- Code Content -->
      <text x="52" y="28" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">import</text>
      <text x="100" y="28" font-family="Roboto Mono, monospace" font-size="11" fill="#1f2937">{ useState }</text>
      <text x="172" y="28" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">from</text>
      <text x="208" y="28" font-family="Roboto Mono, monospace" font-size="11" fill="#f05e23">'react'</text>
      
      <text x="52" y="48" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">import</text>
      <text x="100" y="48" font-family="Roboto Mono, monospace" font-size="11" fill="#1f2937">{ Sullivan }</text>
      <text x="172" y="48" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">from</text>
      <text x="208" y="48" font-family="Roboto Mono, monospace" font-size="11" fill="#f05e23">'@/core'</text>
      
      <text x="52" y="68" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">// BKD Phase 2 - Pristine</text>
      
      <text x="52" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">export</text>
      <text x="100" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">const</text>
      <text x="136" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#2458f3" font-weight="600">Editor</text>
      <text x="180" y="88" font-family="Roboto Mono, monospace" font-size="11" fill="#1f2937">= () => {</text>
      
      <text x="52" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">const</text>
      <text x="92" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#1f2937">[code, setCode] =</text>
      <text x="208" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">useState</text>
      <text x="256" y="108" font-family="Roboto Mono, monospace" font-size="11" fill="#1f2937">('')</text>
      
      <!-- Cursor -->
      <rect x="264" y="96" width="2" height="14" fill="#1258ca">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
      
      <!-- Divider/Splitter -->
      <rect x="306" y="0" width="12" height="360" fill="#f5f5f4"/>
      <rect x="311" y="160" width="2" height="40" rx="1" fill="#c5c4c0"/>
      
      <!-- Right Pane: Roadmap Tracking -->
      <rect x="318" y="0" width="294" height="360" rx="6" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
      
      <!-- Right Pane Header -->
      <text x="338" y="28" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="13" fill="#1f2937">ROADMAP.md</text>
      <circle cx="590" cy="22" r="3" fill="#97ea90"/>
      
      <!-- Content -->
      <text x="338" y="60" font-family="Inter, sans-serif" font-size="12" fill="#6b7280" font-weight="600">## Mission Active</text>
      
      <text x="338" y="88" font-family="Inter, sans-serif" font-size="11" fill="#1f2937">- [x] Configurer BKD</text>
      <text x="338" y="110" font-family="Inter, sans-serif" font-size="11" fill="#1f2937">- [x] Intégrer Sullivan</text>
      <text x="338" y="132" font-family="Inter, sans-serif" font-size="11" fill="#97ea90" font-weight="600">- [ ] Split Editor UI</text>
      <text x="338" y="154" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">- [ ] Déploiement DPL</text>
      
      <rect x="338" y="180" width="254" height="1" fill="#e5e7eb"/>
      
      <text x="338" y="208" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" font-weight="600">Status:</text>
      <rect x="338" y="220" width="80" height="24" rx="4" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <circle cx="350" cy="232" r="3" fill="#97ea90"/>
      <text x="360" y="236" font-family="Inter, sans-serif" font-size="11" fill="#1f2937">En cours</text>
    </g>
    
    <!-- Status Bar -->
    <g transform="translate(24, 484)">
      <rect x="0" y="0" width="612" height="32" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
      <text x="12" y="20" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">main.tsx</text>
      <text x="120" y="20" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">UTF-8</text>
      <text x="200" y="20" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">TypeScript JSX</text>
      <text x="340" y="20" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">Ln 4, Col 12</text>
      <text x="440" y="20" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">Spaces: 2</text>
      
      <!-- Pristine Indicator -->
      <circle cx="596" cy="16" r="4" fill="#97ea90"/>
    </g>
  </g>
</svg>