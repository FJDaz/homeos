<svg viewBox="0 0 240 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-main" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1e4bd0"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="0" y="0" width="240" height="520" rx="10" fill="#ffffff" filter="url(#shadow-main)"/>
    
    <g id="header">
      <text x="120" y="36" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle" fill="#111827">Chat Majordome</text>
      <path d="M120 16 L121 19 L124 19 L122 21 L123 24 L120 22 L117 24 L118 21 L116 19 L119 19 Z" fill="#2458f3"/>
      <text x="120" y="56" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">Pilotage par Gemini</text>
    </g>
    
    <rect x="20" y="68" width="200" height="1" fill="#e5e7eb"/>
    
    <g id="messages">
      <g transform="translate(20, 88)">
        <rect x="0" y="0" width="170" height="56" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
        <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Bonjour ! Je suis là pour</text>
        <text x="14" y="44" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">vos actions courantes.</text>
      </g>
      
      <g transform="translate(130, 160)">
        <rect x="0" y="0" width="90" height="40" rx="8" fill="url(#gradient-accent)"/>
        <text x="45" y="25" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#ffffff">Planifie ma</text>
        <text x="45" y="40" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#ffffff">réunion 14h</text>
      </g>
      
      <g transform="translate(20, 220)">
        <rect x="0" y="0" width="170" height="90" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
        <text x="14" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#111827">C'est noté ! Réunion :</text>
        <text x="14" y="50" font-family="Roboto Mono, monospace" font-size="11" fill="#2458f3">14:00 - Salle Bordeaux</text>
        <text x="14" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Participants: 4 invités</text>
      </g>
    </g>
    
    <g id="actions" transform="translate(20, 340)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Suggestions</text>
      <g transform="translate(0, 10)">
        <rect x="0" y="0" width="56" height="32" rx="8" fill="#eff6ff" stroke="#2458f3" stroke-width="1.5"/>
        <text x="28" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2458f3">Email</text>
        <rect x="64" y="0" width="56" height="32" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
        <text x="92" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#374151">Agenda</text>
        <rect x="128" y="0" width="72" height="32" rx="8" fill="#ffffff" stroke="#d5d4d0" stroke-width="1"/>
        <text x="164" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#374151">Rapport</text>
      </g>
    </g>
    
    <g id="input-section" transform="translate(20, 440)">
      <rect x="0" y="0" width="200" height="48" rx="10" fill="#fafafa" stroke="#d5d4d0" stroke-width="1.5"/>
      <text x="16" y="30" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Écrivez une action...</text>
      <rect x="156" y="8" width="32" height="32" rx="8" fill="#2458f3"/>
      <path d="M164 24 L172 24 M168 20 L172 24 L168 28" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>