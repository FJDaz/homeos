<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowModal" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="indigoAvatar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1258ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e459e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAction" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc20;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="0" y="0" width="350" height="300" fill="#1a1a1a" fill-opacity="0.45"/>
    
    <rect x="20" y="20" width="310" height="260" rx="8" fill="#ffffff" filter="url(#shadowModal)"/>
    
    <text x="55" y="55" font-family="sans-serif" font-weight="700" font-size="16" fill="#1a1a1a">Messages</text>
    
    <g transform="translate(295, 50)">
      <circle cx="0" cy="0" r="10" fill="#f5f5f5"/>
      <path d="M-3 -3 L3 3 M3 -3 L-3 3" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <g id="bubble_s1">
      <circle cx="55" cy="95" r="12" fill="url(#indigoAvatar)"/>
      <text x="55" y="99" font-family="sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">S</text>
      
      <path d="M75 82 h105 a8 8 0 0 1 8 8 v24 a8 8 0 0 1 -8 8 h-105 a8 8 0 0 1 -8 -8 v-12 l-6 -4 l6 -4 v-4 a8 8 0 0 1 8 -8 z" fill="#1258ca"/>
      <text x="82" y="105" font-family="sans-serif" font-size="11" fill="#ffffff">Bonjour ! Comment puis-je</text>
      <text x="82" y="118" font-family="sans-serif" font-size="11" fill="#ffffff">vous aider aujourd'hui ?</text>
    </g>
    
    <g id="bubble_user">
      <rect x="160" y="145" width="130" height="36" rx="10" fill="#f5f5f5"/>
      <text x="170" y="165" font-family="sans-serif" font-size="11" fill="#1a1a1a">Je cherche une solution</text>
      <text x="170" y="178" font-family="sans-serif" font-size="11" fill="#1a1a1a">premium pour mon équipe</text>
      <path d="M290 163 L298 170 L290 177 z" fill="#f5f5f5"/>
    </g>
    
    <g id="bubble_s2">
      <circle cx="55" cy="215" r="12" fill="url(#indigoAvatar)"/>
      <text x="55" y="219" font-family="sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">S</text>
      
      <path d="M75 202 h85 a8 8 0 0 1 8 8 v16 a8 8 0 0 1 -8 8 h-85 a8 8 0 0 1 -8 -8 v-8 l-6 -4 l6 -4 v-4 a8 8 0 0 1 8 -8 z" fill="#1258ca"/>
      <text x="82" y="222" font-family="sans-serif" font-size="11" fill="#ffffff">Parfait, regardons ça.</text>
    </g>
    
    <circle cx="295" cy="200" r="3" fill="#97ea90"/>
    
    <g id="input_bar" transform="translate(40, 245)">
      <rect x="0" y="0" width="230" height="36" rx="8" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <text x="15" y="23" font-family="sans-serif" font-size="12" fill="#999">Écrivez votre message...</text>
      
      <circle cx="250" cy="18" r="12" fill="url(#goldAction)"/>
      <path d="M246 18 L254 18 M254 18 L250 14 M254 18 L250 22" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <text x="55" y="140" font-family="sans-serif" font-size="9" fill="#999">10:42</text>
    <text x="260" y="195" font-family="sans-serif" font-size="9" fill="#999">10:43</text>
  </g>
</svg>