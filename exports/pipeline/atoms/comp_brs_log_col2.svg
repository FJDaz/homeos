<svg viewBox="0 0 1140 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="20" y="20" width="1100" height="160" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <!-- Header -->
    <text x="48" y="56" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Trace LLM 2</text>
    
    <!-- Live Status Indicator -->
    <circle cx="1076" cy="50" r="4" fill="#10b981"/>
    <text x="1088" y="54" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280">Live stream</text>
    
    <!-- Log Entry 1: Success -->
    <g transform="translate(48, 76)" style="cursor: pointer;">
      <rect x="-12" y="-4" width="1064" height="28" rx="6" fill="#f3f4f6" opacity="0"/>
      <text x="0" y="14" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">14:32:15.042</text>
      <circle cx="108" cy="10" r="4" fill="#10b981"/>
      <text x="124" y="14" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Inference completed — 142 tokens generated</text>
      <path d="M1036 6 L1042 10 L1036 14" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <line x1="48" y1="108" x2="1092" y2="108" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Log Entry 2: Processing (Active) -->
    <g transform="translate(48, 112)" style="cursor: pointer;">
      <rect x="-12" y="-4" width="1064" height="28" rx="6" fill="#eff6ff" opacity="0.6"/>
      <text x="0" y="14" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">14:32:14.891</text>
      <circle cx="108" cy="10" r="4" fill="#1258ca"/>
      <text x="124" y="14" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#111827" font-weight="500">Processing request — gpt-4-turbo-preview</text>
      <path d="M1036 6 L1042 10 L1036 14" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <line x1="48" y1="144" x2="1092" y2="144" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Log Entry 3: Warning/Optimization -->
    <g transform="translate(48, 148)" style="cursor: pointer;">
      <rect x="-12" y="-4" width="1064" height="28" rx="6" fill="#f3f4f6" opacity="0"/>
      <text x="0" y="14" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">14:32:12.156</text>
      <circle cx="108" cy="10" r="4" fill="#f59e0b"/>
      <text x="124" y="14" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#374151">Context optimized — Trimmed 4,096 tokens from history</text>
      <path d="M1036 6 L1042 10 L1036 14" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>