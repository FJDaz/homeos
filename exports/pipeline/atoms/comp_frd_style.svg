<svg viewBox="0 0 200 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="style-minimal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#212529;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dabf7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#228be6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-vibrant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff922b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f05e23;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e7f5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d0ebff;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="style-brutal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dee2e6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-nature" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d3f9d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#97ea90;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="style-mono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f3f5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#adb5bd;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="8" y="8" width="184" height="544" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    
    <text x="24" y="44" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">Style Library</text>
    
    <g transform="translate(24, 64)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-minimal)" stroke="#dee2e6" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#495057" text-anchor="middle">Minimal</text>
    </g>
    
    <g transform="translate(106, 64)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-dark)" stroke="#495057" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Dark</text>
    </g>
    
    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-ocean)" stroke="#1971c2" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Ocean</text>
    </g>
    
    <g transform="translate(106, 130)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-vibrant)" stroke="#f05e23" stroke-width="2"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Vibrant</text>
      <circle cx="60" cy="10" r="6" fill="#f05e23"/>
      <path d="M57 10 L59 12 L63 8" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <g transform="translate(24, 196)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-glass)" stroke="#a5d8ff" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#1864ab" text-anchor="middle">Glass</text>
    </g>
    
    <g transform="translate(106, 196)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-brutal)" stroke="#212529" stroke-width="2"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#212529" text-anchor="middle">Brutal</text>
    </g>
    
    <g transform="translate(24, 262)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-nature)" stroke="#2f9e44" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#2b8a3e" text-anchor="middle">Nature</text>
    </g>
    
    <g transform="translate(106, 262)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="url(#style-mono)" stroke="#868e96" stroke-width="1"/>
      <text x="35" y="29" font-family="Inter, sans-serif" font-size="9" fill="#495057" text-anchor="middle">Mono</text>
    </g>
    
    <line x1="24" y1="336" x2="176" y2="336" stroke="#e9ecef" stroke-width="1"/>
    
    <text x="24" y="368" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Custom Upload</text>
    
    <rect x="24" y="384" width="152" height="120" rx="8" fill="#fafafa" stroke="#d5d4d0" stroke-width="1.5" stroke-dasharray="4 4"/>
    
    <g transform="translate(84, 410)">
      <path d="M16 4 L16 20" stroke="#f05e23" stroke-width="2" stroke-linecap="round"/>
      <path d="M10 10 L16 4 L22 10" stroke="#f05e23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 20 L4 22 C4 23 5 24 6 24 L26 24 C27 24 28 23 28 22 L28 20" stroke="#868e96" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </g>
    
    <text x="100" y="456" font-family="Inter, sans-serif" font-size="11" fill="#495057" text-anchor="middle">Drop files or</text>
    <text x="100" y="474" font-family="Inter, sans-serif" font-size="11" fill="#f05e23" font-weight="600" text-anchor="middle">Browse</text>
    
    <text x="100" y="524" font-family="Inter, sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle">Supports .css, .json, .fig</text>
  </g>
</svg>