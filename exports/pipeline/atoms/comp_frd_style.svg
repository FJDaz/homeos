    <linearGradient id="grad-retro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f05e23;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffd548;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd548;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffd548;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
