    <text x="120" y="45" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="19" font-weight="700" text-anchor="middle" fill="#1a1a1a">Style Choice</text>
    <text x="120" y="68" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#6b6b6b">Select a visual direction</text>
    
    <g transform="translate(25, 90)">
      <rect x="0" y="0" width="90" height="90" rx="8" fill="#fafafa" stroke="#d5d4d0" stroke-width="1"/>
      <rect x="32" y="35" width="26" height="20" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="45" y="78" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#4a4a4a">Minimal</text>
