<svg viewBox="0 0 1140 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a46c9"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="70" y="50" width="1000" height="250" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="70" y="50" width="1000" height="250" rx="10" fill="none" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="110" y="100" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#1f2937">Session Actuelle</text>
    
    <text x="110" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Votre session de travail est active. Vous pouvez recommencer à zéro si nécessaire.</text>
    
    <g transform="translate(110, 180)">
      <rect width="176" height="44" rx="8" fill="url(#btnGradient)"/>
      <rect width="176" height="44" rx="8" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
      
      <text x="20" y="29" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#ffffff">↻</text>
      <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Nouvelle session</text>
    </g>
  </g>
</svg>