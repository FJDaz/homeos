<svg viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="modalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="intentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#97ea90;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#97ea90;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Backdrop -->
  <rect width="1440" height="200" fill="rgba(15, 23, 42, 0.6)"/>
  
  <!-- Grid pattern subtle -->
  <path d="M0 40 h1440 M0 80 h1440 M0 120 h1440 M0 160 h1440" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <path d="M120 0 v200 M360 0 v200 M600 0 v200 M840 0 v200 M1080 0 v200 M1320 0 v200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  <g id="component_root">
    <!-- Modal Card -->
    <rect x="450" y="20" width="540" height="160" rx="10" fill="#ffffff" filter="url(#modalShadow)"/>
    
    <!-- Accent Left Border -->
    <rect x="450" y="20" width="3" height="160" rx="1.5" fill="#97ea90"/>
    
    <!-- Header Section -->
    <text x="490" y="65" font-family="sans-serif" font-weight="700" font-size="18" fill="#0f172a">Intent &amp; Usage Protocol</text>
    
    <!-- Close Button -->
    <g transform="translate(958, 52)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
      <path d="M-4,-4 L4,4 M-4,4 L4,-4" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Genome Label -->
    <rect x="490" y="78" width="140" height="20" rx="4" fill="url(#intentGradient)"/>
    <text x="500" y="92" font-family="monospace" font-size="11" fill="#15803d" font-weight="500">GENOME: BTN-PRIMARY</text>
    
    <!-- Content -->
    <text x="490" y="120" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">Primary Conversion Trigger</text>
    
    <text x="490" y="140" font-family="sans-serif" font-size="12" fill="#64748b">
      High-emphasis control for critical workflow initiation. Implements 
    </text>
    <text x="490" y="156" font-family="sans-serif" font-size="12" fill="#64748b">
      immediate visual feedback with #1258ca core state.
    </text>
    
    <!-- Intent Statement -->
    <text x="490" y="172" font-family="sans-serif" font-size="11" fill="#97ea90" font-weight="600" font-style="italic">
      Intent: Minimize friction in high-velocity decision points.
    </text>
    
    <!-- Footer Actions -->
    <rect x="830" y="138" width="140" height="32" rx="6" fill="#97ea90"/>
    <text x="900" y="158" font-family="sans-serif" font-weight="600" font-size="12" fill="#14532d" text-anchor="middle">Inspect Source</text>
    
    <text x="830" y="158" font-family="monospace" font-size="10" fill="#94a3b8">ESC to dismiss</text>
  </g>
</svg>