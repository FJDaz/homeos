<svg viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <g id="component_root">
    <!-- Modal Backdrop -->
    <rect x="0" y="0" width="600" height="100" fill="#000000" fill-opacity="0.45"/>
    
    <!-- White Card Container -->
    <rect x="30" y="15" width="540" height="70" rx="10" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- Gold Accent Indicator -->
    <rect x="30" y="15" width="4" height="70" rx="2" fill="#ffd548"/>
    
    <!-- Content Title -->
    <text x="54" y="40" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#1a1a1a">Intent &amp; Usage</text>
    
    <!-- Content Description -->
    <text x="54" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#666666">Explication de l'usage et Intent au survol</text>
    
    <!-- Primary Action Button -->
    <rect x="450" y="44" width="100" height="32" rx="6" fill="#ffd548"/>
    <text x="500" y="65" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="12" fill="#1a1a1a" text-anchor="middle">Got it</text>
    
    <!-- Close Action -->
    <g transform="translate(545, 25)">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#999999" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="0" x2="0" y2="10" stroke="#999999" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>