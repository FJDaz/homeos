<svg viewBox="0 0 1140 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-floating" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  <g id="component_root">
    <rect width="1140" height="160" fill="#0f172a" opacity="0.45"/>
    
    <rect x="300" y="10" width="540" height="140" rx="8" fill="#ffffff" filter="url(#shadow-floating)" stroke="#e5e4e0" stroke-width="1"/>
    
    <text x="340" y="50" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="16" fill="#111827">Intent &amp; Usage Context</text>
    
    <g transform="translate(820, 42)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="transparent" cursor="pointer"/>
      <path d="M-5,-5 L5,5 M-5,5 L5,-5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <text font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">
      <tspan x="340" y="78">Semantic explanation of component usage</tspan>
      <tspan x="340" y="98">and underlying design intent from the Genome.</tspan>
    </text>
    
    <rect x="340" y="112" width="260" height="28" rx="6" fill="#f8f7f6" stroke="#e5e4e0" stroke-width="1"/>
    <text x="352" y="130" font-family="Roboto Mono, monospace" font-size="11" fill="#1258ca">variant: 'pristine', intent: 'primary'</text>
    
    <rect x="720" y="112" width="100" height="28" rx="6" fill="#ffd548"/>
    <text x="770" y="130" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#1f2937" text-anchor="middle">View Source</text>
