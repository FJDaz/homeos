<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b6ef5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2458f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card -->
    <rect x="25" y="25" width="650" height="350" rx="10" fill="#ffffff" filter="url(#shadow)" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Header -->
    <text x="55" y="65" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="700" fill="#111827">Validation Arbitrage</text>
    <text x="55" y="90" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Reconcile price discrepancies across liquidity pools</text>
    
    <!-- Divider -->
    <line x1="55" y1="105" x2="645" y2="105" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Table Header -->
    <rect x="55" y="120" width="590" height="36" rx="6" fill="#f8fafc"/>
    <text x="75" y="143" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">Market Pair</text>
    <text x="230" y="143" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">Source A</text>
    <text x="360" y="143" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">Source B</text>
    <text x="490" y="143" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">Variance</text>
    <text x="590" y="143" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">Action</text>
    
    <!-- Row 1: High variance -->
    <rect x="55" y="161" width="590" height="52" fill="#ffffff" stroke="#f1f5f9" stroke-width="1"/>
    <text x="75" y="193" font-family="Inter, sans-serif" font-size="14" fill="#1e293b">BTC/USD</text>
    <text x="230" y="193" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">42,385.00</text>
    <text x="360" y="193" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">42,391.50</text>
    <text x="490" y="193" font-family="Roboto Mono, monospace" font-size="13" fill="#f05e23">+0.015%</text>
    <circle cx="600" cy="187" r="8" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="600" cy="187" r="4" fill="#2458f3"/>
    
    <!-- Row 2: No variance -->
    <rect x="55" y="214" width="590" height="52" fill="#ffffff" stroke="#f1f5f9" stroke-width="1"/>
    <text x="75" y="246" font-family="Inter, sans-serif" font-size="14" fill="#1e293b">ETH/USD</text>
    <text x="230" y="246" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">2,245.80</text>
    <text x="360" y="246" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">2,245.80</text>
    <text x="490" y="246" font-family="Roboto Mono, monospace" font-size="13" fill="#97ea90">0.000%</text>
    <circle cx="600" cy="240" r="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <!-- Row 3: High variance -->
    <rect x="55" y="267" width="590" height="52" fill="#ffffff" stroke="#f1f5f9" stroke-width="1"/>
    <text x="75" y="299" font-family="Inter, sans-serif" font-size="14" fill="#1e293b">SOL/USD</text>
    <text x="230" y="299" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">98.450</text>
    <text x="360" y="299" font-family="Roboto Mono, monospace" font-size="13" fill="#1e293b">98.125</text>
    <text x="490" y="299" font-family="Roboto Mono, monospace" font-size="13" fill="#f05e23">-0.330%</text>
    <circle cx="600" cy="293" r="8" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="600" cy="293" r="4" fill="#2458f3"/>
    
    <!-- Footer Stats -->
    <text x="55" y="345" font-family="Inter, sans-serif" font-size="12" fill="#64748b">2 discrepancies detected • 1 validated</text>
    
    <!-- Primary Button -->
    <rect x="515" y="325" width="130" height="40" rx="8" fill="url(#primaryBtn)"/>
    <text x="580" y="350" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Validate</text>
  </g>
</svg>