<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d4199"/>
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#5bc556"/>
    </linearGradient>
    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#f05e23"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="24" y="24" width="352" height="352" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header Section -->
  <rect x="24" y="24" width="352" height="64" rx="12" fill="#ffffff"/>
  <rect x="24" y="76" width="352" height="12" fill="#ffffff"/>
  
  <!-- Status Badge -->
  <rect x="44" y="44" width="76" height="24" rx="6" fill="#1258ca" fill-opacity="0.08"/>
  <text x="52" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1258ca" letter-spacing="0.5">PENDING</text>
  
  <!-- Title -->
  <text x="44" y="96" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Validation Arbitrage</text>
  
  <!-- Subtitle -->
  <text x="44" y="118" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Review discrepancies and submit final decisions</text>
  
  <!-- Divider -->
  <line x1="44" y1="138" x2="356" y2="138" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Form Section 1: Arbitrage Item -->
  <text x="44" y="166" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" letter-spacing="0.3">ITEM #2847-A</text>
  
  <!-- Item Card -->
  <rect x="44" y="178" width="312" height="88" rx="8" fill="#f8f7f4"/>
  
  <!-- Source A -->
  <rect x="56" y="190" width="136" height="64" rx="6" fill="#ffffff"/>
  <text x="68" y="208" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">SOURCE A</text>
  <text x="68" y="228" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515">$12,450.00</text>
  <text x="68" y="244" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22c55e">✓ Verified</text>
  
  <!-- Source B -->
  <rect x="208" y="190" width="136" height="64" rx="6" fill="#ffffff"/>
  <text x="220" y="208" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">SOURCE B</text>
  <text x="220" y="228" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515">$11,875.00</text>
  <text x="220" y="244" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f05e23">⚠ Discrepancy</text>
  
  <!-- Discrepancy Indicator -->
  <circle cx="200" cy="222" r="12" fill="#ffd548"/>
  <text x="200" y="226" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#151515" text-anchor="middle">!</text>
  
  <!-- Form Section 2: Decision -->
  <text x="44" y="286" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" letter-spacing="0.3">YOUR DECISION</text>
  
  <!-- Radio Options -->
  <circle cx="56" cy="306" r="8" fill="#ffffff" stroke="#1258ca" stroke-width="2"/>
  <circle cx="56" cy="306" r="4" fill="#1258ca"/>
  <text x="72" y="310" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#151515">Accept Source A ($12,450.00)</text>
  
  <circle cx="56" cy="332" r="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="72" y="336" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#151515">Accept Source B ($11,875.00)</text>
  
  <circle cx="56" cy="358" r="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="72" y="362" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#151515">Request manual review</text>
  
  <!-- Submit Button -->
  <rect x="264" y="340" width="92" height="36" rx="6" fill="url(#primaryGradient)"/>
  <text x="310" y="362" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Submit</text>
  
  <!-- Progress Indicator -->
  <rect x="264" y="304" width="92" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="264" y="304" width="64" height="4" rx="2" fill="#1258ca"/>
  <text x="310" y="296" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Step 2 of 3</text>
</svg>