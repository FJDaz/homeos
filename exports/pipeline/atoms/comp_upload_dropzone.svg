<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1258ca;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <g id="component_root">
    <rect x="20" y="20" width="360" height="280" rx="10" fill="#ffffff" stroke="#d5d4d0" stroke-width="1" filter="url(#cardShadow)"/>
    
    <text x="40" y="55" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#1a1a1a">Upload Files</text>
    
    <rect x="40" y="75" width="320" height="180" rx="8" fill="#fafafa" stroke="#1258ca" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.9"/>
    
    <g transform="translate(200, 125)">
      <path d="M -20 15 L -20 -5 L -20 -12 L -10 -12 L -8 -5 L 20 -5 L 20 15 Z" fill="none" stroke="#1258ca" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 0 8 L 0 -4 M -4 -1 L 0 -4 L 4 -1" fill="none" stroke="#1258ca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <text x="200" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#2d2d2d" font-weight="500">Drag &amp; drop your files here</text>
    <text x="200" y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b6b6b">or</text>
    
    <rect x="140" y="195" width="120" height="36" rx="6" fill="url(#btnGradient)"/>
    <text x="200" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="500">Browse Files</text>
  </g>
</svg>