<svg viewBox="0 0 240 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#ffc520"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="16" y="16" width="208" height="708" rx="10" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <text x="40" y="72" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="20" fill="#111827">Capture Vision</text>
    
    <text font-family="Inter, sans-serif" font-size="14" fill="#4b5563">
      <tspan x="40" y="110">Capturez l'interface pour</tspan>
      <tspan x="40" y="135">analyse Gemini Vision et</tspan>
      <tspan x="40" y="160">obtenez les instructions</tspan>
      <tspan x="40" y="185">contextuelles de Sullivan.</tspan>
    </text>
    
    <g transform="translate(120, 380)">
      <rect x="-70" y="-70" width="140" height="140" rx="10" fill="url(#goldFill)"/>
      
      <path d="M-40,-30 L-25,-30 M-40,-30 L-40,-15" stroke="#1f2937" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M40,-30 L25,-30 M40,-30 L40,-15" stroke="#1f2937" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M-40,30 L-25,30 M-40,30 L-40,15" stroke="#1f2937" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M40,30 L25,30 M40,30 L40,15" stroke="#1f2937" stroke-width="4" stroke-linecap="round" fill="none"/>
      
      <circle cx="0" cy="0" r="18" stroke="#1f2937" stroke-width="3" fill="none"/>
      <circle cx="0" cy="0" r="6" fill="#1f2937"/>
      
      <text y="95" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-weight="600" font-size="16" fill="#111827">CAPTURER</text>
    </g>
    
    <text x="120" y="640" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#9ca3af">En attente de capture...</text>
    
    <line x1="40" y1="670" x2="200" y2="670" stroke="#e5e7eb" stroke-width="1"/>
    <text x="120" y="695" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#d1d5db">Module DPL • Homeos</text>
  </g>
</svg>