<svg viewBox="0 0 240 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2458f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a46d1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <rect x="16" y="16" width="208" height="568" rx="10" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <text x="40" y="64" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="18" fill="#111111">Capture</text>
    <text x="40" y="88" font-family="Inter, sans-serif" font-size="13" fill="#71717a">Analyse Gemini Vision</text>
    
    <rect x="40" y="112" width="160" height="240" rx="8" fill="#fafafa" stroke="#e4e4e7" stroke-width="1.5"/>
    
    <circle cx="56" cy="128" r="3" fill="#ef4444" opacity="0.8"/>
    <circle cx="68" cy="128" r="3" fill="#eab308" opacity="0.8"/>
    <circle cx="80" cy="128" r="3" fill="#22c55e" opacity="0.8"/>
    <rect x="56" y="142" width="80" height="6" rx="2" fill="#e4e4e7"/>
    <rect x="56" y="154" width="128" height="80" rx="4" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <rect x="68" y="168" width="60" height="4" rx="1" fill="#f0f0f0"/>
    <rect x="68" y="178" width="104" height="4" rx="1" fill="#f0f0f0"/>
    <rect x="68" y="188" width="80" height="4" rx="1" fill="#f0f0f0"/>
    <rect x="56" y="250" width="48" height="24" rx="4" fill="#2458f3" opacity="0.1"/>
    <rect x="112" y="250" width="72" height="24" rx="4" fill="#f0f0f0"/>
    
    <path d="M 72 156 L 72 140 L 88 140" stroke="#2458f3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 168 156 L 168 140 L 152 140" stroke="#2458f3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 72 308 L 72 324 L 88 324" stroke="#2458f3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 168 308 L 168 324 L 152 324" stroke="#2458f3" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <g id="capture_button" transform="translate(40, 380)">
      <rect width="160" height="48" rx="8" fill="url(#btnGradient)"/>
      <rect x="36" y="14" width="24" height="16" rx="3" fill="white" opacity="0.95"/>
      <path d="M 42 14 L 44 11 L 52 11 L 54 14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="48" cy="22" r="4" stroke="#2458f3" stroke-width="2" fill="none"/>
      <circle cx="48" cy="22" r="1.5" fill="#2458f3"/>
      <text x="68" y="24" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="white" dominant-baseline="middle">Capturer</text>
