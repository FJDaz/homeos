    <text x="120" y="460" font-family="Inter, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Analyse instantanée de l'UI</text>
    <text x="120" y="478" font-family="Inter, sans-serif" font-size="11" fill="#d1d5db" text-anchor="middle">Cliquez pour capturer l'écran actif</text>
    
    <circle cx="120" cy="532" r="5" fill="#97ea90"/>
