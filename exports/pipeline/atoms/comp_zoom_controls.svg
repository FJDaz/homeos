<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Gradient for primary button -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd963"/>
    </linearGradient>
    
    <!-- Gradient for zoom level indicator -->
    <linearGradient id="zoomGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#97ea90"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="40" y="40" width="620" height="320" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Title -->
  <text x="70" y="82" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Contrôles Zoom</text>
  
  <!-- Subtitle/Description -->
  <text x="70" y="108" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#666666">Navigation et ajustement du niveau de zoom</text>
  
  <!-- Breadcrumb -->
  <g transform="translate(70, 145)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1258ca" font-weight="500">Anatomie</text>
    <text x="70" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">/</text>
    <text x="85" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1258ca" font-weight="500">Système nerveux</text>
    <text x="215" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">/</text>
    <text x="230" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#151515" font-weight="500">Corps</text>
  </g>
  
  <!-- Zoom Controls Container -->
  <g transform="translate(70, 185)">
    <!-- Zoom Out Button -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="56" height="44" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
      <text x="28" y="28" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#151515" text-anchor="middle">−</text>
    </g>
    
    <!-- Zoom Level Indicator -->
    <g transform="translate(64, 0)">
      <rect x="0" y="0" width="160" height="44" rx="6" fill="#151515"/>
      <!-- Magnifying glass icon -->
      <g transform="translate(16, 12)">
        <circle cx="10" cy="10" r="8" fill="none" stroke="#97ea90" stroke-width="2"/>
        <line x1="16" y1="16" x2="22" y2="22" stroke="#97ea90" stroke-width="2" stroke-linecap="round"/>
      </g>
      <!-- Zoom level text -->
      <text x="48" y="28" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Corps</text>
      <!-- Dropdown arrow -->
      <path d="M 135 18 L 142 26 L 149 18" fill="none" stroke="#97ea90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Progress bar -->
      <rect x="48" y="34" width="104" height="3" rx="1.5" fill="#333333"/>
      <rect x="48" y="34" width="72" height="3" rx="1.5" fill="url(#zoomGradient)"/>
    </g>
    
    <!-- Zoom In Button -->
    <g transform="translate(232, 0)">
      <rect x="0" y="0" width="56" height="44" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
      <text x="28" y="29" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#151515" text-anchor="middle">+</text>
    </g>
    
    <!-- Reset Button -->
    <g transform="translate(304, 0)">
      <rect x="0" y="0" width="80" height="44" rx="6" fill="url(#primaryGradient)"/>
      <text x="40" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">Reset</text>
    </g>
  </g>
  
  <!-- Zoom Presets -->
  <g transform="translate(70, 255)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999" letter-spacing="1.5" text-transform="uppercase">NIVEAUX PRÉDÉFINIS</text>
    
    <!-- Preset buttons -->
    <g transform="translate(0, 16)">
      <!-- 25% -->
      <rect x="0" y="0" width="56" height="32" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="28" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">25%</text>
      
      <!-- 50% -->
      <rect x="64" y="0" width="56" height="32" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="92" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">50%</text>
      
      <!-- 100% (active) -->
      <rect x="128" y="0" width="64" height="32" rx="6" fill="#151515"/>
      <text x="160" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#97ea90" text-anchor="middle" font-weight="500">100%</text>
      
      <!-- 150% -->
      <rect x="200" y="0" width="56" height="32" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="228" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">150%</text>
      
      <!-- 200% -->
      <rect x="264" y="0" width="56" height="32" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="292" y="21" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">200%</text>
    </g>
  </g>
  
  <!-- Keyboard shortcut hint -->
  <g transform="translate(70, 325)">
    <rect x="0" y="0" width="280" height="28" rx="6" fill="#f8f7f4"/>
    <text x="12" y="19" font-family="Roboto Mono, monospace" font-size="11" fill="#666666">Ctrl + Scroll</text>
    <text x="100" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">ou</text>
    <text x="128" y="19" font-family="Roboto Mono, monospace" font-size="11" fill="#666666">Cmd + +/-</text>
    <text x="210" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">pour zoomer</text>
  </g>
  
  <!-- Info badge -->
  <g transform="translate(520, 325)">
    <rect x="0" y="0" width="110" height="28" rx="6" fill="#97ea90" fill-opacity="0.15"/>
    <circle cx="16" cy="14" r="4" fill="#97ea90"/>
    <text x="28" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2d7a27" font-weight="500">Niveau optimal</text>
  </g>
</svg>