<svg viewBox="0 0 340 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <!-- Zone glow effects -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="roseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for image placeholder -->
    <linearGradient id="imgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#e8e6e1"/>
    </linearGradient>
    <!-- Button gradient -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a46c4"/>
    </linearGradient>
  </defs>
  
  <!-- Main card -->
  <rect x="16" y="16" width="308" height="468" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header section -->
  <text x="40" y="56" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Aperçu Zones</text>
  <text x="40" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b6b6b">3 zones détectées • Prêt pour analyse</text>
  
  <!-- Image preview area -->
  <rect x="40" y="98" width="260" height="200" rx="8" fill="url(#imgGradient)"/>
  
  <!-- Mock image content - abstract shapes representing a document -->
  <rect x="60" y="118" width="80" height="6" rx="3" fill="#d0cec8"/>
  <rect x="60" y="130" width="120" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="140" width="100" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="150" width="140" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="165" width="60" height="40" rx="4" fill="#e0ddd6"/>
  <rect x="130" y="165" width="140" height="4" rx="2" fill="#d0cec8"/>
  <rect x="130" y="175" width="120" height="4" rx="2" fill="#d0cec8"/>
  <rect x="130" y="185" width="100" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="215" width="210" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="225" width="180" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="235" width="200" height="4" rx="2" fill="#d0cec8"/>
  <rect x="60" y="250" width="90" height="30" rx="4" fill="#e0ddd6"/>
  <rect x="160" y="250" width="110" height="4" rx="2" fill="#d0cec8"/>
  <rect x="160" y="260" width="90" height="4" rx="2" fill="#d0cec8"/>
  <rect x="160" y="270" width="100" height="4" rx="2" fill="#d0cec8"/>
  
  <!-- Zone 1: Blue highlight - header area -->
  <rect x="55" y="113" width="150" height="45" rx="6" fill="none" stroke="#2458f3" stroke-width="2" stroke-dasharray="4 3" filter="url(#blueGlow)" opacity="0.9"/>
  <rect x="55" y="113" width="150" height="45" rx="6" fill="#2458f3" opacity="0.08"/>
  <circle cx="55" cy="113" r="5" fill="#2458f3"/>
  <text x="65" y="117" font-family="Roboto Mono, monospace" font-size="9" font-weight="600" fill="#ffffff">1</text>
  
  <!-- Zone 2: Green highlight - image block -->
  <rect x="55" y="160" width="70" height="50" rx="6" fill="none" stroke="#97ea90" stroke-width="2" stroke-dasharray="4 3" filter="url(#greenGlow)" opacity="0.9"/>
  <rect x="55" y="160" width="70" height="50" rx="6" fill="#97ea90" opacity="0.12"/>
  <circle cx="125" cy="160" r="5" fill="#97ea90"/>
  <text x="118" y="164" font-family="Roboto Mono, monospace" font-size="9" font-weight="600" fill="#151515">2</text>
  
  <!-- Zone 3: Rose highlight - secondary image -->
  <rect x="55" y="245" width="100" height="40" rx="6" fill="none" stroke="#f05e23" stroke-width="2" stroke-dasharray="4 3" filter="url(#roseGlow)" opacity="0.9"/>
  <rect x="55" y="245" width="100" height="40" rx="6" fill="#f05e23" opacity="0.08"/>
  <circle cx="155" cy="245" r="5" fill="#f05e23"/>
  <text x="148" y="249" font-family="Roboto Mono, monospace" font-size="9" font-weight="600" fill="#ffffff">3</text>
  
  <!-- Legend -->
  <g transform="translate(40, 318)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#2458f3" opacity="0.15"/>
    <rect x="2" y="2" width="8" height="8" rx="2" fill="#2458f3"/>
    <text x="20" y="10" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#151515">Zone 1 — En-tête</text>
    
    <rect x="0" y="22" width="12" height="12" rx="3" fill="#97ea90" opacity="0.2"/>
    <rect x="2" y="24" width="8" height="8" rx="2" fill="#97ea90"/>
    <text x="20" y="32" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#151515">Zone 2 — Illustration principale</text>
    
    <rect x="0" y="44" width="12" height="12" rx="3" fill="#f05e23" opacity="0.15"/>
    <rect x="2" y="46" width="8" height="8" rx="2" fill="#f05e23"/>
    <text x="20" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#151515">Zone 3 — Graphique secondaire</text>
  </g>
  
  <!-- Stats row -->
  <g transform="translate(40, 400)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">CONFIDENCE</text>
    <text x="0" y="20" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="700" fill="#151515">94.2%</text>
    
    <text x="100" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">PIXELS</text>
    <text x="100" y="20" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="700" fill="#151515">12.4K</text>
    
    <text x="180" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">TEMPS</text>
    <text x="180" y="20" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="700" fill="#151515">0.3s</text>
  </g>
  
  <!-- Action buttons -->
  <rect x="40" y="442" width="120" height="36" rx="6" fill="url(#btnGradient)"/>
  <text x="100" y="464" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Explorer zones</text>
  
  <rect x="172" y="442" width="128" height="36" rx="6" fill="none" stroke="#e0ddd6" stroke-width="1.5"/>
  <text x="236" y="464" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">Réanalyser</text>
</svg>