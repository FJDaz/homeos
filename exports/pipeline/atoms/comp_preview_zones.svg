<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <linearGradient id="blueZone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2458f3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2458f3" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="greenZone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#97ea90" stop-opacity="0.1"/>
    </linearGradient>
    
    <linearGradient id="roseZone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Surface -->
    <rect x="20" y="20" width="360" height="280" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
    
    <!-- Header -->
    <text x="40" y="55" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="19" font-weight="700" fill="#1f2937">Aperçu Zones</text>
    <text x="40" y="78" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Survolez les zones pour explorer les détails détectés</text>
    
    <!-- Preview Canvas -->
    <g transform="translate(40, 95)">
      <!-- Document Background -->
      <rect x="0" y="0" width="320" height="180" rx="6" fill="#fafaf9" stroke="#e5e5e5" stroke-width="1"/>
      
      <!-- Document Content Simulation -->
      <rect x="24" y="20" width="80" height="10" rx="2" fill="#d4d4d4"/>
      <rect x="24" y="40" width="272" height="6" rx="1.5" fill="#e5e5e5"/>
      <rect x="24" y="52" width="240" height="6" rx="1.5" fill="#e5e5e5"/>
      <rect x="24" y="64" width="260" height="6" rx="1.5" fill="#e5e5e5"/>
      
      <rect x="24" y="88" width="120" height="6" rx="1.5" fill="#e5e5e5"/>
      <rect x="24" y="100" width="200" height="6" rx="1.5" fill="#e5e5e5"/>
      <rect x="24" y="112" width="180" height="6" rx="1.5" fill="#e5e5e5"/>
      
      <rect x="24" y="140" width="60" height="24" rx="3" fill="#e5e5e5"/>
      <rect x="94" y="140" width="60" height="24" rx="3" fill="#e5e5e5"/>
      
      <!-- Blue Zone: Header Area -->
      <rect x="20" y="16" width="280" height="48" rx="4" fill="url(#blueZone)" stroke="#2458f3" stroke-width="1.5" stroke-dasharray="3 3"/>
      <g transform="translate(280, 16)">
        <rect x="-48" y="-8" width="56" height="20" rx="4" fill="#2458f3"/>
        <text x="-20" y="5" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">En-tête</text>
      </g>
      
      <!-- Green Zone: Content Block -->
      <rect x="20" y="84" width="220" height="40" rx="4" fill="url(#greenZone)" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 3"/>
      <g transform="translate(240, 84)">
        <rect x="-44" y="-8" width="52" height="20" rx="4" fill="#22c55e"/>
        <text x="-18" y="5" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">Texte</text>
      </g>
      
      <!-- Rose Zone: Media/Images -->
      <rect x="20" y="136" width="140" height="32" rx="4" fill="url(#roseZone)" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="3 3"/>
      <g transform="translate(160, 136)">
        <rect x="-44" y="-8" width="52" height="20" rx="4" fill="#f43f5e"/>
        <text x="-18" y="5" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">Images</text>
      </g>
    </g>
    
    <!-- Legend Bar -->
    <g transform="translate(40, 290)">
      <circle cx="6" cy="6" r="5" fill="#2458f3" opacity="0.9"/>
      <text x="16" y="10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4b5563">Zone A</text>
      
      <circle cx="85" cy="6" r="5" fill="#22c55e" opacity="0.9"/>
      <text x="95" y="10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4b5563">Zone B</text>
      
      <circle cx="165" cy="6" r="5" fill="#f43f5e" opacity="0.9"/>
      <text x="175" y="10" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4b5563">Zone C</text>
    </g>
    
    <!-- Action Hint -->
    <text x="340" y="300" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af" text-anchor="end">Cliquez pour éditer</text>
  </g>
</svg>