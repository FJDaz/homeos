<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b6ff5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2458f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g id="component_root">
    <!-- Main Card Container -->
    <rect x="40" y="40" width="320" height="240" rx="8" fill="#ffffff" filter="url(#cardShadow)" stroke="#d5d4d0" stroke-width="1"/>
    
    <!-- Section Title -->
    <text x="64" y="76" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#111827">File Management</text>
    
    <!-- Uploaded File Display Area -->
    <rect x="64" y="96" width="272" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    
    <!-- Document Icon -->
    <g transform="translate(80, 112)">
      <path d="M2 4a2 2 0 0 1 2-2h6l6 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M10 2v6h6" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="8" y1="15" x2="16" y2="15" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="19" x2="13" y2="19" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Filename -->
    <text x="128" y="132" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="500">quarterly_report_q4.pdf</text>
    
    <!-- File Metadata -->
    <text x="128" y="150" font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">3.8 MB • Ready for processing</text>
    
    <!-- Remove Button -->
    <g transform="translate(130, 210)">
      <rect x="0" y="0" width="140" height="40" rx="6" fill="url(#btnGradient)" style="cursor: pointer"/>
      
      <!-- Trash Icon -->
      <g transform="translate(16, 11)">
        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14zM8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="10" y1="11" x2="10" y2="17" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="11" x2="14" y2="17" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      
      <text x="42" y="25" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Remove File</text>
    </g>
  </g>
</svg>