<svg viewBox="0 0 320 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Main Card Surface -->
  <rect x="16" y="16" width="288" height="628" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- Header Section -->
  <text x="40" y="56" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Arbitrage</text>
  <text x="40" y="78" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Synthesis Engine</text>
  
  <!-- Status Badge -->
  <rect x="208" y="46" width="72" height="28" rx="10" fill="#fffbeb" stroke="#ffd548" stroke-width="1.5"/>
  <circle cx="222" cy="60" r="4" fill="#ffd548"/>
  <text x="232" y="64" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#92400e">Active</text>
  
  <!-- Source Analysis Label -->
  <text x="40" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.05em">SOURCE ANALYSIS</text>
  
  <!-- Source 1: Claude -->
  <rect x="40" y="132" width="240" height="60" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
  <rect x="52" y="144" width="36" height="36" rx="6" fill="#cc785c"/>
  <text x="98" y="162" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#374151">Claude</text>
  <text x="98" y="180" font-family="Roboto Mono, sans-serif" font-size="10" fill="#6b7280">Reasoning: 94%</text>
  <circle cx="264" cy="162" r="4" fill="#97ea90"/>
  
  <!-- Source 2: GPT -->
  <rect x="40" y="200" width="240" height="60" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
  <rect x="52" y="212" width="36" height="36" rx="6" fill="#10a37f"/>
  <text x="98" y="230" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#374151">ChatGPT</text>
  <text x="98" y="248" font-family="Roboto Mono, sans-serif" font-size="10" fill="#6b7280">Context: 89%</text>
  <circle cx="264" cy="230" r="4" fill="#97ea90"/>
  
  <!-- Source 3: Gemini -->
  <rect x="40" y="268" width="240" height="60" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
  <rect x="52" y="280" width="36" height="36" rx="6" fill="#4285f4"/>
  <text x="98" y="298" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#374151">Gemini</text>
  <text x="98" y="316" font-family="Roboto Mono, sans-serif" font-size="10" fill="#6b7280">Speed: 96%</text>
  <circle cx="264" cy="298" r="4" fill="#97ea90"/>
  
  <!-- Connection Flow -->
  <path d="M 160 332 L 160 348" stroke="#d5d4d0" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="160,354 156,348 164,348" fill="#d5d4d0"/>
  
  <!-- Synthesis Section -->
  <text x="40" y="378" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.05em">SYNTHESIS</text>
  
  <rect x="40" y="390" width="240" height="140" rx="6" fill="#fafaf9" stroke="#d5d4d0" stroke-width="1"/>
  
  <!-- Progress Bar -->
  <rect x="56" y="406" width="208" height="6" rx="3" fill="#e5e5e5"/>
  <rect x="56" y="406" width="188" height="6" rx="3" fill="#ffd548"/>
  <text x="56" y="432" font-family="Inter, sans-serif" font-size="12" fill="#374151">Cross-referencing patterns</text>
  
  <!-- Consensus Preview -->
  <rect x="56" y="444" width="208" height="72" rx="6" fill="#ffffff" stroke="#c5c4c0" stroke-width="1"/>
  <text x="68" y="468" font-family="Inter, sans-serif" font-size="12" fill="#1a1a1a">Consensus on architecture</text>
  <text x="68" y="488" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700" fill="#2458f3">S-T-A-R</text>
  <text x="68" y="508" font-family="Roboto Mono, sans-serif" font-size="10" fill="#6b7280">Confidence: 92%</text>
  
  <!-- Metrics Section -->
  <text x="40" y="556" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.05em">METRICS</text>
  
  <!-- Agreement Metric -->
  <text x="40" y="580" font-family="Inter, sans-serif" font-size="12" fill="#374151">Agreement</text>
  <text x="264" y="580" font-family="Roboto Mono, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="end">87%</text>
  <rect x="40" y="586" width="120" height="6" rx="3" fill="#ffd548" opacity="0.3"/>
  <rect x="40" y="586" width="104" height="6" rx="3" fill="#ffd548"/>
  
  <!-- Novelty Metric -->
  <text x="40" y="610" font-family="Inter, sans-serif" font-size="12" fill="#374151">Novelty</text>
  <text x="264" y="610" font-family="Roboto Mono, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="end">64%</text>
  <rect x="40" y="616" width="120" height="6" rx="3" fill="#1258ca" opacity="0.2"/>
  <rect x="40" y="616" width="77" height="6" rx="3" fill="#1258ca"/>
</svg>