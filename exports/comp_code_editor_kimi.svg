<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7a47"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="12" y="12" width="416" height="216" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="28" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Éditeur Code</text>

  <!-- Toolbar -->
  <rect x="28" y="50" width="384" height="36" rx="8" fill="#f8f7f4"/>
  <rect x="36" y="58" width="52" height="20" rx="4" fill="#e5e7eb"/>
  <text x="44" y="71" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#151515">JavaScript</text>
  <rect x="96" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <path d="M104 64l4 4-4 4" stroke="#151515" stroke-width="1.5" fill="none"/>
  <rect x="124" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <path d="M132 68l4-4-4-4" stroke="#151515" stroke-width="1.5" fill="none"/>
  <rect x="152" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <rect x="156 62" width="12" height="12" rx="2" fill="#151515"/>
  <rect x="180" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <path d="M188 64v8M184 68h8" stroke="#151515" stroke-width="1.5" fill="none"/>
  <rect x="208" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <path d="M212 68l8-8" stroke="#151515" stroke-width="1.5" fill="none"/>
  <rect x="236" y="58" width="20" height="20" rx="4" fill="#ffffff"/>
  <path d="M244 64h-4v8h4" stroke="#151515" stroke-width="1.5" fill="none"/>

  <!-- Editor -->
  <rect x="28" y="94" width="384" height="122" rx="8" fill="#151515"/>
  <text x="40" y="114" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">1</text>
  <text x="56" y="114" font-family="Roboto Mono, monospace" font-size="12" fill="#f05e23">function</text>
  <text x="108" y="114" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff"> greet(name) {</text>
  <text x="40" y="130" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">2</text>
  <text x="56" y="130" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff">  </text>
  <text x="72" y="130" font-family="Roboto Mono, monospace" font-size="12" fill="#ffd548">const</text>
  <text x="108" y="130" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff"> msg = </text>
  <text x="152" y="130" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">`Bonjour, ${name}!`</text>
  <text x="40" y="146" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">3</text>
  <text x="56" y="146" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff">  </text>
  <text x="72" y="146" font-family="Roboto Mono, monospace" font-size="12" fill="#f05e23">return</text>
  <text x="112" y="146" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff"> msg;</text>
  <text x="40" y="162" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">4</text>
  <text x="56" y="162" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff">}</text>
  <text x="40" y="178" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">5</text>
  <text x="56" y="178" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff">console.log(greet(</text>
  <text x="188" y="178" font-family="Roboto Mono, monospace" font-size="12" fill="#97ea90">'Élise'</text>
  <text x="228" y="178" font-family="Roboto Mono, monospace" font-size="12" fill="#ffffff">));</text>

  <!-- Run Button -->
  <rect x="348" y="58" width="64" height="20" rx="9999" fill="url(#btnGrad)"/>
  <text x="380" y="71" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Run</text>
</svg>