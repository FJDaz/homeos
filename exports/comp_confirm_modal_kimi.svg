<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0f4ab2"/>
    </linearGradient>
    <linearGradient id="btnGradHover" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4ab2"/>
      <stop offset="100%" stop-color="#0d3f9e"/>
    </linearGradient>
  </defs>

  <!-- Modal card -->
  <rect x="20" y="20" width="400" height="200" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Title -->
  <text x="40" y="60" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">
    Confirm Action
  </text>

  <!-- Message -->
  <text x="40" y="100" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4b5563">
    Are you sure you want to proceed? This action cannot be undone.
  </text>

  <!-- Cancel button -->
  <g id="btnCancel">
    <rect x="210" y="150" width="90" height="40" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="255" y="175" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle">
      Cancel
    </text>
  </g>

  <!-- Confirm button -->
  <g id="btnConfirm">
    <rect x="310" y="150" width="90" height="40" rx="9999" fill="url(#btnGrad)"/>
    <text x="355" y="175" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      Confirm
    </text>
  </g>

  <!-- Hover state indicators (subtle inner highlight) -->
  <rect x="211" y="151" width="88" height="38" rx="9999" fill="none" stroke="#d1d5db" stroke-width="1" opacity="0"/>
  <rect x="311" y="151" width="88" height="38" rx="9999" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>