<svg viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="0" y="0" width="360" height="80" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- File icon -->
  <g transform="translate(20 24)">
    <rect width="32" height="40" rx="4" fill="#f05e23" opacity=".12"/>
    <rect x="4" y="4" width="24" height="2" rx="1" fill="#f05e23"/>
    <rect x="4" y="10" width="16" height="2" rx="1" fill="#f05e23"/>
    <rect x="4" y="16" width="20" height="2" rx="1" fill="#f05e23"/>
  </g>

  <!-- File name -->
  <text x="64" y="36" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">report_Q2_2024.xlsx</text>
  <text x="64" y="54" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">1.2 MB</text>

  <!-- Delete button -->
  <g transform="translate(276 20)">
    <rect width="64" height="40" rx="9999" fill="#f05e23"/>
    <text x="32" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Delete</text>
  </g>
</svg>