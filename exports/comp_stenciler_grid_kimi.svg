<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#3a7bff"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="400" height="200" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="40" y="50" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Grille Stencils</text>

  <!-- 3x3 Grid -->
  <g>
    <!-- Row 1 -->
    <rect x="40" y="70" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="95" y="95" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 1</text>
    <rect x="160" y="70" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="215" y="95" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 2</text>
    <rect x="280" y="70" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="335" y="95" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 3</text>

    <!-- Row 2 -->
    <rect x="40" y="126" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="95" y="151" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 4</text>
    <rect x="160" y="126" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="215" y="151" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 5</text>
    <rect x="280" y="126" width="110" height="46" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="335" y="151" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 6</text>

    <!-- Row 3 -->
    <rect x="40" y="182" width="110" height="26" rx="8" fill="#e6eeff" stroke="#2458f3" stroke-width="1"/>
    <text x="95" y="199" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2458f3" text-anchor="middle">Corps 7</text>
    <rect x="160" y="182" width="110" height="26" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="215" y="199" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 8</text>
    <rect x="280" y="182" width="110" height="26" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
    <text x="335" y="199" font-family="Inter, sans-serif" font-size="12" fill="#151515" text-anchor="middle">Corps 9</text>
  </g>

  <!-- Action buttons -->
  <rect x="340" y="36" width="40" height="20" rx="9999" fill="url(#btnGrad)"/>
  <text x="360" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">KEEP</text>

  <rect x="380" y="36" width="40" height="20" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#151515" text-anchor="middle">RESERVE</text>
</svg>