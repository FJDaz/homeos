<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1258ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- KPI Row -->
  <g id="kpiRow">
    <rect x="20" y="20" width="230" height="90" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="40" y="55" font-family="Inter" font-size="28" font-weight="700" fill="#263654">847</text>
    <text x="40" y="75" font-family="Inter" font-size="11" fill="#6b7280">Active Sessions</text>

    <rect x="270" y="20" width="230" height="90" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="290" y="55" font-family="Inter" font-size="28" font-weight="700" fill="#263654">12.4k</text>
    <text x="290" y="75" font-family="Inter" font-size="11" fill="#6b7280">Genomes Processed</text>

    <rect x="520" y="20" width="230" height="90" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="540" y="55" font-family="Inter" font-size="28" font-weight="700" fill="#263654">99.2%</text>
    <text x="540" y="75" font-family="Inter" font-size="11" fill="#6b7280">Uptime</text>

    <rect x="770" y="20" width="210" height="90" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="790" y="55" font-family="Inter" font-size="28" font-weight="700" fill="#263654">3.2s</text>
    <text x="790" y="75" font-family="Inter" font-size="11" fill="#6b7280">Avg Response</text>
  </g>

  <!-- Reset Session Button (header) -->
  <g id="comp_session_reset">
    <rect x="20" y="130" width="140" height="40" rx="9999" fill="url(#gradBlue)" filter="url(#shadow)"/>
    <text x="90" y="155" font-family="Inter" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Reset Session</text>
  </g>

  <!-- Main Chart Area (genome summary) -->
  <g id="comp_genome_summary">
    <rect x="20" y="190" width="640" height="380" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="40" y="220" font-family="Inter" font-size="18" font-weight="600" fill="#263654">Genome Summary</text>
    <rect x="40" y="240" width="600" height="300" rx="8" fill="#f9fafb"/>
    <path d="M50 420 L150 380 L250 390 L350 350 L450 360 L550 340" stroke="url(#gradBlue)" stroke-width="3" fill="none"/>
    <circle cx="50" cy="420" r="5" fill="#2458f3"/>
    <circle cx="150" cy="380" r="5" fill="#2458f3"/>
    <circle cx="250" cy="390" r="5" fill="#2458f3"/>
    <circle cx="350" cy="350" r="5" fill="#2458f3"/>
    <circle cx="450" cy="360" r="5" fill="#2458f3"/>
    <circle cx="550" cy="340" r="5" fill="#2458f3"/>
  </g>

  <!-- Sidebar: Session Status -->
  <g id="comp_session_status">
    <rect x="680" y="190" width="300" height="120" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="700" y="220" font-family="Inter" font-size="18" font-weight="600" fill="#263654">Session Status</text>
    <circle cx="720" cy="260" r="10" fill="#97ea90" filter="url(#glow)"/>
    <text x="740" y="265" font-family="Inter" font-size="12" fill="#6b7280">Current Step</text>
    <circle cx="820" cy="260" r="10" fill="#97ea90" filter="url(#glow)"/>
    <text x="840" y="265" font-family="Inter" font-size="12" fill="#6b7280">Genome</text>
    <circle cx="720" cy="290" r="10" fill="#e5e7eb"/>
    <text x="740" y="295" font-family="Inter" font-size="12" fill="#6b7280">Entries</text>
    <circle cx="820" cy="290" r="10" fill="#97ea90" filter="url(#glow)"/>
    <text x="840" y="295" font-family="Inter" font-size="12" fill="#6b7280">Ready</text>
  </g>

  <!-- Activity Feed: Distillation List -->
  <g id="comp_distillation_list">
    <rect x="680" y="330" width="300" height="240" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="700" y="360" font-family="Inter" font-size="18" font-weight="600" fill="#263654">Distillation Entries</text>
    <g>
      <rect x="700" y="380" width="260" height="40" rx="8" fill="#f9fafb"/>
      <text x="715" y="400" font-family="Inter" font-size="12" font-weight="500" fill="#263654">Entry #4821</text>
      <text x="715" y="415" font-family="Inter" font-size="10" fill="#6b7280">2 min ago — Verdict: Pass</text>
    </g>
    <g>
      <rect x="700" y="430" width="260" height="40" rx="8" fill="#f9fafb"/>
      <text x="715" y="450" font-family="Inter" font-size="12" font-weight="500" fill="#263654">Entry #4820</text>
      <text x="715" y="465" font-family="Inter" font-size="10" fill="#6b7280">5 min ago — Verdict: Review</text>
    </g>
    <g>
      <rect x="700" y="480" width="260" height="40" rx="8" fill="#f9fafb"/>
      <text x="715" y="500" font-family="Inter" font-size="12" font-weight="500" fill="#263654">Entry #4819</text>
      <text x="715" y="515" font-family="Inter" font-size="10" fill="#6b7280">9 min ago — Verdict: Pass</text>
    </g>
  </g>
</svg>