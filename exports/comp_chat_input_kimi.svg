<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="sendGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0f4ab0"/>
    </linearGradient>
  </defs>

  <!-- floating card -->
  <rect x="20" y="80" width="400" height="80" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- input field -->
  <rect x="36" y="96" width="280" height="48" rx="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <text x="52" y="124" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Type a message…</text>

  <!-- attach icon -->
  <g transform="translate(336 108)">
    <circle cx="20" cy="20" r="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M14 20c0-3.31 2.69-6 6-6s6 2.69 6 6v2c0 2.21-1.79 4-4 4s-4-1.79-4-4v-4" stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- emoji icon -->
  <g transform="translate(384 108)">
    <circle cx="20" cy="20" r="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="15" cy="16" r="2" fill="#6b7280"/>
    <circle cx="25" cy="16" r="2" fill="#6b7280"/>
    <path d="M13 24c0 3.31 4.69 6 7 6s7-2.69 7-6" stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- send button -->
  <rect x="348" y="96" width="56" height="48" rx="9999" fill="url(#sendGrad)"/>
  <path d="M368 112l12 8-12 8v-6h-8v-4h8v-6z" fill="#ffffff"/>
</svg>