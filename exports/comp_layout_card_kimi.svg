<svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d48a7"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="24" y="16" width="312" height="148" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Preview -->
  <rect x="40" y="32" width="104" height="116" rx="8" fill="#f8f7f4"/>
  <rect x="48" y="48" width="88" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="48" y="64" width="64" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="48" y="80" width="72" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="48" y="96" width="56" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="48" y="112" width="80" height="8" rx="4" fill="#e5e7eb"/>

  <!-- Metadata -->
  <text x="160" y="56" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.05em" textLength="56" lengthAdjust="spacingAndGlyphs">LAYOUT</text>
  <text x="160" y="80" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#111827">Carte A</text>
  <text x="160" y="100" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4b5563">3 colonnes, 2 blocs</text>

  <!-- Button -->
  <rect x="160" y="118" width="96" height="36" rx="9999" fill="url(#btnGrad)"/>
  <text x="208" y="139" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Sélectionner</text>
</svg>