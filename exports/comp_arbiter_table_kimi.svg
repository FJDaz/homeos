<svg viewBox="0 0 560 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-8" y="-8" width="576" height="356" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <style>
      .txt{font-family:"Inter",system-ui,sans-serif}
      .head{font-family:"Plus Jakarta Sans",Inter,sans-serif;font-weight:700}
    </style>
  </defs>

  <!-- Card -->
  <rect x="16" y="16" width="528" height="308" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="32" y="52" class="head" font-size="20" fill="#151515">Tableau de validations expert</text>

  <!-- Table -->
  <g class="txt" font-size="12" fill="#151515">
    <!-- Header row -->
    <rect x="32" y="72" width="496" height="36" fill="#f8f7f4" rx="6"/>
    <text x="48" y="92" font-weight="600">ID</text>
    <text x="104" y="92" font-weight="600">Type</text>
    <text x="200" y="92" font-weight="600">Statut</text>
    <text x="296" y="92" font-weight="600">Date</text>
    <text x="392" y="92" font-weight="600">Actions</text>

    <!-- Row 1 -->
    <rect x="32" y="116" width="496" height="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="6"/>
    <text x="48" y="136">#4821</text>
    <text x="104" y="136">Certification</text>
    <text x="200" y="136" fill="#059669">Validé</text>
    <text x="296" y="136">12 juin 24</text>
    <g>
      <rect x="380" y="124" width="68" height="20" rx="9999" fill="#ffd548"/>
      <text x="414" y="137" font-size="10" font-weight="600" text-anchor="middle">VOIR</text>
    </g>

    <!-- Row 2 -->
    <rect x="32" y="160" width="496" height="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="6"/>
    <text x="48" y="180">#4819</text>
    <text x="104" y="180">Audit</text>
    <text x="200" y="180" fill="#f05e23">En attente</text>
    <text x="296" y="180">11 juin 24</text>
    <g>
      <rect x="380" y="168" width="68" height="20" rx="9999" fill="#1258ca"/>
      <text x="414" y="181" font-size="10" font-weight="600" text-anchor="middle" fill="#fff">VALIDER</text>
    </g>

    <!-- Row 3 -->
    <rect x="32" y="204" width="496" height="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="6"/>
    <text x="48" y="224">#4815</text>
    <text x="104" y="224">Signature</text>
    <text x="200" y="224" fill="#97ea90">Approuvé</text>
    <text x="296" y="224">10 juin 24</text>
    <g>
      <rect x="380" y="212" width="68" height="20" rx="9999" fill="#ffd548"/>
      <text x="414" y="225" font-size="10" font-weight="600" text-anchor="middle">VOIR</text>
    </g>

    <!-- Row 4 -->
    <rect x="32" y="248" width="496" height="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="6"/>
    <text x="48" y="268">#4812</text>
    <text x="104" y="268">Certification</text>
    <text x="200" y="268" fill="#059669">Validé</text>
    <text x="296" y="268">09 juin 24</text>
    <g>
      <rect x="380" y="256" width="68" height="20" rx="9999" fill="#ffd548"/>
      <text x="414" y="269" font-size="10" font-weight="600" text-anchor="middle">VOIR</text>
    </g>
  </g>

  <!-- Footer -->
  <rect x="32" y="292" width="496" height="20" rx="4" fill="#f8f7f4"/>
  <text x="280" y="305" class="txt" font-size="10" fill="#6b7280" text-anchor="middle">4 sur 4 éléments • 100 % conformes</text>
</svg>