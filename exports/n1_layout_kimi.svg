<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity=".12"/>
    </filter>
    <pattern id="img1" patternUnits="userSpaceOnUse" width="100" height="80">
      <rect width="100" height="80" fill="#e5e7eb"/>
      <path d="M20 30h60v20H20z M30 50h40" stroke="#9ca3af" stroke-width="2" fill="none"/>
    </pattern>
    <pattern id="img2" patternUnits="userSpaceOnUse" width="100" height="80">
      <rect width="100" height="80" fill="#e5e7eb"/>
      <circle cx="50" cy="40" r="20" stroke="#9ca3af" stroke-width="2" fill="none"/>
    </pattern>
    <pattern id="img3" patternUnits="userSpaceOnUse" width="100" height="80">
      <rect width="100" height="80" fill="#e5e7eb"/>
      <path d="M10 20h80M10 40h60M10 60h70" stroke="#9ca3af" stroke-width="2" fill="none"/>
    </pattern>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="1000" height="60" fill="#f9fafb"/>
  <text x="30" y="38" font-size="22" font-weight="700" fill="#111827">Choisissez un style & layout</text>

  <!-- 2x2 Style Choice Grid -->
  <g id="styleChoice">
    <rect x="30" y="90" width="210" height="140" rx="12" fill="#fff" filter="url(#shadow)"/>
    <rect x="40" y="100" width="190" height="80" rx="6" fill="url(#img1)"/>
    <text x="135" y="205" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Minimal</text>
    <circle cx="195" cy="160" r="14" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="195" cy="160" r="6" fill="#6366f1"/>

    <rect x="260" y="90" width="210" height="140" rx="12" fill="#fff" filter="url(#shadow)"/>
    <rect x="270" y="100" width="190" height="80" rx="6" fill="url(#img2)"/>
    <text x="365" y="205" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Brutaliste</text>

    <rect x="30" y="250" width="210" height="140" rx="12" fill="#fff" filter="url(#shadow)"/>
    <rect x="40" y="260" width="190" height="80" rx="6" fill="url(#img3)"/>
    <text x="135" y="365" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Moderne</text>

    <rect x="260" y="250" width="210" height="140" rx="12" fill="#fff" filter="url(#shadow)"/>
    <rect x="270" y="260" width="190" height="80" rx="6" fill="#e5e7eb"/>
    <path d="M290 290h40v20h-40z M350 290l20 20-20 20" stroke="#9ca3af" stroke-width="2" fill="none"/>
    <text x="365" y="365" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Corporate</text>
  </g>

  <!-- Layout Card -->
  <g id="layoutCard">
    <rect x="500" y="90" width="220" height="300" rx="12" fill="#fff" filter="url(#shadow)"/>
    <rect x="510" y="100" width="200" height="130" rx="8" fill="#e5e7eb"/>
    <rect x="520" y="110" width="180" height="20" rx="4" fill="#c7d2fe"/>
    <rect x="520" y="140" width="130" height="12" rx="4" fill="#a5b4fc"/>
    <rect x="520" y="160" width="150" height="12" rx="4" fill="#a5b4fc"/>
    <rect x="520" y="180" width="100" height="12" rx="4" fill="#a5b4fc"/>
    <text x="610" y="260" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Landing Pro</text>
    <text x="610" y="280" font-size="14" fill="#6b7280" text-anchor="middle">Parfait pour SaaS</text>
    <rect x="530" y="300" width="160" height="40" rx="20" fill="url(#btnGrad)"/>
    <text x="610" y="325" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Sélectionner</text>
  </g>

  <!-- 3x2 Layout Gallery -->
  <g id="layoutGallery">
    <rect x="740" y="90" width="220" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
    <rect x="750" y="100" width="80" height="70" rx="6" fill="#e5e7eb"/>
    <rect x="840" y="100" width="110" height="16" rx="4" fill="#c7d2fe"/>
    <rect x="840" y="122" width="90" height="10" rx="4" fill="#a5b4fc"/>
    <rect x="840" y="138" width="100" height="10" rx="4" fill="#a5b4fc"/>

    <rect x="740" y="195" width="220" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
    <rect x="750" y="205" width="80" height="70" rx="6" fill="#e5e7eb"/>
    <rect x="840" y="205" width="110" height="16" rx="4" fill="#c7d2fe"/>
    <rect x="840" y="227" width="90" height="10" rx="4" fill="#a5b4fc"/>
    <rect x="840" y="243" width="100" height="10" rx="4" fill="#a5b4fc"/>

    <rect x="740" y="300" width="220" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
    <rect x="750" y="310" width="80" height="70" rx="6" fill="#e5e7eb"/>
    <rect x="840" y="310" width="110" height="16" rx="4" fill="#c7d2fe"/>
    <rect x="840" y="332" width="90" height="10" rx="4" fill="#a5b4fc"/>
    <rect x="840" y="348" width="100" height="10" rx="4" fill="#a5b4fc"/>
  </g>

  <!-- Bottom actions -->
  <rect x="30" y="420" width="930" height="60" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="820" y="435" width="130" height="30" rx="15" fill="#e5e7eb"/>
  <text x="885" y="454" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Continuer</text>
</svg>