<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7a47"/>
    </linearGradient>
  </defs>

  <!-- Sidebar card -->
  <rect x="0" y="0" width="440" height="240" rx="12" fill="#f8f7f4" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="20" y="30" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#151515">Palette Extraite</text>

  <!-- Swatch row 1 -->
  <rect x="20" y="50" width="56" height="56" rx="8" fill="#1258ca"/>
  <rect x="84" y="50" width="56" height="56" rx="8" fill="#f05e23"/>
  <rect x="148" y="50" width="56" height="56" rx="8" fill="#ffd548"/>
  <rect x="212" y="50" width="56" height="56" rx="8" fill="#97ea90"/>

  <!-- Chips row 1 -->
  <rect x="20" y="118" width="56" height="24" rx="12" fill="#1258ca"/>
  <text x="48" y="134" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">#1258ca</text>

  <rect x="84" y="118" width="56" height="24" rx="12" fill="#f05e23"/>
  <text x="112" y="134" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">#f05e23</text>

  <rect x="148" y="118" width="56" height="24" rx="12" fill="#ffd548"/>
  <text x="176" y="134" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">#ffd548</text>

  <rect x="212" y="118" width="56" height="24" rx="12" fill="#97ea90"/>
  <text x="240" y="134" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">#97ea90</text>

  <!-- Swatch row 2 -->
  <rect x="20" y="158" width="56" height="56" rx="8" fill="#151515"/>
  <rect x="84" y="158" width="56" height="56" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="148" y="158" width="56" height="56" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="212" y="158" width="56" height="56" rx="8" fill="#1a1a2e"/>

  <!-- Chips row 2 -->
  <rect x="20" y="226" width="56" height="24" rx="12" fill="#151515"/>
  <text x="48" y="242" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">#151515</text>

  <rect x="84" y="226" width="56" height="24" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="112" y="242" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">#ffffff</text>

  <rect x="148" y="226" width="56" height="24" rx="12" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <text x="176" y="242" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">#f8f7f4</text>

  <rect x="212" y="226" width="56" height="24" rx="12" fill="#1a1a2e"/>
  <text x="240" y="242" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">#1a1a2e</text>

  <!-- Active pill -->
  <rect x="288" y="108" width="132" height="36" rx="9999" fill="url(#btnGrad)"/>
  <text x="354" y="129" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Copier la palette</text>
</svg>