<svg viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#5d8cff"/>
    </linearGradient>
  </defs>

  <!-- Header bar -->
  <rect width="360" height="80" fill="#0D0E13"/>
  <line x1="0" y1="79" x2="360" y2="79" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Logo / Title -->
  <text x="24" y="48" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Dashboard</text>

  <!-- Reset button -->
  <g filter="url(#btnShadow)">
    <rect id="btn" x="236" y="22" width="100" height="36" rx="9999" fill="url(#grad)"/>
  </g>
  <text x="286" y="44" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Reset</text>

  <!-- Hover hint -->
  <rect x="236" y="62" width="100" height="22" rx="4" fill="#ffffff"/>
  <text x="286" y="77" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#0D0E13" text-anchor="middle">Hold to confirm</text>
</svg>