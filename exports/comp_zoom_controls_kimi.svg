<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShade" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Header bar -->
  <rect x="0" y="0" width="440" height="64" fill="#0D0E13"/>
  
  <!-- Logo / Title -->
  <text x="24" y="38" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Contrôles Zoom</text>

  <!-- Breadcrumb -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#a0a0a0">
    <text x="24" y="58">Accueil</text>
    <text x="68" y="58">/</text>
    <text x="80" y="58">Éditeur</text>
    <text x="124" y="58">/</text>
    <text x="136" y="58" fill="#ffffff">Vue Corps</text>
  </g>

  <!-- Zoom controls card -->
  <rect x="224" y="16" width="192" height="32" rx="8" fill="#ffffff" filter="url(#cardShade)"/>
  
  <!-- Out btn -->
  <rect id="out" x="232" y="20" width="40" height="24" rx="9999" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="252" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0D0E13" text-anchor="middle">←</text>
  
  <!-- Dropdown -->
  <rect id="drop" x="280" y="20" width="80" height="24" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="36" font-family="Inter, sans-serif" font-size="12" fill="#0D0E13">🔍 Corps</text>
  <path d="M348 28l4 4 4-4" stroke="#6b7280" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- In btn -->
  <rect id="in" x="368" y="20" width="40" height="24" rx="9999" fill="url(#btnGrad)"/>
  <text x="388" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">→</text>

  <!-- Hover hints -->
  <rect id="outHover" x="232" y="48" width="40" height="16" rx="3" fill="#0D0E13" opacity="0.9"/>
  <text x="252" y="59" font-family="Inter, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Dézoomer</text>

  <rect id="inHover" x="368" y="48" width="40" height="16" rx="3" fill="#0D0E13" opacity="0.9"/>
  <text x="388" y="59" font-family="Inter, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Zoomer</text>

  <!-- Legend -->
  <text x="24" y="96" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700" fill="#0D0E13">Zone de travail</text>
  <rect x="24" y="108" width="392" height="108" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <text x="216" y="166" font-family="Inter, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Vue actuelle : Corps · Zoom 100%</text>
</svg>