<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShade" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0f4ab0"/>
    </linearGradient>
  </defs>

  <!-- Main Card -->
  <rect x="20" y="20" width="520" height="260" rx="12" fill="#ffffff" filter="url(#cardShade)"/>

  <!-- Header -->
  <text x="40" y="54" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Résumé Genome</text>

  <!-- Topology -->
  <text x="40" y="90" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515">Topology</text>
  <rect x="40" y="100" width="240" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="40" y="100" width="180" height="8" rx="4" fill="#1258ca"/>
  <text x="286" y="108" font-family="Roboto Mono, monospace" font-size="10" fill="#6b7280">75%</text>

  <!-- Endpoints -->
  <text x="40" y="136" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515">Endpoints</text>
  <g font-family="Roboto Mono, monospace" font-size="11" fill="#6b7280">
    <text x="40" y="152">/api/v1/sequence</text>
    <text x="40" y="168">/api/v1/variant</text>
    <text x="40" y="184">/api/v1/annotation</text>
  </g>

  <!-- Status -->
  <g>
    <rect x="320" y="100" width="200" height="60" rx="8" fill="#f8f7f4"/>
    <text x="332" y="120" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#151515" letter-spacing="0.05em">STATUS</text>
    <circle cx="332" cy="138" r="5" fill="#97ea90"/>
    <text x="342" y="142" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#151515">Operational</text>
  </g>

  <!-- CTA -->
  <a>
    <rect x="40" y="220" width="120" height="36" rx="9999" fill="url(#btnGrad)"/>
    <text x="100" y="243" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">View Details</text>
  </a>

  <!-- Meta -->
  <text x="180" y="242" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">Last sync: 2 min ago</text>
</svg>