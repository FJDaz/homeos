<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0f4ab0"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="400" height="200" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Icon -->
  <g>
    <rect x="40" y="50" width="60" height="60" rx="8" fill="#e8f0fe"/>
    <path d="M65 70h10v10h-10z M60 80h20v5h-20z M60 88h20v5h-20z M60 96h15v5h-15z" fill="#1258ca"/>
  </g>

  <!-- Texts -->
  <text x="120" y="70" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Téléchargement ZIP</text>
  <text x="120" y="90" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Archive complète • 12,4 Mo</text>

  <!-- Button -->
  <g>
    <rect x="120" y="110" width="160" height="44" rx="9999" fill="url(#btnGrad)"/>
    <text x="200" y="136" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">📥 Télécharger</text>
  </g>

  <!-- Metadata -->
  <text x="40" y="190" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af" letter-spacing="0.05em">DERNIÈRE MAJ : 14 JUIN 2024</text>
</svg>