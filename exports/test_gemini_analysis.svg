<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#121212"/>

  <rect x="50" y="50" width="550" height="650" rx="15" fill="#212121" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="90" font-size="24" font-weight="bold" fill="#eee">Rapport Analyse Vision</text>
  <text x="80" y="120" font-size="14" fill="#ccc">L'utilisateur voit l'image avec calque d'analyse superposé (zones, confiance) et peut interagir</text>
  <rect x="100" y="150" width="500" height="350" fill="#424242" rx="10"/>
  <line x1="100" y1="325" x2="600" y2="325" stroke="#555" stroke-width="1"/>
  <line x1="350" y1="150" x2="350" y2="500" stroke="#555" stroke-width="1"/>
    <circle cx="200" cy="250" r="30" fill="rgba(255,0,0,0.3)" />
    <circle cx="450" cy="400" r="50" fill="rgba(0,255,0,0.3)" />


  <g transform="translate(100, 530)">
    <rect width="200" height="50" rx="25" fill="url(#buttonGradient)" filter="url(#shadow)" />
    <text x="30" y="30" font-size="16" font-weight="bold" fill="#fff">🚀 Analyser</text>
  </g>

  <g transform="translate(350, 530)">
    <rect width="200" height="50" rx="25" fill="#607D8B" filter="url(#shadow)"/>
    <text x="30" y="30" font-size="16" font-weight="bold" fill="#fff">🔄 Régénérer</text>
  </g>

  <rect x="650" y="50" width="300" height="700" fill="#212121" rx="15"/>
  <text x="680" y="90" font-size="20" font-weight="bold" fill="#eee">Analyse PNG</text>
  <text x="680" y="130" font-size="14" fill="#ccc">split_editorial</text>

  <rect x="670" y="170" width="260" height="100" fill="#333" rx="8"/>
  <text x="680" y="190" font-size="14" fill="#ddd">ID: comp_vision_report</text>
  <text x="680" y="210" font-size="14" fill="#ddd">Name: Rapport Analyse Vision</text>

  <rect x="670" y="290" width="260" height="100" fill="#333" rx="8"/>
  <text x="680" y="310" font-size="14" fill="#ddd">ID: comp_vision_analyze_btn</text>
  <text x="680" y="330" font-size="14" fill="#ddd">Name: Bouton Analyser</text>

  <rect x="670" y="410" width="260" height="100" fill="#333" rx="8"/>
  <text x="680" y="430" font-size="14" fill="#ddd">ID: comp_vision_regenerate</text>
  <text x="680" y="450" font-size="14" fill="#ddd">Name: Régénérer Analyse</text>
</svg>