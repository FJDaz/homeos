<svg viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#ffb703"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="16" y="16" width="328" height="48" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Label -->
  <text x="32" y="40" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280" letter-spacing="0.025em">
    Dialogue en cours
  </text>

  <!-- Button -->
  <g cursor="pointer">
    <rect x="224" y="20" width="112" height="40" rx="9999" fill="url(#btnGrad)"/>
    <text x="280" y="43" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="15" font-weight="700" fill="#151515" text-anchor="middle">
      Passer
    </text>
  </g>
</svg>