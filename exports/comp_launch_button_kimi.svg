<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#df1f29"/>
      <stop offset="100%" stop-color="#b71a22"/>
    </linearGradient>
    <linearGradient id="btnGradHover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a36"/>
      <stop offset="100%" stop-color="#df1f29"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="240" fill="#f8f7f4"/>

  <!-- Floating card -->
  <rect x="40" y="60" width="360" height="120" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Rocket icon -->
  <g transform="translate(70 110)">
    <path d="M16 2c0-1.1-.9-2-2-2s-2 .9-2 2v10c0 .7.4 1.4 1 1.7l6 3c.9.5 2 .1 2.5-.8s.1-2-.8-2.5l-4.7-2.4V2z" fill="#df1f29"/>
    <path d="M22 14c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" fill="#ffd548"/>
  </g>

  <!-- Button -->
  <g id="launchBtn">
    <rect x="120" y="90" width="200" height="60" rx="9999" fill="url(#btnGrad)"/>
    <text x="220" y="127" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Lancer la distillation</text>
  </g>

  <!-- Hover state hint -->
  <rect x="120" y="90" width="200" height="60" rx="9999" fill="url(#btnGradHover)" opacity="0" id="btnHover">
    <animate attributeName="opacity" values="0;0" dur="0.01s" fill="freeze"/>
    <set attributeName="opacity" to="1" begin="launchBtn.mouseover" end="launchBtn.mouseout"/>
  </rect>

  <!-- Metadata label -->
  <text x="220" y="175" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="0.1em">ACTION FINALISÉE</text>
</svg>