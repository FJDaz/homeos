<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Header Dashboard -->
  <g id="comp_validation_dashboard">
    <rect x="20" y="20" width="960" height="100" rx="12" fill="url(#gradB)" filter="url(#shadow)"/>
    <text x="50" y="60" font-size="22" font-weight="600" fill="#1f2937">Dashboard Validation</text>
    <rect x="50" y="75" width="200" height="30" rx="8" fill="#e0e7ff"/>
    <text x="60" y="95" font-size="14" fill="#4f46e5">Zones · Layout · Style · Confiance</text>
    <rect x="280" y="75" width="90" height="30" rx="8" fill="#d1fae5"/>
    <text x="290" y="95" font-size="14" fill="#065f46">Validé 4/4</text>
    <rect x="390" y="75" width="90" height="30" rx="8" fill="#fef3c7"/>
    <text x="400" y="95" font-size="14" fill="#92400e">En attente 2</text>
  </g>

  <!-- Main Accordion -->
  <g id="comp_validation_accordion">
    <rect x="20" y="140" width="680" height="160" rx="12" fill="#fff" filter="url(#shadow)"/>
    <text x="40" y="170" font-size="18" font-weight="600" fill="#1f2937">Résumé Décisions</text>
    <rect x="40" y="185" width="640" height="40" rx="8" fill="#f3f4f6"/>
    <text x="55" y="208" font-size="15" fill="#374151">Zones validées · Header, Hero, Footer</text>
    <rect x="40" y="235" width="640" height="40" rx="8" fill="#f3f4f6"/>
    <text x="55" y="258" font-size="15" fill="#374151">Style · Palette, Typo, Espacements</text>
  </g>

  <!-- Stencil Grid -->
  <g id="comp_stenciler_grid">
    <rect x="20" y="320" width="680" height="260" rx="12" fill="#fff" filter="url(#shadow)"/>
    <text x="40" y="350" font-size="18" font-weight="600" fill="#1f2937">Grille Stencils</text>
    <g fill="#e5e7eb">
      <rect x="40" y="370" width="90" height="90" rx="8"/>
      <rect x="140" y="370" width="90" height="90" rx="8"/>
      <rect x="240" y="370" width="90" height="90" rx="8"/>
      <rect x="340" y="370" width="90" height="90" rx="8"/>
      <rect x="440" y="370" width="90" height="90" rx="8"/>
      <rect x="540" y="370" width="90" height="90" rx="8"/>
      <rect x="40" y="470" width="90" height="90" rx="8"/>
      <rect x="140" y="470" width="90" height="90" rx="8"/>
      <rect x="240" y="470" width="90" height="90" rx="8"/>
    </g>
  </g>

  <!-- Sidebar Choice -->
  <g id="comp_stenciler_select">
    <rect x="720" y="140" width="260" height="440" rx="12" fill="#fff" filter="url(#shadow)"/>
    <text x="740" y="170" font-size="18" font-weight="600" fill="#1f2937">Sélection Composant</text>
    <rect x="740" y="190" width="220" height="80" rx="8" fill="#f3f4f6"/>
    <rect x="750" y="200" width="80" height="28" rx="6" fill="url(#gradA)"/>
    <text x="760" y="218" font-size="13" fill="#fff">Garder</text>
    <rect x="840" y="200" width="80" height="28" rx="6" fill="#e5e7eb"/>
    <text x="850" y="218" font-size="13" fill="#374151">Réserve</text>
    <rect x="740" y="290" width="220" height="80" rx="8" fill="#f3f4f6"/>
    <rect x="750" y="300" width="80" height="28" rx="6" fill="url(#gradA)"/>
    <text x="760" y="318" font-size="13" fill="#fff">Garder</text>
    <rect x="840" y="300" width="80" height="28" rx="6" fill="#e5e7eb"/>
    <text x="850" y="318" font-size="13" fill="#374151">Réserve</text>
    <rect x="740" y="390" width="220" height="80" rx="8" fill="#f3f4f6"/>
    <rect x="750" y="400" width="80" height="28" rx="6" fill="url(#gradA)"/>
    <text x="760" y="418" font-size="13" fill="#fff">Garder</text>
    <rect x="840" y="400" width="80" height="28" rx="6" fill="#e5e7eb"/>
    <text x="850" y="418" font-size="13" fill="#374151">Réserve</text>
  </g>
</svg>