<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter for card -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Gradient for primary button -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a46d1"/>
    </linearGradient>
    
    <!-- Subtle surface gradient -->
    <linearGradient id="surfaceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="50" y="50" width="600" height="300" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Card Header Section -->
  <rect x="50" y="50" width="600" height="72" rx="12" fill="url(#surfaceGradient)"/>
  <rect x="50" y="110" width="600" height="12" fill="#ffffff"/>
  
  <!-- Section Title -->
  <text x="82" y="95" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Structure hiérarchique</text>
  
  <!-- Breadcrumb / Path indicator -->
  <text x="82" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Racine</text>
  <text x="126" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#9ca3af">/</text>
  <text x="138" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Départements</text>
  <text x="226" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#9ca3af">/</text>
  <text x="238" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2458f3">Équipe Design</text>
  
  <!-- Hierarchy visualization - current level indicator -->
  <rect x="82" y="168" width="536" height="64" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Level indicator dots -->
  <circle cx="106" cy="188" r="4" fill="#2458f3"/>
  <circle cx="106" cy="200" r="4" fill="#d1d5db"/>
  <circle cx="106" cy="212" r="4" fill="#d1d5db"/>
  
  <!-- Current node label -->
  <text x="126" y="193" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">Équipe Design</text>
  <text x="126" y="213" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Niveau 3 • 12 membres • 4 sous-équipes</text>
  
  <!-- Decorative hierarchy lines -->
  <line x1="82" y1="256" x2="618" y2="256" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Zoom Out / Remonter Button -->
  <g transform="translate(82, 276)">
    <!-- Button background -->
    <rect width="156" height="44" rx="6" fill="url(#btnGradient)"/>
    
    <!-- Arrow up icon -->
    <path d="M20 26 L26 20 L32 26 M26 20 L26 32" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Button label -->
    <text x="46" y="27" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Remonter</text>
  </g>
  
  <!-- Secondary info -->
  <text x="258" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#9ca3af">Retour au niveau Départements</text>
  
  <!-- Visual hint - parent level preview -->
  <g opacity="0.5">
    <rect x="450" y="276" width="168" height="44" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="534" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Niveau parent</text>
  </g>
</svg>