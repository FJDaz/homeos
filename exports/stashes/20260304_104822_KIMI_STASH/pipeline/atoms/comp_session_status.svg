<svg viewBox="0 0 1140 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Green LED gradient -->
    <radialGradient id="ledGreen" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c8ffbe"/>
      <stop offset="50%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#5cb855"/>
    </radialGradient>
    
    <!-- Gray LED gradient -->
    <radialGradient id="ledGray" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </radialGradient>
    
    <!-- Green glow -->
    <filter id="greenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Button gradient -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#5cb855"/>
    </linearGradient>
  </defs>
  
  <!-- Main card -->
  <rect x="20" y="20" width="1100" height="320" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section title -->
  <text x="60" y="68" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Status Session</text>
  
  <!-- Subtitle -->
  <text x="60" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Real-time system state monitoring</text>
  
  <!-- LED 1: current_step -->
  <g transform="translate(60, 140)">
    <!-- LED circle -->
    <circle cx="24" cy="24" r="20" fill="url(#ledGreen)" filter="url(#greenGlow)"/>
    <circle cx="24" cy="24" r="20" fill="url(#ledGreen)" opacity="0.3"/>
    <!-- Label -->
    <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">current_step</text>
    <!-- Status text -->
    <text x="24" y="82" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#5cb855" text-anchor="middle">Active</text>
  </g>
  
  <!-- LED 2: genome -->
  <g transform="translate(280, 140)">
    <!-- LED circle -->
    <circle cx="24" cy="24" r="20" fill="url(#ledGreen)" filter="url(#greenGlow)"/>
    <circle cx="24" cy="24" r="20" fill="url(#ledGreen)" opacity="0.3"/>
    <!-- Label -->
    <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">genome</text>
    <!-- Status text -->
    <text x="24" y="82" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#5cb855" text-anchor="middle">Ready</text>
  </g>
  
  <!-- LED 3: entries -->
  <g transform="translate(500, 140)">
    <!-- LED circle -->
    <circle cx="24" cy="24" r="20" fill="url(#ledGray)"/>
    <!-- Label -->
    <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">entries</text>
    <!-- Status text -->
    <text x="24" y="82" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Pending</text>
  </g>
  
  <!-- LED 4: export -->
  <g transform="translate(720, 140)">
    <!-- LED circle -->
    <circle cx="24" cy="24" r="20" fill="url(#ledGray)"/>
    <!-- Label -->
    <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">export</text>
    <!-- Status text -->
    <text x="24" y="82" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Idle</text>
  </g>
  
  <!-- Refresh button -->
  <g transform="translate(940, 128)">
    <rect x="0" y="0" width="140" height="48" rx="6" fill="url(#btnGradient)"/>
    <!-- Refresh icon -->
    <path d="M24 16c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M32 24l-4 4 4 4" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Button label -->
    <text x="72" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Refresh</text>
  </g>
  
  <!-- Progress bar section -->
  <g transform="translate(60, 240)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="1.5">OVERALL PROGRESS</text>
    <!-- Progress track -->
    <rect x="0" y="16" width="600" height="8" rx="4" fill="#e5e7eb"/>
    <!-- Progress fill -->
    <rect x="0" y="16" width="300" height="8" rx="4" fill="#97ea90"/>
    <!-- Progress percentage -->
    <text x="620" y="26" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="700" fill="#151515">50%</text>
  </g>
  
  <!-- Last updated -->
  <text x="60" y="308" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af">Last updated: 2024-01-15 14:32:18 UTC</text>
</svg>