<svg viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadows -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <filter id="headerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#f05e23"/>
    </linearGradient>
    
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1b24"/>
      <stop offset="100%" stop-color="#0D0E13"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="280" fill="#f8f7f4"/>
  
  <!-- Main Card Container -->
  <rect x="20" y="20" width="380" height="240" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header Zone -->
  <rect x="20" y="20" width="380" height="72" rx="12" fill="url(#headerGradient)" filter="url(#headerShadow)"/>
  <rect x="20" y="80" width="380" height="12" fill="#0D0E13"/>
  
  <!-- Logo/Title Left -->
  <g transform="translate(40, 44)">
    <!-- Logo Mark -->
    <rect x="0" y="0" width="24" height="24" rx="6" fill="url(#accentGradient)"/>
    <path d="M7 12h10M12 7v10" stroke="#0D0E13" stroke-width="2" stroke-linecap="round"/>
    <!-- Brand Name -->
    <text x="32" y="17" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="14" fill="#ffffff">Nexus</text>
  </g>
  
  <!-- Actions Right -->
  <g transform="translate(316, 40)">
    <!-- Search Button -->
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#ffffff" fill-opacity="0.08"/>
    <circle cx="12" cy="13" r="5" stroke="#ffffff" stroke-width="1.5" fill="none"/>
    <path d="M16 17l4 4" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- User Avatar -->
    <rect x="40" y="0" width="32" height="32" rx="9999" fill="url(#accentGradient)"/>
    <text x="56" y="21" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="12" fill="#0D0E13" text-anchor="middle">JD</text>
  </g>
  
  <!-- Breadcrumb Zone -->
  <g transform="translate(40, 108)">
    <!-- Phase (Clickable) -->
    <g class="breadcrumb-item" style="cursor: pointer;">
      <rect x="0" y="0" width="56" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="28" y="19" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" fill="#1258ca" text-anchor="middle">Phase</text>
    </g>
    
    <!-- Chevron -->
    <path d="M64 10l4 4-4 4" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Étape (Clickable) -->
    <g class="breadcrumb-item" style="cursor: pointer;" transform="translate(76, 0)">
      <rect x="0" y="0" width="52" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="26" y="19" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" fill="#1258ca" text-anchor="middle">Étape</text>
    </g>
    
    <!-- Chevron -->
    <path d="M132 10l4 4-4 4" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Section (Active/Current) -->
    <g transform="translate(144, 0)">
      <rect x="0" y="0" width="64" height="28" rx="6" fill="#ffd548"/>
      <text x="32" y="19" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#0D0E13" text-anchor="middle">Section</text>
    </g>
    
    <!-- Metadata Label -->
    <text x="0" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" letter-spacing="1.5">VOUS ÊTES ICI</text>
  </g>
  
  <!-- Content Preview Area -->
  <g transform="translate(40, 180)">
    <!-- Section Title -->
    <text x="0" y="0" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#0D0E13">Configuration avancée</text>
    
    <!-- Description -->
    <text x="0" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Modifiez les paramètres de cette section</text>
    
    <!-- Action Buttons -->
    <g transform="translate(0, 44)">
      <!-- Secondary Button -->
      <rect x="0" y="0" width="96" height="36" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="48" y="23" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#374151" text-anchor="middle">Annuler</text>
      
      <!-- Primary Button -->
      <rect x="108" y="0" width="120" height="36" rx="6" fill="url(#accentGradient)"/>
      <text x="168" y="23" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#0D0E13" text-anchor="middle">Enregistrer</text>
    </g>
  </g>
  
  <!-- Hover State Indicator (Visual Guide) -->
  <g transform="translate(340, 200)" opacity="0.6">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#f8f7f4"/>
    <text x="20" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">↑</text>
  </g>
</svg>