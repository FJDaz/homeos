<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Backdrop gradient -->
    <linearGradient id="backdropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.9"/>
    </linearGradient>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- S indigo bubble gradient -->
    <linearGradient id="sBubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    
    <!-- User bubble gradient -->
    <linearGradient id="userBubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#e04a12"/>
    </linearGradient>
    
    <!-- Avatar gradient S -->
    <linearGradient id="sAvatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <!-- Typing dots animation -->
    <filter id="typingShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Backdrop -->
  <rect width="400" height="520" fill="url(#backdropGrad)"/>
  
  <!-- Decorative background elements -->
  <circle cx="80" cy="100" r="120" fill="#6366f1" opacity="0.08"/>
  <circle cx="320" cy="420" r="100" fill="#f05e23" opacity="0.06"/>
  
  <!-- Modal Card -->
  <rect x="40" y="60" width="320" height="400" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header -->
  <rect x="40" y="60" width="320" height="64" rx="12" fill="#ffffff"/>
  <rect x="40" y="108" width="320" height="16" rx="0" fill="#ffffff"/>
  <path d="M40 124 L360 124" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- Title -->
  <text x="72" y="98" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Messages</text>
  
  <!-- Online indicator -->
  <circle cx="56" cy="92" r="6" fill="#22c55e"/>
  <circle cx="56" cy="92" r="6" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Close button -->
  <rect x="320" y="76" width="24" height="24" rx="6" fill="#f5f5f5"/>
  <path d="M326 82 L338 94 M338 82 L326 94" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Chat area -->
  <rect x="40" y="124" width="320" height="276" fill="#fafafa"/>
  
  <!-- Time label -->
  <text x="200" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">AUJOURD'HUI</text>
  
  <!-- S Avatar -->
  <circle cx="72" cy="180" r="16" fill="url(#sAvatarGrad)"/>
  <text x="72" y="185" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
  
  <!-- S Message 1 -->
  <rect x="96" y="156" width="168" height="48" rx="16" fill="url(#sBubbleGrad)"/>
  <text x="112" y="178" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">Bonjour ! Comment puis-je</text>
  <text x="112" y="194" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">vous aider aujourd'hui ?</text>
  
  <!-- User Avatar -->
  <circle cx="328" cy="232" r="16" fill="#e5e7eb"/>
  <text x="328" y="237" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#6b7280" text-anchor="middle">V</text>
  
  <!-- User Message 1 -->
  <rect x="184" y="208" width="128" height="48" rx="16" fill="url(#userBubbleGrad)"/>
  <text x="200" y="230" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">J'ai une question sur</text>
  <text x="200" y="246" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">mon abonnement</text>
  
  <!-- S Message 2 -->
  <rect x="96" y="272" width="176" height="64" rx="16" fill="url(#sBubbleGrad)"/>
  <text x="112" y="294" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">Bien sûr ! Je peux vous</text>
  <text x="112" y="310" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">aider avec ça. Votre plan</text>
  <text x="112" y="326" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff">Pro est actif jusqu'au 15/06.</text>
  
  <!-- Typing indicator -->
  <circle cx="112" cy="360" r="16" fill="url(#sAvatarGrad)"/>
  <text x="112" y="365" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
  
  <rect x="136" y="344" width="56" height="32" rx="16" fill="#e0e7ff"/>
  <circle cx="152" cy="360" r="3" fill="#6366f1">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="164" cy="360" r="3" fill="#6366f1">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="176" cy="360" r="3" fill="#6366f1">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Input area -->
  <rect x="40" y="400" width="320" height="60" rx="0 0 12 12" fill="#ffffff"/>
  <path d="M40 400 L360 400" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Input field -->
  <rect x="56" y="412" width="240" height="36" rx="8" fill="#f3f4f6"/>
  <text x="72" y="434" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">Écrivez votre message...</text>
  
  <!-- Send button -->
  <rect x="304" y="412" width="40" height="36" rx="8" fill="#f05e23"/>
  <path d="M318 424 L328 430 L318 436" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Attachment button -->
  <circle cx="292" cy="430" r="14" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <path d="M288 430 L296 430 M292 426 L292 434" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
</svg>