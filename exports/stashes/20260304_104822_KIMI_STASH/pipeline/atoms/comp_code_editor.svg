  <rect x="42" y="88" width="12" height="2" rx="1" fill="#6b7280"/>
  <rect x="42" y="92" width="14" height="2" rx="1" fill="#6b7280"/>
  
  <rect x="72" y="76" width="28" height="24" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
