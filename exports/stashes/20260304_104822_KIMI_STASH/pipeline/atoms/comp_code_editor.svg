  <text x="248" y="224" font-family="Roboto Mono, monospace" font-size="12" fill="#7c3aed">=</text>
  <text x="268" y="224" font-family="Roboto Mono, monospace" font-size="12" fill="#2458f3">useState</text>
  <text x="316" y="224" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">(</text>
  <text x="324" y="224" font-family="Roboto Mono, monospace" font-size="12" fill="#1f2937">initialCode</text>
  <text x="396" y="224" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">);</text>
  
  <!-- Line 6: Empty -->
  
