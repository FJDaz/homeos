  <text x="252" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">}</text>
  <text x="264" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#7c3aed">from</text>
  <text x="296" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#059669">'react'</text>
  <text x="340" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">;</text>
  
  <!-- Line 2: Empty -->
  
  <!-- Line 3: Comment -->
