  <text x="84" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#7c3aed">import</text>
  <text x="132" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">{</text>
  <text x="140" y="144" font-family="Roboto Mono, monospace" font-size="12" fill="#1f2937">useState</text>
