  <text x="100" y="264" font-family="Roboto Mono, monospace" font-size="12" fill="#2458f3">useEffect</text>
  <text x="156" y="264" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">(()</text>
  <text x="180" y="264" font-family="Roboto Mono, monospace" font-size="12" fill="#7c3aed">=&gt;</text>
  <text x="200" y="264" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">{</text>
  
