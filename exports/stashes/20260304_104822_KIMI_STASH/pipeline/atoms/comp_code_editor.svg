  <text x="116" y="304" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">[]);</text>
  
  <!-- Line 10: Empty -->
  
  <!-- Line 11: return -->
  <text x="100" y="344" font-family="Roboto Mono, monospace" font-size="12" fill="#7c3aed">return</text>
  <text x="144" y="344" font-family="Roboto Mono, monospace" font-size="12" fill="#d97706">(</text>
  
  <!-- Line 12: div -->
