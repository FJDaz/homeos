<svg viewBox="0 0 340 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow for card -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <!-- Gradient for delete button -->
    <linearGradient id="deleteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a5a"/>
    </linearGradient>
    <!-- File icon gradient -->
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="340" height="500" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="20" y="20" width="300" height="460" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Title -->
  <text x="40" y="60" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Fichier Uploadé</text>
  
  <!-- Metadata Label -->
  <text x="40" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5" text-transform="uppercase">DOCUMENT ACTIF</text>
  
  <!-- File Preview Card -->
  <g transform="translate(40, 110)">
    <!-- File icon background -->
    <rect x="0" y="0" width="260" height="180" rx="8" fill="url(#fileGradient)"/>
    
    <!-- Document lines -->
    <rect x="30" y="40" width="140" height="8" rx="4" fill="#ffffff"/>
    <rect x="30" y="60" width="100" height="8" rx="4" fill="#ffffff"/>
    <rect x="30" y="80" width="160" height="8" rx="4" fill="#ffffff"/>
    <rect x="30" y="100" width="120" height="8" rx="4" fill="#ffffff"/>
    <rect x="30" y="120" width="80" height="8" rx="4" fill="#ffffff"/>
    
    <!-- File corner fold -->
    <path d="M200 0 L260 0 L260 60 Z" fill="#c0c0c0"/>
    
    <!-- Success indicator -->
    <circle cx="230" cy="140" r="16" fill="#97ea90"/>
    <path d="M222 140 L227 145 L238 134" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- File Info -->
  <text x="40" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515">contrat_final.pdf</text>
  <text x="40" y="340" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b6b6b">2.4 MB • PDF • Uploadé le 15 jan 2024</text>
  
  <!-- Delete Button -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="260" height="48" rx="6" fill="url(#deleteGradient)"/>
    <!-- Trash icon -->
    <g transform="translate(88, 14)">
      <rect x="4" y="6" width="16" height="18" rx="2" stroke="#ffffff" stroke-width="2" fill="none"/>
      <rect x="2" y="4" width="20" height="4" rx="1" fill="#ffffff"/>
      <line x1="8" y1="10" x2="8" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="10" x2="12" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="10" x2="16" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="128" y="30" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Supprimer le fichier</text>
  </g>
  
  <!-- Helper text -->
  <text x="170" y="452" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#9b9b9b" text-anchor="middle">Cette action est irréversible</text>
</svg>