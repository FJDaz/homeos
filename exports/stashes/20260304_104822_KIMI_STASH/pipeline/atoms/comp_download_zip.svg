<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#d94d1a"/>
    </linearGradient>
    <linearGradient id="fileIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f2"/>
      <stop offset="100%" stop-color="#ffe8e0"/>
    </linearGradient>
  </defs>
  
  <!-- Card Background -->
  <rect x="20" y="20" width="560" height="240" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Title -->
  <text x="52" y="64" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="19" font-weight="700" fill="#151515">Téléchargement ZIP</text>
  
  <!-- Subtitle -->
  <text x="52" y="92" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b6b">Téléchargez l'archive complète des ressources</text>
  
  <!-- File Card -->
  <rect x="52" y="118" width="496" height="104" rx="8" fill="#f8f7f4"/>
  
  <!-- File Icon Background -->
  <rect x="76" y="142" width="56" height="56" rx="10" fill="url(#fileIconGrad)"/>
  
  <!-- File Icon - ZIP Document -->
  <rect x="88" y="154" width="32" height="40" rx="3" fill="#f05e23" opacity="0.15"/>
  <rect x="88" y="154" width="32" height="40" rx="3" fill="none" stroke="#f05e23" stroke-width="1.5"/>
  <path d="M88 162h32M88 170h32M88 178h20" stroke="#f05e23" stroke-width="1.5" stroke-linecap="round"/>
  <text x="92" y="188" font-family="Roboto Mono, monospace" font-size="8" font-weight="600" fill="#f05e23">ZIP</text>
  <path d="M112 150l8 8v-8h-8z" fill="#f05e23"/>
  
  <!-- File Info -->
  <text x="152" y="168" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="15" font-weight="600" fill="#151515">ressources_projet_v2.4.zip</text>
  <text x="152" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b6b6b">24.8 MB • Dernière mise à jour: 14 jan 2025</text>
  
  <!-- Download Button -->
  <rect x="428" y="150" width="96" height="40" rx="6" fill="url(#btnGradient)"/>
  <text x="452" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">📥</text>
  <text x="472" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Télécharger</text>
  
  <!-- Metadata Label -->
  <text x="52" y="250" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#9a9a9a" letter-spacing="1.5">ARCHIVE COMPLÈTE</text>
</svg>