<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Button Shadow -->
    <filter id="btnShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#97ea90" flood-opacity="0.4"/>
    </filter>
    
    <!-- Primary Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd965"/>
    </linearGradient>
    
    <!-- Success Glow -->
    <radialGradient id="successGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#97ea90" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#97ea90" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Subtle Border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e6"/>
      <stop offset="100%" stop-color="#f0efec"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="60" y="50" width="580" height="300" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  <rect x="60" y="50" width="580" height="300" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>
  
  <!-- Status Indicator -->
  <circle cx="100" cy="85" r="6" fill="#97ea90"/>
  <text x="118" y="89" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5a5a58" letter-spacing="0.5">PRÊT À LANCER</text>
  
  <!-- Section Title -->
  <text x="100" y="135" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Distillation des données</text>
  
  <!-- Body Text -->
  <text x="100" y="165" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b69">Tous les paramètres sont configurés. Le processus extraira les</text>
  <text x="100" y="185" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b69">entités clés et générera les embeddings vectoriels.</text>
  
  <!-- Stats Row -->
  <g transform="translate(100, 220)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="140" height="56" rx="8" fill="#fafaf9"/>
    <text x="16" y="22" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9a9a98" letter-spacing="1.5">DOCUMENTS</text>
    <text x="16" y="44" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">2,847</text>
    
    <!-- Stat 2 -->
    <rect x="156" y="0" width="140" height="56" rx="8" fill="#fafaf9"/>
    <text x="172" y="22" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9a9a98" letter-spacing="1.5">CHUNKS</text>
    <text x="172" y="44" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">14,203</text>
    
    <!-- Stat 3 -->
    <rect x="312" y="0" width="140" height="56" rx="8" fill="#fafaf9"/>
    <text x="328" y="22" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9a9a98" letter-spacing="1.5">TEMPS EST.</text>
    <text x="328" y="44" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">~4 min</text>
  </g>
  
  <!-- Launch Button -->
  <g transform="translate(100, 298)">
    <!-- Glow Effect -->
    <ellipse cx="180" cy="28" rx="160" ry="24" fill="url(#successGlow)"/>
    
    <!-- Button Background -->
    <rect x="0" y="0" width="360" height="56" rx="9999" fill="url(#primaryGrad)" filter="url(#btnShadow)"/>
    
    <!-- Rocket Icon -->
    <g transform="translate(118, 16)">
      <path d="M12 2c0 0-7 4-7 11v3l-3 3h20l-3-3v-3c0-7-7-11-7-11zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm-5 12h10v2H7v-2z" fill="#ffffff"/>
      <path d="M10 14h4v4h-4z" fill="#ffffff" opacity="0.3"/>
    </g>
    
    <!-- Button Label -->
    <text x="202" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Lancer la distillation</text>
  </g>
  
  <!-- Info Note -->
  <text x="100" y="380" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9a9a98">Vous pourrez suivre la progression en temps réel</text>
  
  <!-- Decorative Element -->
  <circle cx="580" cy="120" r="40" fill="none" stroke="#97ea90" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <circle cx="580" cy="120" r="24" fill="#97ea90" opacity="0.08"/>
</svg>