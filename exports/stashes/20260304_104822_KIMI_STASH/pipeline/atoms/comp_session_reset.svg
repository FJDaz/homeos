<svg viewBox="0 0 1140 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Button gradient -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ffd548"/>
    </linearGradient>
    
    <!-- Icon circle gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8e6"/>
      <stop offset="100%" stop-color="#ffd548"/>
    </linearGradient>
    
    <!-- Warning pulse -->
    <filter id="pulse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1140" height="360" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="60" y="40" width="1020" height="280" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Header -->
  <text x="100" y="88" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Session Management</text>
  
  <!-- Metadata label -->
  <text x="100" y="118" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#6b7280" letter-spacing="1.5" text-transform="uppercase">CURRENT STATUS: ACTIVE</text>
  
  <!-- Divider line -->
  <line x1="100" y1="140" x2="1040" y2="140" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Warning Icon Circle -->
  <circle cx="140" cy="210" r="32" fill="url(#iconGradient)" opacity="0.3"/>
  <circle cx="140" cy="210" r="24" fill="url(#iconGradient)"/>
  
  <!-- Warning Triangle Icon -->
  <path d="M140 194 L152 218 L128 218 Z" fill="#f05e23"/>
  <circle cx="140" cy="212" r="2" fill="#ffffff"/>
  <rect x="138" y="204" width="4" height="6" rx="1" fill="#ffffff"/>
  
  <!-- Content Area -->
  <text x="200" y="200" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#151515">Reset Session</text>
  <text x="200" y="228" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#6b7280">This will clear all progress and return you to the starting point.</text>
  <text x="200" y="248" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#9ca3af">Last saved: 2 minutes ago • 47 items will be removed</text>
  
  <!-- Confirmation Checkbox -->
  <rect x="200" y="270" width="16" height="16" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="224" y="282" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#4b5563">I understand this action cannot be undone</text>
  
  <!-- Reset Button -->
  <g transform="translate(860, 190)">
    <!-- Button bg -->
    <rect x="0" y="0" width="140" height="44" rx="6" fill="url(#btnGradient)"/>
    <!-- Button shadow -->
    <rect x="0" y="2" width="140" height="44" rx="6" fill="#f05e23" opacity="0.2" filter="url(#pulse)"/>
    <!-- Reset icon -->
    <path d="M24 14 L24 20 L18 20 M26 16 C26 12.686 23.314 10 20 10 C16.686 10 14 12.686 14 16 C14 19.314 16.686 22 20 22 C21.657 22 23.157 21.328 24.243 20.243" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Button text -->
    <text x="70" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Reset Now</text>
  </g>
  
  <!-- Cancel link -->
  <text x="930" y="258" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Cancel</text>
  
  <!-- Progress indicator dots -->
  <circle cx="100" cy="310" r="4" fill="#ffd548"/>
  <circle cx="116" cy="310" r="4" fill="#e5e7eb"/>
  <circle cx="132" cy="310" r="4" fill="#e5e7eb"/>
</svg>