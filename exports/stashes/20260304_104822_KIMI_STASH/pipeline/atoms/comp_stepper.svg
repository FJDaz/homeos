<svg viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gradActive" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a46c4"/>
    </linearGradient>
    <linearGradient id="gradCompleted" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gradFuture" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadowCard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowActive" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.2"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#9ca3af"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="280" fill="#0D0E13"/>
  
  <!-- Header -->
  <rect width="420" height="72" fill="#0D0E13"/>
  <rect x="0" y="71" width="420" height="1" fill="#1f2937"/>
  
  <!-- Logo/Title -->
  <circle cx="28" cy="36" r="16" fill="url(#gradActive)"/>
  <text x="28" y="41" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
  <text x="56" y="32" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff">ProcessFlow</text>
  <text x="56" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" letter-spacing="0.5">9-Phase Deployment</text>
  
  <!-- Actions Right -->
  <rect x="332" y="20" width="72" height="32" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="368" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Save</text>
  
  <!-- Stepper Container -->
  <rect x="16" y="88" width="388" height="176" rx="12" fill="#ffffff" filter="url(#shadowCard)"/>
  
  <!-- Stepper Title -->
  <text x="32" y="116" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#111827">Deployment Pipeline</text>
  <text x="32" y="132" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" letter-spacing="0.5">PHASE 4 OF 9</text>
  
  <!-- Progress Bar Background -->
  <rect x="32" y="148" width="356" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="32" y="148" width="142" height="4" rx="2" fill="url(#gradActive)"/>
  
  <!-- Steps Container -->
  <g transform="translate(32, 172)">
    
    <!-- Step 1: Completed -->
    <g>
      <circle cx="16" cy="16" r="16" fill="url(#gradCompleted)" filter="url(#shadowActive)"/>
      <path d="M10 16l4 4 8-8" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#059669" text-anchor="middle">Plan</text>
    </g>
    
    <!-- Connector 1-2 -->
    <rect x="36" y="14" width="28" height="4" rx="2" fill="#10b981"/>
    
    <!-- Step 2: Completed -->
    <g transform="translate(68, 0)">
      <circle cx="16" cy="16" r="16" fill="url(#gradCompleted)" filter="url(#shadowActive)"/>
      <path d="M10 16l4 4 8-8" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#059669" text-anchor="middle">Design</text>
    </g>
    
    <!-- Connector 2-3 -->
    <rect x="104" y="14" width="28" height="4" rx="2" fill="#10b981"/>
    
    <!-- Step 3: Completed -->
    <g transform="translate(136, 0)">
      <circle cx="16" cy="16" r="16" fill="url(#gradCompleted)" filter="url(#shadowActive)"/>
      <path d="M10 16l4 4 8-8" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#059669" text-anchor="middle">Build</text>
    </g>
    
    <!-- Connector 3-4 -->
    <rect x="172" y="14" width="28" height="4" rx="2" fill="url(#gradActive)"/>
    
    <!-- Step 4: Active -->
    <g transform="translate(204, 0)">
      <circle cx="16" cy="16" r="20" fill="url(#gradActive)" filter="url(#shadowActive)"/>
      <circle cx="16" cy="16" r="24" fill="none" stroke="#2458f3" stroke-width="2" stroke-opacity="0.3"/>
      <text x="16" y="21" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
      <text x="16" y="52" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#2458f3" text-anchor="middle">Test</text>
    </g>
    
    <!-- Connector 4-5 -->
    <rect x="244" y="14" width="20" height="4" rx="2" fill="#e5e7eb"/>
    
    <!-- Step 5: Future -->
    <g transform="translate(272, 0)">
      <circle cx="12" cy="16" r="12" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
      <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9ca3af" text-anchor="middle">5</text>
      <text x="12" y="48" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#9ca3af" text-anchor="middle">Review</text>
    </g>
    
    <!-- Connector 5-6 -->
    <rect x="292" y="14" width="12" height="4" rx="2" fill="#e5e7eb"/>
    
    <!-- Step 6: Future -->
    <g transform="translate(312, 0)">
      <circle cx="12" cy="16" r="12" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
      <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9ca3af" text-anchor="middle">6</text>
      <text x="12" y="48" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#9ca3af" text-anchor="middle">Stage</text>
    </g>
    
    <!-- More indicator -->
    <g transform="translate(348, 0)">
      <circle cx="8" cy="16" r="3" fill="#d1d5db"/>
      <circle cx="16" cy="16" r="3" fill="#d1d5db"/>
      <circle cx="24" cy="16" r="3" fill="#d1d5db"/>
      <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#9ca3af" text-anchor="middle">3 more</text>
    </g>
    
  </g>
  
  <!-- Navigation Controls -->
  <g transform="translate(32, 236)">
    <!-- Back Button -->
    <rect x="0" y="0" width="80" height="36" rx="6" fill="#f3f4f6"/>
    <text x="40" y="23" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">← Back</text>
    
    <!-- Next Button -->
    <rect x="260" y="0" width="96" height="36" rx="6" fill="url(#gradActive)" filter="url(#shadowActive)"/>
    <text x="308" y="23" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Continue →</text>
    
    <!-- Step Indicator -->
    <text x="170" y="23" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b7280" text-anchor="middle">Step 4 of 9</text>
  </g>
  
</svg>