<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Backdrop gradient -->
    <linearGradient id="backdropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0.92"/>
    </linearGradient>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-opacity="0.16"/>
    </filter>
    
    <!-- Button gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d4ab0"/>
    </linearGradient>
    
    <!-- Skip button hover state subtle gradient -->
    <linearGradient id="skipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f7f4"/>
    </linearGradient>
  </defs>
  
  <!-- Backdrop -->
  <rect width="400" height="520" fill="url(#backdropGrad)"/>
  
  <!-- Decorative blurred orbs -->
  <circle cx="80" cy="100" r="120" fill="#1258ca" opacity="0.08"/>
  <circle cx="320" cy="420" r="100" fill="#f05e23" opacity="0.06"/>
  
  <!-- Modal Card -->
  <rect x="40" y="80" width="320" height="360" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Progress indicator -->
  <rect x="40" y="80" width="320" height="4" rx="2" fill="#e8e8e8"/>
  <rect x="40" y="80" width="192" height="4" rx="2" fill="#1258ca"/>
  
  <!-- Step indicator -->
  <text x="200" y="124" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" text-anchor="middle" letter-spacing="1.5">ÉTAPE 3 SUR 5</text>
  
  <!-- Title -->
  <text x="200" y="164" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="22" font-weight="700" fill="#151515" text-anchor="middle">Confirmer votre identité</text>
  
  <!-- Subtitle -->
  <text x="200" y="194" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Vérifiez vos informations avant de</text>
  <text x="200" y="214" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">poursuivre vers la validation finale.</text>
  
  <!-- Form field 1 -->
  <rect x="72" y="248" width="256" height="56" rx="6" fill="#f8f7f4"/>
  <text x="88" y="272" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">NOM COMPLET</text>
  <text x="88" y="292" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#151515">Marie Dubois</text>
  <circle cx="312" cy="276" r="8" fill="#97ea90"/>
  <path d="M308 276l3 3 5-6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Form field 2 -->
  <rect x="72" y="316" width="256" height="56" rx="6" fill="#f8f7f4"/>
  <text x="88" y="340" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">EMAIL</text>
  <text x="88" y="360" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#151515">marie.dubois@email.com</text>
  <circle cx="312" cy="344" r="8" fill="#97ea90"/>
  <path d="M308 344l3 3 5-6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Primary action button -->
  <rect x="72" y="392" width="148" height="44" rx="6" fill="url(#btnGrad)"/>
  <text x="146" y="418" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Continuer</text>
  
  <!-- Skip/Passer button -->
  <rect x="228" y="392" width="100" height="44" rx="6" fill="url(#skipGrad)" stroke="#e5e5e5" stroke-width="1"/>
  <text x="278" y="418" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#6b7280" text-anchor="middle">Passer</text>
  
  <!-- Skip icon -->
  <path d="M298 410l4 4-4 4" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Helper text -->
  <text x="200" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Vous pourrez modifier ces informations plus tard</text>
</svg>