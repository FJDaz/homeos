<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" fill="none">
  <defs>
    <!-- Gradient for primary button -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d3d8a"/>
    </linearGradient>
    
    <!-- Gradient for rocket flame -->
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="50%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#c73e0b"/>
    </linearGradient>
    
    <!-- Card shadow -->
    <filter id="cardShadow" x="-8" y="-8" width="796" height="596">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Button shadow -->
    <filter id="btnShadow" x="-4" y="-4" width="312" height="84">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1258ca" flood-opacity="0.25"/>
    </filter>
    
    <!-- Glow effect for rocket -->
    <filter id="rocketGlow" x="-20" y="-20" width="88" height="88">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Main card background -->
  <rect x="40" y="40" width="700" height="500" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Card border subtle -->
  <rect x="40" y="40" width="700" height="500" rx="16" fill="none" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- Section header area -->
  <text x="80" y="100" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Analyse Gemini</text>
  
  <!-- Metadata label -->
  <text x="80" y="132" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1.5" fill="#6b7280">INTELLIGENCE ARTIFICIELLE</text>
  
  <!-- Decorative accent line -->
  <rect x="80" y="148" width="40" height="3" rx="1.5" fill="#1258ca"/>
  
  <!-- Body text -->
  <text x="80" y="190" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4b5563">Lancez une analyse approfondie de vos données</text>
  <text x="80" y="212" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4b5563">avec le modèle Gemini. Traitement optimisé.</text>
  
  <!-- Status indicators row -->
  <g transform="translate(80, 260)">
    <!-- Status dot 1 -->
    <circle cx="6" cy="6" r="6" fill="#97ea90"/>
    <text x="22" y="11" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Modèle prêt</text>
    
    <!-- Status dot 2 -->
    <circle cx="120" cy="6" r="6" fill="#1258ca"/>
    <text x="136" y="11" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">API connectée</text>
    
    <!-- Status dot 3 -->
    <circle cx="260" cy="6" r="6" fill="#ffd548"/>
    <text x="276" y="11" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">En attente</text>
  </g>
  
  <!-- Main launch button -->
  <g transform="translate(80, 320)" filter="url(#btnShadow)">
    <!-- Button background -->
    <rect x="0" y="0" width="304" height="72" rx="12" fill="url(#btnGradient)"/>
    
    <!-- Button hover state overlay (subtle) -->
    <rect x="0" y="0" width="304" height="72" rx="12" fill="white" fill-opacity="0.05"/>
    
    <!-- Rocket icon group -->
    <g transform="translate(24, 16)">
      <!-- Rocket body -->
      <path d="M20 4C20 4 28 12 28 24C28 28 26 32 24 34L20 38L16 34C14 32 12 28 12 24C12 12 20 4 20 4Z" fill="#ffffff"/>
      <!-- Rocket window -->
      <circle cx="20" cy="22" r="5" fill="#1258ca"/>
      <!-- Rocket fins -->
      <path d="M12 26L8 32L12 30V26Z" fill="#e5e7eb"/>
      <path d="M28 26L32 32L28 30V26Z" fill="#e5e7eb"/>
      <!-- Flame -->
      <path d="M16 36L20 44L24 36C22 37 18 37 16 36Z" fill="url(#flameGradient)"/>
    </g>
    
    <!-- Button text -->
    <text x="72" y="30" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Lancer l'analyse</text>
    <text x="72" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#93c5fd">Powered by Gemini</text>
    
    <!-- Arrow indicator -->
    <path d="M268 36L276 44L284 36" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Secondary info card -->
  <g transform="translate(420, 320)">
    <rect x="0" y="0" width="280" height="72" rx="8" fill="#f8f7f4"/>
    
    <!-- Info icon -->
    <circle cx="28" cy="36" r="16" fill="#1258ca" fill-opacity="0.1"/>
    <text x="24" y="41" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1258ca">i</text>
    
    <!-- Info text -->
    <text x="56" y="32" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">Temps estimé</text>
    <text x="56" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">2-4 minutes selon le volume</text>
  </g>
  
  <!-- Progress preview area -->
  <g transform="translate(80, 440)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#9ca3af">PRÉVISUALISATION</text>
    
    <!-- Preview bars -->
    <rect x="0" y="16" width="620" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="0" y="16" width="180" height="8" rx="4" fill="#1258ca" fill-opacity="0.3"/>
    
    <rect x="0" y="32" width="620" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="0" y="32" width="320" height="8" rx="4" fill="#1258ca" fill-opacity="0.2"/>
    
    <rect x="0" y="48" width="620" height="8" rx="4" fill="#e5e7eb"/>
  </g>
</svg>