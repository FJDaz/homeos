<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-8" y="-4" width="136%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd865"/>
    </linearGradient>
    <linearGradient id="minimalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="brutalistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0e46a0"/>
    </linearGradient>
    <linearGradient id="corporateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#d94f1a"/>
    </linearGradient>
  </defs>
  
  <!-- Main Card -->
  <rect x="20" y="20" width="480" height="280" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Title -->
  <text x="48" y="56" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Choix du style</text>
  
  <!-- Subtitle -->
  <text x="48" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Sélectionnez l'esthétique qui correspond à votre marque</text>
  
  <!-- Radio Card 1: Minimal -->
  <g transform="translate(48, 96)">
    <rect x="0" y="0" width="196" height="84" rx="8" fill="url(#minimalGrad)" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Radio indicator (selected) -->
    <circle cx="20" cy="42" r="10" fill="#ffffff" stroke="#97ea90" stroke-width="2"/>
    <circle cx="20" cy="42" r="5" fill="url(#accentGradient)"/>
    <!-- Preview mini -->
    <rect x="44" y="24" width="48" height="36" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="48" y="30" width="32" height="4" rx="2" fill="#d1d5db"/>
    <rect x="48" y="38" width="24" height="4" rx="2" fill="#e5e5e5"/>
    <rect x="48" y="46" width="28" height="4" rx="2" fill="#e5e5e5"/>
    <!-- Label -->
    <text x="104" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#151515">Minimal</text>
    <text x="104" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">Épuré &amp; léger</text>
  </g>
  
  <!-- Radio Card 2: Brutaliste -->
  <g transform="translate(256, 96)">
    <rect x="0" y="0" width="196" height="84" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Radio indicator -->
    <circle cx="20" cy="42" r="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <!-- Preview mini -->
    <rect x="44" y="24" width="48" height="36" rx="0" fill="#151515"/>
    <rect x="48" y="32" width="40" height="3" fill="#ffffff"/>
    <rect x="48" y="40" width="28" height="3" fill="#ffd548"/>
    <rect x="48" y="48" width="32" height="3" fill="#97ea90"/>
    <!-- Label -->
    <text x="104" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#151515">Brutaliste</text>
    <text x="104" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">Contrasté &amp; bold</text>
  </g>
  
  <!-- Radio Card 3: Moderne -->
  <g transform="translate(48, 192)">
    <rect x="0" y="0" width="196" height="84" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Radio indicator -->
    <circle cx="20" cy="42" r="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <!-- Preview mini -->
    <rect x="44" y="24" width="48" height="36" rx="6" fill="url(#modernGrad)"/>
    <rect x="50" y="34" width="20" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="74" y="34" width="14" height="6" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="74" y="44" width="14" height="6" rx="1" fill="#ffffff" opacity="0.4"/>
    <!-- Label -->
    <text x="104" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#151515">Moderne</text>
    <text x="104" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">Fluides &amp; vibrant</text>
  </g>
  
  <!-- Radio Card 4: Corporate -->
  <g transform="translate(256, 192)">
    <rect x="0" y="0" width="196" height="84" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
    <!-- Radio indicator -->
    <circle cx="20" cy="42" r="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <!-- Preview mini -->
    <rect x="44" y="24" width="48" height="36" rx="2" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="48" y="28" width="40" height="10" rx="1" fill="url(#corporateGrad)"/>
    <rect x="48" y="42" width="28" height="3" rx="1" fill="#6b7280"/>
    <rect x="48" y="48" width="36" height="3" rx="1" fill="#9ca3af"/>
    <rect x="48" y="54" width="20" height="3" rx="1" fill="#d1d5db"/>
    <!-- Label -->
    <text x="104" y="38" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#151515">Corporate</text>
    <text x="104" y="56" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">Structuré &amp; fiable</text>
  </g>
</svg>