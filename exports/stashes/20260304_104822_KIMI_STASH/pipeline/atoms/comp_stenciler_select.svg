<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter for cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Gradient for primary button -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd865"/>
    </linearGradient>
    
    <!-- Gradient for reserve button -->
    <linearGradient id="reserveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#f05e23"/>
    </linearGradient>
    
    <!-- Subtle gradient for component preview -->
    <linearGradient id="previewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  
  <!-- Main card background -->
  <rect x="20" y="20" width="560" height="280" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section title -->
  <text x="44" y="56" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="700" font-size="18" fill="#151515">Sélection Composant</text>
  
  <!-- Subtitle/label -->
  <text x="44" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.5">Choisissez l'action pour chaque élément</text>
  
  <!-- Component Card 1 -->
  <g transform="translate(44, 98)">
    <!-- Card background -->
    <rect x="0" y="0" width="248" height="82" rx="8" fill="url(#previewGrad)" stroke="#e5e5e5" stroke-width="1"/>
    
    <!-- Component preview icon area -->
    <rect x="16" y="16" width="50" height="50" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Icon: database cylinder -->
    <ellipse cx="41" cy="28" rx="10" ry="5" fill="none" stroke="#1258ca" stroke-width="2"/>
    <path d="M31 28v14c0 2.76 4.48 5 10 5s10-2.24 10-5v-14" fill="none" stroke="#1258ca" stroke-width="2"/>
    <path d="M31 35c0 2.76 4.48 5 10 5s10-2.24 10-5" fill="none" stroke="#1258ca" stroke-width="2"/>
    
    <!-- Component name -->
    <text x="78" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="13" fill="#151515">Base de données</text>
    <text x="78" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">PostgreSQL 15.2</text>
    
    <!-- Status badge -->
    <rect x="78" y="58" width="52" height="18" rx="4" fill="#f8f7f4"/>
    <text x="104" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Actif</text>
    
    <!-- Garder button -->
    <rect x="148" y="47" width="44" height="28" rx="6" fill="url(#primaryGrad)"/>
    <text x="170" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#151515" text-anchor="middle">Garder</text>
    
    <!-- Réserve button -->
    <rect x="196" y="47" width="44" height="28" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <text x="218" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#6b7280" text-anchor="middle">Réserve</text>
  </g>
  
  <!-- Component Card 2 -->
  <g transform="translate(308, 98)">
    <!-- Card background -->
    <rect x="0" y="0" width="248" height="82" rx="8" fill="url(#previewGrad)" stroke="#e5e5e5" stroke-width="1"/>
    
    <!-- Component preview icon area -->
    <rect x="16" y="16" width="50" height="50" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Icon: API server -->
    <rect x="26" y="30" width="30" height="22" rx="2" fill="none" stroke="#f05e23" stroke-width="2"/>
    <circle cx="33" cy="41" r="2" fill="#f05e23"/>
    <circle cx="41" cy="41" r="2" fill="#f05e23"/>
    <circle cx="49" cy="41" r="2" fill="#f05e23"/>
    <line x1="32" y1="26" x2="32" y2="30" stroke="#f05e23" stroke-width="2"/>
    <line x1="50" y1="26" x2="50" y2="30" stroke="#f05e23" stroke-width="2"/>
    
    <!-- Component name -->
    <text x="78" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="13" fill="#151515">API Gateway</text>
    <text x="78" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Node.js 18.16</text>
    
    <!-- Status badge -->
    <rect x="78" y="58" width="52" height="18" rx="4" fill="#f8f7f4"/>
    <text x="104" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Actif</text>
    
    <!-- Garder button -->
    <rect x="148" y="47" width="44" height="28" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <text x="170" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#6b7280" text-anchor="middle">Garder</text>
    
    <!-- Réserve button (selected) -->
    <rect x="196" y="47" width="44" height="28" rx="6" fill="url(#reserveGrad)"/>
    <text x="218" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#ffffff" text-anchor="middle">Réserve</text>
  </g>
  
  <!-- Component Card 3 -->
  <g transform="translate(44, 196)">
    <!-- Card background -->
    <rect x="0" y="0" width="248" height="82" rx="8" fill="url(#previewGrad)" stroke="#e5e5e5" stroke-width="1"/>
    
    <!-- Component preview icon area -->
    <rect x="16" y="16" width="50" height="50" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Icon: cache/memory -->
    <rect x="28" y="32" width="26" height="18" rx="2" fill="none" stroke="#97ea90" stroke-width="2"/>
    <line x1="32" y1="38" x2="50" y2="38" stroke="#97ea90" stroke-width="2"/>
    <line x1="32" y1="44" x2="44" y2="44" stroke="#97ea90" stroke-width="2"/>
    
    <!-- Component name -->
    <text x="78" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="13" fill="#151515">Cache Redis</text>
    <text x="78" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Redis 7.0.11</text>
    
    <!-- Status badge -->
    <rect x="78" y="58" width="52" height="18" rx="4" fill="#f8f7f4"/>
    <text x="104" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Inactif</text>
    
    <!-- Garder button (selected) -->
    <rect x="148" y="47" width="44" height="28" rx="6" fill="url(#primaryGrad)"/>
    <text x="170" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#151515" text-anchor="middle">Garder</text>
    
    <!-- Réserve button -->
    <rect x="196" y="47" width="44" height="28" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <text x="218" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#6b7280" text-anchor="middle">Réserve</text>
  </g>
  
  <!-- Component Card 4 -->
  <g transform="translate(308, 196)">
    <!-- Card background -->
    <rect x="0" y="0" width="248" height="82" rx="8" fill="url(#previewGrad)" stroke="#e5e5e5" stroke-width="1"/>
    
    <!-- Component preview icon area -->
    <rect x="16" y="16" width="50" height="50" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Icon: storage/files -->
    <rect x="28" y="30" width="26" height="20" rx="2" fill="none" stroke="#1258ca" stroke-width="2"/>
    <path d="M32 30v-4h18v4" fill="none" stroke="#1258ca" stroke-width="2"/>
    <line x1="34" y1="40" x2="48" y2="40" stroke="#1258ca" stroke-width="2"/>
    
    <!-- Component name -->
    <text x="78" y="34" font-family="Plus Jakarta Sans, Inter, sans-serif" font-weight="600" font-size="13" fill="#151515">Stockage S3</text>
    <text x="78" y="52" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">MinIO RELEASE.2023</text>
    
    <!-- Status badge -->
    <rect x="78" y="58" width="52" height="18" rx="4" fill="#f8f7f4"/>
    <text x="104" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Actif</text>
    
    <!-- Garder button -->
    <rect x="148" y="47" width="44" height="28" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <text x="170" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#6b7280" text-anchor="middle">Garder</text>
    
    <!-- Réserve button -->
    <rect x="196" y="47" width="44" height="28" rx="6" fill="#f8f7f4" stroke="#e5e5e5" stroke-width="1"/>
    <text x="218" y="65" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="10" fill="#6b7280" text-anchor="middle">Réserve</text>
  </g>
  
  <!-- Selection counter badge -->
  <rect x="490" y="40" width="70" height="24" rx="12" fill="#151515"/>
  <text x="525" y="56" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#ffffff" text-anchor="middle">2 / 4 sélect.</text>
</svg>