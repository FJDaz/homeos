<svg viewBox="0 0 780 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    
    <!-- Image Shadow -->
    <filter id="imageShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    
    <!-- Blue Gradient -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1a3d8f"/>
    </linearGradient>
    
    <!-- Confidence Gradient -->
    <linearGradient id="confidenceHigh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#5cb85c"/>
    </linearGradient>
    
    <linearGradient id="confidenceMedium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#f0ad4e"/>
    </linearGradient>
    
    <!-- Scan Line Gradient -->
    <linearGradient id="scanGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2458f3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2458f3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2458f3" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Pattern -->
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e5e5" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Main Card Background -->
  <rect x="20" y="20" width="740" height="540" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Header Section -->
  <text x="50" y="65" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="19" font-weight="700" fill="#151515">Rapport Analyse Vision</text>
  
  <!-- Status Badge -->
  <rect x="620" y="48" width="110" height="28" rx="6" fill="#e8f0fe"/>
  <circle cx="638" cy="62" r="4" fill="#2458f3"/>
  <text x="650" y="66" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2458f3">En cours</text>
  
  <!-- Subtitle -->
  <text x="50" y="92" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b7280">Analyse d'image avec détection de zones et score de confiance</text>
  
  <!-- Main Content Area -->
  <g transform="translate(50, 115)">
    <!-- Image Container -->
    <rect x="0" y="0" width="480" height="360" rx="8" fill="#f8f7f4" filter="url(#imageShadow)"/>
    
    <!-- Simulated Image Content -->
    <rect x="0" y="0" width="480" height="360" rx="8" fill="url(#gridPattern)"/>
    
    <!-- Sample Image Elements (Building/Architecture) -->
    <rect x="60" y="80" width="120" height="200" rx="4" fill="#d4d4d4"/>
    <rect x="200" y="60" width="100" height="240" rx="4" fill="#c0c0c0"/>
    <rect x="320" y="100" width="100" height="180" rx="4" fill="#d4d4d4"/>
    <rect x="0" y="300" width="480" height="60" rx="0 0 8 8" fill="#a0a0a0"/>
    
    <!-- Windows -->
    <rect x="75" y="100" width="20" height="30" rx="2" fill="#8a8a8a"/>
    <rect x="105" y="100" width="20" height="30" rx="2" fill="#8a8a8a"/>
    <rect x="145" y="100" width="20" height="30" rx="2" fill="#8a8a8a"/>
    <rect x="75" y="150" width="20" height="30" rx="2" fill="#8a8a8a"/>
    <rect x="105" y="150" width="20" height="30" rx="2" fill="#8a8a8a"/>
    <rect x="145" y="150" width="20" height="30" rx="2" fill="#8a8a8a"/>
    
    <!-- Detection Zones Overlay -->
    <!-- Zone 1: High Confidence -->
    <rect x="55" y="75" width="130" height="210" rx="6" fill="none" stroke="url(#confidenceHigh)" stroke-width="3" stroke-dasharray="8 4"/>
    <rect x="55" y="75" width="130" height="210" rx="6" fill="#97ea90" fill-opacity="0.08"/>
    
    <!-- Zone 2: Medium Confidence -->
    <rect x="195" y="55" width="110" height="250" rx="6" fill="none" stroke="url(#confidenceMedium)" stroke-width="3" stroke-dasharray="8 4"/>
    <rect x="195" y="55" width="110" height="250" rx="6" fill="#ffd548" fill-opacity="0.08"/>
    
    <!-- Zone 3: High Confidence -->
    <rect x="315" y="95" width="110" height="190" rx="6" fill="none" stroke="url(#confidenceHigh)" stroke-width="3" stroke-dasharray="8 4"/>
    <rect x="315" y="95" width="110" height="190" rx="6" fill="#97ea90" fill-opacity="0.08"/>
    
    <!-- Corner Markers Zone 1 -->
    <path d="M55 85 L55 75 L65 75" fill="none" stroke="#97ea90" stroke-width="2"/>
    <path d="M175 75 L185 75 L185 85" fill="none" stroke="#97ea90" stroke-width="2"/>
    <path d="M55 275 L55 285 L65 285" fill="none" stroke="#97ea90" stroke-width="2"/>
    <path d="M175 285 L185 285 L185 275" fill="none" stroke="#97ea90" stroke-width="2"/>
    
    <!-- Corner Markers Zone 2 -->
    <path d="M195 65 L195 55 L205 55" fill="none" stroke="#ffd548" stroke-width="2"/>
    <path d="M295 55 L305 55 L305 65" fill="none" stroke="#ffd548" stroke-width="2"/>
    <path d="M195 295 L195 305 L205 305" fill="none" stroke="#ffd548" stroke-width="2"/>
    <path d="M295 305 L305 305 L305 295" fill="none" stroke="#ffd548" stroke-width="2"/>
    
    <!-- Scan Line Animation Effect -->
    <rect x="0" y="180" width="480" height="2" fill="url(#scanGradient)"/>
    <rect x="0" y="175" width="480" height="12" fill="url(#scanGradient)" fill-opacity="0.3"/>
    
    <!-- Zone Labels -->
    <!-- Label 1 -->
    <g transform="translate(120, 60)">
      <rect x="-35" y="-22" width="70" height="22" rx="4" fill="#ffffff" stroke="#97ea90" stroke-width="1.5"/>
      <text x="0" y="-7" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#2d5a2d" text-anchor="middle">Bâtiment A</text>
      <circle cx="0" cy="0" r="3" fill="#97ea90"/>
    </g>
    
    <!-- Label 2 -->
    <g transform="translate(250, 45)">
      <rect x="-35" y="-22" width="70" height="22" rx="4" fill="#ffffff" stroke="#ffd548" stroke-width="1.5"/>
      <text x="0" y="-7" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8a6d3b" text-anchor="middle">Bâtiment B</text>
      <circle cx="0" cy="0" r="3" fill="#ffd548"/>
    </g>
    
    <!-- Label 3 -->
    <g transform="translate(370, 85)">
      <rect x="-35" y="-22" width="70" height="22" rx="4" fill="#ffffff" stroke="#97ea90" stroke-width="1.5"/>
      <text x="0" y="-7" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#2d5a2d" text-anchor="middle">Bâtiment C</text>
      <circle cx="0" cy="0" r="3" fill="#97ea90"/>
    </g>
    
    <!-- Confidence Scores on Image -->
    <g transform="translate(120, 270)">
      <rect x="-25" y="0" width="50" height="18" rx="4" fill="#97ea90"/>
      <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">94%</text>
    </g>
    
    <g transform="translate(250, 295)">
      <rect x="-25" y="0" width="50" height="18" rx="4" fill="#ffd548"/>
      <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#5a4a1a" text-anchor="middle">78%</text>
    </g>
    
    <g transform="translate(370, 275)">
      <rect x="-25" y="0" width="50" height="18" rx="4" fill="#97ea90"/>
      <text x="0" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">91%</text>
    </g>
  </g>
  
  <!-- Right Panel: Analysis Details -->
  <g transform="translate(550, 115)">
    <!-- Panel Header -->
    <text x="0" y="0" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="700" fill="#151515">Détails de l'analyse</text>
    
    <!-- Stats Cards -->
    <!-- Card 1 -->
    <rect x="0" y="20" width="190" height="70" rx="8" fill="#f8f7f4"/>
    <text x="15" y="45" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="1.5">ZONES DÉTECTÉES</text>
    <text x="15" y="72" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="28" font-weight="700" fill="#151515">3</text>
    <circle cx="165" cy="55" r="18" fill="#e8f0fe"/>
    <text x="165" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#2458f3" text-anchor="middle">100%</text>
    
    <!-- Card 2 -->
    <rect x="0" y="100" width="190" height="70" rx="8" fill="#f8f7f4"/>
    <text x="15" y="125" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="1.5">CONFIANCE MOYENNE</text>
    <text x="15" y="152" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="28" font-weight="700" fill="#151515">87.7%</text>
    <rect x="140" y="132" width="40" height="24" rx="4" fill="#97ea90"/>
    <text x="160" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">+2.3</text>
    
    <!-- Detection List -->
    <text x="0" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="1.5">RÉSULTATS</text>
    
    <!-- List Item 1 -->
    <rect x="0" y="220" width="190" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="12" y="235" width="20" height="20" rx="4" fill="#97ea90" fill-opacity="0.2"/>
    <text x="22" y="249" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2d5a2d" text-anchor="middle">A</text>
    <text x="42" y="238" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515">Bâtiment A</text>
    <text x="42" y="255" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">Structure principale</text>
    <text x="175" y="245" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2d5a2d" text-anchor="end">94%</text>
    
    <!-- List Item 2 -->
    <rect x="0" y="278" width="190" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="12" y="293" width="20" height="20" rx="4" fill="#ffd548" fill-opacity="0.2"/>
    <text x="22" y="307" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8a6d3b" text-anchor="middle">B</text>
    <text x="42" y="296" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515">Bâtiment B</text>
    <text x="42" y="313" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">Annexe gauche</text>
    <text x="175" y="303" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8a6d3b" text-anchor="end">78%</text>
    
    <!-- List Item 3 -->
    <rect x="0" y="336" width="190" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="12" y="351" width="20" height="20" rx="4" fill="#97ea90" fill-opacity="0.2"/>
    <text x="22" y="365" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2d5a2d" text-anchor="middle">C</text>
    <text x="42" y="354" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515">Bâtiment C</text>
    <text x="42" y="371" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">Annexe droite</text>
    <text x="175" y="361" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2d5a2d" text-anchor="end">91%</text>
  </g>
  
  <!-- Bottom Action Bar -->
  <g transform="translate(50, 495)">
    <rect x="0" y="0" width="480" height="45" rx="8" fill="#f8f7f4"/>
    
    <!-- Toggle Switch -->
    <rect x="15" y="12" width="44" height="22" rx="11" fill="#2458f3"/>
    <circle cx="37" cy="23" r="8" fill="#ffffff"/>
    <text x="70" y="27" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#151515">Afficher les zones</text>
    
    <!-- Secondary Toggle -->
    <rect x="200" y="12" width="44" height="22" rx="11" fill="#d1d5db"/>
    <circle cx="211" cy="23" r="8" fill="#ffffff"/>
    <text x="255" y="27" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#6b7280">Masquer labels</text>
    
    <!-- Zoom Controls -->
    <g transform="translate(380, 8)">
      <rect x="0" y="0" width="32" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="16" y="20" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#151515" text-anchor="middle">−</text>
      <rect x="38" y="0" width="50" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="63" y="20" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#151515" text-anchor="middle">100%</text>
      <rect x="94" y="0" width="32" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="110" y="20" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#151515" text-anchor="middle">+</text>
    </g>
  </g>
  
  <!-- Primary Action Button -->
  <g transform="translate(550, 495)">
    <rect x="0" y="0" width="190" height="45" rx="8" fill="url(#blueGradient)"/>
    <text x="95" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Exporter le rapport</text>
    <!-- Download Icon -->
    <path d="M75 20 L75 24 L71 24 L80 32 L89 24 L85 24 L85 20 Z" fill="#ffffff" fill-opacity="0.9"/>
  </g>
</svg>