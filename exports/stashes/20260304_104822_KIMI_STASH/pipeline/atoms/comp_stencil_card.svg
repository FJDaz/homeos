<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97ea90"/>
      <stop offset="100%" stop-color="#6dd965"/>
    </linearGradient>
    <linearGradient id="accentHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b4f0ae"/>
      <stop offset="100%" stop-color="#8ce885"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="32" y="32" width="336" height="336" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Card Header Zone -->
  <rect x="32" y="32" width="336" height="72" rx="12" fill="#ffffff"/>
  <rect x="32" y="80" width="336" height="24" rx="0" fill="#ffffff"/>
  
  <!-- Category Label -->
  <text x="56" y="64" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1258ca" letter-spacing="1.5">POUVOIR</text>
  
  <!-- Card Title -->
  <text x="56" y="96" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Carte Stencil</text>
  
  <!-- Decorative Accent Line -->
  <rect x="56" y="112" width="48" height="3" rx="1.5" fill="url(#accentGradient)"/>
  
  <!-- Description Body -->
  <text x="56" y="152" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#4a4a4a">Choisissez comment utiliser cette carte</text>
  <text x="56" y="174" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#4a4a4a">pouvoir dans votre main.</text>
  
  <!-- Card Visual / Icon Zone -->
  <rect x="56" y="200" width="288" height="80" rx="8" fill="#f8f7f4"/>
  
  <!-- Stencil Icon Representation -->
  <circle cx="100" cy="240" r="24" fill="url(#accentGradient)" opacity="0.15"/>
  <path d="M88 240 L96 248 L112 232" stroke="#97ea90" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Card Details -->
  <text x="140" y="232" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">Effet immédiat</text>
  <text x="140" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#6a6a6a">Active une capacité spéciale</text>
  
  <!-- Action Buttons Zone -->
  <rect x="56" y="304" width="288" height="48" rx="0" fill="none"/>
  
  <!-- Garder Button (Primary) -->
  <rect x="56" y="304" width="136" height="48" rx="6" fill="url(#accentGradient)"/>
  <text x="124" y="334" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515" text-anchor="middle">Garder</text>
  
  <!-- Réserve Button (Secondary) -->
  <rect x="208" y="304" width="136" height="48" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="276" y="334" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515" text-anchor="middle">Réserve</text>
  
  <!-- Selection Indicator (subtle dot for active state) -->
  <circle cx="72" y="328" r="4" fill="#151515"/>
</svg>