<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/>
    </filter>
    
    <!-- Primary button gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#d94d1a"/>
    </linearGradient>
    
    <!-- Secondary button hover state -->
    <linearGradient id="secondaryHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#edebe6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f7f4"/>
  
  <!-- Main Card -->
  <rect x="40" y="40" width="620" height="320" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Section Header -->
  <text x="72" y="88" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Paramètres du système</text>
  
  <!-- Metadata label -->
  <text x="72" y="116" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1.5" fill="#6b7280">MODIFICATIONS EN ATTENTE</text>
  
  <!-- Divider -->
  <line x1="72" y1="136" x2="628" y2="136" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Setting Row 1 -->
  <rect x="72" y="160" width="556" height="48" rx="8" fill="#f8f7f4"/>
  <text x="92" y="188" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#374151">Notifications par email</text>
  <text x="92" y="202" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Activé • Modifié</text>
  
  <!-- Toggle Switch (On) -->
  <rect x="572" y="172" width="44" height="24" rx="12" fill="#97ea90"/>
  <circle cx="600" cy="184" r="9" fill="#ffffff"/>
  
  <!-- Setting Row 2 -->
  <rect x="72" y="220" width="556" height="48" rx="8" fill="#f8f7f4"/>
  <text x="92" y="248" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#374151">Mode sombre automatique</text>
  <text x="92" y="262" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">Désactivé • Modifié</text>
  
  <!-- Toggle Switch (Off) -->
  <rect x="572" y="232" width="44" height="24" rx="12" fill="#d1d5db"/>
  <circle cx="588" cy="244" r="9" fill="#ffffff"/>
  
  <!-- Bottom Divider -->
  <line x1="72" y1="292" x2="628" y2="292" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Action Buttons Container -->
  
  <!-- Cancel Button (Annuler) -->
  <g>
    <rect x="396" y="312" width="112" height="40" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="452" y="338" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">↩️ Annuler</text>
  </g>
  
  <!-- Apply Button (Appliquer) -->
  <g>
    <rect x="516" y="312" width="112" height="40" rx="6" fill="url(#primaryGradient)"/>
    <text x="572" y="338" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">💾 Appliquer</text>
  </g>
  
  <!-- Unsaved Changes Indicator -->
  <circle cx="628" cy="88" r="6" fill="#f05e23"/>
  <circle cx="628" cy="88" r="3" fill="#ffffff"/>
  
</svg>