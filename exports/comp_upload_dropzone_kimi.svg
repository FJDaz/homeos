<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#ffb938"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="360" height="180" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Section header -->
  <text x="40" y="50" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Zone Upload</text>

  <!-- Drop zone -->
  <rect id="dropZone" x="40" y="70" width="320" height="110" rx="8" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <rect id="dropZoneHover" x="40" y="70" width="320" height="110" rx="8" fill="url(#goldGrad)" fill-opacity="0.08" stroke="#ffd548" stroke-width="2" opacity="0"/>

  <!-- Folder icon -->
  <g transform="translate(190 100)">
    <path d="M0 0h20l4 6h36v26H0Z" fill="#ffd548" opacity="0.9"/>
    <path d="M0 0h16l4 6h40v26H0Z" fill="#ffd548"/>
  </g>

  <!-- Label -->
  <text x="200" y="155" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515" text-anchor="middle">Drop file here or click to browse</text>

  <!-- Button -->
  <g id="btn">
    <rect x="150" y="170" width="100" height="36" rx="9999" fill="#ffd548"/>
    <text x="200" y="192" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515" text-anchor="middle">Select File</text>
  </g>

  <!-- Hover states -->
  <style>
    #dropZoneHover { transition: opacity .2s; }
    #dropZone:hover + #dropZoneHover { opacity:1; }
    #btn rect { transition: fill .2s; }
    #btn:hover rect { fill:#ffb938; }
  </style>
</svg>