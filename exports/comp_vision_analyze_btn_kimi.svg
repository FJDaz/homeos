<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7a3c"/>
    </linearGradient>
    <linearGradient id="btnGradHover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9521f"/>
      <stop offset="100%" stop-color="#e56a35"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="20" y="30" width="400" height="180" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="40" y="65" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Analyse de contenu</text>

  <!-- Subtitle -->
  <text x="40" y="90" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Analysez instantanément avec l’IA Gemini</text>

  <!-- Button -->
  <g id="launchBtn">
    <rect x="40" y="110" width="200" height="48" rx="9999" fill="url(#btnGrad)"/>
    <text x="72" y="139" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff">Lancer l’analyse Gemini</text>
    <text x="48" y="137" font-size="20">🚀</text>
  </g>

  <!-- Hover state (implied) -->
  <g id="launchBtnHover" opacity="0">
    <rect x="40" y="110" width="200" height="48" rx="9999" fill="url(#btnGradHover)"/>
    <text x="72" y="139" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff">Lancer l’analyse Gemini</text>
    <text x="48" y="137" font-size="20">🚀</text>
  </g>

  <!-- Metadata label -->
  <text x="40" y="180" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af" letter-spacing="0.05em">STATUS: PRÊT</text>
</svg>