<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7a3c"/>
    </linearGradient>
  </defs>

  <!-- Sidebar card -->
  <rect x="20" y="20" width="400" height="200" rx="12" fill="#f8f7f4" filter="url(#sd)"/>

  <!-- Header -->
  <text x="40" y="56" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#151515">Appliquer Changements</text>

  <!-- Save button -->
  <g>
    <rect x="40" y="80" width="160" height="48" rx="9999" fill="url(#g)"/>
    <text x="72" y="108" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">💾 Appliquer</text>
  </g>

  <!-- Cancel button -->
  <g>
    <rect x="220" y="80" width="160" height="48" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="256" y="108" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#151515">↩️ Annuler</text>
  </g>

  <!-- Status row -->
  <text x="40" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">3 modifications en attente</text>

  <!-- Divider -->
  <line x1="40" y1="176" x2="400" y2="176" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Last saved -->
  <text x="40" y="200" font-family="Roboto Mono, monospace" font-size="11" letter-spacing="0.05em" fill="#9ca3af">DERNIÈRE SAUVEGARDE : 14:32</text>
</svg>