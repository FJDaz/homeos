<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-8" y="-8" width="416" height="276" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0f4ab0"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="16" y="16" width="368" height="228" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Header -->
  <text x="32" y="48" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Liste Distillation</text>

  <!-- List headers -->
  <text x="32" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.05em">ENTRÉE</text>
  <text x="200" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.05em">TIMESTAMP</text>
  <text x="312" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.05em">VERDICT</text>

  <!-- Row 1 (hover) -->
  <rect x="32" y="92" width="336" height="40" rx="8" fill="#f8f7f4"/>
  <text x="48" y="114" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">ethanol_99_2025</text>
  <text x="200" y="114" font-family="Roboto Mono, monospace" font-size="13" fill="#6b7280">14:32:08</text>
  <rect x="312" y="102" width="44" height="20" rx="10" fill="#97ea90"/>
  <text x="334" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">PASS</text>

  <!-- Row 2 -->
  <text x="48" y="158" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">methanol_crude</text>
  <text x="200" y="158" font-family="Roboto Mono, monospace" font-size="13" fill="#6b7280">14:28:55</text>
  <rect x="312" y="148" width="44" height="20" rx="10" fill="#ffd548"/>
  <text x="334" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515" text-anchor="middle">WARN</text>

  <!-- Row 3 -->
  <text x="48" y="202" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">acetone_batch_12</text>
  <text x="200" y="202" font-family="Roboto Mono, monospace" font-size="13" fill="#6b7280">14:25:11</text>
  <rect x="312" y="192" width="44" height="20" rx="10" fill="#f05e23"/>
  <text x="334" y="206" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">FAIL</text>

  <!-- Action button -->
  <rect x="288" y="44" width="80" height="32" rx="9999" fill="url(#btnGrad)"/>
  <text x="328" y="64" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Exporter</text>
</svg>