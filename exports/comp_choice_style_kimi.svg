<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font-family:"Plus Jakarta Sans", Inter, sans-serif; font-weight:700; font-size:20px; fill:#151515; }
      .card { fill:#ffffff; stroke:#e5e7eb; stroke-width:1; filter:url(#cardShadow); cursor:pointer; }
      .card:hover { stroke:#df1f29; }
      .label { font-family:Inter, system-ui, sans-serif; font-size:14px; fill:#151515; }
      .radio { fill:#ffffff; stroke:#e5e7eb; stroke-width:1; }
      input:checked + .card .radio { stroke:#df1f29; fill:#df1f29; }
      input:checked + .card .radio-dot { fill:#ffffff; }
      input:checked + .card { stroke:#df1f29; }
    </style>
  </defs>

  <text x="20" y="30" class="title">Choix Style</text>

  <g id="minimal">
    <input type="radio" name="style" value="minimal" style="display:none;"/>
    <rect class="card" x="20" y="50" width="190" height="80" rx="12"/>
    <circle class="radio" cx="40" cy="80" r="10"/>
    <circle class="radio-dot" cx="40" cy="80" r="4" fill="none"/>
    <text x="60" y="85" class="label">Minimal</text>
    <rect x="60" y="95" width="130" height="2" fill="#e5e7eb"/>
    <rect x="60" y="105" width="90" height="2" fill="#e5e7eb"/>
  </g>

  <g id="brutal">
    <input type="radio" name="style" value="brutal" style="display:none;"/>
    <rect class="card" x="230" y="50" width="190" height="80" rx="12"/>
    <circle class="radio" cx="250" cy="80" r="10"/>
    <circle class="radio-dot" cx="250" cy="80" r="4" fill="none"/>
    <text x="270" y="85" class="label">Brutaliste</text>
    <rect x="270" y="95" width="130" height="20" fill="#151515"/>
  </g>

  <g id="modern">
    <input type="radio" name="style" value="modern" style="display:none;"/>
    <rect class="card" x="20" y="150" width="190" height="80" rx="12"/>
    <circle class="radio" cx="40" cy="180" r="10"/>
    <circle class="radio-dot" cx="40" cy="180" r="4" fill="none"/>
    <text x="60" y="185" class="label">Moderne</text>
    <rect x="60" y="195" width="130" height="2" fill="#df1f29"/>
    <rect x="60" y="205" width="90" height="2" fill="#df1f29"/>
  </g>

  <g id="corporate">
    <input type="radio" name="style" value="corporate" style="display:none;"/>
    <rect class="card" x="230" y="150" width="190" height="80" rx="12"/>
    <circle class="radio" cx="250" cy="180" r="10"/>
    <circle class="radio-dot" cx="250" cy="180" r="4" fill="none"/>
    <text x="270" y="185" class="label">Corporate</text>
    <rect x="270" y="195" width="130" height="2" fill="#1258ca"/>
    <rect x="270" y="205" width="90" height="2" fill="#1258ca"/>
  </g>
</svg>