<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1258ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".08"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- KPI row -->
  <g id="kpiRow">
    <rect x="40" y="40" width="210" height="100" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="64" y="80" font-size="28" font-weight="700" fill="#263654">1,247</text>
    <text x="64" y="100" font-size="11" fill="#6b7280">Intent Captured</text>

    <rect x="270" y="40" width="210" height="100" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="294" y="80" font-size="28" font-weight="700" fill="#263654">92.4%</text>
    <text x="294" y="100" font-size="11" fill="#6b7280">Refactor Accuracy</text>

    <rect x="500" y="40" width="210" height="100" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="524" y="80" font-size="28" font-weight="700" fill="#263654">342</text>
    <text x="524" y="100" font-size="11" fill="#6b7280">Pending Review</text>

    <rect x="730" y="40" width="210" height="100" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="754" y="80" font-size="28" font-weight="700" fill="#263654">18ms</text>
    <text x="754" y="100" font-size="11" fill="#6b7280">Avg Response</text>
  </g>

  <!-- Main layout -->
  <g id="mainLayout">
    <!-- Chart area -->
    <rect x="40" y="170" width="620" height="390" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="64" y="210" font-size="18" font-weight="600" fill="#263654">Intent Flow (7 days)</text>
    <polyline points="64,400 140,360 216,380 292,320 368,340 444,300 520,310 596,290" fill="none" stroke="url(#gradBlue)" stroke-width="3"/>
    <circle cx="64" cy="400" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="140" cy="360" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="216" cy="380" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="292" cy="320" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="368" cy="340" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="444" cy="300" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="520" cy="310" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="596" cy="290" r="5" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <g font-size="12" fill="#9ca3af">
      <text x="64" y="440">Mon</text>
      <text x="180" y="440">Tue</text>
      <text x="296" y="440">Wed</text>
      <text x="412" y="440">Thu</text>
      <text x="528" y="440">Fri</text>
    </g>

    <!-- Activity feed -->
    <rect x="690" y="170" width="250" height="390" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="714" y="210" font-size="18" font-weight="600" fill="#263654">Activity Feed</text>
    <g font-size="13" fill="#4b5563">
      <text x="714" y="240">Liver flagged – high variance</text>
      <text x="714" y="260" font-size="11" fill="#9ca3af">2 min ago</text>
      <line x1="714" y1="280" x2="916" y2="280" stroke="#e5e7eb"/>
      <text x="714" y="310">Kidney auto-approved</text>
      <text x="714" y="330" font-size="11" fill="#9ca3af">14 min ago</text>
      <line x1="714" y1="350" x2="916" y2="350" stroke="#e5e7eb"/>
      <text x="714" y="380">Lung sent to revision</text>
      <text x="714" y="400" font-size="11" fill="#9ca3af">26 min ago</text>
      <line x1="714" y1="420" x2="916" y2="420" stroke="#e5e7eb"/>
      <text x="714" y="450">Heart model updated</text>
      <text x="714" y="470" font-size="11" fill="#9ca3af">1 hr ago</text>
    </g>
  </g>

  <!-- Sidebar table -->
  <g id="sidebarTable" transform="translate(40,590)">
    <rect width="300" height="160" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="24" y="30" font-size="16" font-weight="600" fill="#263654">Vue Rapport IR</text>
    <rect x="24" y="44" width="252" height="32" fill="#f3f4f6" rx="8"/>
    <text x="36" y="64" font-size="13" fill="#4b5563">Liver</text>
    <circle cx="260" cy="60" r="8" fill="#10b981"/>
    <text x="270" y="65" font-size="11" fill="#059669">Accept</text>
    <rect x="24" y="84" width="252" height="32" fill="#f3f4f6" rx="8"/>
    <text x="36" y="104" font-size="13" fill="#4b5563">Kidney</text>
    <circle cx="260" cy="100" r="8" fill="#f59e0b"/>
    <text x="270" y="105" font-size="11" fill="#d97706">Revise</text>
    <rect x="24" y="124" width="252" height="32" fill="#f3f4f6" rx="8"/>
    <text x="36" y="144" font-size="13" fill="#4b5563">Lung</text>
    <circle cx="260" cy="140" r="8" fill="#ef4444"/>
    <text x="270" y="145" font-size="11" fill="#dc2626">Reject</text>
  </g>

  <!-- Detail card -->
  <g id="detailCard" transform="translate(380,590)">
    <rect width="360" height="160" fill="#ffffff" rx="12" filter="url(#shadow)"/>
    <text x="24" y="30" font-size="16" font-weight="600" fill="#263654">Détail Organe</text>
    <text x="24" y="54" font-size="13" fill="#4b5563">Endpoint:</text>
    <text x="90" y="54" font-size="13" fill="#1258ca">/api/v1/liver/validate</text>
    <text x="24" y="76" font-size="13" fill="#4b5563">Model:</text>
    <text x="70" y="76" font-size="13" fill="#4b5563">IR-Liver-v3.2</text>
    <rect x="24" y="92" width="88" height="32" fill="url(#gradBlue)" rx="9999"/>
    <text x="68" y="112" font-size="12" fill="#ffffff" text-anchor="middle">Copy</text>
    <rect x="124" y="92" width="88" height="32" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="9999"/>
    <text x="168" y="112" font-size="12" fill="#4b5563" text-anchor="middle">Test</text>
  </g>
</svg>