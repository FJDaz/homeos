<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="launchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".15"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="1000" height="60" fill="#f3f4f6"/>
  <g id="comp_zoom_controls" transform="translate(20,15)">
    <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#btnGrad)" filter="url(#shadow)"/>
    <text x="15" y="20" text-anchor="middle" fill="#fff" font-size="14" font-family="Arial">−</text>
    <rect x="40" y="0" width="110" height="30" rx="6" fill="#fff" stroke="#d1d5db"/>
    <text x="95" y="20" text-anchor="middle" fill="#111" font-size="13" font-family="Arial">🔍 Corps ▼</text>
    <rect x="160" y="0" width="30" height="30" rx="6" fill="url(#btnGrad)" filter="url(#shadow)"/>
    <text x="175" y="20" text-anchor="middle" fill="#fff" font-size="14" font-family="Arial">+</text>
  </g>
  <g id="comp_zoom_out" transform="translate(600,15)">
    <rect x="0" y="0" width="90" height="30" rx="6" fill="#fff" stroke="#d1d5db"/>
    <text x="45" y="20" text-anchor="middle" fill="#111" font-size="13" font-family="Arial">Remonter</text>
  </g>

  <!-- Main -->
  <g id="comp_detail_card" transform="translate(20,80)">
    <rect x="0" y="0" width="460" height="220" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="15" y="15" width="430" height="100" rx="4" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="30" y="40" fill="#4b5563" font-size="13" font-family="Arial">Endpoint</text>
    <text x="30" y="60" fill="#111" font-size="14" font-family="Arial">/studio/zoom/atome/42</text>
    <text x="30" y="85" fill="#4b5563" font-size="13" font-family="Arial">Méthode</text>
    <text x="30" y="105" fill="#10b981" font-size="14" font-family="Arial">GET</text>
    <rect x="30" y="130" width="70" height="28" rx="6" fill="#e0e7ff"/>
    <text x="65" y="148" text-anchor="middle" fill="#4338ca" font-size="12" font-family="Arial">Copier</text>
    <rect x="110" y="130" width="70" height="28" rx="6" fill="#e0e7ff"/>
    <text x="145" y="148" text-anchor="middle" fill="#4338ca" font-size="12" font-family="Arial">Tester</text>
  </g>

  <g id="comp_code_editor" transform="translate(500,80)">
    <rect x="0" y="0" width="480" height="220" rx="8" fill="#1e293b" filter="url(#shadow)"/>
    <rect x="0" y="0" width="480" height="36" rx="8" fill="#111827"/>
    <circle cx="14" cy="18" r="5" fill="#ef4444"/>
    <circle cx="30" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="46" cy="18" r="5" fill="#10b981"/>
    <text x="60" y="22" fill="#9ca3af" font-size="12" font-family="monospace">ir-genome-view.js</text>
    <text x="15" y="65" fill="#34d399" font-size="13" font-family="monospace">function distill(atom) {</text>
    <text x="25" y="85" fill="#e5e7eb" font-size="13" font-family="monospace">return atom.refine();</text>
    <text x="15" y="105" fill="#34d399" font-size="13" font-family="monospace">}</text>
  </g>

  <!-- Sidebar -->
  <g id="comp_apply_changes" transform="translate(20,320)">
    <rect x="0" y="0" width="220" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
    <text x="40" y="25" fill="#111" font-size="13" font-family="Arial">💾 Appliquer</text>
    <rect x="230" y="0" width="90" height="40" rx="6" fill="#fff" stroke="#d1d5db"/>
    <text x="275" y="25" fill="#111" font-size="13" font-family="Arial">↩️ Annuler</text>
  </g>

  <!-- Floating -->
  <g id="comp_launch_button" transform="translate(850,480)">
    <circle cx="40" cy="40" r="40" fill="url(#launchGrad)" filter="url(#shadow)"/>
    <path d="M30 35l10 10-10 10 5 5 15-15-15-15z" fill="#fff"/>
    <text x="40" y="95" text-anchor="middle" fill="#92400e" font-size="12" font-family="Arial">Lancer</text>
  </g>
</svg>