<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd548"/>
      <stop offset="100%" stop-color="#f05e23"/>
    </linearGradient>
  </defs>

  <!-- Sidebar background -->
  <rect width="400" height="320" fill="#1a1a2e" rx="0"/>

  <!-- Header -->
  <text x="24" y="36" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Validation Arbitrage</text>

  <!-- Form card -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="56" width="352" height="240" fill="#ffffff" rx="12"/>
  </g>

  <!-- Row 1: Status -->
  <g>
    <circle cx="48" cy="96" r="10" fill="#97ea90"/>
    <text x="68" y="100" font-family="Inter, sans-serif" font-size="13" fill="#151515">Status: Ready for review</text>
  </g>

  <!-- Row 2: Spread -->
  <g>
    <rect x="48" y="120" width="16" height="16" rx="4" fill="#f05e23"/>
    <text x="72" y="131" font-family="Inter, sans-serif" font-size="13" fill="#151515">Spread: 2.34 %</text>
  </g>

  <!-- Row 3: Volume -->
  <g>
    <rect x="48" y="152" width="16" height="16" rx="4" fill="#1258ca"/>
    <text x="72" y="163" font-family="Inter, sans-serif" font-size="13" fill="#151515">Volume: 1.2 M</text>
  </g>

  <!-- Row 4: Decision -->
  <g>
    <text x="48" y="195" font-family="Inter, sans-serif" font-size="12" fill="#151515" letter-spacing="0.05em">DECISION</text>
    <rect x="48" y="204" width="80" height="32" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="88" y="224" font-family="Inter, sans-serif" font-size="13" fill="#151515" text-anchor="middle">Accept</text>
    <rect x="136" y="204" width="80" height="32" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="176" y="224" font-family="Inter, sans-serif" font-size="13" fill="#151515" text-anchor="middle">Reject</text>
  </g>

  <!-- Submit button -->
  <rect x="48" y="256" width="120" height="40" rx="9999" fill="url(#btnGrad)"/>
  <text x="108" y="280" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Submit</text>
</svg>