<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-8" y="-8" width="416" height="96">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7c3e"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="8" y="8" width="384" height="64" rx="12" ry="12" fill="#f8f7f4" filter="url(#cardShadow)"/>

  <!-- Title -->
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#151515">Status Session</text>

  <!-- LED indicators -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#151515">
    <!-- current_step -->
    <circle cx="24" cy="52" r="6" fill="#97ea90"/>
    <text x="36" y="56">current_step</text>

    <!-- genome -->
    <circle cx="118" cy="52" r="6" fill="#97ea90"/>
    <text x="130" y="56">genome</text>

    <!-- entries -->
    <circle cx="198" cy="52" r="6" fill="#97ea90"/>
    <text x="210" y="56">entries</text>

    <!-- inactive -->
    <circle cx="278" cy="52" r="6" fill="#d1d5db"/>
    <text x="290" y="56">inactive</text>
  </g>

  <!-- Refresh button -->
  <g>
    <rect x="336" y="38" width="48" height="28" rx="9999" ry="9999" fill="url(#accentGrad)"/>
    <path d="M354 48l4-4 4 4m-4-4v6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="360" y="56" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#fff">Refresh</text>
  </g>
</svg>