<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#df1f29"/>
      <stop offset="100%" stop-color="#b71a24"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="12" y="12" width="336" height="176" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Title -->
  <text x="24" y="40" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="18" font-weight="700" fill="#151515">Carte Pouvoir</text>

  <!-- Description -->
  <text x="24" y="64" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4b5563">Doublez votre prochaine action.</text>

  <!-- Divider -->
  <line x1="24" y1="84" x2="336" y2="84" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Garder button (default) -->
  <g id="keep">
    <rect x="24" y="100" width="144" height="40" rx="9999" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="96" y="124" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#151515" text-anchor="middle">Garder</text>
  </g>

  <!-- Réserve button (active) -->
  <g id="reserve">
    <rect x="192" y="100" width="144" height="40" rx="9999" fill="url(#btnGrad)"/>
    <text x="264" y="124" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Réserve</text>
  </g>

  <!-- Metadata row -->
  <text x="24" y="164" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af" textLength="80">TYPE: ACTION</text>
  <text x="120" y="164" font-family="Roboto Mono, monospace" font-size="11" fill="#9ca3af" textLength="60">COST: 0</text>
</svg>