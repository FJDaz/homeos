<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2458f3"/>
      <stop offset="100%" stop-color="#1258ca"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2458f3" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- KPI Row -->
  <g id="kpiRow">
    <rect x="40" y="40" width="210" height="100" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="64" y="82" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#263654">€12.4K</text>
    <text x="64" y="102" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Profit Today</text>

    <rect x="270" y="40" width="210" height="100" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="294" y="82" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#263654">+3.8%</text>
    <text x="294" y="102" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Avg Spread</text>

    <rect x="500" y="40" width="210" height="100" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="524" y="82" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#263654">847</text>
    <text x="524" y="102" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Pairs Monitored</text>

    <rect x="730" y="40" width="210" height="100" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="754" y="82" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#263654">96.2%</text>
    <text x="754" y="102" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Uptime</text>
  </g>

  <!-- Main Chart Area -->
  <g id="mainChart">
    <rect x="40" y="170" width="620" height="390" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="64" y="210" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#263654">Arbitrage Spread Trends</text>
    <polyline points="64 280 144 250 224 260 304 230 384 240 464 220 544 235 624 225" fill="none" stroke="url(#gradBlue)" stroke-width="3"/>
    <circle cx="64" cy="280" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="144" cy="250" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="224" cy="260" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="304" cy="230" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="384" cy="240" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="464" cy="220" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="544" cy="235" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <circle cx="624" cy="225" r="4" fill="#ffffff" stroke="#2458f3" stroke-width="2"/>
    <rect x="64" y="320" width="560" height="48" rx="8" fill="#f9fafb"/>
    <text x="80" y="344" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Tableau Expert — Live validation feed</text>
    <text x="80" y="360" font-family="Inter, sans-serif" font-size="10" fill="#9ca3af">Click any row to inspect pair details</text>
  </g>

  <!-- Sidebar -->
  <g id="sidebar">
    <rect x="680" y="170" width="260" height="390" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>
    <text x="704" y="210" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#263654">Validation Arbitrage</text>

    <!-- Stencil Card -->
    <rect x="696" y="234" width="228" height="120" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="712" y="258" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#263654">EUR/USD – GBP/USD</text>
    <text x="712" y="276" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">Spread: 0.38% • Window: 4m 12s</text>
    <rect x="712" y="290" width="90" height="32" rx="16" fill="url(#gradBlue)" filter="url(#btnShadow)"/>
    <text x="757" y="310" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Garder</text>
    <rect x="814" y="290" width="90" height="32" rx="16" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="859" y="310" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">Réserve</text>

    <!-- Activity Feed -->
    <text x="704" y="384" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#263654">Activity Feed</text>
    <rect x="696" y="398" width="228" height="36" rx="8" fill="#f9fafb"/>
    <text x="712" y="418" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">14:32 — GBP/JPY validated (+0.42%)</text>
    <rect x="696" y="442" width="228" height="36" rx="8" fill="#ffffff"/>
    <text x="712" y="462" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">14:28 — EUR/CHF rejected (timeout)</text>
    <rect x="696" y="486" width="228" height="36" rx="8" fill="#ffffff"/>
    <text x="712" y="506" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">14:25 — USD/CAD under review</text>
  </g>
</svg>