<svg viewBox="0 0 560 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#df1f29"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <style>
      .txt{font-family:"Inter",system-ui,sans-serif;font-size:12px;fill:#1a1a2e}
      .lbl{font-family:"Inter",system-ui,sans-serif;font-size:10px;fill:#6b7280;letter-spacing:0.05em}
      .pill{fill:#ffffff;stroke:#e5e7eb;stroke-width:1}
      .pill.active{fill:url(#btnGrad);stroke:none}
      .pill.active .txt{fill:#ffffff;font-weight:600}
      .verdict{font-family:"Plus Jakarta Sans",Inter,sans-serif;font-size:11px;font-weight:700}
      .accept{fill:#97ea90}
      .revise{fill:#ffd548}
      .reject{fill:#df1f29}
    </style>
  </defs>

  <!-- Sidebar card -->
  <rect x="0" y="0" width="560" height="340" rx="12" fill="#f8f7f4" filter="url(#sd)"/>

  <!-- Header -->
  <text x="24" y="32" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Vue Rapport IR</text>
  <text x="24" y="50" class="lbl">12 organes détectés</text>

  <!-- Table headers -->
  <text x="24" y="80" class="lbl">ORGANE</text>
  <text x="320" y="80" class="lbl">VERDICT</text>

  <!-- Row 1 – active -->
  <g class="pill active" transform="translate(12 92)">
    <rect x="0" y="0" width="536" height="40" rx="9999"/>
    <circle cx="16" cy="20" r="10" fill="#ffffff" opacity="0.3"/>
    <path d="M12 16l3 3 5-5" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="15" class="txt">Foie</text>
    <text x="40" y="27" class="lbl">Volume: 1482 cm³</text>
    <rect x="300" y="10" width="60" height="20" rx="9999" fill="#ffffff" opacity="0.2"/>
    <text x="330" y="23" text-anchor="middle" class="verdict accept">ACCEPT</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(12 140)">
    <rect class="pill" width="536" height="40" rx="9999"/>
    <circle cx="16" cy="20" r="10" fill="#f05e23" opacity="0.15"/>
    <path d="M14 16h4v8h-4z" fill="#f05e23"/>
    <text x="40" y="15" class="txt">Rein gauche</text>
    <text x="40" y="27" class="lbl">Volume: 142 cm³</text>
    <rect x="300" y="10" width="60" height="20" rx="9999" fill="#ffd548" opacity="0.15"/>
    <text x="330" y="23" text-anchor="middle" class="verdict revise">REVISE</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(12 188)">
    <rect class="pill" width="536" height="40" rx="9999"/>
    <circle cx="16" cy="20" r="10" fill="#1258ca" opacity="0.15"/>
    <path d="M12 16l6 4-6 4" fill="#1258ca"/>
    <text x="40" y="15" class="txt">Poumon droit</text>
    <text x="40" y="27" class="lbl">Volume: 1980 cm³</text>
    <rect x="300" y="10" width="60" height="20" rx="9999" fill="#df1f29" opacity="0.15"/>
    <text x="330" y="23" text-anchor="middle" class="verdict reject">REJECT</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(12 236)">
    <rect class="pill" width="536" height="40" rx="9999"/>
    <circle cx="16" cy="20" r="10" fill="#97ea90" opacity="0.15"/>
    <circle cx="16" cy="20" r="5" fill="#97ea90"/>
    <text x="40" y="15" class="txt">Rate</text>
    <text x="40" y="27" class="lbl">Volume: 198 cm³</text>
    <rect x="300" y="10" width="60" height="20" rx="9999" fill="#ffffff" opacity="0.3"/>
    <text x="330" y="23" text-anchor="middle" class="verdict accept">ACCEPT</text>
  </g>

  <!-- Footer button -->
  <g transform="translate(12 292)">
    <rect width="536" height="40" rx="9999" fill="url(#btnGrad)"/>
    <text x="268" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Afficher les détails complets</text>
  </g>
</svg>