<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1258ca"/>
      <stop offset="100%" stop-color="#0d48a7"/>
    </linearGradient>
  </defs>

  <!-- Main card -->
  <rect x="20" y="20" width="400" height="200" rx="12" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Section header -->
  <text x="40" y="50" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Bulles Conversation</text>

  <!-- Sender bubble (S indigo) -->
  <g>
    <rect x="40" y="70" width="120" height="36" rx="18" fill="#1258ca"/>
    <text x="58" y="93" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ffffff">Salut !</text>
  </g>

  <!-- User bubble -->
  <g>
    <rect x="280" y="120" width="120" height="36" rx="18" fill="#f8f7f4"/>
    <text x="298" y="143" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#151515">Hello !</text>
  </g>

  <!-- Timestamp labels -->
  <text x="40" y="125" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af" letter-spacing="0.05em">10:42</text>
  <text x="280" y="175" font-family="Roboto Mono, monospace" font-size="10" fill="#9ca3af" letter-spacing="0.05em">10:43</text>

  <!-- Input bar -->
  <rect x="40" y="190" width="280" height="36" rx="18" fill="#f8f7f4" stroke="#e5e7eb" stroke-width="1"/>
  <text x="58" y="212" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Écrire un message…</text>

  <!-- Send button (hover implied by gradient) -->
  <rect x="340" y="190" width="80" height="36" rx="18" fill="url(#btnGrad)"/>
  <text x="370" y="212" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ffffff">Envoyer</text>
</svg>