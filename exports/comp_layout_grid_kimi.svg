<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f05e23"/>
      <stop offset="100%" stop-color="#ff7c3a"/>
    </linearGradient>
  </defs>

  <!-- Section header -->
  <text x="20" y="30" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="700" fill="#151515">Galerie Layouts</text>

  <!-- Grid 3×2 -->
  <g id="grid">
    <!-- Card 1 -->
    <g class="card" transform="translate(20,50)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <rect x="14" y="14" width="40" height="52" rx="3" fill="#e5e7eb"/>
      <rect x="58" y="14" width="58" height="24" rx="3" fill="#e5e7eb"/>
      <rect x="58" y="42" width="58" height="24" rx="3" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Classic</text>
    </g>

    <!-- Card 2 -->
    <g class="card" transform="translate(155,50)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <rect x="14" y="14" width="102" height="24" rx="3" fill="#e5e7eb"/>
      <rect x="14" y="42" width="102" height="24" rx="3" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Minimal</text>
    </g>

    <!-- Card 3 -->
    <g class="card" transform="translate(290,50)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <circle cx="65" cy="40" r="20" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Hero</text>
    </g>

    <!-- Card 4 -->
    <g class="card" transform="translate(20,140)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <rect x="14" y="14" width="32" height="52" rx="3" fill="#e5e7eb"/>
      <rect x="50" y="14" width="32" height="52" rx="3" fill="#e5e7eb"/>
      <rect x="86" y="14" width="32" height="52" rx="3" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Columns</text>
    </g>

    <!-- Card 5 -->
    <g class="card" transform="translate(155,140)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <rect x="14" y="14" width="102" height="18" rx="3" fill="#e5e7eb"/>
      <rect x="14" y="36" width="102" height="18" rx="3" fill="#e5e7eb"/>
      <rect x="14" y="58" width="102" height="12" rx="3" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Blog</text>
    </g>

    <!-- Card 6 -->
    <g class="card" transform="translate(290,140)">
      <rect width="130" height="80" rx="8" fill="#ffffff" filter="url(#cardShadow)"/>
      <rect x="10" y="10" width="110" height="60" rx="4" fill="#f8f7f4"/>
      <rect x="14" y="14" width="102" height="52" rx="3" fill="#e5e7eb"/>
      <text x="10" y="96" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#151515">Fullscreen</text>
    </g>
  </g>

  <!-- Selection indicator -->
  <rect x="20" y="50" width="130" height="80" rx="8" fill="none" stroke="#f05e23" stroke-width="2"/>
  <text x="20" y="135" font-family="Roboto Mono, monospace" font-size="10" fill="#f05e23">SELECTED</text>

  <!-- Action button -->
  <rect x="320" y="14" width="100" height="28" rx="9999" fill="url(#btnGrad)"/>
  <text x="370" y="32" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Appliquer</text>
</svg>