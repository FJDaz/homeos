<svg viewBox="0 0 440 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <style>
      .txt{font-family:"Inter",system-ui,sans-serif;font-size:13px;fill:#0d0e13}
      .link{font-family:"Inter",system-ui,sans-serif;font-size:13px;fill:#1258ca;cursor:pointer}
      .link:hover{text-decoration:underline}
      .sep{font-family:"Inter",system-ui,sans-serif;font-size:13px;fill:#9ca3af}
      .caps{font-family:"Plus Jakarta Sans",Inter,sans-serif;font-size:11px;fill:#6b7280;letter-spacing:0.05em}
    </style>
  </defs>

  <!-- Header bar -->
  <rect x="0" y="0" width="440" height="64" fill="#ffffff"/>
  <rect x="0" y="64" width="440" height="1" fill="#e5e7eb"/>

  <!-- Logo / title -->
  <text x="24" y="38" font-family="Plus Jakarta Sans,Inter,sans-serif" font-size="20" font-weight="700" fill="#0d0e13">MonApp</text>

  <!-- Breadcrumb -->
  <g transform="translate(24,98)">
    <rect width="392" height="44" fill="#ffffff" rx="8" filter="url(#sh)"/>
    <g transform="translate(16,22)">
      <text class="link" x="0" y="0">Phase</text>
      <text class="sep" x="52" y="0">/</text>
      <text class="link" x="68" y="0">Étape</text>
      <text class="sep" x="124" y="0">/</text>
      <text class="txt" x="140" y="0">Section</text>
    </g>
  </g>

  <!-- Dark header variant -->
  <rect x="0" y="152" width="440" height="64" fill="#0d0e13"/>
  <g transform="translate(24,152)">
    <text x="0" y="38" font-family="Plus Jakarta Sans,Inter,sans-serif" font-size="20" font-weight="700" fill="#ffffff">MonApp</text>
  </g>

  <!-- Dark breadcrumb -->
  <g transform="translate(24,226)">
    <rect width="392" height="44" fill="#ffffff" rx="8" filter="url(#sh)"/>
    <g transform="translate(16,22)">
      <text class="link" x="0" y="0">Phase</text>
      <text class="sep" x="52" y="0">/</text>
      <text class="link" x="68" y="0">Étape</text>
      <text class="sep" x="124" y="0">/</text>
      <text class="txt" x="140" y="0">Section</text>
    </g>
  </g>
</svg>