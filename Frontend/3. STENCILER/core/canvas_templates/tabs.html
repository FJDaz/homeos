<div class="af-tabs w-full {{layout_class}}" data-af-id="tabs-{{id}}">
    <div class="af-tabs-header flex items-center gap-2 mb-6 border-b af-border-primary overflow-x-auto no-scrollbar">
        <button class="af-tab-item active-tab af-text-primary text-[11px] font-medium pb-2 relative transition-all whitespace-nowrap min-w-[60px]">
            Général
            <span class="af-nudge-bg absolute bottom-0 left-0 w-full h-[1.5px] rounded-t-full"></span>
        </button>
        <button class="af-tab-item af-text-muted text-[11px] font-medium pb-2 hover:af-text-primary transition-all whitespace-nowrap min-w-[60px]">
            Paramètres
        </button>
        <button class="af-tab-item af-text-muted text-[11px] font-medium pb-2 hover:af-text-primary transition-all whitespace-nowrap min-w-[60px]">
            Notifications
        </button>
    </div>
    
    <div class="af-tabs-content">
        <div class="af-tab-panel animate-fade-in">
            <p class="af-text-muted text-xs leading-relaxed">Contenu de l'onglet actif...</p>
        </div>
    </div>
</div>
