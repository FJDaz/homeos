<div class="af-timeline w-full max-w-lg mx-auto" data-af-id="timeline-{{id}}">
    <div class="af-timeline-item relative border-l-2 af-border-primary pb-8 pl-8 flex flex-col group">
        <div class="af-timeline-dot absolute left-[-9px] top-0 w-4 h-4 af-radius-full border-2 border-white af-nudge-bg shadow-md transition-all group-hover:scale-125"></div>
        <div class="af-timeline-content">
            <span class="af-text-muted text-[10px] uppercase font-bold mb-1 block">Janvier 2026</span>
            <h4 class="af-text-primary text-sm font-semibold mb-2">Lancement de la mission</h4>
            <p class="af-text-muted text-xs leading-relaxed">Définition du catalogue canevas et préparation des briques de base...</p>
        </div>
    </div>
    
    <div class="af-timeline-item relative border-l-2 af-border-primary pb-8 pl-8 flex flex-col group">
        <div class="af-timeline-dot absolute left-[-9px] top-0 w-4 h-4 af-radius-full border-2 border-white bg-gray-200 shadow-md"></div>
        <div class="af-timeline-content">
            <span class="af-text-muted text-[10px] uppercase font-bold mb-1 block">Février 2026</span>
            <h4 class="af-text-primary text-sm font-semibold mb-2">Forge du catalogue</h4>
            <p class="af-text-muted text-xs leading-relaxed">Création des templates et de l'instanciateur dynamique...</p>
        </div>
    </div>
</div>
