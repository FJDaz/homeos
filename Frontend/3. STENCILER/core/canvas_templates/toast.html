<div class="af-toast fixed {{position_class}} ml-6 mb-6 z-[200] af-bg-primary af-radius-md af-border-primary border p-4 shadow-xl flex items-center justify-between gap-4 max-w-sm w-full animate-slide-up" data-af-id="toast-{{id}}">
    <div class="af-toast-content flex items-center gap-3">
        <div class="af-toast-icon w-8 h-8 af-radius-full flex items-center justify-center {{variant_bg_class}}">
            <svg class="w-4 h-4 {{variant_text_class}}" ...></svg>
        </div>
        <p class="af-text-primary text-[11px] font-medium leading-normal">{{message}}</p>
    </div>
    <button class="af-text-muted hover:af-text-primary transition-all p-1">
        <svg class="w-3.5 h-3.5" ...></svg>
    </button>
</div>
