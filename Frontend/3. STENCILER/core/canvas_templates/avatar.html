<div class="af-avatar-container relative inline-block" data-af-id="avatar-{{id}}">
    <div class="af-avatar af-radius-full border-2 af-border-primary shadow-sm overflow-hidden bg-gray-200 flex items-center justify-center p-0.5 {{size_class}}">
        [[if hasFallback]]
        <span class="af-text-primary text-sm font-semibold tracking-tighter">JD</span>
        [[else]]
        <img src="https://ui-avatars.com/api/?name=John+Doe" class="w-full h-full object-cover af-radius-full" alt="avatar">
        [[endif]]
    </div>
    
    [[if hasStatus]]
    <span class="af-status-dot absolute bottom-0 right-0 w-3 h-3 af-radius-full border-2 border-white af-nudge-bg shadow-sm"></span>
    [[endif]]
</div>
