<div class="af-table-wrapper w-full af-bg-primary af-radius-md border af-border-primary overflow-hidden shadow-sm flex flex-col" data-af-id="table-{{id}}">
    [[if hasSearch]]
    <div class="af-table-header px-4 py-3 border-b af-border-primary bg-gray-50/10 flex items-center justify-between">
        <h3 class="af-text-primary text-xs font-semibold">{{title}}</h3>
        <input type="text" placeholder="Rechercher..." class="af-bg-primary af-border-primary border af-radius-sm px-2 py-1 text-[10px] w-32 focus:ring-1 focus:outline-none placeholder:af-text-muted">
    </div>
    [[endif]]
    
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="af-bg-secondary/20 af-border-primary border-b">
                    <th class="px-4 py-3 af-text-muted text-[10px] font-semibold uppercase tracking-wider">ID</th>
                    <th class="px-4 py-3 af-text-muted text-[10px] font-semibold uppercase tracking-wider">Nom</th>
                    <th class="px-4 py-3 af-text-muted text-[10px] font-semibold uppercase tracking-wider">Statut</th>
                    <th class="px-4 py-3 af-text-muted text-[10px] font-semibold uppercase tracking-wider">Date</th>
                </tr>
            </thead>
            <tbody>
                <tr class="af-border-primary border-b hover:bg-gray-50/50 transition-all cursor-pointer">
                    <td class="px-4 py-3 af-text-primary text-xs font-medium">#1024</td>
                    <td class="px-4 py-3 af-text-primary text-xs">Utilisateur A</td>
                    <td class="px-4 py-3"><span class="af-badge af-radius-max px-2 py-0.5 text-[9px] af-nudge-bg af-text-primary">Actif</span></td>
                    <td class="px-4 py-3 af-text-muted text-[10px]">Il y a 2h</td>
                </tr>
                <!-- ROWS REPEAT -->
            </tbody>
        </table>
    </div>
    
    [[if hasPagination]]
    <div class="af-table-footer px-4 py-3 flex items-center justify-between border-t af-border-primary bg-gray-50/10">
        <span class="af-text-muted text-[10px]">Affichage 1-5 sur 42</span>
        <div class="flex gap-1">
            <button class="af-radius-sm border af-border-primary p-1.5 hover:bg-gray-100 transition-all">
                <svg class="w-3 h-3 af-text-muted" ...></svg>
            </button>
            <button class="af-radius-sm border af-border-primary p-1.5 hover:bg-gray-100 transition-all">
                <svg class="w-3 h-3 af-text-muted" ...></svg>
            </button>
        </div>
    </div>
    [[endif]]
</div>
