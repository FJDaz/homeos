<div class="af-stat-block af-bg-primary af-radius-md border af-border-primary p-6 shadow-sm flex flex-col transition-all hover:shadow-md" data-af-id="stat-{{id}}">
    <div class="flex items-center justify-between mb-4">
        [[if hasIcon]]
        <div class="af-stat-icon w-8 h-8 af-radius-sm af-nudge-bg af-text-primary flex items-center justify-center p-1 shadow-sm">
            <svg class="w-4 h-4" ...></svg>
        </div>
        [[endif]]
        
        [[if hasTrend]]
        <div class="af-trend flex items-center gap-1.5 px-2 py-1 af-radius-max border-2 border-green-500/10 bg-green-500/5 transition-all">
            <svg class="w-3 h-3 text-green-600" ...></svg>
            <span class="text-[10px] font-bold text-green-600 tracking-tighter">+12.5%</span>
        </div>
        [[endif]]
    </div>
    
    <div class="af-stat-content">
        <h4 class="af-text-muted text-[10px] font-bold uppercase tracking-widest mb-1.5">{{label}}</h4>
        <div class="flex items-baseline gap-1.5">
            <span class="af-text-primary text-2xl font-black tracking-tight leading-none">{{value}}</span>
            <span class="af-text-muted text-[9px] uppercase font-bold">vs hier</span>
        </div>
    </div>
</div>
