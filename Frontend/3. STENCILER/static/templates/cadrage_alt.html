<!DOCTYPE html>
<html lang="fr" class="bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    <!-- Bootstrap.js — Navigation globale (Mission 107) -->
    <script src="/static/js/bootstrap.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: { bg: '#ffffff', panel: '#f9f9f9', input: '#f2f3f5', text: '#666666', textDark: '#1a1a1a', tabActive: '#8cc63f', dotGreen: '#5ec069', sep: '#e5e5e5' }
                    },
                    fontFamily: {
                        homeos: ['Helvetica', 'Inter', 'sans-serif'],
                        geist: ['Geist', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-image: radial-gradient(#eeeeee 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .insight-card { position: relative; }
        .insight-card .capture-btn { opacity: 0; transition: opacity 0.15s; }
        .insight-card:hover .capture-btn { opacity: 1; }
        .llm-tab-content { display: none; height: 100%; flex-direction: column; }
        .llm-tab-content.active { display: flex; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-geist text-[12px] text-figma-text bg-white">

    <!-- Sidebar collapsible — dimensions bkd_frd -->
    <aside id="sidebar" class="relative flex flex-col w-[280px] h-full border-r border-figma-sep bg-white flex-shrink-0 transition-all duration-300 overflow-hidden" id="sidebar-wrap">
        <!-- Header logo — identique bkd_frd -->
        <div class="h-[48px] flex items-center justify-between px-6 border-b border-figma-sep flex-shrink-0">
            <span class="font-homeos font-black text-lg tracking-tighter text-black">Homé<span class="text-figma-tabActive">OS</span></span>
            <button id="sidebar-toggle" class="text-gray-300 hover:text-black transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
        </div>

        <!-- Boutons Multiplex / Conseil -->
        <div class="px-6 py-3 flex gap-2 border-b border-figma-sep flex-shrink-0">
            <button id="btn-multiplex" class="flex-1 py-1 text-[11px] font-semibold tracking-wider bg-figma-tabActive text-white transition-colors">Multiplex</button>
            <button id="btn-conseil" class="flex-1 py-1 text-[11px] font-semibold tracking-wider border border-figma-sep text-gray-400 hover:border-black hover:text-black transition-colors">Conseil</button>
        </div>

        <!-- Barre contextuelle (Multiplex = prompt global / Conseil = recherche) -->
        <div class="px-6 py-3 border-b border-figma-sep flex-shrink-0">
            <input type="text" id="multiplex-input" placeholder="Prompt global (tous modèles)…"
                   class="w-full bg-transparent border-b border-gray-200 focus:border-figma-tabActive pb-1 outline-none text-[12px] transition-colors">
            <input type="text" id="conseil-input" placeholder="Rechercher dans les chats…"
                   class="hidden w-full bg-transparent border-b border-gray-200 focus:border-figma-tabActive pb-1 outline-none text-[12px] transition-colors">
        </div>

        <!-- Session ID -->
        <div class="mt-auto px-6 py-4">
            <span id="session-info" class="text-[10px] text-gray-300 uppercase tracking-widest">Id: --</span>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0 bg-white">

        <!-- Header local (Cadrage Alt) -->
        <header class="h-[48px] border-b border-figma-sep flex items-center px-8 bg-[#f7f6f2] flex-shrink-0">
            <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Cadrage Alternative View</span>
        </header>

        <!-- Sous-tabs LLM — niveau inférieur, text-[11px] -->
        <div class="flex items-center border-b border-figma-sep bg-figma-panel flex-shrink-0">
            <button class="llm-tab-btn px-5 py-2 text-[11px] font-semibold text-figma-tabActive border-b-2 border-figma-tabActive flex items-center gap-1.5" data-tab="gemini">
                <span class="w-1.5 h-1.5 rounded-full bg-[#e8f5e9] border border-figma-dotGreen"></span> Gemini
            </button>
            <button class="llm-tab-btn px-5 py-2 text-[11px] text-gray-400 hover:text-black transition-colors flex items-center gap-1.5" data-tab="groq">
                <span class="w-1.5 h-1.5 rounded-full bg-[#fff3e0] border border-[#f55036]"></span> Groq
            </button>
            <button class="llm-tab-btn px-5 py-2 text-[11px] text-gray-400 hover:text-black transition-colors flex items-center gap-1.5" data-tab="codestral">
                <span class="w-1.5 h-1.5 rounded-full bg-figma-dotGreen"></span> Codestral
            </button>
        </div>

        <!-- Contenu LLM tabs -->
        <main class="flex-1 overflow-hidden">

            <!-- Gemini -->
            <section id="tab-gemini" class="llm-tab-content active">
                <div id="stream-gemini" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-3"></div>
                <div class="p-4 border-t border-figma-sep flex gap-2 flex-shrink-0">
                    <input type="text" id="input-gemini" placeholder="Message à Gemini…"
                           class="flex-1 bg-figma-input px-3 py-2 text-[12px] outline-none border border-figma-sep focus:border-figma-tabActive">
                    <button onclick="sendMessage('gemini')" class="px-4 py-2 bg-figma-tabActive text-white text-[11px] font-semibold hover:opacity-90">Envoyer</button>
                </div>
            </section>

            <!-- Groq -->
            <section id="tab-groq" class="llm-tab-content">
                <div id="stream-groq" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-3"></div>
                <div class="p-4 border-t border-figma-sep flex gap-2 flex-shrink-0">
                    <input type="text" id="input-groq" placeholder="Message à Groq…"
                           class="flex-1 bg-figma-input px-3 py-2 text-[12px] outline-none border border-figma-sep focus:border-figma-tabActive">
                    <button onclick="sendMessage('groq')" class="px-4 py-2 bg-figma-tabActive text-white text-[11px] font-semibold hover:opacity-90">Envoyer</button>
                </div>
            </section>

            <!-- Codestral -->
            <section id="tab-codestral" class="llm-tab-content">
                <div id="stream-codestral" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-3"></div>
                <div class="p-4 border-t border-figma-sep flex gap-2 flex-shrink-0">
                    <input type="text" id="input-codestral" placeholder="Message à Codestral…"
                           class="flex-1 bg-figma-input px-3 py-2 text-[12px] outline-none border border-figma-sep focus:border-figma-tabActive">
                    <button onclick="sendMessage('codestral')" class="px-4 py-2 bg-figma-tabActive text-white text-[11px] font-semibold hover:opacity-90">Envoyer</button>
                </div>
            </section>

        </main>
    </div>

    <!-- Sullivan Panel — dimensions bkd_frd (w-[280px], h-[48px] header) -->
    <section id="sullivan-panel" class="w-[280px] flex flex-col border-l border-figma-sep bg-white flex-shrink-0">
        <div class="h-[48px] flex items-center px-6 border-b border-figma-sep gap-2 flex-shrink-0">
            <span class="w-1.5 h-1.5 rounded-full bg-figma-dotGreen shadow-[0_0_6px_rgba(94,192,105,0.4)]"></span>
            <span class="text-[12px] font-semibold text-black">Sullivan</span>
        </div>
        <div id="nugget-list" class="flex-1 overflow-y-auto no-scrollbar px-6 py-4 space-y-3">
            <p class="text-[10px] text-gray-300 uppercase tracking-widest">Aucun nugget</p>
        </div>
        <div class="p-4 border-t border-figma-sep space-y-2 flex-shrink-0">
            <button id="btn-arbitrate" class="w-full py-2 text-[11px] uppercase tracking-widest border border-figma-sep hover:border-black transition-colors text-gray-600 hover:text-black">Sullivan Arbitrage</button>
            <button id="btn-prd" disabled class="w-full py-2 text-[11px] uppercase tracking-widest bg-figma-input text-gray-400 disabled:cursor-not-allowed transition-colors">Générer PRD</button>
        </div>
    </section>

    <!-- PRD Modal -->
    <div id="prd-modal" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[1000] flex items-center justify-center p-20">
        <div class="bg-white border border-figma-sep w-full max-w-2xl h-full shadow-xl flex flex-col">
            <div class="h-[48px] px-6 border-b border-figma-sep flex items-center justify-between flex-shrink-0">
                <span class="font-semibold text-black text-[12px]">Dossier de conception</span>
                <div class="flex gap-4">
                    <a id="prd-download" download="PRD.md" href="#" class="text-figma-tabActive text-[12px] font-semibold hover:underline">Télécharger</a>
                    <button onclick="document.getElementById('prd-modal').classList.add('hidden')" class="text-[12px] text-red-400 hover:text-red-600">Fermer</button>
                </div>
            </div>
            <pre id="prd-content" class="flex-1 p-8 overflow-y-auto text-[12px] whitespace-pre-wrap font-geist text-figma-text leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const sessionId = "CAD-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;

        const streams = {
            gemini: document.getElementById('stream-gemini'),
            groq: document.getElementById('stream-groq'),
            codestral: document.getElementById('stream-codestral')
        };
        const inputs = {
            gemini: document.getElementById('input-gemini'),
            groq: document.getElementById('input-groq'),
            codestral: document.getElementById('input-codestral')
        };

        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');
        let basketCount = 0;

        // Sidebar toggle
        document.getElementById('sidebar-toggle').onclick = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-[280px]');
            sidebar.classList.toggle('w-[48px]');
        };

        // Multiplex / Conseil mode
        let currentMode = 'multiplex';
        const btnMultiplex = document.getElementById('btn-multiplex');
        const btnConseil = document.getElementById('btn-conseil');
        const multiplexInput = document.getElementById('multiplex-input');
        const conseilInput = document.getElementById('conseil-input');

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'multiplex') {
                btnMultiplex.classList.add('bg-figma-tabActive', 'text-white');
                btnMultiplex.classList.remove('border', 'border-figma-sep', 'text-gray-400');
                btnConseil.classList.remove('bg-figma-tabActive', 'text-white');
                btnConseil.classList.add('border', 'border-figma-sep', 'text-gray-400');
                multiplexInput.classList.remove('hidden');
                conseilInput.classList.add('hidden');
            } else {
                btnConseil.classList.add('bg-figma-tabActive', 'text-white');
                btnConseil.classList.remove('border', 'border-figma-sep', 'text-gray-400');
                btnMultiplex.classList.remove('bg-figma-tabActive', 'text-white');
                btnMultiplex.classList.add('border', 'border-figma-sep', 'text-gray-400');
                conseilInput.classList.remove('hidden');
                multiplexInput.classList.add('hidden');
                conseilInput.focus();
            }
        }
        btnMultiplex.onclick = () => setMode('multiplex');
        btnConseil.onclick = () => setMode('conseil');

        // LLM sub-tabs
        const tabBtns = document.querySelectorAll('.llm-tab-btn');
        const tabContents = document.querySelectorAll('.llm-tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b => {
                    b.classList.remove('text-figma-tabActive', 'border-b-2', 'border-figma-tabActive', 'font-semibold');
                    b.classList.add('text-gray-400');
                });
                btn.classList.remove('text-gray-400');
                btn.classList.add('text-figma-tabActive', 'border-b-2', 'border-figma-tabActive', 'font-semibold');
                tabContents.forEach(c => {
                    c.classList.remove('active');
                    if (c.id === `tab-${target}`) c.classList.add('active');
                });
            });
        });

        // Nugget
        function addNugget(text, provider) {
            if (basketCount === 0) nuggetList.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'p-3 border-l-2 border-figma-tabActive bg-figma-panel text-[12px]';
            div.innerHTML = `<div class="leading-relaxed text-figma-textDark">${text}</div><div class="mt-1 text-[10px] text-gray-400 uppercase tracking-wider">${provider} · capture</div>`;
            nuggetList.prepend(div);
            basketCount++;
            btnPrd.disabled = false;
            btnPrd.classList.remove('bg-figma-input', 'text-gray-400');
            btnPrd.classList.add('bg-figma-tabActive', 'text-white');
        }

        async function captureNugget(text, provider) {
            try {
                const res = await fetch('/api/cadrage/capture', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, text, provider })
                });
                if (res.ok) addNugget(text, provider);
            } catch (e) { console.error("Capture error", e); }
        }

        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'insight-card relative pb-5 border-b border-figma-sep';
            const content = document.createElement('div');
            content.className = 'text-[12px] text-figma-text leading-relaxed';
            card.appendChild(content);
            const btn = document.createElement('button');
            btn.className = 'capture-btn absolute bottom-1 right-0 px-2 py-0.5 text-[10px] uppercase tracking-widest text-figma-tabActive border border-figma-tabActive hover:bg-figma-tabActive hover:text-white transition-all';
            btn.innerText = '+ capture';
            btn.onclick = (e) => { e.stopPropagation(); captureNugget(content.innerText, provider); };
            card.appendChild(btn);
            streams[provider].appendChild(card);
            streams[provider].scrollTop = streams[provider].scrollHeight;
            return content;
        }

        function startStreaming(provider, message) {
            const url = `/api/cadrage/chat/${provider}?session_id=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(message)}`;
            const es = new EventSource(url);
            let card = null;
            es.addEventListener('token', (e) => {
                const token = JSON.parse(e.data);
                if (!card) card = createInsightCard(provider);
                card.innerText += token;
                streams[provider].scrollTop = streams[provider].scrollHeight;
            });
            es.addEventListener('done', () => es.close());
            es.onerror = () => es.close();
        }

        function sendMessage(provider) {
            const msg = inputs[provider].value.trim();
            if (!msg) return;
            streams[provider].innerHTML = '';
            startStreaming(provider, msg);
            inputs[provider].value = '';
        }

        // Enter sur chaque input individuel
        Object.keys(inputs).forEach(p => {
            inputs[p].addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(p); });
        });

        // Multiplex input → dispatch tous les modèles
        multiplexInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const query = e.target.value.trim();
            if (!query) return;
            Object.values(streams).forEach(s => s.innerHTML = '');
            Object.keys(streams).forEach(p => startStreaming(p, query));
            e.target.value = '';
            document.getElementById('nudge-label').innerText = 'Dispatch en cours…';
            setTimeout(() => document.getElementById('nudge-label').innerText = '3 modèles actifs', 2000);
        });

        // Conseil input → recherche dans les streams visibles
        conseilInput.addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            document.querySelectorAll('.insight-card').forEach(card => {
                const text = card.querySelector('div')?.innerText.toLowerCase() || '';
                card.style.opacity = (!term || text.includes(term)) ? '1' : '0.2';
            });
        });
        conseilInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') { e.target.value = ''; conseilInput.dispatchEvent(new Event('input')); } });

        // Sullivan Arbitrage
        document.getElementById('btn-arbitrate').onclick = () => {
            const nuggets = Array.from(nuggetList.querySelectorAll('div > div:first-child')).map(d => d.innerText).join('\n---\n');
            if (!nuggets) return;
            const btn = document.getElementById('btn-arbitrate');
            btn.innerText = 'Arbitrage…';
            startStreaming('gemini', `En tant qu'arbitre Sullivan, synthétise ces insights en 3-5 points actionnables :\n\n${nuggets}`);
            btn.innerText = 'Sullivan Arbitrage';
        };

        // Générer PRD
        btnPrd.onclick = async () => {
            const projectName = prompt("Nom du projet ?", "AetherFlow Project");
            if (!projectName) return;
            btnPrd.innerText = "Génération…";
            try {
                const res = await fetch('/api/cadrage/generate-prd', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, project_name: projectName })
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prd-content').textContent = data.prd_content;
                    const blob = new Blob([data.prd_content], { type: 'text/markdown' });
                    const dl = document.getElementById('prd-download');
                    dl.href = URL.createObjectURL(blob);
                    dl.download = data.prd_path ? data.prd_path.split('/').pop() : 'PRD.md';
                    const modal = document.getElementById('prd-modal');
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                }
            } catch (e) { console.error(e); }
            finally { btnPrd.innerText = "Générer PRD"; }
        };
    </script>
</body>
</html>
