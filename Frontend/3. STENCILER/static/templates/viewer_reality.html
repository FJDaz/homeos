<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>KIMI Template Viewer — Reality</title>
    <style>
        /* Reset & Shell */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            background: #0a0a0b
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            color: #e1e1e6
        }

        #bar {
            width: 100%;
            background: #111;
            color: #666;
            font: 11px/28px monospace;
            padding: 0 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            height: 28px
        }

        #dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #f05e23;
            flex-shrink: 0
        }

        #main {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        /* Reality Canvas : Isolation area */
        #reality-canvas {
            flex: 1;
            min-width: 0;
            background: #fff;
            overflow: auto;
            position: relative
        }

        /* Sullivan Cockpit Styles */
        #chat {
            width: 380px;
            flex-shrink: 0;
            background: #0f0f10;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        #cockpit-header {
            padding: 16px;
            background: linear-gradient(180deg, #161618 0%, #0f0f10 100%);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .score-box {
            text-align: right
        }

        .score-lvl {
            font-size: 10px;
            text-transform: uppercase;
            color: #ff6b35;
            font-weight: 700;
            letter-spacing: 1px
        }

        #pedo-panel {
            background: #161618;
            border-bottom: 1px solid #222;
            display: none;
            padding: 16px;
            flex-shrink: 0
        }

        .pedo-section {
            margin-bottom: 12px
        }

        .pedo-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px
        }

        .pedo-value {
            font-size: 13px;
            color: #fff;
            font-weight: 600
        }

        .pedo-desc {
            font-size: 11px;
            color: #a1a1aa;
            line-height: 1.5;
            font-style: italic;
            margin-top: 4px
        }

        /* Gap List */
        #gap-list {
            padding: 16px;
            border-bottom: 1px solid #222;
            background: rgba(255, 107, 53, 0.03);
            max-height: 180px;
            overflow-y: auto
        }

        .gap-item {
            padding: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 107, 53, 0.1);
            margin-bottom: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s
        }

        .gap-item:hover {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.05)
        }

        .gap-tag {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 3px;
            background: #ff6b35;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            margin-right: 6px
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2)
        }

        .msg {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid #333
        }

        .msg.sent {
            border-left-color: #ff6b35;
            background: rgba(255, 107, 53, 0.05)
        }

        #chat-input {
            padding: 16px;
            background: #0a0a0b;
            border-top: 1px solid #222
        }

        #txt {
            width: 100%;
            background: #161618;
            border: 1px solid #333;
            color: #e1e1e6;
            font-family: inherit;
            font-size: 13px;
            padding: 12px;
            border-radius: 6px;
            resize: none;
            height: 80px;
            outline: none;
            transition: border-color 0.2s
        }

        #btns {
            margin-top: 12px;
            display: flex;
            gap: 10px
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer
        }

        #btn-send {
            background: #ff6b35;
            color: #fff
        }

        /* Sullivan Fix Highlights */
        .sullivan-suggestion {
            outline: 3px solid #ff6b35 !important;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.4) !important;
            position: relative;
            z-index: 9999;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 107, 53, 0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fidelity-pulse {
            animation: pulse-orange 2s infinite;
        }

        @keyframes pulse-orange {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
    <script>
        let currentRealityHTML = "";

        function addMsg(text, cls) {
            var d = document.getElementById('messages');
            var m = document.createElement('div'); m.className = 'msg ' + (cls || '');
            m.textContent = text; d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }

        function loadReality() {
            const canvas = document.getElementById('reality-canvas');
            canvas.innerHTML = '<div style="padding:100px; text-align:center; color:#666"><div class="spinner" style="margin: 0 auto 20px;"></div>Chargement de la Reality View...</div>';
            
            // 1. Load the generated HTML
            fetch('/api/retro-genome/reality')
                .then(r => r.text())
                .then(html => {
                    currentRealityHTML = html;
                    canvas.innerHTML = html;
                    addMsg('Reality View chargée. Analyse des Gaps par Sullivan...');
                })
                .catch(err => {
                    canvas.innerHTML = '<div style="padding:100px; text-align:center; color:#ff3b30;">Erreur lors du chargement de la réalité.</div>';
                });

            // 2. Load Gaps & Fidelity
            fetch('/api/pedagogy/gaps')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('gap-list');
                    // Keep the header but clear items
                    const header = list.querySelector('div:first-child');
                    list.innerHTML = '';
                    if (header) list.appendChild(header);
                    
                    if (data.fidelity_score !== undefined) {
                        const scoreLvl = document.querySelector('.score-lvl');
                        scoreLvl.innerHTML = `FIDELITY: <span id="fidelity-val" class="fidelity-pulse" style="color:#ff6b35">${data.fidelity_score}%</span>`;
                    }

                    if (data.gaps && data.gaps.length > 0) {
                        data.gaps.forEach(g => {
                            const div = document.createElement('div');
                            div.className = 'gap-item';
                            const severity = g.severity || 'major';
                            const intentId = g.intent_id || g.type || 'GAP';
                            
                            div.innerHTML = `
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px; align-items: center;">
                                    <span class="gap-tag" style="background:${severity === 'critical' ? '#ff3b30' : '#ff6b35'}; font-size:8px; padding:1px 4px;">${severity.toUpperCase()}</span>
                                    <span style="font-size:10px; color:#fff; font-weight:700;">${intentId}</span>
                                </div>
                                <div style="font-size:11px; color:#a1a1aa; line-height:1.4;">${g.description}</div>
                                <div style="margin-top:8px; padding:6px; background:rgba(255,107,53,0.1); border-radius:4px; color:#ff6b35; font-size:11px;">
                                    <b style="font-size:9px; text-transform:uppercase; display:block; margin-bottom:2px;">Sullivan Mentoring:</b>
                                    ${g.suggestion || 'Vérifier la cohérence visuelle.'}
                                </div>
                            `;
                            list.appendChild(div);
                        });
                        addMsg(`${data.gaps.length} écart(s) de fidélité identifié(s) par Sullivan.`);
                    } else {
                        list.innerHTML += '<div style="font-size:11px; color:#4CAF50; padding:10px; background:rgba(76,175,80,0.1); border-radius:4px; margin-top:10px;">✓ Aucune divergence majeure détectée.</div>';
                        addMsg('Félicitations : le système est sémantiquement complet.');
                    }
                }).catch(e => {
                    console.error(e);
                    // Hide old audit gracefully if it fails on refresh
                    if (!document.getElementById('gap-list').innerHTML.includes('Sullivan')) {
                        document.getElementById('gap-list').innerHTML += '<div style="font-size:10px; color:#555; padding:10px;">Audit non disponible.</div>';
                    }
                });
        }

        function setupChat() {
            const btn = document.getElementById('btn-send');
            const txt = document.getElementById('txt');
            
            btn.addEventListener('click', async () => {
                const feedback = txt.value.trim();
                if (!feedback) return;
                
                addMsg(feedback, 'sent');
                txt.value = '';
                
                // Remove previous temporary messages
                const msgs = document.getElementById('messages');
                const tempMsgs = msgs.querySelectorAll('.temp-msg');
                tempMsgs.forEach(m => m.remove());
                
                addMsg('Sullivan travaille sur la codebase...', 'temp-msg');
                
                btn.disabled = true;
                btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div>...';
                
                try {
                    const res = await fetch('/api/retro-genome/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            feedback: feedback,
                            current_html: currentRealityHTML
                        })
                    });
                    
                    const data = await res.json();
                    
                    // Cleanup temp msgs
                    const tMsgs = msgs.querySelectorAll('.temp-msg');
                    tMsgs.forEach(m => m.remove());

                    if (data.status === 'ok') {
                        addMsg('Code mis à jour avec succès.', '');
                        loadReality();
                    } else {
                        addMsg('Erreur: ' + (data.error || 'Inconnue'), 'error temp-msg');
                    }
                } catch (e) {
                    addMsg('Erreur de connexion au serveur.', 'error temp-msg');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = 'ENVOYER';
                }
            });

            txt.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    btn.click();
                }
            });
        }

        window.onload = () => {
            loadReality();
            setupChat();
        };
    </script>
</head>

<body>
    <div id="bar">
        <div id="dot"></div>
        <span style="color:#aaa">KIMI Template Viewer — Reality</span>
        <span style="margin-left:auto;color:#333">XHR · Sullivan Cockpit</span>
    </div>
    <div id="main">
        <div id="reality-canvas"></div>
        <div id="chat">
            <div id="cockpit-header">
                <div>
                    <div style="font-weight:700; color:#ff6b35; font-size:14px;">SULLIVAN COCKPIT</div>
                    <div style="font-size:10px; color:#666;">REALITY MENTOR</div>
                </div>
                <div class="score-box">
                    <div class="score-lvl">FULL COMPLIANCE</div>
                </div>
            </div>

            <div id="gap-list">
                <div
                    style="font-size:10px; color:#666; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px">
                    Écarts de Fidélité (Gaps)</div>
            </div>

            <div id="pedo-panel">
                <div class="pedo-section">
                    <div class="pedo-label">Empreinte Sémantique</div>
                    <div class="pedo-value" id="pedo-title">...</div>
                </div>
            </div>

            <div id="messages"></div>
            <div id="chat-input">
                <textarea id="txt" placeholder="Dites à Sullivan ce que vous souhaitez changer..."></textarea>
                <div id="btns">
                    <button id="btn-send" class="btn">ENVOYER</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
