<!DOCTYPE html>
<html lang="fr" class="bg-white">

<head>
    <meta charset="utf-8">
    <title>AetherFlow — Reality Viewer</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Geist -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#ffffff',
                            panel: '#f9f9f9',
                            input: '#f2f3f5',
                            text: '#666666',
                            textDark: '#1a1a1a',
                            tabActive: '#8cc63f',
                            dotGreen: '#5ec069',
                            sep: '#e5e5e5',
                        }
                    },
                    fontFamily: {
                        geist: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: radial-gradient(#eeeeee 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(140, 198, 63, 0.1);
            border-top-color: #8cc63f; border-radius: 50%; animation: spin 1s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden font-geist text-figma-text">
    <!-- Top Bar -->
    <div class="h-[28px] bg-white border-b-[0.5px] border-figma-sep px-4 flex items-center gap-4 z-50">
        <div id="dot" class="w-[10px] h-[10px] rounded-full bg-figma-tabActive animate-pulse"></div>
        <span class="text-[11px] font-bold uppercase tracking-widest text-black/40">Reality Viewer</span>
        <span class="ml-auto text-[11px] font-bold uppercase tracking-widest text-figma-text/30">FJD Director Approval Required</span>
    </div>

    <div id="main" class="flex-1 flex overflow-hidden relative">
        <!-- Agency Approval Band -->
        <div id="agency-approval-band" class="absolute top-0 left-0 right-0 bg-black text-white px-6 py-3 hidden justify-between items-center z-[1000] shadow-2xl animate-in slide-in-from-top duration-300">
            <span class="text-[13px] font-bold uppercase tracking-[0.1em]">Directeur, validez-vous la livraison de cette Reality View ?</span>
            <div class="flex gap-2">
                <button id="btn-approve" class="px-4 py-1.5 bg-figma-tabActive text-white text-[12px] font-bold uppercase tracking-widest rounded-sm hover:opacity-90 transition-all">APPROUVER</button>
                <button id="btn-reject" class="px-4 py-1.5 border-[0.5px] border-white/30 text-white text-[12px] font-bold uppercase tracking-widest rounded-sm hover:bg-white/10 transition-all">REJETER</button>
            </div>
        </div>

        <!-- Reality Canvas -->
        <div id="reality-canvas" class="flex-1 min-w-0 bg-white overflow-auto relative no-scrollbar">
            <div id="canvas-content" class="h-full w-full"></div>
        </div>

        <!-- Sullivan Cockpit (Right Pane) -->
        <div id="chat" class="w-[380px] border-l-[0.5px] border-figma-sep bg-figma-panel flex flex-col overflow-hidden">
            <div class="h-[50px] px-6 flex items-center justify-between border-b-[0.5px] border-figma-sep bg-white">
                <div>
                    <div class="text-[13px] font-bold uppercase tracking-widest text-black">Sullivan Cockpit</div>
                    <div class="text-[10px] font-bold uppercase tracking-widest text-figma-text/40">Mission 36 — Agentic Loop</div>
                </div>
                <div class="text-right">
                    <div class="text-[11px] font-bold uppercase tracking-widest text-figma-tabActive">FIDELITY: <span id="fidelity-val">...</span></div>
                </div>
            </div>

            <!-- Export Panel (Mission 37) -->
            <div id="export-panel" class="hidden p-6 bg-white border-b-[0.5px] border-figma-sep space-y-3">
                <div class="text-[10px] font-bold uppercase tracking-widest text-figma-text/40">Multi-Vector Exports</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generatePRD()" class="p-2 border-[0.5px] border-figma-sep text-[10px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">📄</span> PRD & ROADMAP
                    </button>
                    <button onclick="exportZIP()" class="p-2 border-[0.5px] border-figma-sep text-[10px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">📦</span> ZIP VANILLA
                    </button>
                    <button onclick="exportManifest()" class="p-2 border-[0.5px] border-figma-sep text-[10px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">🔗</span> FIGMA BRIDGE
                    </button>
                    <button onclick="exportSchema()" class="p-2 border-[0.5px] border-figma-sep text-[10px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">🧬</span> SCHEMA JSON
                    </button>
                </div>
            </div>

            <!-- Gaps & DA Critique List -->
            <div id="gap-list" class="p-6 bg-figma-tabActive/5 border-b-[0.5px] border-figma-sep max-h-[300px] overflow-y-auto no-scrollbar space-y-4">
                <div id="da-critique-panel" class="hidden p-4 bg-black text-white rounded-sm space-y-2 border-l-2 border-figma-tabActive">
                    <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-figma-tabActive">[DA CRITIQUE] Round <span id="da-round">1</span></div>
                    <div id="da-text" class="text-[14px] leading-relaxed italic">...</div>
                </div>
                <div id="gap-items" class="space-y-2"></div>
            </div>

            <!-- Chat Messages -->
            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3 no-scrollbar"></div>

            <!-- Open in FRD Editor -->
            <div class="px-6 py-3 border-b-[0.5px] border-figma-sep">
                <a href="/frd-editor" class="block w-full py-1.5 text-center text-[12px] font-bold uppercase tracking-widest border-[0.5px] border-figma-tabActive text-figma-tabActive hover:bg-figma-tabActive hover:text-white transition-all">
                    Ouvrir dans FRD Editor →
                </a>
            </div>

            <!-- Chat Input -->
            <div class="p-6 bg-white border-t-[0.5px] border-figma-sep space-y-3">
                <textarea id="txt" placeholder="Feedback directeur..."
                    class="w-full h-20 bg-figma-input border-none text-[15px] text-figma-textDark p-4 outline-none focus:ring-1 focus:ring-figma-tabActive transition-all resize-none"></textarea>
                <button id="btn-send" class="w-full py-2 bg-black text-white text-[12px] font-bold uppercase tracking-widest hover:opacity-80 transition-all">ENVOYER</button>
            </div>
        </div>
    </div>

    <script>
        let currentRealityHTML = "";
        let pollTimer = null;

        function addMsg(text, cls) {
            const d = document.getElementById('messages');
            const m = document.createElement('div');
            m.className = 'text-[11px] p-3 border-l-2 bg-white/50 border-figma-sep font-mono leading-relaxed ' + (cls || '');
            if(cls === 'sent') m.style.borderLeftColor = '#000';
            if(cls === 'success') m.style.borderLeftColor = '#8cc63f';
            m.textContent = text; d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }

        async function loadReality() {
            const canvas = document.getElementById('canvas-content');
            canvas.innerHTML = '<div class="flex flex-col items-center justify-center h-full gap-4 text-figma-text/40"><div class="spinner"></div><span class="text-[12px] font-bold uppercase tracking-widest">Chargement de la réalité...</span></div>';
            
            try {
                const r = await fetch('/api/retro-genome/reality');
                const html = await r.text();
                currentRealityHTML = html;
                canvas.innerHTML = html;
                addMsg('Reality View rafraîchie.');
                pollStatus();
            } catch (e) {
                canvas.innerHTML = '<div class="flex items-center justify-center h-full text-red-500 text-[12px] font-bold uppercase">Erreur Reality View.</div>';
            }

            // Load Gaps
            fetch('/api/pedagogy/gaps').then(r => r.json()).then(data => {
                const list = document.getElementById('gap-items');
                list.innerHTML = '';
                if (data.fidelity_score) document.getElementById('fidelity-val').textContent = data.fidelity_score + '%';
                if (data.gaps) {
                    data.gaps.forEach(g => {
                        const div = document.createElement('div');
                        div.className = 'p-3 bg-white border-[0.5px] border-figma-sep text-[13px] flex gap-3';
                        div.innerHTML = `<span class="text-figma-tabActive font-bold">${g.severity || 'GAP'}</span> <span class="text-figma-text">${g.description}</span>`;
                        list.appendChild(div);
                    });
                }
            });
        }

        async function generatePRD() {
            addMsg('Génération du PRD & Roadmap en cours...');
            const res = await fetch('/api/retro-genome/generate-prd', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: {}, project_name: "AetherFlow PROJECT" })
            });
            const data = await res.json();
            if (data.status === 'ok') addMsg('PRD & Roadmap générés avec succès !', 'success');
        }

        async function exportZIP() {
            addMsg('Compression du package HTML/CSS...');
            const res = await fetch('/api/retro-genome/export-zip', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') addMsg('ZIP généré : ' + data.zip_path, 'success');
        }

        async function exportManifest() {
            addMsg('Inférence du carrefour JSON Figma...');
            const res = await fetch('/api/retro-genome/export-manifest', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') {
                addMsg('Manifest JSON généré !', 'success');
                window.open('/api/retro-genome/manifest', '_blank');
            }
        }

        async function exportSchema() {
            addMsg('Export du schéma JSON (Validated Analysis)...');
            const res = await fetch('/api/retro-genome/export-schema', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') addMsg('Schéma sauvegardé (voir backend) : ' + data.schema_path, 'success');
        }

        function pollStatus() {
            if (pollTimer) clearTimeout(pollTimer);
            fetch('/api/retro-genome/status?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    const critiquePanel = document.getElementById('da-critique-panel');
                    const band = document.getElementById('agency-approval-band');
                    const exportPanel = document.getElementById('export-panel');
                    
                    if (data.step === 'done' || data.step === 'idle') {
                        exportPanel.style.display = 'block';
                    } else {
                        exportPanel.style.display = 'none';
                    }
                    
                    if (data.step === 'generating' || data.step === 'awaiting_approval') {
                        critiquePanel.classList.remove('hidden');
                        if (data.critique) {
                            document.getElementById('da-text').textContent = data.critique;
                            document.getElementById('da-round').textContent = data.attempt || '?';
                        }
                    } else {
                        critiquePanel.classList.add('hidden');
                    }

                    if (data.step === 'awaiting_approval') {
                        band.classList.remove('hidden');
                        band.classList.add('flex');
                    } else {
                        band.classList.add('hidden');
                        band.classList.remove('flex');
                    }

                    if (data.step !== 'done' && data.step !== 'idle') {
                        pollTimer = setTimeout(pollStatus, 2000);
                    }
                });
        }

        async function approveReality() {
            const res = await fetch('/api/retro-genome/approve', { method: 'POST' });
            if (res.ok) {
                document.getElementById('agency-approval-band').classList.add('hidden');
                addMsg('LIVRAISON VALIDÉE PAR LA DIRECTION.', 'success');
                loadReality();
            }
        }

        function setupChat() {
            const btn = document.getElementById('btn-send');
            const txt = document.getElementById('txt');
            btn.onclick = async () => {
                const feedback = txt.value.trim();
                if (!feedback) return;
                addMsg(feedback, 'sent');
                txt.value = '';
                btn.disabled = true;
                try {
                    const res = await fetch('/api/retro-genome/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ feedback, current_html: currentRealityHTML })
                    });
                    if (res.ok) loadReality();
                } finally {
                    btn.disabled = false;
                }
            };
        }

        window.onload = () => {
            loadReality();
            setupChat();
            pollStatus();
            document.getElementById('btn-approve').onclick = approveReality;
            document.getElementById('btn-reject').onclick = () => {
                document.getElementById('agency-approval-band').classList.add('hidden');
                addMsg('Rendu rejeté. Reprise de la boucle...', 'sent');
            };
        };
    </script>
</body>

</html>
