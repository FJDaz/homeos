<!DOCTYPE html>
<html lang="fr" class="bg-[#fafafa]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room ALT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: { bg: '#ffffff', panel: '#f9f9f9', input: '#f2f3f5', text: '#666666', textDark: '#1a1a1a', tabActive: '#8cc63f', dotGreen: '#5ec069', sep: '#e5e5e5' }
                    },
                    fontFamily: {
                        homeos: ['"Helvetica LT Std"', 'Helvetica', 'Inter', 'sans-serif'],
                        geist: ['Geist', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-image: radial-gradient(#eeeeee 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .insight-card { position: relative; }
        .insight-card .capture-btn { opacity: 0; transition: opacity 0.15s; }
        .insight-card:hover .capture-btn { opacity: 1; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: flex; }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-geist text-figma-text bg-white">

    <!-- Sidebar collapsible -->
    <aside id="sidebar" class="group relative flex flex-col w-[300px] h-full p-8 pl-[37px] border-r-[0.5px] border-figma-sep flex-shrink-0 transition-all duration-300 overflow-hidden has-[:checked]:w-[70px]">
        <input type="checkbox" id="sidebar-toggle" class="peer hidden">
        <label for="sidebar-toggle" class="absolute top-[35px] right-6 z-10 text-gray-300 hover:text-black cursor-pointer transition-transform peer-checked:rotate-180">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </label>

        <div class="mb-12 font-homeos text-2xl text-black tracking-tighter whitespace-nowrap">
            <span class="font-black">H</span><span class="font-black peer-checked:hidden">omé<span class="text-figma-tabActive">OS</span></span>
        </div>

        <input type="text" id="search-input" placeholder="Prompt global (tous modèles)…"
               class="bg-transparent border-b-[0.5px] border-gray-200 focus:border-figma-tabActive pb-2 outline-none text-[14px] w-full tracking-[0] transition-all peer-checked:hidden">

        <div id="session-info" class="mt-auto pt-8 text-[11px] text-gray-300 uppercase tracking-widest peer-checked:hidden">Id: --</div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-[60px] border-b-[0.5px] border-figma-sep flex items-center px-10">
            <nav class="flex items-end gap-10 h-full">
                <a href="#" class="text-[13px] font-semibold text-figma-tabActive border-b-[2px] border-figma-tabActive h-full flex items-center">Brainstorm</a>
                <a href="/bkd-editor" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Backend</a>
                <a href="/frd-editor" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Frontend</a>
                <a href="#" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Deploy</a>
            </nav>
        </header>

        <main class="flex-1 flex overflow-hidden flex-col">
            <!-- Tabs Header -->
            <div class="flex items-center border-b-[0.5px] border-figma-sep bg-white">
                <button class="tab-btn active px-6 py-3 text-[13px] font-semibold text-figma-tabActive border-b-[2px] border-figma-tabActive h-full flex items-center gap-2" data-tab="gemini">
                    <span class="w-2 h-2 rounded-full bg-[#e8f5e9] border border-figma-dotGreen"></span> Gemini
                </button>
                <button class="tab-btn px-6 py-3 text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center gap-2" data-tab="groq">
                    <span class="w-2 h-2 rounded-full bg-[#fff3e0] border border-[#f55036]"></span> Groq
                </button>
                <button class="tab-btn px-6 py-3 text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center gap-2" data-tab="codestral">
                    <span class="w-2 h-2 rounded-full bg-figma-dotGreen"></span> Codestral
                </button>
            </div>

            <!-- Tab Contents -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Gemini Tab -->
                <section id="tab-gemini" class="tab-content active flex-1 flex flex-col">
                    <div id="stream-gemini" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-4"></div>
                    <div class="p-4 border-t-[0.5px] border-figma-sep flex gap-2">
                        <input type="text" id="input-gemini" placeholder="Message à Gemini..." class="flex-1 bg-figma-input rounded px-3 py-2 text-[14px] outline-none focus:ring-1 focus:ring-figma-tabActive">
                        <button onclick="sendMessage('gemini')" class="px-4 py-2 bg-figma-tabActive text-white text-[13px] rounded hover:opacity-90">Envoyer</button>
                    </div>
                </section>

                <!-- Groq Tab -->
                <section id="tab-groq" class="tab-content flex-1 flex flex-col">
                    <div id="stream-groq" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-4"></div>
                    <div class="p-4 border-t-[0.5px] border-figma-sep flex gap-2">
                        <input type="text" id="input-groq" placeholder="Message à Groq..." class="flex-1 bg-figma-input rounded px-3 py-2 text-[14px] outline-none focus:ring-1 focus:ring-figma-tabActive">
                        <button onclick="sendMessage('groq')" class="px-4 py-2 bg-figma-tabActive text-white text-[13px] rounded hover:opacity-90">Envoyer</button>
                    </div>
                </section>

                <!-- Codestral Tab -->
                <section id="tab-codestral" class="tab-content flex-1 flex flex-col">
                    <div id="stream-codestral" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-4"></div>
                    <div class="p-4 border-t-[0.5px] border-figma-sep flex gap-2">
                        <input type="text" id="input-codestral" placeholder="Message à Codestral..." class="flex-1 bg-figma-input rounded px-3 py-2 text-[14px] outline-none focus:ring-1 focus:ring-figma-tabActive">
                        <button onclick="sendMessage('codestral')" class="px-4 py-2 bg-figma-tabActive text-white text-[13px] rounded hover:opacity-90">Envoyer</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Sullivan Panel -->
    <section id="sullivan-panel" class="w-[300px] flex flex-col border-l-[0.5px] border-figma-sep bg-[#fdfdfd] flex-shrink-0">
        <div class="h-[60px] flex items-center px-8 border-b-[0.5px] border-figma-sep text-[13px] font-semibold gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-figma-dotGreen shadow-[0_0_6px_rgba(94,192,105,0.5)]"></span> Sullivan
        </div>
        <div id="nugget-list" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-3 text-[14px] leading-relaxed">
            <p class="text-[12px] text-gray-300 uppercase tracking-widest">Aucun nugget</p>
        </div>
        <div class="p-6 border-t-[0.5px] border-figma-sep space-y-3">
            <button id="btn-arbitrate" class="w-full py-2 text-[12px] uppercase tracking-widest border border-gray-200 hover:border-black rounded-lg transition-all">Sullivan Arbitrage</button>
            <button id="btn-prd" disabled class="w-full py-2 text-[12px] uppercase tracking-widest bg-gray-200 text-white rounded-lg transition-all disabled:cursor-not-allowed hover:bg-figma-tabActive">Générer PRD</button>
        </div>
    </section>

    <!-- PRD Modal -->
    <div id="prd-modal" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[1000] flex items-center justify-center p-20">
        <div class="bg-white border border-figma-sep w-full max-w-2xl h-full shadow-xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <span class="font-bold text-black text-[15px]">Dossier de conception</span>
                <div class="flex gap-4">
                    <a id="prd-download" download="PRD.md" href="#" class="text-figma-tabActive text-[13px] font-semibold hover:underline">Télécharger</a>
                    <button onclick="document.getElementById('prd-modal').classList.add('hidden')" class="text-[13px] text-red-400 hover:text-red-600">Fermer</button>
                </div>
            </div>
            <pre id="prd-content" class="flex-1 p-8 overflow-y-auto text-[14px] whitespace-pre-wrap font-geist text-figma-text leading-relaxed"></pre>
        </div>
    </div>

    <script>
        // Session Management
        const sessionId = "BRS-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;

        // Stream Containers
        const streams = {
            gemini: document.getElementById('stream-gemini'),
            groq: document.getElementById('stream-groq'),
            codestral: document.getElementById('stream-codestral')
        };

        // Inputs
        const inputs = {
            gemini: document.getElementById('input-gemini'),
            groq: document.getElementById('input-groq'),
            codestral: document.getElementById('input-codestral')
        };

        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');
        let basketCount = 0;

        // Tab switching logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetTab = btn.dataset.tab;
                
                // Update button styles
                tabBtns.forEach(b => {
                    b.classList.remove('text-figma-tabActive', 'border-b-[2px]', 'border-figma-tabActive');
                    b.classList.add('text-gray-400');
                });
                btn.classList.remove('text-gray-400');
                btn.classList.add('text-figma-tabActive', 'border-b-[2px]', 'border-figma-tabActive');
                
                // Update content visibility
                tabContents.forEach(content => {
                    content.classList.remove('active');
                    if (content.id === `tab-${targetTab}`) {
                        content.classList.add('active');
                    }
                });
            });
        });

        function addNugget(text, provider) {
            if (basketCount === 0) nuggetList.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'p-4 border-l-2 border-figma-tabActive bg-white shadow-sm text-[13px]';
            div.innerHTML = `<div class="leading-relaxed">${text}</div><div class="mt-2 text-[11px] text-gray-300 uppercase tracking-wider">${provider} · capture</div>`;
            nuggetList.prepend(div);
            basketCount++;
            btnPrd.disabled = false;
            btnPrd.classList.remove('bg-gray-200');
            btnPrd.classList.add('bg-figma-tabActive');
        }

        async function captureNugget(text, provider) {
            try {
                const res = await fetch('/api/brs/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, text, provider })
                });
                if (res.ok) addNugget(text, provider);
            } catch (e) { console.error("Capture error", e); }
        }

        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'insight-card relative bg-white/60 border-b-[0.5px] border-figma-sep pb-4';
            const content = document.createElement('div');
            content.className = 'text-[14px] text-gray-800 leading-relaxed';
            card.appendChild(content);
            const btn = document.createElement('button');
            btn.className = 'capture-btn absolute bottom-1 right-0 px-2 py-1 text-[11px] uppercase tracking-widest text-figma-tabActive hover:bg-figma-tabActive hover:text-white transition-all border border-figma-tabActive';
            btn.innerText = '+ capture';
            btn.onclick = (e) => { e.stopPropagation(); captureNugget(content.innerText, provider); };
            card.appendChild(btn);
            streams[provider].appendChild(card);
            streams[provider].scrollTop = streams[provider].scrollHeight;
            return content;
        }

        function startStreaming(provider, message) {
            const url = `/api/brs/chat/${provider}?session_id=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(message)}`;
            const eventSource = new EventSource(url);
            let currentCard = null;
            eventSource.addEventListener('token', (e) => {
                const token = JSON.parse(e.data);
                if (!currentCard) currentCard = createInsightCard(provider);
                currentCard.innerText += token;
                streams[provider].scrollTop = streams[provider].scrollHeight;
            });
            eventSource.addEventListener('done', () => eventSource.close());
            eventSource.onerror = () => eventSource.close();
        }

        function sendMessage(provider) {
            const input = inputs[provider];
            const message = input.value.trim();
            if (!message) return;
            // Clear previous chat for this provider
            streams[provider].innerHTML = '';
            startStreaming(provider, message);
            input.value = '';
        }

        // Dispatch from sidebar input to ALL tabs
        document.getElementById('search-input').onkeydown = (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (!query) return;
                
                // Clear all streams
                Object.values(streams).forEach(s => s.innerHTML = '');
                
                // Send to all providers
                Object.keys(streams).forEach(provider => startStreaming(provider, query));
                e.target.value = '';
            }
        };

        // Enter key support for individual inputs
        Object.keys(inputs).forEach(provider => {
            inputs[provider].addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage(provider);
            });
        });

        // Arbitrage Sullivan
        document.getElementById('btn-arbitrate').onclick = async () => {
            const btn = document.getElementById('btn-arbitrate');
            btn.innerText = 'Arbitrage...';
            const nuggets = Array.from(nuggetList.querySelectorAll('div > div:first-child')).map(d => d.innerText).join('\n---\n');
            if (!nuggets) { btn.innerText = 'Sullivan Arbitrage'; return; }
            startStreaming('gemini', `En tant qu'arbitre Sullivan, synthétise ces insights en 3-5 points actionnables :\n\n${nuggets}`);
            btn.innerText = 'Sullivan Arbitrage';
        };

        // Générer PRD
        btnPrd.onclick = async () => {
            const projectName = prompt("Nom du projet ?", "AetherFlow Project");
            if (!projectName) return;
            btnPrd.innerText = "Génération...";
            try {
                const res = await fetch('/api/brs/generate-prd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, project_name: projectName })
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prd-content').textContent = data.prd_content;
                    const blob = new Blob([data.prd_content], { type: 'text/markdown' });
                    const dl = document.getElementById('prd-download');
                    dl.href = URL.createObjectURL(blob);
                    dl.download = data.prd_path ? data.prd_path.split('/').pop() : 'PRD.md';
                    document.getElementById('prd-modal').classList.remove('hidden');
                    document.getElementById('prd-modal').style.display = 'flex';
                }
            } catch (e) { console.error(e); }
            finally { btnPrd.innerText = "Générer PRD"; }
        };
    </script>
</body>
</html>
