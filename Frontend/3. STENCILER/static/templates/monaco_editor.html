<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRD Monaco Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    font-size: 14px;
    background: #fff;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    height: 48px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
    padding: 0 16px;
  }

  #header .title {
    font-size: 15px;
    font-weight: 500;
    color: #333;
    margin-right: 24px;
    letter-spacing: -0.01em;
  }

  .tab-btn {
    height: 48px;
    padding: 0 16px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    font-family: inherit;
    font-size: 14px;
    color: #999;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active {
    color: #333;
    border-bottom-color: #333;
  }
  .tab-btn:hover:not(.active) { color: #666; }

  .sep { width: 1px; height: 20px; background: #ddd; margin: 0 8px; }

  .file-input {
    flex: 1;
    max-width: 240px;
    height: 28px;
    border: 1px solid #ddd;
    padding: 0 8px;
    font-family: inherit;
    font-size: 13px;
    color: #333;
    background: #f9f9f9;
    outline: none;
  }
  .file-input:focus { border-color: #999; background: #fff; }

  .action-btn {
    height: 28px;
    padding: 0 14px;
    border: 1px solid #333;
    background: #fff;
    font-family: inherit;
    font-size: 13px;
    color: #333;
    cursor: pointer;
    margin-left: 8px;
    transition: background 0.15s;
  }
  .action-btn:hover { background: #f2f2f2; }
  .action-btn.save { background: #333; color: #fff; }
  .action-btn.save:hover { background: #555; }

  /* ── Main split ── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #editor-pane {
    width: 50%;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #monaco-container {
    flex: 1;
    overflow: hidden;
  }

  #preview-pane {
    width: 50%;
    overflow: hidden;
    position: relative;
  }

  #preview-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: #fff;
    font-size: 14px;
    padding: 8px 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 9999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <span class="title">FRD Monaco Editor</span>
  <button class="tab-btn active" id="tab-html" onclick="switchTab('html')">HTML</button>
  <button class="tab-btn" id="tab-css" onclick="switchTab('css')">CSS</button>
  <div class="sep"></div>
  <input class="file-input" id="file-name" type="text" value="brainstorm_war_room.html" placeholder="nom du fichier…">
  <button class="action-btn" onclick="loadFile()">LOAD</button>
  <button class="action-btn save" onclick="saveFile()">SAVE</button>
</div>

<div id="main">
  <div id="editor-pane">
    <div id="monaco-container"></div>
  </div>
  <div id="preview-pane">
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<div id="toast"></div>

<!-- Monaco CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
  // ── State ──
  let htmlContent = '';
  let cssContent  = '';
  let activeTab   = 'html';
  let editorHTML  = null;
  let editorCSS   = null;
  let debounceTimer = null;

  // ── Monaco init ──
  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], function() {
    const container = document.getElementById('monaco-container');

    editorHTML = monaco.editor.create(container, {
      value: htmlContent,
      language: 'html',
      theme: 'vs',
      fontSize: 12,
      minimap: { enabled: false },
      wordWrap: 'on',
      scrollBeyondLastLine: false,
      automaticLayout: true,
      fontFamily: "'Geist Mono', 'Cascadia Code', 'Fira Code', monospace",
    });

    editorCSS = monaco.editor.create(container, {
      value: cssContent,
      language: 'css',
      theme: 'vs',
      fontSize: 12,
      minimap: { enabled: false },
      wordWrap: 'on',
      scrollBeyondLastLine: false,
      automaticLayout: true,
      fontFamily: "'Geist Mono', 'Cascadia Code', 'Fira Code', monospace",
    });

    // CSS editor hidden initially
    editorCSS.getDomNode().style.display = 'none';

    editorHTML.onDidChangeModelContent(() => schedulePreview());
    editorCSS.onDidChangeModelContent(() => schedulePreview());

    // Auto-load default file
    loadFile();
  });

  // ── Tab switch ──
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-html').classList.toggle('active', tab === 'html');
    document.getElementById('tab-css').classList.toggle('active', tab === 'css');

    if (tab === 'html') {
      editorHTML.getDomNode().style.display = '';
      editorCSS.getDomNode().style.display = 'none';
      editorHTML.layout();
    } else {
      editorHTML.getDomNode().style.display = 'none';
      editorCSS.getDomNode().style.display = '';
      editorCSS.layout();
    }
  }

  // ── Load file ──
  async function loadFile() {
    const name = document.getElementById('file-name').value.trim();
    if (!name) return;
    try {
      const res = await fetch(`/api/frd/file?name=${encodeURIComponent(name)}`);
      if (!res.ok) { showToast(`Erreur ${res.status}`); return; }
      const data = await res.json();
      parseIntoTabs(data.content);
      showToast(`${name} chargé`);
    } catch(e) {
      showToast('Erreur réseau');
    }
  }

  function parseIntoTabs(fullContent) {
    // Extraire le contenu du premier <style>…</style>
    const styleMatch = fullContent.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
    if (styleMatch) {
      cssContent  = styleMatch[1];
      htmlContent = fullContent.replace(styleMatch[0], '<style id="monaco-injected-style"></style>');
    } else {
      cssContent  = '';
      htmlContent = fullContent;
    }
    if (editorHTML) editorHTML.setValue(htmlContent);
    if (editorCSS)  editorCSS.setValue(cssContent);
    updatePreview();
  }

  // ── Preview ──
  function schedulePreview() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updatePreview, 300);
  }

  function updatePreview() {
    if (!editorHTML || !editorCSS) return;
    const html = editorHTML.getValue();
    const css  = editorCSS.getValue();

    if (activeTab === 'css') {
      // CSS-only : injection sans rechargement iframe
      const frame = document.getElementById('preview-frame');
      try {
        const styleEl = frame.contentDocument && frame.contentDocument.getElementById('monaco-injected-style');
        if (styleEl) {
          styleEl.textContent = css;
          return;
        }
      } catch(e) { /* cross-origin fallback */ }
    }

    // HTML change ou premier chargement : rebuild srcdoc
    const src = html.replace(
      '<style id="monaco-injected-style"></style>',
      `<style id="monaco-injected-style">${css}</style>`
    );
    document.getElementById('preview-frame').srcdoc = src;
  }

  // ── Save file ──
  async function saveFile() {
    const name = document.getElementById('file-name').value.trim();
    if (!name) return;

    const css  = editorCSS  ? editorCSS.getValue()  : cssContent;
    const html = editorHTML ? editorHTML.getValue()  : htmlContent;

    // Recombiner : réinjecter le CSS dans la balise <style>
    const finalContent = html.replace(
      '<style id="monaco-injected-style"></style>',
      `<style>\n${css}\n</style>`
    );

    try {
      const res = await fetch('/api/frd/file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content: finalContent })
      });
      if (res.ok) showToast('Sauvegardé ✓');
      else showToast(`Erreur ${res.status}`);
    } catch(e) {
      showToast('Erreur réseau');
    }
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
