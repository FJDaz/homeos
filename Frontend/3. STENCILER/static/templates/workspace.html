<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — Workspace</title>
    <!-- 1. Tailwind Config (AVANT le script pour éviter le double-scan) -->
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                homeos: {
                  green: '#A3CD54',
                  dark: '#1a1a1a',
                  gray: '#f5f5f5',
                  border: '#e5e5e5'
                }
              },
              fontFamily: {
                sans: ['"Source Sans 3"', 'sans-serif'],
              },
              borderRadius: {
                'custom': '20px',
              }
            }
          }
        }
    </script>
    
    <!-- 2. Tailwind CSS v3 CDN (exécuté après la config) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- 3. Fonts & Styles -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/css/stenciler.css">
    <link rel="stylesheet" href="/static/css/workspace.css">
    <!-- Bootstrap.js — Navigation globale (Mission 107) -->
    <script src="/static/js/bootstrap.js"></script>
</head>
<body class="font-sans text-slate-800 bg-white h-screen flex flex-col overflow-hidden">

    <!-- HEADER LOCAL (Contrôles spécifiques Canvas) -->
    <header class="h-14 flex items-center justify-between px-6 bg-white border-b border-slate-100 z-50 shrink-0" data-purpose="header">
        <div class="flex items-center space-x-4">
            <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Workspace Canvas</span>
            <div id="ws-active-project-badge" class="px-2 py-0.5 bg-slate-100 text-slate-500 text-[9px] font-bold rounded uppercase tracking-tighter">Projet Actif</div>
        </div>
        
        <div class="flex items-center space-x-3">
            <!-- Save active screen -->
            <button id="ws-btn-save" onclick="window.wsCanvas?.saveActiveScreen(this)" class="px-4 py-1.5 border border-slate-200 rounded-custom text-[10px] font-bold text-slate-500 uppercase tracking-widest hover:text-homeos-green hover:border-homeos-green transition-all">
                save
            </button>
            <!-- Preview exit button (Visible only in preview mode) -->
            <div id="ws-preview-exit" class="hidden">
                <button onclick="window.exitPreviewMode()" class="px-6 py-2 border border-slate-200 rounded-custom text-[11px] font-bold text-slate-500 uppercase hover:text-homeos-green transition-all">
                    Quitter l'aperçu
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CANVAS AREA -->
    <main class="flex-grow relative bg-dot-grid overflow-hidden" id="canvas-wrapper">
        
        <!-- SVG CANVAS DYNAMIQUE -->
        <svg id="ws-canvas" class="w-full h-full cursor-grab active:cursor-grabbing" xmlns="http://www.w3.org/2000/svg">
            <g id="canvas-content" transform="matrix(1 0 0 1 0 0)"></g>
        </svg>

        <!-- PREVIEW OVERLAY (Mission 130-B) -->
        <div id="ws-preview-overlay" class="hidden absolute inset-0 bg-transparent z-[35] flex items-center justify-center overflow-auto">
            <div id="ws-preview-frame-container" class="relative">
                <!-- Actual preview content will be injected here -->
            </div>
            
            <!-- WIRE OVERLAY (Mission 147) -->
            <div id="ws-wire-overlay" class="hidden absolute inset-0 z-[50] flex flex-col">
              <!-- Fond blur -->
              <div class="absolute inset-0 backdrop-blur-sm bg-white/80"></div>
              <!-- Contenu -->
              <div class="relative z-10 flex flex-col h-full p-8 gap-6 max-w-5xl mx-auto w-full">
                <!-- Header -->
                <div class="flex items-center justify-between">
                  <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-widest">wire — mapping composants</h2>
                  <span id="ws-wire-import-label" class="text-xs text-slate-400 font-mono tracking-tighter"></span>
                </div>
                <!-- Tableau -->
                <div class="flex-1 overflow-auto rounded-lg border border-slate-200 bg-white shadow-sm scrollbar-hide">
                  <table class="w-full text-xs text-slate-600">
                    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-20">
                      <tr>
                        <th class="px-4 py-3 text-left font-medium">Composant</th>
                        <th class="px-4 py-3 text-left font-medium">Rôle</th>
                        <th class="px-4 py-3 text-left font-medium">Z-index</th>
                        <th class="px-4 py-3 text-left font-medium">Statut</th>
                      </tr>
                    </thead>
                    <tbody id="ws-wire-table-body" class="divide-y divide-slate-100">
                      <!-- Rows injectées par WsWire.show() -->
                    </tbody>
                  </table>
                </div>
                <!-- Actions -->
                <div class="flex items-center gap-3 justify-end">
                  <button id="ws-wire-btn-cadrage" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest text-slate-500 border border-slate-200 rounded-custom hover:bg-slate-50 transition-all">
                    retour cadrage
                  </button>
                  <button id="ws-wire-btn-validate" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest text-white bg-slate-900 rounded-custom hover:bg-black shadow-lg shadow-slate-200 transition-all">
                    valider le wire
                  </button>
                </div>
              </div>
            </div>
        </div>

        <!-- SIDEBAR PANELS LEFT (Z3) -->
        <div class="absolute top-8 left-8 flex flex-col space-y-4 z-40 pointer-events-none" id="ws-left-panels">
            
            <!-- SECTION SCREENS (Stable wrapper) -->
            <div id="section-screens" class="flex flex-col items-start">
                <!-- PANEL SCREENS -->
                <aside id="panel-screens" class="w-80 glass-card rounded-custom shadow-2xl border border-slate-100 transition-all duration-300 pointer-events-auto origin-top-left">
                    <div class="p-4 border-b border-slate-100 flex items-center justify-between cursor-pointer hover:bg-slate-50/50 transition-colors" onclick="togglePanel('panel-screens')">
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 rounded-full bg-homeos-green"></div>
                            <span class="text-[10px] font-bold text-slate-800 uppercase tracking-widest">screens list</span>
                        </div>
                        <div class="p-1 text-slate-300">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </div>
                    </div>
                    <div class="p-4 max-h-[30vh] overflow-y-auto" id="ws-import-list">
                        <div class="text-xs text-slate-400 italic">chargement...</div>
                    </div>
                </aside>
                <!-- BADGE SCREENS (Shown when collapsed) -->
                <button id="badge-screens" onclick="togglePanel('panel-screens')" class="badge-hidden pointer-events-auto bg-homeos-green text-white px-4 py-2 rounded-custom shadow-lg flex items-center justify-center transition-all hover:pl-6 w-fit">
                    <span class="text-[10px] font-bold uppercase tracking-widest">screens</span>
                </button>
            </div>

            <!-- SECTION AUDIT UX (Stable wrapper) -->
            <div id="section-audit" class="flex flex-col items-start">
                <!-- PANEL AUDIT UX -->
                <aside id="panel-audit" class="w-80 glass-card rounded-custom shadow-2xl border border-slate-100 transition-all duration-300 pointer-events-auto origin-top-left">
                    <div class="p-4 border-b border-slate-100 flex items-center justify-between cursor-pointer hover:bg-slate-50/50 transition-colors" onclick="togglePanel('panel-audit')">
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 rounded-full bg-amber-500"></div>
                            <span class="text-[10px] font-bold text-slate-800 uppercase tracking-widest">audit ux analytics</span>
                        </div>
                        <div class="p-1 text-slate-300">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        </div>
                    </div>
                    <div class="p-6 max-h-[40vh] overflow-y-auto" id="ws-audit-content">
                        <div class="text-[11px] text-slate-400 italic leading-relaxed">sélectionnez un écran pour lancer l'audit Sullivan.</div>
                    </div>
                </aside>
                <!-- BADGE AUDIT (Shown when collapsed) -->
                <button id="badge-audit" onclick="togglePanel('panel-audit')" class="badge-hidden pointer-events-auto bg-slate-900 text-white px-4 py-2 rounded-custom shadow-lg flex items-center justify-center transition-all hover:pl-6 w-fit">
                    <span class="text-[10px] font-bold uppercase tracking-widest">audit ux</span>
                </button>
            </div>

        </div>

        <!-- TOOLBAR DROITE : CANVAS TOOLS (Mission 129) -->
        <nav class="absolute top-1/2 right-8 -translate-y-1/2 flex flex-col z-40 pointer-events-none" data-purpose="floating-toolbar" style="max-height: calc(100vh - 120px); overflow-y: auto;">
            <div class="glass-card rounded-custom p-2 flex flex-col space-y-2 shadow-xl border border-slate-100 items-center pointer-events-auto">
                
                <!-- SELECT (Arrow) -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green active-tool shadow-inner-soft transition-all" data-mode="select" title="Sélectionner (V)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg>
                </button>

                <!-- PAN (Hand) -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green transition-all" data-mode="drag" title="Déplacer (H)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0V12m3.001-3.5a1.5 1.5 0 113 0V12m3.001-4.5a1.5 1.5 0 113 0V12M9 11V9m6 2V9m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2z"/></svg>
                </button>

                <div class="h-px bg-slate-100 w-8 mx-auto my-1"></div>

                <!-- PLACE IMAGE -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green transition-all" data-mode="place-img" title="Placer Image (I)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </button>

                <!-- FRAME (Rectangle) -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green transition-all" data-mode="frame" title="Créer un cadre (F)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5z"/></svg>
                </button>

                <!-- COLORS (Dropper) -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green transition-all" data-mode="colors" title="Couleurs (C)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
                </button>

                <!-- TEXT (Type) -->
                <button class="ws-tool-btn p-3 rounded-xl text-slate-400 hover:text-homeos-green transition-all" data-mode="text" title="Typographie (T)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
                </button>

                <div class="h-px bg-slate-100 w-8 mx-auto my-1"></div>

                <!-- ZOOM INDICATOR -->
                <div class="flex flex-col items-center py-2">
                    <span class="text-[9px] font-bold text-slate-300 uppercase tracking-tighter" id="zoom-level">100%</span>
                    <button class="p-1 text-slate-300 hover:text-slate-500 transition-colors" onclick="window.wsCanvas.resetView()" title="Réinitialiser vue (0)">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- ASSISTANT SULLIVAN (CENTRAL BOTTOM) -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-full max-w-3xl px-6 z-40" data-purpose="chat-interface">
            <div class="glass-card rounded-custom overflow-hidden shadow-2xl border border-slate-100">
                <!-- Header (Mission 143 Compact) -->
                <div class="px-4 py-2 border-b border-slate-50 flex items-center space-x-2 bg-white">
                    <div class="w-1.5 h-1.5 rounded-full bg-homeos-green"></div>
                    <span class="text-[11px] font-semibold text-slate-800 uppercase tracking-wider">Sullivan</span>
                    <span class="text-[8px] uppercase font-bold text-[#A3CD54] tracking-tighter ml-2">v3</span>
                </div>
                
                <!-- Typography Drawer (Mission 129) -->
                <div id="ws-font-drawer" class="hidden px-6 py-4 border-t border-slate-50 bg-white transition-all duration-300">
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Typography Advisor</div>
                        <label for="ws-font-upload" class="px-3 py-1 border border-slate-200 rounded text-[9px] font-bold uppercase tracking-wider text-slate-500 hover:border-homeos-green hover:text-homeos-green transition-all cursor-pointer">
                            téléverser
                            <input id="ws-font-upload" type="file" class="hidden" accept=".ttf,.otf" multiple onchange="window.wsFontManager.handleUpload(this.files)">
                        </label>
                    </div>
                    <div id="ws-font-grid" class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                        <!-- Font Cards injected here -->
                    </div>
                </div>

                <!-- Messages area (Mission 143: max 2 bulles, ~96px) -->
                <div id="ws-chat-history" class="hidden flex flex-col gap-1 px-4 py-2 max-h-24 overflow-y-auto text-[11px]"></div>

                <!-- Input area (Mission 143: compact heights) -->
                <div class="p-3 bg-[#fcfcfc]">
                    <textarea id="ws-chat-input" class="w-full bg-transparent border-none focus:ring-0 text-slate-600 text-sm placeholder-slate-300 resize-none h-12" placeholder="Un coup de main ?"></textarea>
                    
                    <div class="flex items-center justify-between mt-2">
                        <div class="flex items-center space-x-2">
                            <!-- Direct Upload -->
                            <button onclick="document.getElementById('ws-direct-upload').click()" class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:text-homeos-green hover:bg-slate-50 transition-all">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                            </button>
                            <input type="file" id="ws-direct-upload" class="hidden" multiple accept=".svg,.zip,.tsx,.ts,.html,.css,.js,.png,.jpg,.jpeg">

                            <!-- Toggle Group -->
                            <div class="flex bg-slate-100 p-1 rounded-custom">
                                <button data-mode="construct" class="ws-mode-btn px-4 py-1.5 rounded-custom text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-slate-600 transition-all">
                                    CONSTRUCT
                                </button>
                                <button data-mode="wire" class="ws-mode-btn px-4 py-1.5 rounded-custom text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-slate-600 transition-all">
                                    WIRE
                                </button>
                            </div>

                            <!-- Typography Drawer Toggle -->
                            <button id="btn-ws-typo" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:text-homeos-green hover:bg-slate-50 transition-all" title="Typographie">
                                <span class="text-[10px] font-bold">Aa</span>
                            </button>
                        </div>
                        
                        <!-- Submit Button -->
                        <button id="btn-ws-send" class="w-8 h-8 rounded-full border border-slate-200 bg-white flex items-center justify-center text-slate-400 hover:text-homeos-green hover:border-homeos-green hover:shadow-md transition-all">
                            <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="m5 12 7-7 7 7"></path><path d="M12 19V5"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER: CODE PREVIEW BUTTON -->
        <div id="ws-frd-btn-wrapper" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-40">
            <button onclick="window.location.href='/frd-editor'" class="bg-white border border-slate-200 px-6 py-2 rounded-custom text-[10px] font-bold uppercase tracking-widest text-slate-500 shadow-sm hover:shadow-md hover:text-homeos-green transition-all flex items-center space-x-2">
                <span>&lt;/&gt; FRD Editor view</span>
            </button>
        </div>

    </main>

    <!-- MONACO POPOVER (Mission 130 — Inspect) -->
    <div id="ws-popover-container" class="hidden fixed z-[60] pointer-events-none origin-top-left transition-all duration-300">
        <div id="ws-monaco-popover" class="glass-card shadow-2xl border border-slate-200 rounded-xl overflow-hidden pointer-events-auto flex flex-col bg-white/95 backdrop-blur-md scale-95 opacity-0 transition-all duration-300">
            <div class="px-4 py-2 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 cursor-move" id="ws-popover-header">
                <div class="flex items-center space-x-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-homeos-green animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Snippets Engine</span>
                    <span id="ws-popover-tag" class="text-[9px] font-mono text-slate-300 bg-slate-100 px-1 rounded lowercase">div</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="ws-popover-save" class="px-3 py-1 bg-homeos-green text-white text-[10px] font-bold rounded-md hover:opacity-90 transition-all uppercase tracking-widest">Graft</button>
                    <button id="ws-popover-close" class="p-1 text-slate-300 hover:text-slate-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <div id="ws-popover-editor" class="w-[450px] h-[300px] resize overflow-hidden"></div>
        </div>
    </div>

    <!-- COLOR PICKER TSL (Mission 133) -->
    <div id="ws-color-container" class="hidden fixed z-[60] pointer-events-none origin-top-left transition-all duration-300">
        <div id="ws-color-popover" class="glass-card shadow-2xl border border-slate-200 rounded-xl overflow-hidden pointer-events-auto flex flex-col bg-white/95 backdrop-blur-md p-4 space-y-4 w-64 scale-95 opacity-0 transition-all duration-300">
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Color TSL</span>
                <div class="flex items-center space-x-2">
                    <div id="ws-color-preview" class="w-4 h-4 rounded-full border border-slate-200"></div>
                    <button id="ws-color-close" class="text-slate-300 hover:text-slate-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
            </div>
            
            <div class="space-y-3">
                <div class="flex flex-col space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-400">Teinte (H)</label>
                    <input type="range" id="ws-tsl-h" min="0" max="360" value="163" class="w-full h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-homeos-green">
                </div>
                <div class="flex flex-col space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-400">Saturation (S)</label>
                    <input type="range" id="ws-tsl-s" min="0" max="100" value="50" class="w-full h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-homeos-green">
                </div>
                <div class="flex flex-col space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-400">Luminosité (L)</label>
                    <input type="range" id="ws-tsl-l" min="0" max="100" value="50" class="w-full h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-homeos-green">
                </div>
            </div>
            <button id="ws-color-apply" class="w-full py-2 bg-slate-900 text-white text-[10px] font-bold rounded-lg uppercase tracking-widest hover:bg-black transition-all">Appliquer</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="/static/js/workspace/WsCanvas.js"></script>
    <script src="/static/js/workspace/WsChat.js"></script>
    <script src="/static/js/workspace/ws_font_manager.js"></script>
    <script src="/static/js/workspace/WsInspect.js"></script>
    <script src="/static/js/workspace/WsWire.js"></script>
    <!-- TYPO INSPECTOR (Mission 134) -->
    <div id="ws-typo-container" class="hidden fixed z-[60] pointer-events-none origin-top-left transition-all duration-300">
        <div id="ws-typo-popover" class="glass-card shadow-2xl border border-slate-200 rounded-xl overflow-hidden pointer-events-auto flex flex-col bg-white/95 backdrop-blur-md p-4 space-y-4 w-72 scale-95 opacity-0 transition-all duration-300">
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Arsenal Typo</span>
                <button id="ws-typo-close" class="text-slate-300 hover:text-slate-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex flex-col space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-400">Police Système</label>
                    <select id="ws-typo-font" class="w-full bg-slate-50 border-slate-200 rounded-lg text-xs py-2 focus:ring-homeos-green focus:border-homeos-green font-sans">
                        <option value="Source Sans 3">Source Sans 3 (Default)</option>
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col space-y-1">
                        <label class="text-[9px] uppercase font-bold text-slate-400">Taille (px)</label>
                        <input type="number" id="ws-typo-size" value="16" class="w-full bg-slate-50 border-slate-200 rounded-lg text-xs py-2">
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[9px] uppercase font-bold text-slate-400">Graisse</label>
                        <select id="ws-typo-weight" class="w-full bg-slate-50 border-slate-200 rounded-lg text-xs py-2">
                            <option value="400">Regular</option>
                            <option value="500">Medium</option>
                            <option value="600">SemiBold</option>
                            <option value="700">Bold</option>
                        </select>
                    </div>
                </div>
                <button id="ws-typo-apply" class="w-full py-2 bg-slate-900 text-white text-[10px] font-bold rounded-lg uppercase tracking-widest hover:bg-black transition-all">Appliquer & Générer</button>
            </div>
        </div>
    </div>

    <!-- HIDDEN INPUTS (Mission 132-B) -->
    <input type="file" id="ws-internal-image-loader" class="hidden" accept="image/*">

    <script type="module" src="/static/js/workspace/ws_main.js"></script>
</body>
