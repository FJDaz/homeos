<!DOCTYPE html>
<html lang="fr" class="bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room (Tailwind Refined)</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Inter & Geist -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#ffffff',
                            panel: '#f9f9f9',
                            input: '#f2f3f5',
                            text: '#666666',
                            textDark: '#333333',
                            tabActive: '#8cc63f',
                            dotGreen: '#5ec069',
                            send: '#999999',
                            sep: '#333333',
                        },
                        accent: {
                            bleu: '#a8c5fc',
                            mauve: '#c4b5d4',
                            vert: '#a8dcc9',
                            orange: '#edd0b0',
                        }
                    },
                    fontFamily: {
                        homeos: ['"Helvetica LT STD"', 'Helvetica', 'Inter', 'Geist', 'Arial', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                        geist: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sullivan-arbitrage {
            font-style: italic;
            color: #c4b5d4;
            border-left: 2px solid #c4b5d4;
            padding-left: 10px;
            margin-bottom: 15px;
            font-size: 15px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-geist text-figma-text bg-white">

    <!-- Sidebar Gauche (Aside) - 350px -->
    <aside class="flex flex-col w-[350px] h-full p-[42px] border-r-[0.5px] border-figma-sep bg-white flex-shrink-0">
        <div class="flex justify-center mb-[40px]">
            <div class="font-homeos text-[40px] font-[900] text-black tracking-[-0.02em] leading-tight">
                Homé<span class="text-figma-tabActive">os</span>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="Recherche sémantique…" 
               class="bg-figma-input border-none p-[12px_16px] text-[15px] outline-none rounded-none">
        
        <div id="session-info" class="mt-auto text-[15px] text-gray-400">Id: --</div>
    </aside>

    <!-- RIGHT SECTION -->
    <div class="flex-1 flex flex-col min-w-0">
        
        <!-- Header (Tabs) -->
        <header class="h-[64px] border-b-[0.5px] border-figma-sep bg-white flex-shrink-0">
            <nav class="flex h-full">
                <a href="#" class="flex-1 flex items-center justify-center border-r-[0.5px] border-figma-sep font-[system-ui] text-[15px] text-black hover:text-figma-tabActive transition-colors">Brainstorm</a>
                <a href="#" class="flex-1 flex items-center justify-center border-r-[0.5px] border-figma-sep font-[system-ui] text-[15px] text-figma-tabActive font-[900]">Backend</a>
                <a href="#" class="flex-1 flex items-center justify-center border-r-[0.5px] border-figma-sep font-[system-ui] text-[15px] text-black">Frontend</a>
                <a href="#" class="flex-1 flex items-center justify-center border-r-[0.5px] border-figma-sep font-[system-ui] text-[15px] text-black">Deploy</a>
            </nav>
        </header>

        <!-- Lower Workspace -->
        <div class="flex-1 flex overflow-hidden">
            
            <!-- IA Workspace (Grid AI + Footer) -->
            <div class="flex-1 flex flex-col min-w-0">
                
                <!-- LLM Grid (3 columns) -->
                <main class="flex-1 grid grid-cols-3 overflow-hidden">
                    <!-- Column: Gemini -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center">
                            <div class="font-inter text-[15px] text-figma-text mb-3 tracking-wider">Aujourd'hui</div>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" class="h-6 w-auto" alt="Gemini">
                        </div>
                        <div id="stream-gemini" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[15px] border-r-[0.5px] border-figma-sep items-center"></div>
                    </section>
                    <!-- Column: DeepSeek -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center">
                            <div class="font-inter text-[15px] text-figma-text mb-3 tracking-wider">Aujourd'hui</div>
                            <img src="https://deepseek.com/favicon.ico" class="h-6 w-6" alt="DeepSeek">
                        </div>
                        <div id="stream-deepseek" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[15px] border-r-[0.5px] border-figma-sep items-center"></div>
                    </section>
                    <!-- Column: Mistral -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center">
                            <div class="font-inter text-[15px] text-figma-text mb-3 tracking-wider flex items-center gap-2">
                                Aujourd'hui
                                <span class="w-1.5 h-1.5 rounded-full bg-figma-tabActive"></span>
                            </div>
                            <img src="https://mistral.ai/favicon.ico" class="h-6 w-6" alt="Mistral">
                        </div>
                        <div id="stream-mistral" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[15px] items-center"></div>
                    </section>
                </main>

                <!-- IA Footer (3 invisible columns for results) -->
                <footer class="h-[100px] border-t-[0.5px] border-figma-sep bg-figma-input grid grid-cols-3 flex-shrink-0">
                    <div id="results-gemini" class="p-4 overflow-y-auto no-scrollbar text-[15px] text-gray-500 italic flex flex-col items-center"></div>
                    <div id="results-deepseek" class="p-4 overflow-y-auto no-scrollbar text-[15px] text-gray-500 italic flex flex-col items-center"></div>
                    <div id="results-mistral" class="p-4 overflow-y-auto no-scrollbar text-[15px] text-gray-500 italic flex flex-col items-center"></div>
                    
                    <!-- Preserved but hidden interaction markers -->
                    <button id="btn-dispatch" class="hidden"></button>
                    <input type="text" id="prompt-input" class="hidden">
                </footer>
            </div>

            <!-- Sullivan Panel (Next to IA Workspace, Down to bottom) -->
            <section id="sullivan-panel" class="w-[336px] flex flex-col border-l-[0.5px] border-figma-sep bg-figma-panel flex-shrink-0">
                <div class="h-[101px] flex items-center p-[0_32px] bg-white border-b-[0.5px] border-black gap-3 flex-shrink-0">
                    <div class="w-2 h-2 rounded-full bg-figma-dotGreen shadow-[0_0_8px_rgba(94,192,105,0.5)]"></div>
                    <div class="font-geist text-[15px] text-figma-text">Sullivan</div>
                </div>
                
                <div id="nugget-list" class="flex-1 overflow-y-auto p-8 no-scrollbar flex flex-col gap-4">
                    <!-- nuggets here -->
                </div>

                <div class="p-6 bg-white border-t-[0.5px] border-figma-sep flex flex-col gap-3 flex-shrink-0">
                    <button id="btn-arbitrate" class="w-full h-[40px] border-[0.5px] border-black text-[15px] font-geist hover:bg-gray-50 transition-colors tracking-widest">
                        Sullivan Arbitrage
                    </button>
                    <button id="btn-prd" disabled class="w-full h-[40px] bg-figma-tabActive text-white text-[15px] font-bold disabled:bg-gray-300 disabled:cursor-not-allowed tracking-widest">
                        Générer PRD
                    </button>
                </div>
            </section>
        </div>
    </div>

    <!-- PRD Modal -->
    <div id="prd-modal" class="hidden fixed inset-0 bg-black/50 z-[1000] items-center justify-center p-10">
        <div class="bg-white w-full max-w-4xl h-full flex flex-col shadow-2xl font-homeos">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <span class="font-semibold text-figma-textDark whitespace-nowrap text-[15px]">Dossier de conception AI</span>
                <div class="flex gap-4">
                    <a id="prd-download" download="PRD.md" href="#" class="text-figma-tabActive font-bold border-b border-transparent hover:border-figma-tabActive px-2 py-1 transition-all text-[15px]">Télécharger</a>
                    <button onclick="document.getElementById('prd-modal').classList.add('hidden')" class="px-4 py-1 text-red-500 hover:bg-red-50 rounded transition-all text-[15px]">Fermer</button>
                </div>
            </div>
            <pre id="prd-content" class="flex-1 p-10 overflow-y-auto whitespace-pre-wrap font-geist text-figma-text text-[15px] leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const sessionId = "BRS-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;

        const streams = {
            gemini: document.getElementById('stream-gemini'),
            deepseek: document.getElementById('stream-deepseek'),
            mistral: document.getElementById('stream-mistral')
        };
        
        const footerResults = {
            gemini: document.getElementById('results-gemini'),
            deepseek: document.getElementById('results-deepseek'),
            mistral: document.getElementById('results-mistral')
        };

        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');
        const promptInput = document.getElementById('prompt-input');

        let basketCount = 0;

        function addNugget(text, provider) {
            if (basketCount === 0) nuggetList.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'bg-white p-4 border-l-4 border-figma-tabActive shadow-sm self-end max-w-[90%] relative mb-2';
            div.innerHTML = `
                <div class="text-[15px] leading-relaxed">${text}</div>
                <div class="text-[15px] text-gray-400 mt-2 tracking-tighter">${provider} · capture</div>
            `;
            nuggetList.prepend(div);
            basketCount++;
            btnPrd.disabled = false;
        }

        async function captureNugget(text, provider) {
            try {
                const res = await fetch('/api/brs/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, text: text, provider: provider })
                });
                if (res.ok) addNugget(text, provider);
            } catch (e) { console.error("Capture error", e); }
        }

        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'bg-white border-b-[0.5px] border-figma-input pb-8 relative group mb-4 w-full';
            const content = document.createElement('div');
            content.className = 'text-[15px] leading-relaxed';
            card.appendChild(content);
            const btn = document.createElement('button');
            btn.className = 'absolute bottom-0 right-0 w-11 h-11 bg-figma-input flex items-center justify-center text-xl hover:bg-accent-bleu/20 transition-colors opacity-0 group-hover:opacity-100';
            btn.innerHTML = '＋';
            btn.onclick = (e) => { e.stopPropagation(); captureNugget(content.innerText, provider); };
            card.appendChild(btn);
            streams[provider].appendChild(card);
            streams[provider].scrollTop = streams[provider].scrollHeight;
            return content;
        }

        function startStreaming(provider) {
            const eventSource = new EventSource(`/api/brs/stream/${sessionId}/${provider}`);
            let currentCard = null;
            eventSource.addEventListener('token', (e) => {
                const token = JSON.parse(e.data);
                if (!currentCard) currentCard = createInsightCard(provider);
                currentCard.innerText += token;
                streams[provider].scrollTop = streams[provider].scrollHeight;
            });
            eventSource.addEventListener('done', (e) => eventSource.close());
            eventSource.onerror = (e) => eventSource.close();
        }

        async function dispatchPrompt(prompt) {
            if (!prompt) return;
            Object.values(streams).forEach(s => s.innerHTML = '');
            try {
                const res = await fetch('/api/brs/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, prompt: prompt })
                });
                if (res.ok) {
                    startStreaming('gemini');
                    startStreaming('deepseek');
                    startStreaming('mistral');
                }
            } catch (e) { console.error("Dispatch failed", e); }
        }

        btnPrd.onclick = async () => {
            const projectName = prompt("Nom du projet ?", "AetherFlow Project");
            if (!projectName) return;
            btnPrd.innerText = "Génération...";
            try {
                const res = await fetch('/api/brs/generate-prd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, project_name: projectName })
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prd-content').textContent = data.prd_content;
                    const blob = new Blob([data.prd_content], { type: 'text/markdown' });
                    const dl = document.getElementById('prd-download');
                    dl.href = URL.createObjectURL(blob);
                    dl.download = data.prd_path.split('/').pop() || 'PRD.md';
                    document.getElementById('prd-modal').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
            finally { btnPrd.innerText = "Générer PRD"; }
        };

        const searchInput = document.getElementById('search-input');
        searchInput.onkeydown = async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;
                try {
                    const res = await fetch(`/api/brs/search?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data.status === 'ok' && data.results.length > 0) {
                        // Clear previous footer results
                        Object.values(footerResults).forEach(f => f.innerHTML = '');
                        
                        data.results.forEach(res => {
                            const provider = res.provider.toLowerCase();
                            if (footerResults[provider]) {
                                const div = document.createElement('div');
                                div.className = 'mb-2 pb-2 border-b border-white border-opacity-20';
                                div.innerHTML = `<div class="font-bold">[${res.session_id.substr(0,8)}]</div>${res.excerpt}`;
                                footerResults[provider].appendChild(div);
                            }
                        });
                    } else {
                        dispatchPrompt(query);
                    }
                } catch (e) { console.error("Search failed", e); }
            }
        };

        document.getElementById('btn-arbitrate').onclick = async () => {
            const btn = document.getElementById('btn-arbitrate');
            btn.innerText = "Arbitrage...";
            const eventSource = new EventSource(`/api/brs/arbitrate/${sessionId}`);
            nuggetList.innerHTML = ''; 
            const sullivanDiv = document.createElement('div');
            sullivanDiv.className = 'sullivan-arbitrage';
            nuggetList.appendChild(sullivanDiv);
            eventSource.addEventListener('message', (e) => {
                const token = JSON.parse(e.data);
                sullivanDiv.innerText += token;
                nuggetList.scrollTop = nuggetList.scrollHeight;
            });
            eventSource.addEventListener('done', (e) => {
                eventSource.close();
                btn.innerText = "Sullivan Arbitrage";
            });
            eventSource.onerror = (e) => {
                eventSource.close();
                btn.innerText = "Sullivan Arbitrage";
            };
        };
    </script>
</body>
</html>
