<!DOCTYPE html>
<html lang="fr" class="bg-[#fafafa]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: { bg: '#ffffff', panel: '#f9f9f9', input: '#f2f3f5', text: '#666666', textDark: '#1a1a1a', tabActive: '#8cc63f', dotGreen: '#5ec069', sep: '#e5e5e5' }
                    },
                    fontFamily: {
                        homeos: ['"Helvetica LT Std"', 'Helvetica', 'Inter', 'sans-serif'],
                        geist: ['Geist', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-image: radial-gradient(#eeeeee 0.5px, transparent 0.5px); background-size: 20px 20px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-geist text-figma-text bg-white">

    <aside id="sidebar" class="group relative flex flex-col w-[300px] h-full p-8 pl-[37px] border-r-[0.5px] border-figma-sep flex-shrink-0 transition-all duration-300 overflow-hidden has-[:checked]:w-[70px]">
        
        <div class="mb-12 font-homeos text-2xl text-black tracking-tighter whitespace-nowrap cursor-pointer">
            <input type="checkbox" id="sidebar-toggle" class="peer hidden">
            <label for="sidebar-toggle" class="absolute top-[35px] right-8 z-10 text-gray-300 hover:text-black cursor-pointer peer-checked:rotate-180 transition-transform">
                <svg class="w-5 h-5 mr-[2px] relative left-[3px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </label>
            <span class="font-black peer-checked:text-figma-tabActive transition-colors">H</span><span class="font-black peer-checked:hidden">omé<span class="text-figma-tabActive">OS</span></span>

            <input type="text" id="search-input" placeholder="Recherche..." 
                   class="block mt-8 bg-transparent border-b-[0.5px] border-gray-200 focus:border-figma-tabActive pb-2 outline-none text-[14px] w-full tracking-[0] transition-all peer-checked:hidden">
            
            <div id="session-info" class="mt-auto pt-8 text-[11px] text-gray-300 uppercase tracking-widest peer-checked:hidden">Id: --</div>
        </div>

    </aside>

    <div class="flex-1 flex flex-col min-w-0 transition-all duration-300">
        <header class="h-[60px] border-b-[0.5px] border-figma-sep flex items-center justify-between px-10">
            <nav class="flex items-end gap-10 h-full">
                <a href="#" class="text-[13px] font-semibold text-figma-tabActive border-b-[2px] border-figma-tabActive h-full flex items-center">Brainstorm</a>
                <a href="#" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Backend</a>
                <a href="#" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Frontend</a>
                <a href="#" class="text-[13px] text-gray-400 hover:text-black transition-colors h-full flex items-center">Deploy</a>
            </nav>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-1 flex overflow-hidden">
                <section class="flex-1 border-r-[0.5px] border-figma-sep flex flex-col p-6">
                    <div class="flex items-center gap-2 mb-4 text-[11px] uppercase font-bold tracking-wider text-black">
                        <span class="w-2 h-2 rounded-full bg-[#e8f5e9] border border-figma-dotGreen"></span> Gemini
                    </div>
                    <div id="stream-gemini" class="flex-1 overflow-y-auto no-scrollbar space-y-6"></div>
                    <input type="text" placeholder="Envoyer un message..." class="mt-4 bg-transparent border-b-[0.5px] border-gray-200 focus:border-figma-tabActive pb-2 outline-none text-[14px] w-full transition-colors">
                </section>
                <section class="flex-1 border-r-[0.5px] border-figma-sep flex flex-col p-6">
                    <div class="flex items-center gap-2 mb-4 text-[11px] uppercase font-bold tracking-wider text-black">
                        <span class="w-2 h-2 rounded-full bg-[#e8f5e9] border border-figma-dotGreen"></span> Deepseek
                    </div>
                    <div id="stream-deepseek" class="flex-1 overflow-y-auto no-scrollbar space-y-6"></div>
                    <input type="text" placeholder="Envoyer un message..." class="mt-4 bg-transparent border-b-[0.5px] border-gray-200 focus:border-figma-tabActive pb-2 outline-none text-[14px] w-full transition-colors">
                </section>
                <section class="flex-1 border-r-[0.5px] border-figma-sep flex flex-col p-6">
                    <div class="flex items-center gap-2 mb-4 text-[11px] uppercase font-bold tracking-wider text-black">
                        <span class="w-2 h-2 rounded-full bg-figma-dotGreen"></span> Mistral
                    </div>
                    <div id="stream-mistral" class="flex-1 overflow-y-auto no-scrollbar space-y-6"></div>
                    <input type="text" placeholder="Envoyer un message..." class="mt-4 bg-transparent border-b-[0.5px] border-gray-200 focus:border-figma-tabActive pb-2 outline-none text-[14px] w-full transition-colors">
                </section>
            </div>
            <footer class="h-10 w-full bg-[#f9f9f9] border-t-[0.5px] border-figma-sep flex items-center px-6 text-[10px] text-gray-400 uppercase tracking-widest">
            </footer>
        </main>
    </div>

    <section id="sullivan-panel" class="w-[300px] flex flex-col border-l-[1px] border-figma-sep bg-[#fdfdfd]">
        <div class="h-[60px] flex items-center px-8 border-b-[0.5px] border-figma-sep text-[13px] font-semibold gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-figma-tabActive"></span> Sullivan
        </div>
        <div id="nugget-list" class="flex-1 overflow-y-auto p-8 text-[14px] leading-relaxed"></div>
        <div class="p-8 border-t-[0.5px] border-figma-sep space-y-3">
            <button id="btn-arbitrate" class="w-full py-2 text-[12px] uppercase tracking-widest border border-gray-200 hover:border-black rounded-lg transition-all shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1)]">Arbitrer</button>
            <button id="btn-prd" class="w-full py-2 text-[12px] uppercase tracking-widest bg-[#d1d5db] text-white hover:bg-figma-tabActive rounded-lg transition-all shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1)]">Générer prd</button>
        </div>
    </section>

    <div id="prd-modal" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[1000] flex items-center justify-center p-20">
        <div class="bg-white border border-figma-sep w-full max-w-2xl h-full shadow-xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <span class="font-bold text-black">Prd draft</span>
                <button onclick="document.getElementById('prd-modal').classList.add('hidden')" class="text-xs">Fermer</button>
            </div>
            <pre id="prd-content" class="flex-1 p-8 overflow-y-auto text-[14px]"></pre>
        </div>
    </div>

    <script>
        const sessionId = "BRS-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;
        const streams = { gemini: document.getElementById('stream-gemini'), deepseek: document.getElementById('stream-deepseek'), mistral: document.getElementById('stream-mistral') };
        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');
        
        function addNugget(text, provider) {
            const div = document.createElement('div');
            div.className = 'mb-4 p-4 border-l-2 border-figma-tabActive bg-white shadow-sm text-xs';
            div.innerHTML = `<div>${text}</div><div class="mt-2 text-gray-300 uppercase">${provider}</div>`;
            nuggetList.prepend(div);
        }
        
        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'text-[14px] text-gray-800 leading-relaxed';
            streams[provider].appendChild(card);
            return card;
        }

        function startStreaming(provider) {
            const eventSource = new EventSource(`/api/brs/stream/${sessionId}/${provider}`);
            let currentCard = null;
            eventSource.addEventListener('token', (e) => { 
                const token = JSON.parse(e.data); 
                if (!currentCard) currentCard = createInsightCard(provider); 
                currentCard.innerText += token; 
            });
            eventSource.addEventListener('done', () => eventSource.close());
        }
    </script>
</body>
</html>
