<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room Brainstorm</title>
    <!-- Fonts: Inter & Geist -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    <style>
        :root {
            /* Palette Figma extracted from spec */
            --figma-bg: #ffffff;
            --figma-panel: #f9f9f9;
            --figma-input-bg: #f2f3f5;
            --figma-text: #666666;
            --figma-text-dark: #333333;
            --figma-tab-active: #8cc63f;
            --figma-dot-green: #5ec069;
            --figma-send: #999999;
            --figma-bubble-user: #e4e6ea;
            --figma-bubble-s: #a58de0;
            --figma-bubble-sl: #e0e6fc;
            --figma-dots: #626ae8;
            --figma-sep: #333333;

            /* Stenciler Base (for consistency) */
            --accent-bleu: #a8c5fc;
            --accent-mauve: #c4b5d4;
            --accent-vert: #a8dcc9;
            --accent-orange: #edd0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--figma-bg);
            color: var(--figma-text);
            font-family: 'Geist', -apple-system, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 554px;
            height: 100%;
            background: #fff;
            border-right: 0.5px solid var(--figma-sep);
            display: flex;
            flex-direction: column;
            padding: 42px 40px;
            flex-shrink: 0;
        }

        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* ========== HEADER (Tabs y=18.8 area) ========== */
        .app-header {
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid var(--figma-sep);
            background: #fff;
            z-index: 100;
        }

        .nav-tabs {
            flex: 1;
            display: flex;
            height: 100%;
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 22px;
            color: #000;
            border-left: 0.5px solid var(--figma-sep);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .tab-item:last-child {
            border-right: 0.5px solid var(--figma-sep);
        }

        .tab-item.active {
            color: var(--figma-tab-active);
            font-weight: 900;
        }

        /* ========== MAIN GRID LAYOUT (4 Columns) ========== */
        .columns-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            overflow: hidden;
        }

        .logo-homeos {
            font-family: 'Inter', sans-serif;
            font-size: 42px;
            font-weight: 400;
            color: #000;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
        }

        .search-field {
            background: var(--figma-input-bg);
            border: none;
            padding: 12px 16px;
            font-size: 16px;
            color: var(--figma-text);
            outline: none;
            border-radius: 0;
        }

        /* Columns 2-4: AI Columns */
        .ai-column {
            display: flex;
            flex-direction: column;
            border-right: 0.5px solid var(--figma-sep);
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .ai-header {
            padding: 24px 20px;
            border-bottom: 0.5px solid var(--figma-input-bg);
        }

        .provider-label {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .provider-icon {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .insight-stream {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.6;
            color: var(--figma-text);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .insight-card {
            background: #fff;
            border-bottom: 0.5px solid var(--figma-input-bg);
            padding-bottom: 16px;
            position: relative;
        }

        .capture-btn {
            position: absolute;
            bottom: 4px;
            right: 0;
            width: 44px;
            height: 44px;
            background: var(--figma-input-bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            color: var(--figma-text);
            transition: background 0.1s;
        }

        .capture-btn:hover { background: #e4e6ea; }

        /* Column 5: Sullivan Panel */
        .sullivan-panel {
            background: var(--figma-panel);
            display: flex;
            flex-direction: column;
            height: 100%;
            border-right: 0.5px solid var(--figma-sep);
        }

        .sullivan-header {
            height: 101px;
            display: flex;
            align-items: center;
            padding: 0 32px;
            background: #fff;
            border-bottom: 0.5px solid #000;
            gap: 12px;
        }

        .sullivan-title {
            font-family: 'Geist', sans-serif;
            font-size: 22px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--figma-dot-green);
            border-radius: 50%;
        }

        .nugget-list {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nugget {
            background: var(--figma-bubble-user);
            padding: 16px 20px;
            border-radius: 0;
            font-size: 18px;
            color: var(--figma-text);
            align-self: flex-end;
            max-width: 90%;
            position: relative;
        }

        .nugget::after {
            content: "V";
            position: absolute;
            right: -24px;
            top: 0;
            width: 20px;
            height: 20px;
            background: #e4e6ea;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .nugget-meta {
            font-size: 13px; color: #999; margin-top: 8px;
        }

        /* ========== FOOTER (Controls) ========== */
        .app-footer {
            height: 100px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            background: #fff;
            border-top: 0.5px solid var(--figma-sep);
            gap: 20px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--figma-input-bg);
            height: 56px;
            align-items: center;
            padding: 0 16px;
        }

        #prompt-input {
            flex: 1; border: none; outline: none; background: transparent;
            font-family: 'Geist', sans-serif; font-size: 16px;
            color: var(--figma-text);
        }

        .dispatch-btn {
            height: 56px; padding: 0 32px;
            background: var(--figma-send); color: #fff;
            border: none; font-weight: 600; cursor: pointer;
        }

        #btn-prd {
            width: 200px; height: 56px;
            background: var(--figma-tab-active); color: #fff;
            border: none; font-weight: 600; cursor: pointer;
        }

        #btn-prd:disabled { background: #ccc; cursor: not-allowed; }

        /* ========== MODAL ========== */
        #prd-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #prd-modal.open { display: flex; }
        #prd-modal-inner {
            background: #fff; width: 80%; height: 80%;
            display: flex; flex-direction: column;
        }
        #prd-content {
            flex: 1; padding: 40px; overflow-y: auto; white-space: pre-wrap;
            font-family: 'Geist', sans-serif;
        }

        /* Provider Icons coloring */
        .ai-theme-gemini .provider-icon { color: var(--accent-bleu); }
        .ai-theme-deepseek .provider-icon { color: var(--accent-mauve); }
        .ai-theme-mistral .provider-icon { color: var(--accent-vert); }

        .sullivan-arbitrage {
            font-style: italic;
            color: var(--accent-mauve);
            border-left: 2px solid var(--accent-mauve);
            padding-left: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .search-result-badge {
            background: #eee;
            color: #666;
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 3px;
            margin-bottom: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- Column 1: HomeOS Sidebar -->
        <aside class="sidebar">
            <div class="logo-homeos">HoméOS</div>
            <input class="search-field" type="text" id="search-input" placeholder="Recherche sémantique…">
            <div id="session-info" style="margin-top: auto; font-size: 12px; color: #999;">ID: --</div>
        </aside>

        <div class="main-workspace">
            <header class="app-header">
                <nav class="nav-tabs">
                    <a href="#" class="tab-item">Brainstorm</a>
                    <a href="#" class="tab-item active">Backend</a>
                    <a href="#" class="tab-item">Frontend</a>
                    <a href="#" class="tab-item">Deploy</a>
                </nav>
            </header>

            <main class="columns-container">
                <!-- Column 2: Gemini -->
                <section class="ai-column ai-theme-gemini">
                    <div class="ai-header">
                        <div class="provider-label">Aujourd'hui</div>
                        <div class="provider-icon">Gemini</div>
                    </div>
                    <div class="insight-stream" id="stream-gemini"></div>
                </section>

                <!-- Column 3: DeepSeek -->
                <section class="ai-column ai-theme-deepseek">
                    <div class="ai-header">
                        <div class="provider-label">Aujourd'hui</div>
                        <div class="provider-icon">DeepSeek</div>
                    </div>
                    <div class="insight-stream" id="stream-deepseek"></div>
                </section>

                <!-- Column 4: Groq -->
                <section class="ai-column ai-theme-mistral">
                    <div class="ai-header">
                        <div class="provider-label">Aujourd'hui</div>
                        <div class="provider-icon">Mistral</div>
                    </div>
                    <div class="insight-stream" id="stream-mistral"></div>
                </section>

                <!-- Column 5: Sullivan -->
                <section class="sullivan-panel">
                    <div class="sullivan-header">
                        <div class="online-dot"></div>
                        <div class="sullivan-title">Sullivan</div>
                    </div>
                    <div class="nugget-list" id="nugget-list">
                        <!-- Basket of Nuggets -->
                    </div>
                    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
                        <button id="btn-arbitrate">SULLIVAN ARBITRAGE</button>
                        <button id="btn-prd" disabled>GÉNÉRER PRD</button>
                    </div>
                </section>
            </main>

            <footer class="app-footer">
                <div class="input-wrapper">
                    <input type="text" id="prompt-input" autocomplete="off" placeholder="Décrivez votre vision...">
                </div>
                <button class="dispatch-btn" id="btn-dispatch">DISPATCHER</button>
                <button class="dispatch-btn" style="background: #333;" onclick="window.history.back()">RETOUR</button>
            </footer>
        </div>
    </div>

    <!-- PRD Modal -->
    <div id="prd-modal">
        <div id="prd-modal-inner">
            <div style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                <span>Dossier de Conception AI</span>
                <div style="display:flex; gap:10px;">
                    <a id="prd-download" download="PRD.md" href="#" style="text-decoration:none; color:#000;">TÉLÉCHARGER</a>
                    <button onclick="document.getElementById('prd-modal').classList.remove('open')">FERMER</button>
                </div>
            </div>
            <pre id="prd-content"></pre>
        </div>
    </div>

    <script>
        const sessionId = "BRS-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;

        const streams = {
            gemini: document.getElementById('stream-gemini'),
            deepseek: document.getElementById('stream-deepseek'),
            mistral: document.getElementById('stream-mistral')
        };

        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');
        const promptInput = document.getElementById('prompt-input');

        let basketCount = 0;

        function addNugget(text, provider) {
            if (basketCount === 0) nuggetList.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = 'nugget';
            div.innerHTML = `
                <div>${text}</div>
                <div class="nugget-meta">${provider} · capture</div>
            `;
            nuggetList.prepend(div);
            basketCount++;
            btnPrd.disabled = false;
        }

        async function captureNugget(text, provider) {
            try {
                const res = await fetch('/api/brs/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        text: text,
                        provider: provider
                    })
                });
                if (res.ok) {
                    addNugget(text, provider);
                }
            } catch (e) { console.error("Capture error", e); }
        }

        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'insight-card';
            
            const content = document.createElement('div');
            content.className = 'card-content';
            card.appendChild(content);
            
            const btn = document.createElement('button');
            btn.className = 'capture-btn';
            btn.innerHTML = '＋';
            btn.onclick = (e) => {
                e.stopPropagation();
                captureNugget(content.innerText, provider);
            };
            card.appendChild(btn);
            
            streams[provider].appendChild(card);
            streams[provider].scrollTop = streams[provider].scrollHeight;
            
            return content;
        }

        function startStreaming(provider) {
            const eventSource = new EventSource(`/api/brs/stream/${sessionId}/${provider}`);
            
            let currentCard = null;

            eventSource.addEventListener('status', (e) => {
                const data = JSON.parse(e.data);
                console.log(`[${provider}] Status: ${data.status}`);
            });

            eventSource.addEventListener('token', (e) => {
                const token = JSON.parse(e.data);
                if (!currentCard) {
                    currentCard = createInsightCard(provider);
                }
                currentCard.innerText += token;
                streams[provider].scrollTop = streams[provider].scrollHeight;
            });

            eventSource.addEventListener('done', (e) => {
                eventSource.close();
            });

            eventSource.onerror = (e) => {
                console.error(`[${provider}] Stream error`, e);
                eventSource.close();
            };
        }

        document.getElementById('btn-dispatch').onclick = async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            Object.values(streams).forEach(s => s.innerHTML = '');
            
            try {
                const res = await fetch('/api/brs/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        prompt: prompt
                    })
                });

                if (res.ok) {
                    startStreaming('gemini');
                    startStreaming('deepseek');
                    startStreaming('mistral');
                    promptInput.value = '';
                }
            } catch (e) {
                console.error("Dispatch failed", e);
            }
        };

        btnPrd.onclick = async () => {
            const projectName = prompt("Nom du projet pour le PRD ?", "AetherFlow Project");
            if (!projectName) return;

            btnPrd.innerText = "GÉNÉRATION...";
            btnPrd.disabled = true;

            try {
                const res = await fetch('/api/brs/generate-prd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        project_name: projectName
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prd-content').textContent = data.prd_content;
                    const blob = new Blob([data.prd_content], { type: 'text/markdown' });
                    const dl = document.getElementById('prd-download');
                    dl.href = URL.createObjectURL(blob);
                    dl.download = data.prd_path.split('/').pop() || 'PRD.md';
                    document.getElementById('prd-modal').classList.add('open');
                }
            } catch (e) {
                console.error("PRD Failure", e);
            } finally {
                btnPrd.innerText = "GÉNÉRER PRD";
                btnPrd.disabled = false;
            }
        };

        promptInput.onkeydown = (e) => {
            if (e.key === 'Enter') document.getElementById('btn-dispatch').click();
        };

        // --- Search FTS5 ---
        const searchInput = document.getElementById('search-input');
        searchInput.onkeydown = async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;
                
                try {
                    const res = await fetch(`/api/brs/search?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    
                    if (data.status === 'ok') {
                        // Clear streams if user wants fresh view, or just prepend
                        // For now, let's prepend results as "Past Context"
                        data.results.forEach(res => {
                            const provider = res.provider.toLowerCase();
                            if (streams[provider]) {
                                const card = document.createElement('div');
                                card.className = 'insight-card';
                                card.style.opacity = '0.7';
                                card.innerHTML = `
                                    <div class="search-result-badge">SESSION ${res.session_id.substr(4,4)}</div>
                                    <div class="card-content">${res.excerpt}</div>
                                `;
                                streams[provider].prepend(card);
                            }
                        });
                    }
                } catch (e) { console.error("Search failed", e); }
            }
        };

        // --- Sullivan Arbitrage ---
        document.getElementById('btn-arbitrate').onclick = async () => {
            const btn = document.getElementById('btn-arbitrate');
            btn.innerText = "ARBITRAGE EN COURS...";
            btn.disabled = true;
            
            const eventSource = new EventSource(`/api/brs/arbitrate/${sessionId}`);
            
            nuggetList.innerHTML = ''; // Sullivan takes over the panel
            const sullivanDiv = document.createElement('div');
            sullivanDiv.className = 'sullivan-arbitrage';
            nuggetList.appendChild(sullivanDiv);

            eventSource.addEventListener('status', (e) => {
                const data = JSON.parse(e.data);
                console.log("[Sullivan] Status:", data.status);
            });

            eventSource.addEventListener('message', (e) => {
                const token = JSON.parse(e.data);
                sullivanDiv.innerText += token;
                nuggetList.scrollTop = nuggetList.scrollHeight;
            });

            eventSource.addEventListener('done', (e) => {
                eventSource.close();
                btn.innerText = "SULLIVAN ARBITRAGE";
                btn.disabled = false;
            });

            eventSource.onerror = (e) => {
                console.error("[Sullivan] Error", e);
                eventSource.close();
                btn.innerText = "SULLIVAN ARBITRAGE";
                btn.disabled = false;
            };
        };

    </script>
</body>
</html>
