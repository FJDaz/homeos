<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow | Intent Viewer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --bg-panel: #141417;
            --accent-orange: #ff6b35;
            --accent-blue: #007aff;
            --text-main: #e2e2e7;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            color: var(--accent-orange);
            font-size: 1.2rem;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .col-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .col-title {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Mockup Viewer */
        .mockup-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mockup-image {
            max-width: 100%;
            height: auto;
        }

        /* Intent List */
        .intent-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .intent-card:hover {
            border-color: var(--accent-orange);
        }

        .intent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .comp-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-orange);
        }

        .comp-type {
            font-size: 0.7rem;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-blue);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .intent-select {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .intent-description {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .validation-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        input[type="checkbox"] {
            accent-color: var(--accent-orange);
        }

        /* Audit Panel */
        .audit-panel {
            background: rgba(255, 107, 53, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.2);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .audit-title {
            font-weight: 700;
            color: var(--accent-orange);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .audit-item {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .audit-item::before {
            content: "• ";
            color: var(--accent-orange);
        }

        /* Controls */
        #upload-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        #generate-prd-btn,
        #validate-btn {
            position: fixed;
            bottom: 24px;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
            display: none;
            z-index: 100;
        }

        #generate-prd-btn {
            right: 250px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        #validate-btn {
            right: 24px;
            background: var(--accent-orange);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #manifesto-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        #fidelity-badge {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(255, 107, 53, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 53, 0);
            }
        }
    </style>
    <!-- Bypass Monkey Patch: extract clean XHR from a sandboxed iframe (Mission 34C) -->
    <script>
        (function () {
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.head.appendChild(iframe);
            window.__NativeXHR = iframe.contentWindow.XMLHttpRequest;
        })();
    </script>
</head>

<body>
    <header>
        <div class="logo">AETHERFLOW <span style="color: var(--text-dim); font-weight: 300;">| Retro Genome</span></div>
        <div class="status" id="app-status">Ready for analysis</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <input type="file" id="file-input" style="display: none;" accept="image/png" multiple>
            <button id="upload-btn" style="background: var(--accent-blue);">+ Select Mockups (PNG)</button>
            <button id="start-analysis-btn" class="validate-btn"
                style="position: static; display: inline-block; padding: 8px 16px; font-size: 0.85rem; border-radius: 4px; background: var(--accent-orange);">Run
                Analysis</button>
        </div>
    </header>

    <main>
        <!-- Column 1: Inputs & Mockups -->
        <div class="column" style="flex: 0.8;">
            <div class="col-header">
                <div class="col-title">Inputs: Manifeste & Images</div>
            </div>
            <div class="content">
                <div style="margin-bottom: 24px;">
                    <label
                        style="display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Manifeste
                        (Intentions HCI)</label>
                    <textarea id="manifesto-input"
                        placeholder="Décrivez votre système HCI, ses règles et votre intention (ex: Triangle de Pascal, Carré Magique...)"
                        style="width: 100%; background: #161618; border: 1px solid var(--border); color: #fff; border-radius: 8px; padding: 12px; min-height: 150px; font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none; transition: border-color 0.2s;"></textarea>
                </div>

                <div class="col-title" style="margin-bottom: 12px; font-size: 0.75rem;">Mockup Preview</div>
                <div id="mockup-previews"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px;">
                    <div id="add-img-btn"
                        style="aspect-ratio: 1/1; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.8rem; cursor: pointer;">
                        + Add Image
                    </div>
                </div>
            </div>
        </div>

        <!-- Column 2: Semantic Analysis -->
        <div class="column">
            <div class="col-header">
                <div class="col-title">Semantic Matching & Gaps</div>
                <div id="fidelity-badge"
                    style="display: none; background: #ff6b35; color: #fff; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 12px;">
                    FIDELITY: 0%</div>
            </div>
            <div class="content" id="analysis-content">
                <p style="color: var(--text-dim);">Final results will appear here after analysis...</p>
            </div>
        </div>
    </main>

    <button id="validate-btn">Valider & Ouvrir Reality View</button>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Analyzing Intentions...</div>
    </div>

    <script>
        // — Éléments DOM —
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const startBtn = document.getElementById('start-analysis-btn');
        const manifestoInput = document.getElementById('manifesto-input');
        const previewsContainer = document.getElementById('mockup-previews');
        const analysisContent = document.getElementById('analysis-content');
        const loading = document.getElementById('loading');
        const validateBtn = document.getElementById('validate-btn');
        const fidelityBadge = document.getElementById('fidelity-badge');

        let selectedFiles = [];

        // — Sélection de fichiers —
        uploadBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            selectedFiles = [...selectedFiles, ...files];
            fileInput.value = '';
            renderPreviews();
        };

        function renderPreviews() {
            previewsContainer.innerHTML = selectedFiles.map((file, idx) => `
                <div style="position:relative; aspect-ratio:1/1; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#000;">
                    <img src="${URL.createObjectURL(file)}" style="width:100%; height:100%; object-fit:cover;">
                    <div onclick="removeFile(event,${idx})"
                         style="position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); color:#fff;
                                width:20px; height:20px; border-radius:50%; display:flex; align-items:center;
                                justify-content:center; cursor:pointer; font-size:14px; line-height:1;">×</div>
                    <div style="position:absolute; bottom:4px; left:4px; right:4px; background:rgba(0,0,0,0.5);
                                font-size:9px; color:#aaa; padding:2px 4px; border-radius:3px; overflow:hidden;
                                text-overflow:ellipsis; white-space:nowrap;">${file.name}</div>
                </div>
            `).join('') + `
                <div onclick="document.getElementById('file-input').click()"
                     style="aspect-ratio:1/1; border:2px dashed var(--border); border-radius:8px;
                            display:flex; align-items:center; justify-content:center;
                            color:var(--text-dim); font-size:0.8rem; cursor:pointer; flex-direction:column; gap:4px;">
                    <span style="font-size:1.4rem;">+</span>
                    <span>Add Image</span>
                </div>`;
        }

        window.removeFile = (e, idx) => {
            e.stopPropagation();
            selectedFiles.splice(idx, 1);
            renderPreviews();
        };

        // — Status polling —
        const STEPS = {
            'vision': '🔍 Analyse visuelle par Gemini...',
            'mapping': '🧠 Mise en tension Manifeste ↔ Mockups...',
            'saving': '💾 Finalisation du diagnostic...',
            'generating': '🏗️ Génération de la Reality View...',
            'done': '✅ Prêt pour validation !',
        };
        let _statusPoller = null;

        function startStatusPolling() {
            const loadingText = document.getElementById('loading-text');
            _statusPoller = setInterval(() => {
                const sxhr = new window.__NativeXHR();
                sxhr.open('GET', '/api/retro-genome/status?t=' + Date.now(), true);
                sxhr.onload = () => {
                    try {
                        const d = JSON.parse(sxhr.responseText);
                        if (d.step && STEPS[d.step]) loadingText.textContent = STEPS[d.step];
                    } catch (e) { }
                };
                sxhr.send();
            }, 1000);
        }

        function stopStatusPolling() {
            if (_statusPoller) { clearInterval(_statusPoller); _statusPoller = null; }
        }

        // — Run Analysis —
        startBtn.onclick = () => {
            if (selectedFiles.length === 0) {
                alert('Sélectionnez au moins un mockup PNG.');
                return;
            }
            loading.style.display = 'flex';
            document.getElementById('loading-text').textContent = '📤 Préparation de la mission...';
            startStatusPolling();

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('images', f));
            formData.append('manifesto', manifestoInput.value);

            const xhr = new window.__NativeXHR();
            xhr.open('POST', '/api/retro-genome/upload');
            xhr.onload = () => {
                stopStatusPolling();
                loading.style.display = 'none';
                try {
                    const data = JSON.parse(xhr.responseText);
                    window.lastAnalysisData = data;
                    renderMissionResult(data);
                } catch (err) {
                    alert('Erreur API : ' + err + '\nRaw: ' + xhr.responseText.substring(0, 300));
                }
            };
            xhr.onerror = () => {
                stopStatusPolling();
                loading.style.display = 'none';
                alert('Erreur réseau.');
            };
            xhr.send(formData);
        };

        // — Rendu Mission 35 —
        function renderMissionResult(data) {
            const audit = data.audit || {};
            validateBtn.style.display = 'block';
            fidelityBadge.style.display = 'block';
            fidelityBadge.textContent = 'FIDELITY: ' + (audit.fidelity_score || 0) + '%';

            let html = '';

            if (audit.concept_inferred) {
                html += '<div class="audit-panel" style="background:rgba(0,122,255,0.05); border-color:rgba(0,122,255,0.2);">'
                    + '<div class="audit-title" style="color:var(--accent-blue);">Concept Inféré</div>'
                    + '<div style="font-size:0.9rem; font-style:italic;">"' + audit.concept_inferred + '"</div></div>';
            }

            if (audit.matches && audit.matches.length > 0) {
                html += '<div class="col-title" style="margin:12px 0 8px; font-size:0.7rem;">✅ Matches</div>';
                audit.matches.forEach(function (m) {
                    html += '<div class="intent-card" style="border-left:3px solid #4CAF50;">'
                        + '<div class="intent-header">'
                        + '<span class="comp-id">' + (m.visual_element_id || '') + '</span>'
                        + '<span class="comp-type" style="background:rgba(76,175,80,0.1);color:#4CAF50;">' + Math.round((m.confidence || 0.9) * 100) + '% Match</span>'
                        + '</div>'
                        + '<div style="font-weight:600;font-size:0.85rem;margin-bottom:4px;">' + (m.declared_intent || '') + '</div>'
                        + '<div class="intent-description" style="margin-bottom:0;font-size:0.8rem;">' + (m.note || '') + '</div>'
                        + '</div>';
                });
            }

            if (audit.gaps && audit.gaps.length > 0) {
                html += '<div class="col-title" style="margin:16px 0 8px;font-size:0.7rem;color:#ff3b30;">⚠️ Gaps Critiques</div>';
                audit.gaps.forEach(function (g) {
                    html += '<div class="intent-card" style="border-left:3px solid #ff3b30;background:rgba(255,59,48,0.03);">'
                        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">'
                        + '<div style="font-weight:700;font-size:0.85rem;color:#ff3b30;">' + (g.intent_id || g.type || 'GAP') + '</div>'
                        + '<span style="font-size:0.6rem;text-transform:uppercase;background:#ff3b30;color:#fff;padding:1px 4px;border-radius:3px;">' + (g.severity || 'major') + '</span>'
                        + '</div>'
                        + '<div class="intent-description" style="color:var(--text-main);margin-bottom:8px;">' + (g.description || '') + '</div>'
                        + '<div style="font-size:0.8rem;padding:8px;background:rgba(0,0,0,0.2);border-radius:4px;color:var(--accent-orange);">'
                        + '<b>Sullivan Fix:</b> ' + (g.suggestion || '') + '</div></div>';
                });
            }

            if (audit.pedagogical_summary) {
                html += '<div style="margin-top:24px;padding:16px;border-top:1px solid var(--border);font-size:0.85rem;color:var(--text-dim);line-height:1.6;">'
                    + '<b style="color:var(--text-main);">Synthèse pour l\'étudiant :</b><br>'
                    + audit.pedagogical_summary + '</div>';
            }

            if (!html) {
                html = '<div class="audit-panel"><div class="audit-title">Résultat brut</div>'
                    + '<pre style="font-size:0.7rem;white-space:pre-wrap;color:var(--text-dim);">'
                    + JSON.stringify(data, null, 2).substring(0, 1000) + '</pre></div>';
            }

            analysisContent.innerHTML = html;
        }

        // — Validation & Génération HTML —
        validateBtn.onclick = () => {
            if (!window.lastAnalysisData) {
                alert("Lancez d'abord une analyse."); return;
            }
            loading.style.display = 'flex';
            document.getElementById('loading-text').innerText = 'Enregistrement de la session...';
            startStatusPolling();

            const xhr = new window.__NativeXHR();
            xhr.open('POST', '/api/retro-genome/validate');
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = () => {
                try {
                    const result = JSON.parse(xhr.responseText);
                    if (result.status === 'ok') {
                        // Validation OK, on lance la génération HTML
                        document.getElementById('loading-text').innerText = 'Démarrage de la génération HTML...';
                        const xhrGen = new window.__NativeXHR();
                        xhrGen.open('POST', '/api/retro-genome/generate-html');
                        xhrGen.onload = () => {
                            stopStatusPolling();
                            loading.style.display = 'none';
                            try {
                                const genRes = JSON.parse(xhrGen.responseText);
                                if (genRes.status === 'ok') {
                                    window.location.href = '/template-viewer?mode=reality';
                                } else {
                                    alert('Erreur génération : ' + (genRes.error || 'Erreur inconnue'));
                                }
                            } catch (e) {
                                alert('Erreur parsing gen : ' + xhrGen.responseText.substring(0, 200));
                            }
                        };
                        xhrGen.onerror = () => {
                            stopStatusPolling();
                            loading.style.display = 'none';
                            alert('Erreur réseau lors de la génération HTML.');
                        };
                        xhrGen.send();
                    } else {
                        stopStatusPolling();
                        loading.style.display = 'none';
                        alert('Validation échouée : ' + (result.error || 'Erreur inconnue'));
                    }
                } catch (e) {
                    stopStatusPolling();
                    loading.style.display = 'none';
                    alert('Erreur parsing : ' + xhr.responseText.substring(0, 200));
                }
            };
            xhr.onerror = () => {
                stopStatusPolling();
                loading.style.display = 'none';
                alert('Erreur réseau.');
            };
            xhr.send(JSON.stringify(window.lastAnalysisData));
        };
        // Initialisation : afficher le bouton Add Image dès le chargement
        renderPreviews();
    </script>
</body>

</html>
