<!DOCTYPE html>
<html lang="fr" class="bg-[#f7f6f2]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homéos — bkd studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/bootstrap.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        homeos: {
                            bg: '#f7f6f2',
                            panel: '#efefeb',
                            text: '#3d3d3c',
                            muted: '#9a9a98',
                            green: '#8cc63f',
                            border: '#e5e5e5',
                            architect: '#f0f4ff',
                            worker: '#fffaf0',
                            terminal: '#2a2a29'
                        }
                    },
                    fontFamily: { 
                        homeos: ['Inter', 'sans-serif'],
                        mono: ['Menlo', 'Monaco', 'Courier New', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; font-size: 12px; color: #3d3d3c; letter-spacing: -0.01em; background-color: #f7f6f2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Global Reset Hard-Edge sauf conteneurs ALT */
        *:not(button):not(input):not(select):not(textarea) { 
            border-radius: 0 !important; 
        }
        
        /* Boutons (Nouveau Dogme Mission 220) */
        button, .btn-homeos { 
            border-radius: 4px !important; 
        }
        
        /* Zones de Saisie (A/Q) */
        textarea, input[type="text"], input[type="password"] { 
            border-radius: 4px !important; 
        }
        
        .tab-active { border-bottom: 2px solid #8cc63f; color: #3d3d3c; font-weight: 600; }
        .terminal-log { height: 100%; overflow-y: auto; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "monospace"; font-size: 11px; line-height: 1.4; color: #3d3d3c; }
        #log-arch { color: #8cc63f; } /* Vert HoméOS Lisible */
        #log-work { color: #3d3d3c; } /* Texte Principal */
        
        /* Shadow Ambient "Paper on the Desk" */
        .shadow-ambient { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        
        /* Sidebar Collapse */
        aside#sidebar-left { transition: width 0.2s ease-out; }
        aside#sidebar-left.collapsed { width: 0px; border-right: none; overflow: hidden; }
        
        button, label, select { text-transform: lowercase; }
        .roadmap-content h1, .roadmap-content h2, .roadmap-content h3 { text-transform: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- HEADER (Beige HoméOS) -->
    <header class="h-[48px] border-b border-homeos-border flex items-center justify-between px-6 bg-homeos-bg z-50">
        <div class="flex items-center gap-4">
            <select id="project-switcher" class="text-[10px] font-semibold text-homeos-muted bg-transparent border-none outline-none cursor-pointer">
                <option value="">chargement...</option>
            </select>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-recompile" class="text-[10px] font-semibold border border-homeos-border px-3 py-1.5 text-homeos-muted hover:border-homeos-green hover:text-homeos-green transition-colors">
                recompiler génome
            </button>
        </div>
    </header>

    <!-- WRAPPER CHÂSSIS SOBRE (M220) -->
    <div class="flex-1 p-4 overflow-hidden bg-homeos-bg">
        <div id="studio-chassis" class="h-full border border-homeos-border flex overflow-hidden bg-homeos-bg">
            
            <!-- SIDEBAR GAUCHE : EXPLOREUR (Collapsible) -->
            <aside id="sidebar-left" class="w-[220px] border-r border-homeos-border bg-homeos-bg flex flex-col shrink-0">
                <div class="p-3 border-b border-homeos-border flex items-center justify-between bg-homeos-panel/30">
                    <button id="toggle-sidebar" class="text-homeos-muted hover:text-homeos-green transition-colors" title="alt+b">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                        </svg>
                    </button>
                    <button id="btn-refresh-files" class="text-homeos-muted hover:text-homeos-green">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
                <div id="explorer-grid" class="flex-1 overflow-y-auto p-3 space-y-1 no-scrollbar text-[11px]">
                    <!-- Fichiers -->
                </div>
            </aside>

            <!-- ZONE MAIN (Centre) -->
            <div class="flex-1 flex flex-col min-w-0 bg-homeos-bg">
                
                <!-- TOP AREA: ARCHITECTE | WORKSPACE -->
                <div class="flex-1 grid grid-cols-[320px_1fr] divide-x divide-homeos-border overflow-hidden">
                    
                    <!-- ARCHITECTE CHAT -->
                    <div id="architect-pane" class="flex flex-col bg-homeos-architect/10">
                        <div class="p-3 border-b border-homeos-border flex items-center justify-between bg-white/50">
                            <span class="text-[10px] font-semibold">architecte</span>
                            <select id="select-history-arch" class="text-[10px] bg-transparent border-none outline-none font-medium text-homeos-muted max-w-[120px]">
                                <option value="">nouv. session</option>
                            </select>
                        </div>
                        <div id="chat-arch-history" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar"></div>
                        <div class="p-3 border-t border-homeos-border bg-homeos-bg">
                            <textarea id="input-arch" placeholder="planifier..." class="w-full bg-homeos-bg border border-homeos-border p-2 text-[14px] resize-none outline-none focus:border-homeos-green h-16"></textarea>
                        </div>
                    </div>

                    <!-- WORKSPACE (ROADMAP / EDITOR) -->
                    <div class="flex flex-col overflow-hidden">
                        <div id="ws-tab-row" class="h-9 border-b border-homeos-border flex items-center px-4 gap-6 bg-homeos-panel/20">
                            <button data-tab="roadmap" class="h-full text-[10px] font-semibold tab-active">roadmap</button>
                            <button data-tab="editor" class="h-full text-[10px] font-medium text-homeos-muted hover:text-homeos-text">éditeur</button>
                            <div class="flex-1"></div>
                            <div id="current-filename" class="text-[10px] font-mono text-homeos-muted italic">roadmap.md</div>
                        </div>
                        <div id="ws-content-area" class="flex-1 overflow-hidden relative">
                            <div class="h-full overflow-auto p-8 roadmap-content no-scrollbar" id="render-area"></div>
                            <div class="hidden h-full overflow-hidden" id="editor-area">
                                <div id="monaco-container" class="w-full h-full"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- BOTTOM AREA: DOUBLE TERMINAL (Papier HoméOS) -->
                <footer class="h-[180px] border-t border-homeos-border bg-[#fafafa] text-homeos-text">
                    <div id="terminal-split" class="grid grid-cols-2 h-full divide-x divide-homeos-border">
                        <div class="flex flex-col">
                            <div class="h-6 bg-homeos-panel/50 px-3 flex items-center">
                                <span class="text-[9px] font-medium text-homeos-muted">logs architecte</span>
                            </div>
                            <div class="terminal-log no-scrollbar" id="log-arch"></div>
                        </div>
                        <div class="flex flex-col">
                            <div class="h-6 bg-homeos-panel/50 px-3 flex items-center">
                                <span class="text-[9px] font-medium text-homeos-muted">output ouvrier</span>
                            </div>
                            <div class="terminal-log no-scrollbar" id="log-work"></div>
                        </div>
                    </div>
                </footer>
            </div>

            <!-- SIDEBAR DROITE : OUVRIER -->
            <aside class="w-[280px] border-l border-homeos-border bg-homeos-worker/10 flex flex-col shrink-0">
                <div class="p-3 border-b border-homeos-border flex items-center justify-between bg-white/50">
                    <span class="text-[10px] font-semibold">ouvrier</span>
                    <select id="select-history-work" class="text-[10px] bg-transparent border-none outline-none font-medium text-homeos-muted max-w-[120px]">
                        <option value="">nouv. session</option>
                    </select>
                </div>
                <div id="chat-work-history" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar"></div>
                <div class="p-3 border-t border-homeos-border bg-homeos-bg">
                    <textarea id="input-work" placeholder="exécuter..." class="w-full bg-homeos-bg border border-homeos-border p-2 text-[14px] resize-none outline-none focus:border-homeos-green h-16"></textarea>
                </div>
            </aside>
        </div>
    </div>

    <div id="fee-lab-overlay" class="hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/workspace/WsBackend.js"></script>
    <script src="/static/js/workspace/WsFEE.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.wsBackend = new WsBackend();
        });
    </script>
</body>
</html>
