<!DOCTYPE html>
<html lang="fr" class="bg-white">

<head>
    <meta charset="utf-8">
    <title>AetherFlow — Blueprint Viewer</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Geist -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#ffffff',
                            panel: '#f9f9f9',
                            input: '#f2f3f5',
                            text: '#666666',
                            textDark: '#1a1a1a',
                            tabActive: '#8cc63f',
                            dotGreen: '#5ec069',
                            sep: '#e5e5e5',
                        }
                    },
                    fontFamily: {
                        geist: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: radial-gradient(#eeeeee 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #canvas svg {
            box-shadow: 0 8px 40px rgba(0, 0, 0, .08);
            border: 0.5px solid #e5e5e5;
        }

        /* Interaction SVG Styles preserved and adapted */
        svg .af-organ { cursor: grab; }
        svg .af-organ:active { cursor: grabbing; }
        svg .af-organ:hover>rect:first-child { stroke: #8cc63f; stroke-dasharray: 4; }
        svg .af-organ.selected>rect:first-child { stroke: #000; stroke-width: 2; stroke-dasharray: none; }
        svg .kimi-comp.selected>rect:first-child { stroke: #8cc63f; stroke-width: 2; stroke-dasharray: none; }
        svg .kimi-comp.selected .resize-handle { opacity: 1 !important; fill: #fff; }
        svg .kimi-comp.hovered>rect:first-child { stroke: #8cc63f; stroke-width: 1; stroke-dasharray: none; }
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden font-geist text-figma-text">
    <!-- Top Bar -->
    <div class="h-[28px] bg-white border-b-[0.5px] border-figma-sep px-4 flex items-center gap-4 z-50">
        <div id="dot" class="w-2 h-2 rounded-full bg-figma-sep transition-colors"></div>
        <span class="text-[9px] font-bold uppercase tracking-widest text-black/40">Blueprint Viewer</span>
        <span id="ts" class="text-[9px] font-bold uppercase tracking-widest text-figma-tabActive ml-2">Prêt</span>
        <span class="ml-auto text-[9px] font-bold uppercase tracking-widest text-figma-text/30">XHR · Sullivan Cockpit</span>
    </div>

    <div id="main" class="flex-1 flex overflow-hidden">
        <!-- Canvas Area -->
        <div id="canvas" class="flex-1 overflow-auto p-12 flex justify-center items-start no-scrollbar">
            <div id="empty" class="text-figma-text/30 font-bold uppercase tracking-[0.2em] text-[11px] m-auto animate-pulse">
                Chargement du Blueprint...
            </div>
        </div>

        <!-- Sullivan Cockpit (Right Pane) -->
        <div id="chat" class="w-[380px] border-l-[0.5px] border-figma-sep bg-figma-panel flex flex-col overflow-hidden">
            <div class="h-[50px] px-6 flex items-center justify-between border-b-[0.5px] border-figma-sep bg-white">
                <div>
                    <div class="text-[11px] font-bold uppercase tracking-widest text-black">Sullivan Cockpit</div>
                    <div class="text-[8px] font-bold uppercase tracking-widest text-figma-text/40">Blueprint Mentor</div>
                </div>
            </div>

            <!-- Pedagogy Panel -->
            <div id="pedo-panel" class="hidden p-6 bg-figma-tabActive/5 border-b-[0.5px] border-figma-sep space-y-4">
                <div>
                    <div class="text-[8px] font-bold uppercase tracking-widest text-figma-tabActive mb-1">Empreinte Sémantique</div>
                    <div id="pedo-title" class="text-[13px] font-bold text-black uppercase tracking-tight">Comp...</div>
                </div>
                <div>
                    <div class="text-[8px] font-bold uppercase tracking-widest text-figma-tabActive mb-1">Intention du Génome</div>
                    <div id="pedo-intent" class="text-[12px] text-figma-text leading-relaxed italic">...</div>
                </div>
                <button id="btn-quick-prompt" class="w-full py-2 bg-white border-[0.5px] border-figma-tabActive/30 text-figma-tabActive text-[9px] font-bold uppercase tracking-widest hover:bg-figma-tabActive hover:text-white transition-all">
                    Challenge AI Logic
                </button>
            </div>

            <!-- Export Panel (Mission 37) -->
            <div id="export-panel" class="hidden p-6 bg-white border-b-[0.5px] border-figma-sep space-y-3">
                <div class="text-[8px] font-bold uppercase tracking-widest text-figma-text/40">Multi-Vector Exports</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generatePRD()" class="p-2 border-[0.5px] border-figma-sep text-[8px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">📄</span> PRD & ROADMAP
                    </button>
                    <button onclick="exportZIP()" class="p-2 border-[0.5px] border-figma-sep text-[8px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">📦</span> ZIP VANILLA
                    </button>
                    <button onclick="exportManifest()" class="p-2 border-[0.5px] border-figma-sep text-[8px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">🔗</span> FIGMA BRIDGE
                    </button>
                    <button onclick="exportSchema()" class="p-2 border-[0.5px] border-figma-sep text-[8px] font-bold uppercase tracking-widest hover:border-black transition-all flex items-center gap-2">
                        <span class="text-figma-tabActive">🧬</span> SCHEMA JSON
                    </button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3 no-scrollbar"></div>

            <!-- Chat Input -->
            <div class="p-6 bg-white border-t-[0.5px] border-figma-sep space-y-3">
                <textarea id="txt" placeholder="Dites à Sullivan ce que vous souhaitez changer..."
                    class="w-full h-24 bg-figma-input border-none text-[13px] text-figma-textDark p-4 outline-none focus:ring-1 focus:ring-figma-tabActive transition-all resize-none"></textarea>
                <div class="flex gap-2">
                    <button id="btn-send" class="flex-1 py-2 bg-black text-white text-[10px] font-bold uppercase tracking-widest hover:opacity-80 transition-all">ENVOYER</button>
                    <button id="btn-accept" class="flex-1 py-2 border-[0.5px] border-figma-sep text-[10px] font-bold uppercase tracking-widest hover:bg-figma-tabActive hover:text-white hover:border-figma-tabActive transition-all">ACCEPTER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Logic (Preserved mot-à-mot from original) ---
        var lastTs = 0, lastRunning = false;
        function addMsg(text, cls) {
            var d = document.getElementById('messages');
            var m = document.createElement('div'); 
            m.className = 'text-[11px] p-3 border-l-2 bg-white/50 border-figma-sep font-mono leading-relaxed ' + (cls || '');
            if(cls === 'sent') m.style.borderLeftColor = '#000';
            if(cls === 'ok') m.style.borderLeftColor = '#8cc63f';
            if(cls === 'err') m.style.borderLeftColor = '#ff3b30';
            if(cls === 'running') m.classList.add('animate-pulse', 'text-figma-tabActive');
            m.textContent = text; d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }
        function setButtons(on) {
            document.getElementById('btn-send').disabled = !on;
            document.getElementById('btn-accept').disabled = !on;
        }
        function loadSVG() {
            var x = new XMLHttpRequest();
            x.open('GET', '/api/template-svg?t=' + Date.now(), true);
            x.onload = function () {
                try {
                    var d = JSON.parse(x.responseText);
                    if (d.svg && d.svg.indexOf('<svg') !== -1) {
                        document.getElementById('canvas').innerHTML = d.svg;
                        document.getElementById('ts').textContent = 'Rendu ' + new Date().toLocaleTimeString();
                        var dot = document.getElementById('dot'); 
                        dot.style.backgroundColor = '#8cc63f';
                        setTimeout(function () { dot.style.backgroundColor = ''; }, 2000);
                        setTimeout(initInteraction, 100);
                    }
                } catch (e) { }
            };
            x.send();
        }
        function pollTemplate() {
            var x = new XMLHttpRequest();
            x.open('GET', '/api/template-ts?t=' + Date.now(), true);
            x.onload = function () {
                try { var d = JSON.parse(x.responseText); if (d.ts && d.ts !== lastTs) { lastTs = d.ts; loadSVG(); } } catch (e) { }
            };
            x.send();
        }
        function pollStatus() {
            var x = new XMLHttpRequest();
            x.open('GET', '/api/pipeline-status?t=' + Date.now(), true);
            x.onload = function () {
                try {
                    var d = JSON.parse(x.responseText);
                    if (d.running && !lastRunning) { addMsg('⟳ Génération en cours...', 'running'); setButtons(false); }
                    if (!d.running && lastRunning) { addMsg('✓ Template mis à jour', 'ok'); setButtons(true); loadSVG(); }
                    lastRunning = d.running;
                } catch (e) { }
            };
            x.send();

            var x2 = new XMLHttpRequest();
            x2.open('GET', '/api/retro-genome/status?t=' + Date.now(), true);
            x2.onload = function () {
                try {
                    var d = JSON.parse(x2.responseText);
                    var ep = document.getElementById('export-panel');
                    if (d.step === 'done' || d.step === 'idle') {
                        ep.style.display = 'block';
                    } else {
                        ep.style.display = 'none';
                    }
                } catch (e) { }
            };
            x2.send();
        }

        async function generatePRD() {
            addMsg('Génération du PRD & Roadmap en cours...');
            const res = await fetch('/api/retro-genome/generate-prd', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: {}, project_name: "AetherFlow PROJECT" })
            });
            const data = await res.json();
            if (data.status === 'ok') addMsg('PRD & Roadmap générés !', 'ok');
        }

        async function exportZIP() {
            addMsg('Compression du package HTML/CSS...');
            const res = await fetch('/api/retro-genome/export-zip', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') addMsg('ZIP généré : ' + data.zip_path, 'ok');
        }

        async function exportManifest() {
            addMsg('Inférence du carrefour JSON Figma...');
            const res = await fetch('/api/retro-genome/export-manifest', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') {
                addMsg('Manifest JSON généré !', 'ok');
                window.open('/api/retro-genome/manifest', '_blank');
            }
        }

        async function exportSchema() {
            addMsg('Export du schéma JSON...');
            const res = await fetch('/api/retro-genome/export-schema', { method: 'POST' });
            const data = await res.json();
            if (data.status === 'ok') addMsg('Schéma sauvegardé : ' + data.schema_path, 'ok');
        }
        function sendFeedback() {
            var txt = document.getElementById('txt').value.trim();
            if (!txt) return;
            var x = new XMLHttpRequest();
            x.open('POST', '/api/feedback', true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.onload = function () { try { var d = JSON.parse(x.responseText); if (d.status === 'already_running') addMsg('⚠ Pipeline déjà en cours', 'err'); } catch (e) { } };
            x.send(JSON.stringify({ feedback: txt }));
            addMsg('→ ' + txt, 'sent');
            document.getElementById('txt').value = '';
        }
        function acceptTemplate() {
            var x = new XMLHttpRequest();
            x.open('POST', '/api/accept', true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.onload = function () { try { var d = JSON.parse(x.responseText); addMsg('✓ Sauvegardé : ' + d.saved, 'ok'); } catch (e) { } };
            x.send(JSON.stringify({}));
        }
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendFeedback(); }
        });
        window.onload = function () {
            pollTemplate(); setInterval(pollTemplate, 3000);
            pollStatus(); setInterval(pollStatus, 2000);
            document.getElementById('btn-send').onclick = sendFeedback;
            document.getElementById('btn-accept').onclick = acceptTemplate;
            addMsg('Blueprint prêt. Le Cockpit attend votre sélection.');
        };

        // --- Interaction Logic SVG ---
        var selectedOrgan = null;
        var selectedComp = null;
        var isDragging = false;
        var isDraggingComp = false;
        var isResizing = false;
        var dragStart = { x: 0, y: 0 };
        var startTransform = { tx: 0, ty: 0, s: 1 };

        function getTransformParams(el) {
            var transform = el.getAttribute('transform');
            if (!transform) return { tx: 0, ty: 0, s: 1 };
            var tMatch = transform.match(/translate\(([^,]+),\s*([^)]+)\)/);
            var sMatch = transform.match(/scale\(([^)]+)\)/);
            var tx = tMatch ? parseFloat(tMatch[1]) : 0;
            var ty = tMatch ? parseFloat(tMatch[2]) : 0;
            var s = sMatch ? parseFloat(sMatch[1]) : 1;
            return { tx: tx, ty: ty, s: s };
        }

        function setTransformParams(el, p) {
            el.setAttribute('transform', 'translate(' + p.tx + ',' + p.ty + ') scale(' + p.s + ')');
        }

        function initInteraction() {
            var svg = document.querySelector('#canvas svg');
            if (!svg) return;
            var pt = svg.createSVGPoint();

            function getMousePosition(evt) {
                pt.x = evt.clientX; pt.y = evt.clientY;
                return pt.matrixTransform(svg.getScreenCTM().inverse());
            }

            svg.addEventListener('mousedown', function (evt) {
                var resizeHandle = evt.target.closest('.resize-handle');
                var gComp = evt.target.closest('.kimi-comp');
                var gOrgan = evt.target.closest('.af-organ');

                if (resizeHandle && gComp) {
                    isResizing = true; selectedComp = gComp;
                    var mousePt = getMousePosition(evt);
                    dragStart = { x: mousePt.x, y: mousePt.y };
                    startTransform = getTransformParams(selectedComp);
                    evt.preventDefault(); evt.stopPropagation();
                    return;
                }

                if (gComp) {
                    if (selectedComp) selectedComp.classList.remove('selected');
                    selectedComp = gComp; selectedComp.classList.add('selected');
                    var mousePt = getMousePosition(evt);
                    dragStart = { x: mousePt.x, y: mousePt.y };
                    startTransform = getTransformParams(selectedComp);
                    isDraggingComp = true;
                    evt.preventDefault(); evt.stopPropagation();
                    return;
                }

                if (gOrgan) {
                    if (selectedOrgan) selectedOrgan.classList.remove('selected');
                    selectedOrgan = gOrgan; selectedOrgan.classList.add('selected');
                    var mousePt = getMousePosition(evt);
                    dragStart = { x: mousePt.x, y: mousePt.y };
                    startTransform = getTransformParams(selectedOrgan);
                    isDragging = true;
                    if (selectedComp) selectedComp.classList.remove('selected');
                    selectedComp = gComp;
                    if (selectedComp) selectedComp.classList.add('selected');
                } else {
                    if (selectedOrgan) selectedOrgan.classList.remove('selected');
                    selectedOrgan = null;
                    if (selectedComp) selectedComp.classList.remove('selected');
                    selectedComp = null;
                }
            });

            var pedagogicalDict = {};
            fetch('/api/genome')
                .then(r => r.json())
                .then(data => {
                    if (data && data.n0_phases) {
                        data.n0_phases.forEach(ph => {
                            (ph.n1_sections || []).forEach(org => {
                                (org.n2_features || []).forEach(feat => {
                                    (feat.n3_components || []).forEach(comp => {
                                        pedagogicalDict[comp.id] = { atom: comp, feature: feat, organ: org };
                                    });
                                });
                            });
                        });
                    }
                });

            var pedoPanel = document.getElementById('pedo-panel');
            var pedoTitle = document.getElementById('pedo-title');
            var pedoIntent = document.getElementById('pedo-intent');
            var lastHoveredComp = null;

            document.getElementById('btn-quick-prompt').onclick = function () {
                if (lastHoveredComp) {
                    document.getElementById('txt').value = "Sullivan, quelle est la logique métier profonde derrière cet atome \"" + lastHoveredComp.atom.name + "\" dans le cadre de " + lastHoveredComp.feature.name + " ?";
                    document.getElementById('txt').focus();
                }
            };

            svg.addEventListener('mousemove', function (evt) {
                if (isResizing && selectedComp) {
                    var mousePt = getMousePosition(evt);
                    var dx = mousePt.x - dragStart.x;
                    var scaleDelta = dx / 300;
                    var newS = Math.max(0.1, startTransform.s + scaleDelta);
                    setTransformParams(selectedComp, { tx: startTransform.tx, ty: startTransform.ty, s: newS });
                } else if (isDraggingComp && selectedComp) {
                    var mousePt = getMousePosition(evt);
                    var dx = mousePt.x - dragStart.x;
                    var dy = mousePt.y - dragStart.y;
                    setTransformParams(selectedComp, { tx: startTransform.tx + dx, ty: startTransform.ty + dy, s: startTransform.s });
                } else if (isDragging && selectedOrgan) {
                    var mousePt = getMousePosition(evt);
                    var dx = mousePt.x - dragStart.x;
                    var dy = mousePt.y - dragStart.y;
                    setTransformParams(selectedOrgan, { tx: startTransform.tx + dx, ty: startTransform.ty + dy, s: startTransform.s });
                } else {
                    var gComp = evt.target.closest('.kimi-comp');
                    if (gComp && !isDragging && !isResizing && !isDraggingComp) {
                        var compId = gComp.getAttribute('id');
                        var context = pedagogicalDict[compId];
                        if (context) {
                            if (lastHoveredComp !== context) {
                                lastHoveredComp = context;
                                pedoTitle.innerText = context.atom.name;
                                var atomRole = context.atom.ui_role || "Rôle standard";
                                var featSens = context.feature.doc_sens_humain || "Réalisation directe de l'intention.";
                                pedoIntent.innerHTML = "<b>" + atomRole + "</b><br>" + featSens;
                                pedoPanel.style.display = 'block';
                                document.querySelectorAll('.kimi-comp').forEach(c => c.classList.remove('hovered'));
                                gComp.classList.add('hovered');
                            }
                        }
                    }
                }
            });

            svg.addEventListener('mouseup', function (evt) {
                if (isDragging && selectedOrgan) {
                    isDragging = false;
                    var finalT = getTransformParams(selectedOrgan);
                    if (finalT.tx !== startTransform.tx || finalT.ty !== startTransform.ty) {
                        var xReq = new XMLHttpRequest();
                        xReq.open('POST', '/api/organ-move', true);
                        xReq.setRequestHeader('Content-Type', 'application/json');
                        xReq.send(JSON.stringify({ id: selectedOrgan.id, x: Math.round(finalT.tx), y: Math.round(finalT.ty) }));
                    }
                } else if (isDraggingComp && selectedComp) {
                    isDraggingComp = false;
                    var finalT = getTransformParams(selectedComp);
                    if (finalT.tx !== startTransform.tx || finalT.ty !== startTransform.ty) {
                        var xReq = new XMLHttpRequest();
                        xReq.open('POST', '/api/comp-move', true);
                        xReq.setRequestHeader('Content-Type', 'application/json');
                        xReq.send(JSON.stringify({ id: selectedComp.id, x: Math.round(finalT.tx), y: Math.round(finalT.ty), s: finalT.s }));
                    }
                } else if (isResizing && selectedComp) {
                    isResizing = false;
                    var finalT = getTransformParams(selectedComp);
                    if (finalT.s !== startTransform.s) {
                        var xReq = new XMLHttpRequest();
                        xReq.open('POST', '/api/comp-move', true);
                        xReq.setRequestHeader('Content-Type', 'application/json');
                        xReq.send(JSON.stringify({ id: selectedComp.id, x: Math.round(finalT.tx), y: Math.round(finalT.ty), s: finalT.s }));
                    }
                }
            });
        }
    </script>
</body>

</html>
