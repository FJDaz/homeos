<!DOCTYPE html>
<html lang="fr" class="bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoméOS — War Room (Tailwind Refined)</title>
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Inter & Geist -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    <!-- Bootstrap.js — Navigation globale (Mission 107) -->
    <script src="/static/js/bootstrap.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#ffffff',
                            panel: '#f9f9f9',
                            input: '#f2f3f5',
                            text: '#666666',
                            textDark: '#333333',
                            tabActive: '#8cc63f',
                            dotGreen: '#5ec069',
                            send: '#999999',
                            sep: '#333333',
                        },
                        accent: {
                            bleu: '#a8c5fc',
                            mauve: '#c4b5d4',
                            vert: '#a8dcc9',
                            orange: '#edd0b0',
                        }
                    },
                    fontFamily: {
                        homeos: ['"Helvetica LT STD"', 'Helvetica', 'Inter', 'Geist', 'Arial', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                        geist: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sullivan-arbitrage {
            font-style: italic;
            color: #c4b5d4;
            border-left: 2px solid #c4b5d4;
            padding-left: 10px;
            margin-bottom: 15px;
            font-size: 17px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-geist text-figma-text bg-white">

    <!-- Sidebar Gauche (Aside) - 350px -->
    <aside class="flex flex-col w-[350px] h-full p-[42px] border-r-[0.5px] border-figma-sep bg-white flex-shrink-0">
        <div class="flex justify-center mb-[40px]">
            <div class="font-homeos text-[42px] font-[900] text-black tracking-[-0.02em] leading-tight">
                Homé<span class="text-figma-tabActive">os</span>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="Envoyer un prompt aux 3 modèles…"
               class="bg-figma-input border-none p-[12px_16px] text-[17px] outline-none rounded-none">

        <div id="session-info" class="mt-auto text-[17px] text-gray-400">Id: --</div>
    </aside>

    <!-- RIGHT SECTION -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- Header bar (Contrôles spécifiques Cadrage) -->
        <header class="h-[48px] border-b-[0.5px] border-figma-sep bg-[#f7f6f2] flex-shrink-0 flex items-center px-8">
            <span class="text-[12px] text-gray-400 uppercase font-bold tracking-widest">Cadrage War Room</span>
        </header>

        <!-- Lower Workspace -->
        <div class="flex-1 flex overflow-hidden">

            <!-- IA Workspace (Grid AI + Footer) -->
            <div class="flex-1 flex flex-col min-w-0">

                <!-- LLM Grid (3 columns) -->
                <main class="flex-1 grid grid-cols-3 overflow-hidden">
                    <!-- Column: Gemini -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center">
                            <div class="font-inter text-[17px] text-figma-text mb-3 tracking-wider">Gemini</div>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" class="h-[26px] w-auto" alt="Gemini">
                        </div>
                        <div id="stream-gemini" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[17px] border-r-[0.5px] border-figma-sep items-center"></div>
                    </section>
                    <!-- Column: Groq -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center">
                            <div class="font-inter text-[17px] text-figma-text mb-3 tracking-wider">Groq</div>
                            <svg class="h-[26px] w-[26px]" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#f55036"/><text x="12" y="16" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="bold">G</text></svg>
                        </div>
                        <div id="stream-groq" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[17px] border-r-[0.5px] border-figma-sep items-center"></div>
                    </section>
                    <!-- Column: Codestral -->
                    <section class="flex flex-col overflow-hidden">
                        <div class="p-[24px_20px] flex flex-col items-center flex items-center gap-2">
                            <div class="font-inter text-[17px] text-figma-text mb-3 tracking-wider flex items-center gap-2">
                                Codestral
                                <span class="w-[6px].5 h-[6px].5 rounded-full bg-figma-tabActive"></span>
                            </div>
                            <svg class="h-[26px] w-[26px]" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#ff7000"/><text x="12" y="16" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="bold">M</text></svg>
                        </div>
                        <div id="stream-codestral" class="flex-1 overflow-y-auto p-5 no-scrollbar flex flex-col gap-4 text-[17px] items-center"></div>
                    </section>
                </main>

                <!-- IA Footer (3 invisible columns for results) -->
                <footer class="h-[100px] border-t-[0.5px] border-figma-sep bg-figma-input grid grid-cols-3 flex-shrink-0">
                    <div id="results-gemini" class="p-4 overflow-y-auto no-scrollbar text-[17px] text-gray-500 italic flex flex-col items-center"></div>
                    <div id="results-groq" class="p-4 overflow-y-auto no-scrollbar text-[17px] text-gray-500 italic flex flex-col items-center"></div>
                    <div id="results-codestral" class="p-4 overflow-y-auto no-scrollbar text-[17px] text-gray-500 italic flex flex-col items-center"></div>

                    <!-- Preserved but hidden interaction markers -->
                    <button id="btn-dispatch" class="hidden"></button>
                    <input type="text" id="prompt-input" class="hidden">
                </footer>
            </div>

            <!-- Sullivan Panel (Next to IA Workspace, Down to bottom) -->
            <section id="sullivan-panel" class="w-[336px] flex flex-col border-l-[0.5px] border-figma-sep bg-figma-panel flex-shrink-0">
                <div class="h-[101px] flex items-center p-[0_32px] bg-white border-b-[0.5px] border-black gap-3 flex-shrink-0">
                    <div class="w-[10px] h-[10px] rounded-full bg-figma-dotGreen shadow-[0_0_8px_rgba(94,192,105,0.5)]"></div>
                    <div class="font-geist text-[17px] text-figma-text">Sullivan</div>
                </div>

                <div id="nugget-list" class="flex-1 overflow-y-auto p-8 no-scrollbar flex flex-col gap-4">
                    <!-- nuggets here -->
                </div>

                <div class="p-6 bg-white border-t-[0.5px] border-figma-sep flex flex-col gap-3 flex-shrink-0">
                    <button id="btn-arbitrate" class="w-full h-[40px] border-[0.5px] border-black text-[17px] font-geist hover:bg-gray-50 transition-colors tracking-widest">
                        Sullivan Arbitrage
                    </button>
                    <button id="btn-prd" disabled class="w-full h-[40px] bg-figma-tabActive text-white text-[17px] font-bold disabled:bg-gray-300 disabled:cursor-not-allowed tracking-widest">
                        Générer PRD
                    </button>
                </div>
            </section>
        </div>
    </div>

    <!-- PRD Modal -->
    <div id="prd-modal" class="hidden fixed inset-0 bg-black/50 z-[1000] items-center justify-center p-10">
        <div class="bg-white w-full max-w-4xl h-full flex flex-col shadow-2xl font-homeos">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <span class="font-semibold text-figma-textDark whitespace-nowrap text-[17px]">Dossier de conception AI</span>
                <div class="flex gap-4">
                    <a id="prd-download" download="PRD.md" href="#" class="text-figma-tabActive font-bold border-b border-transparent hover:border-figma-tabActive px-2 py-1 transition-all text-[17px]">Télécharger</a>
                    <button onclick="document.getElementById('prd-modal').classList.add('hidden')" class="px-4 py-1 text-red-500 hover:bg-red-50 rounded transition-all text-[17px]">Fermer</button>
                </div>
            </div>
            <pre id="prd-content" class="flex-1 p-10 overflow-y-auto whitespace-pre-wrap font-geist text-figma-text text-[17px] leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const sessionId = "CAD-" + Math.random().toString(36).substr(2, 9);
        document.getElementById('session-info').innerText = "ID: " + sessionId;

        // Pré-remplissage depuis Wire (import_id + context)
        const _params = new URLSearchParams(window.location.search);
        const _wireContext = _params.get('context');
        const _wireImportId = _params.get('import_id');
        if (_wireContext) {
            const inputEl = document.getElementById('main-input') || document.querySelector('textarea, input[type="text"]');
            if (inputEl) inputEl.value = `Contexte wire détecté :\n${_wireContext}\n\nQue veux-tu faire avec ce screen ?`;
            const badge = document.createElement('div');
            badge.style.cssText = 'background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:8px;';
            badge.textContent = `⟵ Wire : ${_wireImportId || 'import'}`;
            document.querySelector('.max-w-screen-2xl') && document.querySelector('.max-w-screen-2xl').prepend(badge);
        }

        const streams = {
            gemini: document.getElementById('stream-gemini'),
            groq: document.getElementById('stream-groq'),
            codestral: document.getElementById('stream-codestral')
        };

        const nuggetList = document.getElementById('nugget-list');
        const btnPrd = document.getElementById('btn-prd');

        let basketCount = 0;

        function addNugget(text, provider) {
            if (basketCount === 0) nuggetList.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'bg-white p-4 border-l-4 border-figma-tabActive shadow-sm self-end max-w-[90%] relative mb-2';
            div.innerHTML = `
                <div class="text-[17px] leading-relaxed">${text}</div>
                <div class="text-[17px] text-gray-400 mt-2 tracking-tighter">${provider} · capture</div>
            `;
            nuggetList.prepend(div);
            basketCount++;
            btnPrd.disabled = false;
        }

        async function captureNugget(text, provider) {
            try {
                const res = await fetch('/api/cadrage/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, text: text, provider: provider })
                });
                if (res.ok) addNugget(text, provider);
            } catch (e) { console.error("Capture error", e); }
        }

        function createInsightCard(provider) {
            const card = document.createElement('div');
            card.className = 'bg-white border-b-[0.5px] border-figma-input pb-8 relative group mb-4 w-full';
            const content = document.createElement('div');
            content.className = 'text-[17px] leading-relaxed';
            card.appendChild(content);
            const btn = document.createElement('button');
            btn.className = 'absolute bottom-0 right-0 w-11 h-11 bg-figma-input flex items-center justify-center text-xl hover:bg-accent-bleu/20 transition-colors opacity-0 group-hover:opacity-100';
            btn.innerHTML = '＋';
            btn.onclick = (e) => { e.stopPropagation(); captureNugget(content.innerText, provider); };
            card.appendChild(btn);
            streams[provider].appendChild(card);
            streams[provider].scrollTop = streams[provider].scrollHeight;
            return content;
        }

        function startStreaming(provider, message) {
            const url = `/api/cadrage/chat/${provider}?session_id=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(message)}`;
            const eventSource = new EventSource(url);
            let currentCard = null;
            eventSource.addEventListener('token', (e) => {
                const token = JSON.parse(e.data);
                if (!currentCard) currentCard = createInsightCard(provider);
                currentCard.innerText += token;
                streams[provider].scrollTop = streams[provider].scrollHeight;
            });
            eventSource.addEventListener('done', () => eventSource.close());
            eventSource.onerror = () => eventSource.close();
        }

        function dispatchToAll(message) {
            Object.values(streams).forEach(s => s.innerHTML = '');
            Object.keys(streams).forEach(provider => startStreaming(provider, message));
        }

        btnPrd.onclick = async () => {
            const projectName = prompt("Nom du projet ?", "AetherFlow Project");
            if (!projectName) return;
            btnPrd.innerText = "Génération...";
            try {
                const res = await fetch('/api/cadrage/generate-prd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, project_name: projectName })
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prd-content').textContent = data.prd_content;
                    const blob = new Blob([data.prd_content], { type: 'text/markdown' });
                    const dl = document.getElementById('prd-download');
                    dl.href = URL.createObjectURL(blob);
                    dl.download = data.prd_path ? data.prd_path.split('/').pop() : 'PRD.md';
                    document.getElementById('prd-modal').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
            finally { btnPrd.innerText = "Générer PRD"; }
        };

        const searchInput = document.getElementById('search-input');
        searchInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;
                dispatchToAll(query);
                searchInput.value = '';
            }
        };

        document.getElementById('btn-arbitrate').onclick = async () => {
            const btn = document.getElementById('btn-arbitrate');
            btn.innerText = "Arbitrage...";
            // Synthèse via Gemini
            const nuggets = Array.from(nuggetList.querySelectorAll('div > div:first-child')).map(d => d.innerText).join('\n---\n');
            if (!nuggets) { btn.innerText = "Sullivan Arbitrage"; return; }
            startStreaming('gemini', `En tant qu'arbitre, synthétise ces insights en 3-5 points actionnables :\n\n${nuggets}`);
            btn.innerText = "Sullivan Arbitrage";
        };
    </script>
</body>
</html>
