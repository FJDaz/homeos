<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity=".12"/>
    </filter>
    <pattern id="imgPlace" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#f3f4f6"/>
      <path d="M0 0h20v20H0z" fill="none" stroke="#d1d5db" stroke-width="1"/>
      <path d="M0 0l20 20M20 0L0 20" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Card -->
  <rect x="80" y="80" width="840" height="440" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="100" y="100" width="800" height="260" rx="8" fill="url(#imgPlace)"/>

  <!-- Overlay zones -->
  <rect x="140" y="140" width="160" height="160" rx="8" fill="#3b82f6" fill-opacity=".18" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="225" text-anchor="middle" font-size="14" fill="#1e40af" font-family="sans-serif">Zone A – 92%</text>

  <rect x="520" y="180" width="180" height="120" rx="8" fill="#10b981" fill-opacity=".18" stroke="#10b981" stroke-width="2"/>
  <text x="610" y="245" text-anchor="middle" font-size="14" fill="#047857" font-family="sans-serif">Zone B – 87%</text>

  <!-- Buttons -->
  <g id="launch-btn">
    <rect x="100" y="400" width="240" height="56" rx="28" fill="url(#btnGrad)"/>
    <text x="220" y="432" text-anchor="middle" font-size="16" fill="#ffffff" font-family="sans-serif" font-weight="600">🚀 Lancer l'analyse Gemini</text>
  </g>

  <g id="regen-btn">
    <rect x="360" y="400" width="180" height="56" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="450" y="432" text-anchor="middle" font-size="16" fill="#4b5563" font-family="sans-serif" font-weight="500">🔄 Régénérer Analyse</text>
  </g>
</svg>