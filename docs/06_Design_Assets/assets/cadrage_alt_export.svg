<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Dot Grid -->
  <rect width="1440" height="900" fill="white" />
  <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="0.5" cy="0.5" r="0.5" fill="#eeeeee" />
  </pattern>
  <rect width="1440" height="900" fill="url(#dotGrid)" />

  <!-- GLOBAL NAV (48px) -->
  <g id="GlobalNav">
    <rect width="1440" height="48" fill="#f7f6f2" />
    <line x1="0" y1="48" x2="1440" y2="48" stroke="#e5e5e5" />
    
    <!-- Brand -->
    <text x="24" y="30" font-family="Geist, sans-serif" font-size="14" font-weight="700" fill="#3d3d3c">hom<tspan fill="#8cc63f">é</tspan>OS</text>
    
    <!-- Tabs -->
    <g id="NavTabs" transform="translate(100, 0)">
      <text x="0" y="30" font-family="Geist, sans-serif" font-size="12" font-weight="700" fill="#3d3d3c">Cadrage</text>
      <text x="80" y="30" font-family="Geist, sans-serif" font-size="12" font-weight="400" fill="#888888">Backend</text>
      <text x="160" y="30" font-family="Geist, sans-serif" font-size="12" font-weight="400" fill="#888888">Frontend</text>
      <text x="240" y="30" font-family="Geist, sans-serif" font-size="12" font-weight="400" fill="#cccccc">Déploiement</text>
    </g>
    
    <!-- Project ID -->
    <g id="ProjectInfo" transform="translate(1300, 14)">
      <rect width="100" height="20" rx="10" fill="white" stroke="#e5e5e5" />
      <text x="50" y="14" font-family="Geist, sans-serif" font-size="10" font-weight="700" fill="#8cc63f" text-anchor="middle">homéos default</text>
    </g>
  </g>

  <!-- SIDEBAR (280px) -->
  <g id="Sidebar" transform="translate(0, 48)">
    <rect width="280" height="852" fill="white" />
    <line x1="280" y1="0" x2="280" y2="852" stroke="#e5e5e5" />
    
    <!-- Sidebar Header -->
    <g id="SidebarHeader">
      <rect width="280" height="48" fill="white" />
      <line x1="0" y1="48" x2="280" y2="48" stroke="#e5e5e5" />
      <text x="24" y="30" font-family="Helvetica, sans-serif" font-size="18" font-weight="900" fill="black" style="letter-spacing:-0.05em">Homé<tspan fill="#8cc63f">OS</tspan></text>
      <!-- Toggle Icon -->
      <path d="M250 18 L242 24 L250 30" stroke="#cccccc" stroke-width="2" fill="none" />
    </g>
    
    <!-- Multiplex Buttons -->
    <g id="SidebarButtons" transform="translate(24, 60)">
      <rect width="112" height="24" fill="#8cc63f" />
      <text x="56" y="16" font-family="Geist, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle" style="letter-spacing:0.05em">Multiplex</text>
      
      <rect x="120" y="0" width="112" height="24" fill="white" stroke="#e5e5e5" />
      <text x="176" y="16" font-family="Geist, sans-serif" font-size="11" font-weight="600" fill="#999999" text-anchor="middle" style="letter-spacing:0.05em">Conseil</text>
    </g>
    
    <!-- Input -->
    <g id="SidebarInput" transform="translate(24, 100)">
      <line x1="0" y1="24" x2="232" y2="24" stroke="#e5e5e5" />
      <text x="0" y="16" font-family="Geist, sans-serif" font-size="12" fill="#999999">Prompt global (tous modèles)…</text>
    </g>
    
    <!-- Session ID -->
    <text x="24" y="830" font-family="Geist, sans-serif" font-size="10" font-weight="400" fill="#cccccc" style="letter-spacing:0.1em">ID: CAD-2LYRKJVO6</text>
  </g>

  <!-- MAIN CONTENT -->
  <g id="MainContent" transform="translate(280, 48)">
    <!-- Main Header (48px) -->
    <g id="MainHeader">
      <rect width="1160" height="48" fill="#f7f6f2" />
      <line x1="0" y1="48" x2="1160" y2="48" stroke="#e5e5e5" />
      <text x="32" y="30" font-family="Source Sans 3, sans-serif" font-size="20" font-weight="700" fill="black" style="letter-spacing:-0.02em">Home<tspan fill="#A3CD54">OS</tspan></text>
      <text x="130" y="28" font-family="Geist, sans-serif" font-size="10" font-weight="700" fill="#999999" style="letter-spacing:0.1em" class="uppercase">Cadrage Alternative View</text>
    </g>
    
    <!-- LLM Tabs -->
    <g id="LLMTabs" transform="translate(0, 48)">
      <rect width="1160" height="32" fill="#f9f9f9" />
      <line x1="0" y1="32" x2="1160" y2="32" stroke="#e5e5e5" />
      
      <!-- Gemini Tab (Active) -->
      <g id="TabGemini">
        <text x="32" y="20" font-family="Geist, sans-serif" font-size="11" font-weight="600" fill="#8cc63f">Gemini</text>
        <circle cx="20" cy="16" r="3" fill="#e8f5e9" stroke="#5ec069" />
        <rect x="0" y="30" width="100" height="2" fill="#8cc63f" transform="translate(10, 0)" />
      </g>
      
      <!-- Groq Tab -->
      <g id="TabGroq" transform="translate(100, 0)">
        <text x="32" y="20" font-family="Geist, sans-serif" font-size="11" font-weight="400" fill="#999999">Groq</text>
        <circle cx="20" cy="16" r="3" fill="#fff3e0" stroke="#f55036" />
      </g>
      
      <!-- Codestral Tab -->
      <g id="TabCodestral" transform="translate(180, 0)">
        <text x="32" y="20" font-family="Geist, sans-serif" font-size="11" font-weight="400" fill="#999999">Codestral</text>
        <circle cx="20" cy="16" r="3" fill="#5ec069" stroke="#5ec069" />
      </g>
    </g>
    
    <!-- Chat Area Card -->
    <g id="ChatArea" transform="translate(32, 112)">
      <g id="InsightCard">
        <text x="0" y="20" font-family="Geist, sans-serif" font-size="12" fill="#666666" style="line-height:1.5">
          <tspan x="0" dy="0">En tant qu'arbitre Sullivan, j'ai analysé les intentions</tspan>
          <tspan x="0" dy="18">pour le projet AetherFlow. La structure suggère une</tspan>
          <tspan x="0" dy="18">approche modulaire orientée vers l'ergonomie Cléa.</tspan>
        </text>
        <rect x="0" y="65" width="60" height="18" fill="white" stroke="#8cc63f" />
        <text x="30" y="78" font-family="Geist, sans-serif" font-size="10" font-weight="400" fill="#8cc63f" text-anchor="middle" style="letter-spacing:0.1em">+ capture</text>
        <line x1="0" y1="100" x2="300" y2="100" stroke="#e5e5e5" />
      </g>
    </g>
  </g>

  <!-- SULLIVAN PANEL (Floating) -->
  <g id="SullivanPanel" transform="translate(580, 750)">
    <!-- shadow -->
    <rect x="-4" y="-4" width="288" height="128" rx="24" fill="black" fill-opacity="0.05" />
    <rect width="280" height="120" rx="20" fill="white" fill-opacity="0.98" stroke="#e5e5e5" />
    
    <!-- Header -->
    <g id="SullivanPanelHeader">
      <circle cx="24" cy="24" r="3" fill="#5ec069" />
      <text x="36" y="28" font-family="Geist, sans-serif" font-size="12" font-weight="600" fill="black">Sullivan</text>
      <line x1="0" y1="48" x2="280" y2="48" stroke="#e5e5e5" />
    </g>
    
    <!-- Content Placeholder -->
    <text x="24" y="75" font-family="Geist, sans-serif" font-size="10" font-weight="400" fill="#cccccc" style="letter-spacing:0.1em">AUCUN NUGGET</text>
    
    <!-- Arbitrate Button -->
    <g id="SullivanButtons" transform="translate(24, 88)">
      <rect width="232" height="24" stroke="#e5e5e5" fill="white" />
      <text x="116" y="16" font-family="Geist, sans-serif" font-size="11" fill="#666666" text-anchor="middle" style="letter-spacing:0.1em">SULLIVAN ARBITRAGE</text>
    </g>
  </g>
</svg>
