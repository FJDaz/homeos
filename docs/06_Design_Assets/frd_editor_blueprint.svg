<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BACKGROUND -->
  <rect width="1280" height="800" fill="#F7F6F2"/>
  
  <!-- HEADER CHROME (48px) -->
  <rect width="1280" height="48" fill="#F7F6F2"/>
  <line x1="0" y1="47.5" x2="1280" y2="47.5" stroke="#E5E5E5"/>
  
  <!-- LOGO -->
  <text x="24" y="29" fill="#3D3D3C" font-family="Geist, sans-serif" font-size="14" font-weight="700" letter-spacing="-0.02em">hom<tspan fill="#8CC63F">é</tspan>OS</text>
  <text x="90" y="28" fill="#999998" font-family="Geist, sans-serif" font-size="10" font-weight="700" text-transform="lowercase">frd editor</text>
  
  <!-- MODE SWITCHER -->
  <rect x="220" y="8" width="160" height="32" rx="6" fill="white" stroke="#E5E5E5"/>
  <rect x="222" y="10" width="78" height="28" rx="4" fill="#8CC63F"/>
  <text x="261" y="28" fill="white" font-family="Geist, sans-serif" font-size="9" font-weight="800" text-anchor="middle">CONSTRUCT</text>
  <text x="340" y="28" fill="#999998" font-family="Geist, sans-serif" font-size="9" font-weight="800" text-anchor="middle">WIRE</text>
  
  <!-- ACTIONS (Right) -->
  <rect x="1180" y="10" width="76" height="28" rx="6" fill="#8CC63F"/>
  <text x="1218" y="28" fill="white" font-family="Geist, sans-serif" font-size="11" font-weight="700" text-anchor="middle">SAVE</text>
  
  <rect x="1090" y="10" width="80" height="28" rx="6" fill="white" stroke="#E5E5E5"/>
  <text x="1130" y="28" fill="#6A6A69" font-family="Geist, sans-serif" font-size="11" text-anchor="middle">aperçu ↗</text>

  <!-- MAIN WORKSPACE -->
  <!-- PREVIEW PANE -->
  <rect x="0" y="48" width="1000" height="452" fill="#E5E5E5"/>
  <text x="500" y="270" fill="#999998" font-family="Geist, sans-serif" font-size="14" font-style="italic" text-anchor="middle">aperçu de la maquette...</text>
  
  <!-- MONACO PANE (300px) -->
  <rect x="0" y="500" width="1000" height="300" fill="white"/>
  <line x1="0" y1="499.5" x2="1000" y2="499.5" stroke="#E5E5E5"/>
  <!-- Editor Mockup -->
  <rect x="24" y="524" width="400" height="12" rx="2" fill="#F0F9FF"/>
  <rect x="24" y="544" width="250" height="12" rx="2" fill="#F0F9FF"/>
  <rect x="24" y="564" width="320" height="12" rx="2" fill="#F0F9FF"/>
  
  <!-- RESIZE HANDLE -->
  <rect x="480" y="488" width="40" height="24" rx="12" fill="white" stroke="#D5D4D0"/>
  <text x="500" y="505" fill="#6A6A69" font-family="sans-serif" font-size="12" text-anchor="middle">↕</text>

  <!-- SULLIVAN SIDEBAR (Right, 280px) -->
  <rect x="1000" y="48" width="280" height="752" fill="#F9F9F9"/>
  <line x1="1000" y1="48" x2="1000" y2="800" stroke="#E5E5E5"/>
  
  <!-- SIDEBAR HEADER -->
  <rect x="1000" y="48" width="280" height="48" fill="white"/>
  <circle cx="1024" cy="72" r="3" fill="#8CC63F"/>
  <text x="1036" y="76" fill="black" font-family="Geist, sans-serif" font-size="12" font-weight="600">Sullivan</text>
  <line x1="1000" y1="95.5" x2="1280" y2="95.5" stroke="#E5E5E5"/>
  
  <!-- AUDIT PANEL -->
  <rect x="1000" y="96" width="280" height="40" fill="#F0FDF4"/>
  <text x="1016" y="120" fill="#166534" font-family="Geist, sans-serif" font-size="10" font-weight="800" letter-spacing="0.1em">AUDIT UX</text>
  <text x="1260" y="122" fill="#166534" font-family="sans-serif" font-size="10" text-anchor="middle">▼</text>
  <line x1="1000" y1="135.5" x2="1280" y2="135.5" stroke="#BBF7D0"/>
  
  <!-- CHAT AREA -->
  <text x="1016" y="170" fill="#999998" font-family="Geist, sans-serif" font-size="11" font-style="italic">Comment puis-je vous aider ?</text>
  
  <!-- OVERLAY LOADER -->
  <rect x="400" y="200" width="200" height="60" rx="8" fill="white" fill-opacity="0.9" stroke="#E5E5E5"/>
  <text x="500" y="235" fill="black" font-family="Geist, sans-serif" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="0.2em">SULLIVAN TRAVAILLE...</text>
</svg>
