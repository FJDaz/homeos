<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200">
  <!-- Timeline Rail - 7 étapes Frontend -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>
  
  <!-- Ligne horizontale -->
  <line x1="100" y1="50" x2="900" y2="50" 
        stroke="#a8dcc9" stroke-width="2" opacity="0.4"/>
  
  <!-- Point 1: Présentation (actif) -->
  <circle cx="100" cy="50" r="10" fill="#a8dcc9"/>
  <text x="100" y="54" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
  <text x="100" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#5A6B7C">présentation</text>
  
  <!-- Point 2: Structure -->
  <circle cx="233" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="233" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">2</text>
  <text x="233" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">structure</text>
  
  <!-- Point 3: Styles -->
  <circle cx="366" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="366" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">3</text>
  <text x="366" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">styles</text>
  
  <!-- Point 4: Composants -->
  <circle cx="500" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="500" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">4</text>
  <text x="500" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">composants</text>
  
  <!-- Point 5: Interactions -->
  <circle cx="633" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="633" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">5</text>
  <text x="633" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">interactions</text>
  
  <!-- Point 6: Animation -->
  <circle cx="766" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="766" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">6</text>
  <text x="766" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">animation</text>
  
  <!-- Point 7: Final -->
  <circle cx="900" cy="50" r="6" fill="#fff" stroke="#a8dcc9" stroke-width="2"/>
  <text x="900" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#a8dcc9">7</text>
  <text x="900" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#9B8B9E">finalisation</text>
</svg>
