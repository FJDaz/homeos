<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 400">
  <!-- Frontend Wave Layout - 7 organes en disposition sinusoïdale -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5A6B7C" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Titre section -->
  <text x="512" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#5A6B7C" font-family="system-ui">n0_frontend — 7 étapes</text>
  
  <!-- ==================== CARD 1 (x=80, y=base + sin) ==================== -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#a8dcc9"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#a8dcc9" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 1</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">présentation</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">structure &amp; wireframes</text>
    <circle cx="220" cy="45" r="12" fill="#a8dcc9" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#a8dcc9">1</text>
  </g>
  
  <!-- ==================== CARD 2 (sin = +15px) ==================== -->
  <g transform="translate(350, 95)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#C4A589"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#C4A589" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 2</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">structure html</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">sémantique &amp; accessibilité</text>
    <circle cx="220" cy="45" r="12" fill="#C4A589" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#C4A589">2</text>
  </g>
  
  <!-- ==================== CARD 3 (sin = +15px) ==================== -->
  <g transform="translate(620, 95)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#9B8B9E"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#9B8B9E" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 3</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">styles css</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">design system &amp; variables</text>
    <circle cx="220" cy="45" r="12" fill="#9B8B9E" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#9B8B9E">3</text>
  </g>
  
  <!-- ==================== CARD 4 (sin = baseline) ==================== -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#5A6B7C"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#5A6B7C" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 4</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">composants</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">atoms &amp; molecules</text>
    <circle cx="220" cy="45" r="12" fill="#5A6B7C" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#5A6B7C">4</text>
  </g>
  
  <!-- ==================== CARD 5 (sin = -15px) ==================== -->
  <g transform="translate(350, 205)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#a8dcc9"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#a8dcc9" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 5</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">interactions</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">events &amp; handlers</text>
    <circle cx="220" cy="45" r="12" fill="#a8dcc9" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#a8dcc9">5</text>
  </g>
  
  <!-- ==================== CARD 6 (sin = -15px) ==================== -->
  <g transform="translate(620, 205)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#C4A589"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#C4A589" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 6</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">animations</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">transitions &amp; keyframes</text>
    <circle cx="220" cy="45" r="12" fill="#C4A589" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#C4A589">6</text>
  </g>
  
  <!-- ==================== CARD 7 (sin = baseline) ==================== -->
  <g transform="translate(350, 320)">
    <rect x="0" y="0" width="240" height="90" rx="8" fill="#fafafa" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="90" rx="8" fill="#9B8B9E"/>
    <rect x="12" y="12" width="50" height="14" rx="7" fill="#9B8B9E" opacity="0.15"/>
    <text x="37" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#5A6B7C">étape 7</text>
    <text x="16" y="50" font-size="15" font-weight="700" fill="#1a1a1a">finalisation</text>
    <text x="16" y="70" font-size="10" fill="#5A6B7C">optimisation &amp; livraison</text>
    <circle cx="220" cy="45" r="12" fill="#9B8B9E" opacity="0.1"/>
    <text x="220" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#9B8B9E">7</text>
  </g>
</svg>
