name: deploy to hf spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: install huggingface_hub
        run: pip install huggingface_hub

      - name: push to hugging face space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          api.upload_folder(
              folder_path=".",
              repo_id="FJDaz/homeos",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=[
                  ".git/**", ".github/**",
                  "**/__pycache__/**", "**/*.pyc",
                  "**/*.gguf", "**/*.bin",
                  "node_modules/**",
              ],
          )
          print("Deploy OK")
          EOF
