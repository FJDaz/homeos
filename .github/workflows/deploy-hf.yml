name: deploy to hf spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: push to hugging face space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@homeos"
          git config user.name "homeos-ci"
          git remote remove hf-space 2>/dev/null || true
          git remote add hf-space https://FJDaz:${HF_TOKEN}@huggingface.co/spaces/FJDaz/homeos
          git push hf-space main --force
